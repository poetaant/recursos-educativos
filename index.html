<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Nos Trasladamos!</title>
    <!-- Importar Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Definición de todas las animaciones keyframes */
        @keyframes trainMove {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        @keyframes bounceWalk {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-25px) rotate(2deg); }
        }
        @keyframes trumpLeft {
            0% { transform: rotate(30deg) translateY(0); }
            100% { transform: rotate(140deg) translateY(-10px); }
        }
        @keyframes trumpRight {
            0% { transform: rotate(-30deg) translateY(0); }
            100% { transform: rotate(-140deg) translateY(-10px); }
        }
        @keyframes swingLeft {
            0% { transform: rotate(-45deg); }
            100% { transform: rotate(45deg); }
        }
        @keyframes swingRight {
            0% { transform: rotate(45deg); }
            100% { transform: rotate(-45deg); }
        }
        @keyframes bounceRight {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(15px); }
        }
        @keyframes bounceLeft {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-15px); }
        }

        /* Clases de utilidad para aplicar las animaciones */
        .animate-train {
            animation: trainMove 35s linear infinite;
        }
        .animate-bounce-walk {
            animation: bounceWalk 0.6s infinite ease-in-out;
        }
        .animate-trump-left {
            animation: trumpLeft 0.5s infinite alternate ease-in-out;
        }
        .animate-trump-right {
            animation: trumpRight 0.5s infinite alternate ease-in-out;
        }
        .animate-swing-left {
            animation: swingLeft 0.6s infinite alternate ease-in-out;
        }
        .animate-swing-right {
            animation: swingRight 0.6s infinite alternate ease-in-out;
        }
        .animate-bounce-right {
            animation: bounceRight 1s infinite ease-in-out;
        }
        .animate-bounce-left {
            animation: bounceLeft 1s infinite ease-in-out;
        }
    </style>
</head>
<body class="w-full h-screen bg-gradient-to-b from-sky-300 to-green-300 overflow-hidden relative flex items-center m-0 p-0 font-sans">

    <!-- ENLACES SUPERIORES Y FLECHAS FIJAS -->
    <div class="absolute top-8 left-0 w-full flex flex-col items-center justify-start z-50 px-4">
        <div class="w-full max-w-6xl bg-white/95 p-6 md:p-10 rounded-3xl shadow-[0_10px_0_rgba(0,0,0,0.8)] border-4 border-gray-900 text-center transform transition hover:scale-105 flex flex-col items-center gap-6 md:gap-8">
            <div class="flex items-center justify-center gap-4 md:gap-8">
                <!-- Flecha Izquierda (fija apuntando al título) -->
                <svg class="w-12 h-12 md:w-20 md:h-20 text-red-500 drop-shadow-[0_4px_0_rgba(0,0,0,1)]" fill="none" stroke="currentColor" stroke-width="6" viewBox="0 0 24 24">
                   <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 12h14"></path>
                </svg>
                
                <h1 class="text-3xl md:text-5xl lg:text-7xl font-black text-gray-900 uppercase tracking-wide">¡NUEVA PÁGINA WEB!</h1>
                
                <!-- Flecha Derecha (fija apuntando al título) -->
                <svg class="w-12 h-12 md:w-20 md:h-20 text-red-500 drop-shadow-[0_4px_0_rgba(0,0,0,1)]" fill="none" stroke="currentColor" stroke-width="6" viewBox="0 0 24 24">
                   <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7M19 12H5"></path>
                </svg>
            </div>
            <div class="flex flex-col md:flex-row gap-4 md:gap-8 w-full justify-center">
                <a href="https://poetaanton.educastu.com" target="_blank" rel="noopener noreferrer" class="flex-1 max-w-lg px-6 py-4 md:py-6 bg-blue-500 hover:bg-blue-400 text-white font-bold rounded-2xl border-4 border-gray-900 shadow-[6px_6px_0_rgba(0,0,0,1)] transition-all active:shadow-none active:translate-y-1 active:translate-x-1 text-lg md:text-2xl lg:text-3xl">
                    poetaanton.educastu.com
                </a>
                <a href="https://www.poetaanton.educastu.com" target="_blank" rel="noopener noreferrer" class="flex-1 max-w-lg px-6 py-4 md:py-6 bg-purple-500 hover:bg-purple-400 text-white font-bold rounded-2xl border-4 border-gray-900 shadow-[6px_6px_0_rgba(0,0,0,1)] transition-all active:shadow-none active:translate-y-1 active:translate-x-1 text-lg md:text-2xl lg:text-3xl">
                    www.poetaanton.educastu.com
                </a>
            </div>
        </div>
    </div>

    <!-- Contenedor del Tren (Se mueve de derecha a izquierda) -->
    <div class="animate-train absolute bottom-28 md:bottom-36 flex items-center z-10 w-max pr-32">
        
        <!-- LA CUERDA / HILO (conecta todo) -->
        <div class="absolute top-1/2 left-0 w-full h-4 bg-amber-800 -translate-y-1/2 border-y-2 border-amber-950 z-0"></div>

        <!-- EL LETRERO (Se generará con JavaScript) -->
        <div id="text-container" class="flex items-center space-x-2 mr-16 md:mr-32 z-10">
            <!-- Las letras se insertan aquí -->
        </div>

        <!-- LOS PERSONAJES FOTOGRÁFICOS (Se generarán con JavaScript) -->
        <div id="characters-container" class="flex items-center">
            <!-- Las imágenes se insertan aquí -->
        </div>

    </div>

    <!-- Decoración del fondo (nubes) -->
    <div class="absolute top-10 left-20 w-32 h-10 bg-white/50 rounded-full blur-sm pointer-events-none"></div>
    <div class="absolute top-32 right-40 w-48 h-16 bg-white/40 rounded-full blur-md pointer-events-none"></div>
    <div class="absolute top-20 left-1/2 w-64 h-20 bg-white/30 rounded-full blur-md pointer-events-none"></div>

    <!-- Script para generar elementos dinámicamente -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. GENERAR EL TEXTO
            const textToDisplay = "NOS TRASLADAMOS A UN SITIO MAS SEGURO: https";
            const textContainer = document.getElementById('text-container');
            
            textToDisplay.split('').forEach((char, i) => {
                if (char === ' ') {
                    // Espacio en blanco
                    const space = document.createElement('div');
                    space.className = "w-8 md:w-10";
                    textContainer.appendChild(space);
                } else {
                    // Letra con pinza
                    const wrapper = document.createElement('div');
                    wrapper.className = "relative flex flex-col items-center";
                    
                    const pin = document.createElement('div');
                    pin.className = "w-2 h-6 bg-gray-600 rounded-full border border-gray-800 z-10 -mb-2";
                    
                    const letterBox = document.createElement('div');
                    letterBox.className = "w-12 h-16 md:w-16 md:h-20 bg-yellow-400 rounded border-4 border-gray-800 flex items-center justify-center text-3xl md:text-5xl font-black text-gray-900 shadow-[4px_4px_0px_rgba(0,0,0,1)] origin-top animate-bounce-walk";
                    letterBox.style.animationDelay = `${i * 0.1}s`;
                    letterBox.textContent = char;
                    
                    wrapper.appendChild(pin);
                    wrapper.appendChild(letterBox);
                    textContainer.appendChild(wrapper);
                }
            });

            // 2. GENERAR LOS PERSONAJES
            const images = [
                '1.jpg',
                '2.JPG',
                '3.JPG',
                '4.JPG',
                '5.JPG',
                '6.jpg',
                '7.JPG'
            ];
            const charactersContainer = document.getElementById('characters-container');

            images.forEach((src, index) => {
                const delay = index * 0.2;
                const legDelay = index * 0.2;
                
                // Usamos template literals para construir el HTML del personaje de forma limpia
                const charHTML = `
                <div class="relative flex-shrink-0 mx-10 flex flex-col items-center justify-center z-10 group">
                  
                  <!-- Contenedor del Personaje -->
                  <div class="relative w-48 h-36 md:w-64 md:h-48 bg-white border-4 border-gray-800 rounded-2xl shadow-xl z-10 flex items-center justify-center animate-bounce-walk" style="animation-delay: ${delay}s;">
                    
                    <!-- Cuerpo (La Foto) -->
                    <img 
                      src="${src}" 
                      alt="Personaje ${index + 1}" 
                      class="w-full h-full object-cover rounded-xl"
                      onerror="this.src='https://placehold.co/400x300?text=Foto+${index + 1}'"
                    />

                    <!-- Brazo Izquierdo -->
                    <div class="absolute -left-8 top-1/4 w-8 h-20 bg-[#f4c28d] border-2 border-gray-800 rounded-full origin-top z-20 shadow-md flex justify-center animate-trump-left" style="animation-delay: ${delay}s;">
                      <div class="absolute -bottom-3 w-10 h-10 bg-white border-2 border-gray-800 rounded-full shadow-sm"></div>
                    </div>

                    <!-- Brazo Derecho -->
                    <div class="absolute -right-8 top-1/4 w-8 h-20 bg-[#f4c28d] border-2 border-gray-800 rounded-full origin-top z-20 shadow-md flex justify-center animate-trump-right" style="animation-delay: ${delay + 0.1}s;">
                      <div class="absolute -bottom-3 w-10 h-10 bg-white border-2 border-gray-800 rounded-full shadow-sm"></div>
                    </div>

                    <!-- Pierna Izquierda -->
                    <div class="absolute -bottom-20 left-6 w-8 h-24 bg-blue-600 border-2 border-gray-800 rounded-full origin-top -z-10 animate-swing-left" style="animation-delay: ${legDelay}s;">
                      <div class="absolute -bottom-4 -left-4 w-14 h-8 bg-black rounded-full border-2 border-gray-800"></div>
                    </div>

                    <!-- Pierna Derecha -->
                    <div class="absolute -bottom-20 right-6 w-8 h-24 bg-blue-600 border-2 border-gray-800 rounded-full origin-top -z-10 animate-swing-right" style="animation-delay: ${legDelay}s;">
                      <div class="absolute -bottom-4 -left-4 w-14 h-8 bg-black rounded-full border-2 border-gray-800"></div>
                    </div>

                  </div>
                </div>`;
                
                // Insertarlo en el contenedor
                charactersContainer.insertAdjacentHTML('beforeend', charHTML);
            });
        });
    </script>
</body>
</html>
