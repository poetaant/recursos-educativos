                  const estCharWidth = ww > 768 ? 24 : 14; 
                  const estPadding = ww > 768 ? 60 : 40; 
                  const estWidth = (w.w.length * estCharWidth) + estPadding;
                  
                  if (currentWidth + estWidth > availableWidth && currentRow.length > 0) {
                      rows.push({ words: currentRow, totalWidth: currentWidth - wordSpacing });
                      currentRow = [];
                      currentWidth = 0;
                  }
                  currentRow.push({ ...w, estWidth });
                  currentWidth += estWidth + wordSpacing;
              });
              if (currentRow.length > 0) {
                  rows.push({ words: currentRow, totalWidth: currentWidth - wordSpacing });
              }

              let playableWords = [];
              let startY = 80;

              rows.forEach((row, rIndex) => {
                  let currentX = marginOffset + (availableWidth - row.totalWidth) / 2;
                  
                  row.words.forEach((w, wIndex) => {
                      playableWords.push({
                          ...w,
                          id: `gw-${Date.now()}-${rIndex}-${wIndex}`,
                          mappedTag: getCycleMappedTag(w.t3, cycle),
                          x: currentX + (w.estWidth / 2),
                          y: startY,
                          status: 'falling',
                          rotation: 0 
                      });
                      currentX += w.estWidth + wordSpacing;
                  });
                  startY -= (ww > 768 ? 90 : 70); 
              });

              setGameWords(prev => clearPrevious ? playableWords : [...prev, ...playableWords]);
              setIsSpawning(false);
          }, [cycle]);

          const startGame = () => {
              setGameScore(0);
              setHighestScore(0);
              setLives(3);
              setConsecutiveErrors(0);
              setFallenCount(0);
              setIsSpawning(false);
              setAnalysisQueue([]);
              setIsRecycling(false);
              setGameSpeedMultiplier(0.6); // Reseteo de velocidad a LENTA
              setGameState('playing');
              loadGameSentence(true);
          };

          // Hitos de Puntuación (Vidas y Reciclaje)
          const triggerRecycleAnimation = useCallback(() => {
              setIsRecycling(true);
              playSound('magic');
              
              setGameWords(prev => prev.map(w => {
                  if (w.status === 'fallen' || w.status === 'failing') {
                      return { ...w, status: 'recycling_gather', x: window.innerWidth / 2, y: window.innerHeight / 2, rotation: w.rotation + 1080 };
                  }
                  return w;
              }));
              
              setTimeout(() => {
                  setGameWords(prev => prev.map(w => {
                      if (w.status === 'recycling_gather') {
                          return { 
                              ...w, 
                              status: 'recycling_explode', 
                              x: (window.innerWidth / 2) + (Math.random() * window.innerWidth - window.innerWidth / 2), 
                              y: -200, 
                              rotation: w.rotation + 1080 
                          };
                      }
                      return w;
                  }));
                  setFallenCount(0); 
              }, 2000);
              
              setTimeout(() => {
                  setGameWords(prev => prev.filter(w => w.status !== 'recycling_explode'));
                  setIsRecycling(false);
              }, 3500);
          }, []);

          useEffect(() => {
              if (gameScore > highestScore) {
                  const old1000s = Math.floor(highestScore / 1000);
                  const new1000s = Math.floor(gameScore / 1000);
                  if (new1000s > old1000s) {
                      setLives(l => l + (new1000s - old1000s));
                      playSound('success'); 
                  }

                  const old1500s = Math.floor(highestScore / 1500);
                  const new1500s = Math.floor(gameScore / 1500);
                  if (new1500s > old1500s) {
                      triggerRecycleAnimation();
                  }

                  setHighestScore(gameScore);
              }
          }, [gameScore, highestScore, triggerRecycleAnimation]);

          useEffect(() => {
              if (consecutiveErrors >= 3) {
                  setLives(l => l - 1);
                  setConsecutiveErrors(0);
                  playSound('error');
              }
          }, [consecutiveErrors]);

          useEffect(() => {
              if (gameState !== 'playing') return;

              if (lives <= 0 || fallenCount >= maxFallenAllowed) {
                  setGameState('over');
                  playSound('error');
                  return;
              }

              if (gameWords.length > 0 && !isRecycling) {
                  const hasActiveWords = gameWords.some(w => w.status === 'falling' || w.status === 'dragging' || w.status === 'failing');
                  if (!hasActiveWords && !isSpawning) {
                      setIsSpawning(true);
                      setTimeout(() => {
                          if (gameState === 'playing') loadGameSentence(false);
                      }, 1000);
                  }
              }
          }, [lives, gameWords, fallenCount, gameState, isSpawning, loadGameSentence, isRecycling]);

          // Loop de gravedad del juego
          useEffect(() => {
              let rafId;
              let lastTime = performance.now();
              const baseSpeed = cycle === 1 ? 0.005 : cycle === 2 ? 0.008 : 0.012;
              const speed = baseSpeed * gameSpeedMultiplier;

              const tick = (time) => {
                  if (gameState !== 'playing') return;
                  const dt = Math.min(time - lastTime, 50);
                  lastTime = time;

                  setGameWords(prev => {
                      let hasChanges = false;
                      let newFallen = 0;
                      
                      let currentFallen = prev.filter(w => w.status === 'fallen');
                      const wordHeight = window.innerWidth > 768 ? 50 : 35; 
                      const baseFloor = window.innerHeight - 50;
                      
                      const next = prev.map(w => {
                          if (w.status === 'falling' || w.status === 'failing') {
                              hasChanges = true;
                              const isFailing = w.status === 'failing';
                              const currentSpeed = isFailing ? Math.max(0.8, speed * 3) : speed; 
                              const newY = w.y + (currentSpeed * dt);
                              const newX = isFailing && w.driftX ? w.x + (w.driftX * dt) : w.x;
                              
                              let newRotation = w.rotation || 0;
                              if (isFailing) {
                                  newRotation += (w.rotationDir || 1) * dt * 0.3; 
                              }

                              let myFloor = baseFloor;
                              for (let fw of currentFallen) {
                                  const wHalf = (w.estWidth || 100) / 2;
                                  const fwHalf = (fw.estWidth || 100) / 2;
                                  
                                  if (Math.abs(newX - fw.x) < (wHalf + fwHalf - 15)) {
                                      if (fw.y >= w.y - 10) {
                                          const localFloor = fw.y - wordHeight;
                                          if (localFloor < myFloor) {
                                              myFloor = localFloor;
                                          }
                                      }
                                  }
                              }

                              if (newY >= myFloor) { 
                                  if (w.status !== 'fallen') {
                                      newFallen++;
                                  }
                                  
                                  const finalWord = { 
                                      ...w, 
                                      x: Math.max(20, Math.min(window.innerWidth - 20, newX)),
                                      y: myFloor, 
                                      status: 'fallen',
                                      rotation: isFailing ? newRotation : (Math.random() * 40) - 20 
                                  };
                                  
                                  currentFallen.push(finalWord); 
                                  return finalWord;
                              }
                              return { ...w, x: newX, y: newY, rotation: newRotation };
                          }
                          return w;
                      });

                      if (newFallen > 0) {
                          setTimeout(() => {
                              setFallenCount(fc => fc + newFallen);
                              setGameScore(s => s - (50 * newFallen));
                              setConsecutiveErrors(c => c + newFallen);
                          }, 0);
                      }
                      return hasChanges ? next : prev;
                  });

                  rafId = requestAnimationFrame(tick);
              };

              if (gameState === 'playing' && !isRecycling) {
                  rafId = requestAnimationFrame(tick);
              }
              return () => cancelAnimationFrame(rafId);
          }, [gameState, cycle, isRecycling, gameSpeedMultiplier]);

          const handlePointerDown = (e, id) => {
              if (isRecycling) return;
              e.currentTarget.setPointerCapture(e.pointerId);
              setDraggedWordId(id);
              setGameWords(prev => prev.map(w => w.id === id ? { ...w, status: 'dragging' } : w));
          };

          const handlePointerMove = (e) => {
              if (!draggedWordId) return;
              setGameWords(prev => prev.map(w => w.id === draggedWordId ? { ...w, x: e.clientX, y: e.clientY } : w));
          };

          const handlePointerUp = (e, id) => {
              if (draggedWordId !== id) return;
              
              e.currentTarget.releasePointerCapture(e.pointerId);
              
              const currentDisplay = e.currentTarget.style.display;
              e.currentTarget.style.display = 'none';
              const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
              e.currentTarget.style.display = currentDisplay;

              const refugeCat = dropTarget?.closest('[data-refuge-cat]')?.getAttribute('data-refuge-cat');

              setGameWords(prev => {
                  const targetWord = prev.find(w => w.id === id);
                  if (!targetWord) return prev;
                  
                  if (refugeCat) {
                      if (refugeCat === targetWord.mappedTag) {
                          playSound('success');
                          setTimeout(() => {
                              setGameScore(s => s + 100);
                              setConsecutiveErrors(0);
                          }, 0);
                          
                          setOpenDoors(d => ({ ...d, [refugeCat]: true }));
                          setTimeout(() => {
                              setOpenDoors(d => ({ ...d, [refugeCat]: false }));
                          }, 500);

                          return prev.map(w => w.id === id ? { ...w, status: 'caught' } : w);
                      } else {
                          playSound('error');
                          setTimeout(() => {
                              setGameScore(s => s - 50);
                              setConsecutiveErrors(c => c + 1);
                          }, 0);
                          return prev.map(w => w.id === id ? { 
                              ...w, 
                              status: 'failing', 
                              rotationDir: Math.random() > 0.5 ? 1 : -1,
                              driftX: (Math.random() - 0.5) * 0.5,
                              stackOffset: Math.random() * 60
                          } : w);
                      }
                  } else {
                      return prev.map(w => w.id === id ? { ...w, status: 'falling' } : w);
                  }
              });
              setDraggedWordId(null);
          };

          // --- LÓGICA DE ANÁLISIS DE CONTENEDORES ---
          const startContainerAnalysis = () => {
              const caught = gameWords.filter(w => w.status === 'caught');
              if (caught.length === 0) return;
              setAnalysisQueue(caught);
              setGameState('analyzing');
              setModalState({ tempSelections: {}, error: "", hint: "" });
          };

          const handleArcadeTraitSelect = (key, val) => {
              setModalState(prev => ({ ...prev, tempSelections: { ...prev.tempSelections, [key]: val }, error: "" }));
          };

          const handleComprobarArcade = () => {
              const wordObj = analysisQueue[0];
              const catId = wordObj.mappedTag;
              
              let requiredKeys = traitDefs.map(t => t.key).filter(k => wordObj[k] !== "-" && wordObj[k] !== undefined);
              if (catId === "verbo" && cycle === 1) requiredKeys = requiredKeys.filter(k => k === 'tense');
              if (catId === "numeral") requiredKeys = requiredKeys.filter(k => ['type', 'gen', 'num'].includes(k));
              if (catId === "indefinido") requiredKeys = requiredKeys.filter(k => ['gen', 'num'].includes(k));
              if (catId === "pronombre personal") requiredKeys = requiredKeys.filter(k => ['per', 'gen', 'num'].includes(k));

              const isComplete = requiredKeys.every(k => modalState.tempSelections[k] !== undefined);
              if (!isComplete) {
                  playSound('error');
                  setModalState(prev => ({ ...prev, error: "¡ANÁLISIS INCOMPLETO!" }));
                  setTimeout(() => setModalState(prev => ({ ...prev, error: "" })), 1500);
                  return;
              }
              
              const isCorrect = requiredKeys.every(k => wordObj[k] === modalState.tempSelections[k]);

              if (isCorrect) {
                  playSound('success');
                  setGameScore(s => s + 100); 
                  setConsecutiveErrors(0);
                  setGameWords(prev => prev.map(w => w.id === wordObj.id ? { ...w, status: 'archived' } : w));
                  
                  const nextQ = analysisQueue.slice(1);
                  if (nextQ.length > 0) {
                      setAnalysisQueue(nextQ);
                      setModalState({ tempSelections: {}, error: "", hint: "" });
                  } else {
                      setGameState('playing');
                  }
              } else {
                  playSound('error');
                  setGameScore(s => s - 50);
                  setConsecutiveErrors(c => c + 1);
                  
                  setGameWords(prev => prev.map(w => w.id === wordObj.id ? { 
                      ...w, 
                      status: 'failing',
                      y: window.innerHeight / 2, 
                      x: window.innerWidth / 2,
                      rotationDir: Math.random() > 0.5 ? 1 : -1,
                      driftX: (Math.random() - 0.5) * 0.8,
                      stackOffset: Math.random() * 60
                  } : w));
                  
                  setModalState(prev => ({ ...prev, error: "¡ERROR CRÍTICO! PALABRA PERDIDA." }));
                  
                  setTimeout(() => {
                      const nextQ = analysisQueue.slice(1);
                      if (nextQ.length > 0) {
                          setAnalysisQueue(nextQ);
                          setModalState({ tempSelections: {}, error: "", hint: "" });
                      } else {
                          setGameState('playing');
                      }
                  }, 2000);
              }
          };

          // --- FUNCIONES MODO PIZARRA MANUAL ---
          const fetchFromBVMC = async () => {
            setIsFetchingBVMC(true);
            setErrorMessage("");
            try {
                const query = `PREFIX dc: <http://purl.org/dc/elements/1.1/> PREFIX rda: <http://rdvocab.info/ElementsGr2/> SELECT ?title ?authorName WHERE { ?work dc:title ?title . ?work dc:creator ?creator . ?creator rda:nameOfThePerson ?authorName . } LIMIT 100`;
                const url = `https://data.cervantesvirtual.com/sparql?query=${encodeURIComponent(query)}`;
                const response = await fetch(url, { headers: { 'Accept': 'application/sparql-results+json' } });
                if (!response.ok) throw new Error("BVMC error");
                const data = await response.json();
                const bindings = data.results.bindings;
                if (bindings && bindings.length > 0) {
                    const randomItem = bindings[Math.floor(Math.random() * bindings.length)];
                    const title = randomItem.title.value.replace(/[.,;*!?'"()]/g,"").trim();
                    const author = randomItem.authorName.value.replace(/[.,;*!?'"()]/g,"").trim();
                    setRawCustomText(`La obra literaria ${title} fue escrita por el autor ${author}.`);
                } else throw new Error("Vacio");
            } catch (error) {
                const fallbacks = ["En un lugar de la Mancha de cuyo nombre no quiero acordarme no ha mucho tiempo que vivía un hidalgo.", "Con diez cañones por banda viento en popa a toda vela no corta el mar sino vuela un velero bergantín.", "Juventud divino tesoro ya te vas para no volver."];
                setRawCustomText(fallbacks[Math.floor(Math.random() * fallbacks.length)]);
                setErrorMessage("Conexión bloqueada. Se ha cargado un fragmento clásico alternativo.");
                setTimeout(() => setErrorMessage(""), 4000);
            }
            setIsFetchingBVMC(false);
          };

          const loadCustomText = () => {
            if (!rawCustomText.trim()) return;
            const paragraphs = rawCustomText.split('\n').filter(p => p.trim() !== "");
            const newTextData = paragraphs.map((p, pIndex) => {
                const words = p.split(/\s+/).filter(w => w.trim() !== "");
                return words.map((rawWord, wIndex) => {
                   const match = rawWord.match(/^([^a-záéíóúüñÁÉÍÓÚÜÑ]*)([a-záéíóúüñÁÉÍÓÚÜÑ]+)([^a-záéíóúüñÁÉÍÓÚÜÑ]*)$/i);
                   if (match) return { id: `c-p${pIndex}-w${wIndex}`, pre: match[1]||"", w: match[2], s: match[3]||"", isCustom: true, isCorrect: false, initials: [] };
                   return { id: `c-p${pIndex}-w${wIndex}`, pre: "", w: rawWord, s: "", isCustom: true, isCorrect: false, initials: [] };
                });
            });
            setTextData(newTextData);
            setIsCustomTextLoaded(true);
            setModalState(null);
            setIsCloudVisible(false);
          };

          const handleWordClick = (p, w) => {
            const wordObj = textData[p][w];
            if (wordObj.isCorrect) return;
            if (!wordObj.isCustom) {
                const mappedExpectedTag = getCycleMappedTag(wordObj.t3, cycle);
                if (!mappedExpectedTag) return;
            }
            setModalState({ p, w, step: 1, category: null, tempSelections: {}, error: "", hint: "" });
          };

          const handleCategorySelect = (clickedCat) => {
            const wordObj = textData[modalState.p][modalState.w];
            if (wordObj.isCustom) {
                const traits = getActiveTraitsForWord(wordObj, cycle, clickedCat.id, {});
                if (traits.length === 0) {
                  playSound('success');
                  const initials = [getCategoryAbbreviation(clickedCat.id)];
                  const newData = [...textData];
                  newData[modalState.p][modalState.w] = { ...wordObj, isCorrect: true, colorClass: clickedCat.color, category: clickedCat, initials };
                  setTextData(newData);
                  setModalState(null);
                } else {
                  setModalState(prev => ({ ...prev, step: 2, category: clickedCat, error: "", hint: "" }));
                }
                return;
            }
            const mappedExpectedTag = getCycleMappedTag(wordObj.t3, cycle);
            if (clickedCat.id === mappedExpectedTag) {
              const traits = getActiveTraitsForWord(wordObj, cycle, clickedCat.id, {});
              if (traits.length === 0) {
                  playSound('success');
                  const initials = [getCategoryAbbreviation(clickedCat.id)];
                  const newData = [...textData];
                  newData[modalState.p][modalState.w] = { ...wordObj, isCorrect: true, colorClass: clickedCat.color, category: clickedCat, initials };
                  setTextData(newData);
                  setModalState(null);
              } else {
                  setModalState(prev => ({ ...prev, step: 2, category: clickedCat, error: "", hint: "" }));
              }
            } else {
              playSound('error');
              const hintMsg = hintsDict[mappedExpectedTag] || "Fíjate bien en la función que cumple en la oración.";
              setModalState(prev => ({ ...prev, error: "Categoría incorrecta, inténtalo de nuevo.", hint: hintMsg }));
              setTimeout(() => setModalState(prev => prev ? { ...prev, error: "", hint: "" } : null), 5000);
            }
          };

          const handleTraitSelect = (key, val) => {
            setModalState(prev => ({ ...prev, tempSelections: { ...prev.tempSelections, [key]: val } }));
          };

          const handleComprobar = () => {
            const wordObj = textData[modalState.p][modalState.w];
            let isCorrect = true;
            if (!wordObj.isCustom) {
                let requiredKeys = traitDefs.map(t => t.key).filter(k => wordObj[k] !== "-" && wordObj[k] !== undefined);
                if (modalState.category.id === "verbo" && cycle === 1) requiredKeys = requiredKeys.filter(k => k === 'tense');
                if (modalState.category.id === "numeral") requiredKeys = requiredKeys.filter(k => ['type', 'gen', 'num'].includes(k));
                if (modalState.category.id === "indefinido") requiredKeys = requiredKeys.filter(k => ['gen', 'num'].includes(k));
                if (modalState.category.id === "pronombre personal") requiredKeys = requiredKeys.filter(k => ['per', 'gen', 'num'].includes(k));
                isCorrect = requiredKeys.every(k => wordObj[k] === modalState.tempSelections[k]);
            } else {
                const shownTraits = getActiveTraitsForWord(wordObj, cycle, modalState.category.id, modalState.tempSelections);
                isCorrect = shownTraits.every(t => modalState.tempSelections[t.key] !== undefined);
            }

            if (isCorrect) {
              playSound('success');
              const initials = [];
              initials.push(getCategoryAbbreviation(modalState.category.id));
              if (modalState.category.id === "verbo") {
                if (modalState.tempSelections.tense) initials.push(modalState.tempSelections.tense === "presente" ? "PRES" : modalState.tempSelections.tense === "pasado" ? "PAS" : "FUT");
                if (modalState.tempSelections.per) initials.push(modalState.tempSelections.per);
                if (modalState.tempSelections.gen) initials.push(modalState.tempSelections.gen);
                if (modalState.tempSelections.num) initials.push(modalState.tempSelections.num);
                if (modalState.tempSelections.verbForm) initials.push(modalState.tempSelections.verbForm === "Personal" ? "PERS" : modalState.tempSelections.verbForm.substring(0,3).toUpperCase()); 
                if (modalState.tempSelections.conjugation) initials.push(modalState.tempSelections.conjugation.split(' ')[0]);
              } else {
                if (modalState.tempSelections.type) initials.push(modalState.category.id === "numeral" ? modalState.tempSelections.type.substring(0,3).toUpperCase() : modalState.tempSelections.type);
                if (modalState.tempSelections.gen) initials.push(modalState.tempSelections.gen);   
                if (modalState.tempSelections.num) initials.push(modalState.tempSelections.num);   
                if (modalState.tempSelections.dist) initials.push(modalState.tempSelections.dist === "Cercanía" ? "CERC" : modalState.tempSelections.dist === "Dist. media" ? "MED" : "LEJ");
                if (modalState.tempSelections.per) initials.push(modalState.tempSelections.per);   
                if (modalState.tempSelections.advType) initials.push(modalState.tempSelections.advType.substring(0,3).toUpperCase()); 
                if (modalState.tempSelections.conjType) initials.push(modalState.tempSelections.conjType.substring(0,3).toUpperCase()); 
              }

              const newData = [...textData];
              newData[modalState.p][modalState.w] = { ...wordObj, isCorrect: true, colorClass: modalState.category.color, category: modalState.category, initials };
              setTextData(newData);
              setModalState(null);
            } else {
              playSound('error');
              if (wordObj.isCustom) {
                  setModalState(prev => ({ ...prev, error: "¡Faltan opciones por seleccionar!", hint: "Completa todos los rasgos." }));
              } else {
                  setModalState(prev => ({ ...prev, error: "¡Revisa los rasgos morfológicos!", hint: "Comprueba las opciones." }));
              }
              setTimeout(() => setModalState(prev => prev ? { ...prev, error: "", hint: "" } : null), 5000);
            }
          };

          const handleFinalizar = () => {
            const unanalyzedWords = [];
            const allCorrectWords = [];
            let isCustomModeActive = false;

            textData.forEach(paragraph => {
              paragraph.forEach(wordObj => {
                if (wordObj.isCustom) isCustomModeActive = true;
                
                if (wordObj.isCustom) {
                    if (wordObj.isCorrect && wordObj.category) {
                        allCorrectWords.push({ w: wordObj.w, cat: wordObj.category });
                    }
                } else {
                    const expectedTag = getCycleMappedTag(wordObj.t3, cycle);
                    if (expectedTag) {
                      if (!wordObj.isCorrect) unanalyzedWords.push(wordObj.w);
                      else {
                        const catInfo = cyclesData[cycle].find(c => c.id === expectedTag);
                        allCorrectWords.push({ w: wordObj.w, cat: catInfo });
                      }
                    }
                }
              });
            });

            if (!isCustomModeActive && unanalyzedWords.length > 0) {
              playSound('error');
              setErrorMessage(`¡Aún faltan ${unanalyzedWords.length} palabras por analizar!`);
              setHighlightRemaining(true);
              setTimeout(() => { setErrorMessage(""); setHighlightRemaining(false); }, 3500);
              return;
            }
            if (isCustomModeActive && allCorrectWords.length === 0) {
               playSound('error');
               setErrorMessage(`¡No has analizado ninguna palabra!`);
               setTimeout(() => setErrorMessage(""), 3500);
               return;
            }
            
            setShowClouds(shuffle(allCorrectWords));
            setIsCloudVisible(true);
          };

          const textClasses = cycle === 1 ? "text-4xl md:text-5xl" : "text-2xl md:text-3xl";

          const activeTraitsToRender = modalState && modalState.step === 2 
            ? getActiveTraitsForWord(textData[modalState.p][modalState.w], cycle, modalState.category.id, modalState.tempSelections) 
            : [];

          // --- RENDERIZADO PRINCIPAL ---
          
          if (inputMode === 'game') {
              if (gameState === 'idle') {
                  return (
                     <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center font-mono p-4">
                         <div className="absolute inset-0 opacity-20 bg-[linear-gradient(rgba(34,211,238,0.2)_1px,transparent_1px),linear-gradient(90deg,rgba(34,211,238,0.2)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none"></div>
                         <GamepadIcon size={80} className="text-cyan-400 mb-6 drop-shadow-[0_0_15px_rgba(34,211,238,0.8)]" />
                         <h2 className="text-5xl md:text-7xl font-black text-cyan-300 mb-6 drop-shadow-[0_0_10px_rgba(34,211,238,0.8)] tracking-widest uppercase">Atrapa Palabras</h2>
                         <p className="mb-10 text-slate-300 text-xl max-w-2xl text-center leading-relaxed">
                            Acierta: <span className="text-emerald-400 font-bold">+100pts</span> | Falla: <span className="text-rose-400 font-bold">-50pts</span><br/><br/>
                            Empiezas con 3 vidas. Cada 1000 puntos ganas una vida extra. 3 fallos seguidos te quitan 1 vida. Si la basura colapsa el suelo (15 piezas), Game Over. ¡Pero cada 1500 puntos habrá un evento especial de reciclaje mágico!
                         </p>
                         <div className="flex gap-6 z-10">
                             <button onClick={startGame} className="bg-emerald-600 border-2 border-emerald-400 text-white font-black px-10 py-4 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.5)] hover:bg-emerald-500 hover:scale-105 active:scale-95 transition-transform text-2xl flex items-center gap-3">
                               <Star size={28} /> START GAME
                             </button>
                             <button onClick={() => setInputMode('auto')} className="bg-slate-800 border-2 border-slate-600 text-white font-black px-6 py-4 rounded-xl shadow-lg hover:bg-slate-700 hover:scale-105 active:scale-95 transition-transform text-xl flex items-center gap-3">
                               <XCircle size={28} /> Volver
                             </button>
                         </div>
                     </div>
                  )
              }

              const activeCats = cyclesData[cycle];
              const half = Math.ceil(activeCats.length / 2);
              const leftCats = activeCats.slice(0, half);
              const rightCats = activeCats.slice(half);

              const caughtWordsCount = gameWords.filter(w => w.status === 'caught').length;

              return (
                  <div className="fixed inset-0 bg-slate-950 z-50 overflow-hidden flex touch-none select-none font-mono">
                      
                      {/* Fondo dinámico del juego y Máscara Superior */}
                      <div className="absolute inset-0 opacity-20 bg-[linear-gradient(rgba(34,211,238,0.2)_1px,transparent_1px),linear-gradient(90deg,rgba(34,211,238,0.2)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none"></div>
                      <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_transparent_0%,_#020617_100%)] pointer-events-none"></div>
                      
                      {/* Máscara sombra debajo del HUD para aparición suave */}
                      <div className="absolute top-0 left-[120px] md:left-[280px] right-[120px] md:right-[280px] h-32 bg-gradient-to-b from-slate-950 via-slate-950 to-transparent z-[35] pointer-events-none"></div>

                      <style>{`
                          @keyframes slideInLeftRefuge {
                              0% { transform: translate(50px, -20px) scale(0.5); opacity: 0; }
                              100% { transform: translate(0, 0) scale(1); opacity: 1; }
                          }
                          @keyframes slideInRightRefuge {
                              0% { transform: translate(-50px, -20px) scale(0.5); opacity: 0; }
                              100% { transform: translate(0, 0) scale(1); opacity: 1; }
                          }
                          .animate-slide-in-left-refuge { animation: slideInLeftRefuge 0.3s ease-out forwards; }
                          .animate-slide-in-right-refuge { animation: slideInRightRefuge 0.3s ease-out forwards; }
                      `}</style>

                      {/* EVENTO RECICLAJE MÁGICO */}
                      {isRecycling && (
                        <div className="absolute inset-0 z-[150] flex items-center justify-center pointer-events-none">
                            <div className="relative w-64 h-64 flex items-center justify-center animate-spin-slow">
                               <div className="absolute inset-0 bg-[radial-gradient(circle,rgba(34,211,238,0.9)_0%,rgba(34,211,238,0)_70%)] rounded-full shadow-[0_0_80px_rgba(34,211,238,1)] scale-150 animate-pulse"></div>
                               <span className="font-black text-2xl md:text-4xl text-white text-center drop-shadow-[0_0_10px_#000] z-10 leading-tight transform -rotate-12">
                                   ¡RECICLAJE<br/>DE PALABRAS!
                               </span>
                            </div>
                        </div>
                      )}

                      {/* REFUGIOS IZQUIERDA */}
                      <div className="w-[120px] md:w-[280px] h-full flex flex-col gap-4 p-2 md:p-4 z-20">
                          {leftCats.map(cat => {
                              const containedWords = gameWords.filter(w => (w.status === 'caught' || w.status === 'archived') && w.mappedTag === cat.id);
                              const isDoorOpen = openDoors[cat.id];
                              return (
                                  <div key={cat.id} data-refuge-cat={cat.id} className="flex-1 relative flex flex-col pointer-events-auto group">
                                      <div className={`absolute top-0 bottom-6 md:bottom-10 left-0 right-6 md:right-12 border-[3px] border-l-0 rounded-r-2xl bg-slate-900 overflow-hidden flex flex-col items-center shadow-[inset_0_-10px_20px_rgba(0,0,0,0.5)] border-slate-600`}>
                                          <div className={`absolute inset-0 bg-slate-800 border-r-4 border-slate-950 z-30 transition-transform duration-300 origin-bottom flex flex-col items-center justify-center ${isDoorOpen ? '-translate-y-[90%] opacity-20' : 'translate-y-0 opacity-100'}`}>
                                               <div className="absolute inset-0 opacity-20 bg-[repeating-linear-gradient(45deg,transparent,transparent_10px,#000_10px,#000_20px)]"></div>
                                               <span className={`font-black uppercase text-lg md:text-3xl tracking-widest drop-shadow-[0_0_8px_currentcolor] text-center px-1 break-words z-40 ${cat.color.replace('800', '400').replace('700', '400')}`}>{cat.label}</span>
                                          </div>
                                          <div className="absolute inset-0 flex flex-wrap content-start justify-center gap-1 p-2 pt-4 overflow-hidden z-10">
                                              {containedWords.map(w => (
                                                  <span key={w.id} className={`text-[0.55rem] md:text-sm font-bold px-1.5 py-0.5 rounded border shadow-sm truncate max-w-full flex items-center gap-1 animate-slide-in-left-refuge
                                                      ${w.status === 'archived' ? 'bg-emerald-900 text-emerald-200 border-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-slate-800 text-white border-slate-600'}`}>
                                                      {w.w} {w.status === 'archived' && <CheckCircle size={12}/>}
                                                  </span>
                                              ))}
                                          </div>
                                      </div>
                                      <div className={`absolute bottom-0 md:bottom-2 left-0 right-0 h-6 md:h-10 border-[3px] border-l-0 rounded-r-2xl shadow-[5px_5px_15px_rgba(0,0,0,0.8)] z-40 bg-slate-800 transition-colors ${isDoorOpen ? cat.bg.replace('100', '500') + ' border-' + cat.bg.replace('100', '400') : 'border-slate-600'}`}>
                                          <div className="w-full h-full opacity-40 bg-[repeating-linear-gradient(90deg,transparent,transparent_5px,#000_5px,#000_10px)]"></div>
                                      </div>
                                  </div>
                              );
                          })}
                      </div>

                      {/* ZONA CENTRAL */}
                      <div className="flex-1 relative pointer-events-none flex flex-col items-center justify-center">
                          <div className="absolute top-24 md:top-20 pointer-events-auto z-40 bg-slate-900 border border-slate-700 rounded-lg p-1 shadow-lg flex gap-1 items-center">
                              <span className="text-slate-400 text-xs font-bold px-2 uppercase">Velocidad:</span>
                              <button onClick={() => setGameSpeedMultiplier(0.6)} className={`px-3 py-1 text-xs font-bold rounded transition-colors ${gameSpeedMultiplier === 0.6 ? 'bg-cyan-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>LENTA</button>
                              <button onClick={() => setGameSpeedMultiplier(1)} className={`px-3 py-1 text-xs font-bold rounded transition-colors ${gameSpeedMultiplier === 1 ? 'bg-amber-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>NORMAL</button>
                              <button onClick={() => setGameSpeedMultiplier(2)} className={`px-3 py-1 text-xs font-bold rounded transition-colors ${gameSpeedMultiplier === 2 ? 'bg-rose-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>RÁPIDA</button>
                          </div>

                          <div className="px-4 text-center max-w-3xl z-0 mt-40 absolute top-16">
                              <h3 className="text-cyan-500/50 font-bold uppercase tracking-widest text-xs md:text-sm mb-2 drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">MISIÓN ACTIVA:</h3>
                              <div className="text-slate-600 font-black text-xl md:text-4xl uppercase leading-relaxed drop-shadow-md">
                                  {currentSentenceText}
                              </div>
                          </div>
                      </div>

                      {/* REFUGIOS DERECHA */}
                      <div className="w-[120px] md:w-[280px] h-full flex flex-col gap-4 p-2 md:p-4 z-20">
                          {rightCats.map(cat => {
                              const containedWords = gameWords.filter(w => (w.status === 'caught' || w.status === 'archived') && w.mappedTag === cat.id);
                              const isDoorOpen = openDoors[cat.id];
                              return (
                                  <div key={cat.id} data-refuge-cat={cat.id} className="flex-1 relative flex flex-col pointer-events-auto group">
                                      <div className={`absolute top-0 bottom-6 md:bottom-10 right-0 left-6 md:left-12 border-[3px] border-r-0 rounded-l-2xl bg-slate-900 overflow-hidden flex flex-col items-center shadow-[inset_0_-10px_20px_rgba(0,0,0,0.5)] border-slate-600`}>
                                          <div className={`absolute inset-0 bg-slate-800 border-l-4 border-slate-950 z-30 transition-transform duration-300 origin-bottom flex flex-col items-center justify-center ${isDoorOpen ? '-translate-y-[90%] opacity-20' : 'translate-y-0 opacity-100'}`}>
                                               <div className="absolute inset-0 opacity-20 bg-[repeating-linear-gradient(45deg,transparent,transparent_10px,#000_10px,#000_20px)]"></div>
                                               <span className={`font-black uppercase text-lg md:text-3xl tracking-widest drop-shadow-[0_0_8px_currentcolor] text-center px-1 break-words z-40 ${cat.color.replace('800', '400').replace('700', '400')}`}>{cat.label}</span>
                                          </div>
                                          <div className="absolute inset-0 flex flex-wrap content-start justify-center gap-1 p-2 pt-4 overflow-hidden z-10">
                                              {containedWords.map(w => (
                                                  <span key={w.id} className={`text-[0.55rem] md:text-sm font-bold px-1.5 py-0.5 rounded border shadow-sm truncate max-w-full flex items-center gap-1 animate-slide-in-right-refuge
                                                      ${w.status === 'archived' ? 'bg-emerald-900 text-emerald-200 border-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-slate-800 text-white border-slate-600'}`}>
                                                      {w.w} {w.status === 'archived' && <CheckCircle size={12}/>}
                                                  </span>
                                              ))}
                                          </div>
                                      </div>
                                      <div className={`absolute bottom-0 md:bottom-2 left-0 right-0 h-6 md:h-10 border-[3px] border-r-0 rounded-l-2xl shadow-[5px_5px_15px_rgba(0,0,0,0.8)] z-40 bg-slate-800 transition-colors ${isDoorOpen ? cat.bg.replace('100', '500') + ' border-' + cat.bg.replace('100', '400') : 'border-slate-600'}`}>
                                          <div className="w-full h-full opacity-40 bg-[repeating-linear-gradient(-90deg,transparent,transparent_5px,#000_5px,#000_10px)]"></div>
                                      </div>
                                  </div>
                              );
                          })}
                      </div>

                      {/* HUD DE JUEGO (SUPERIOR) */}
                      <div className="absolute top-4 left-[130px] md:left-[290px] right-[130px] md:right-[290px] flex justify-between items-start pointer-events-none z-40 px-2 md:px-4">
                          <div className="flex gap-4 items-center">
                              <button onClick={() => setInputMode('auto')} className="bg-rose-600 border-2 border-rose-400 text-rose-100 p-2 md:p-3 rounded-full shadow-[0_0_15px_rgba(225,29,72,0.8)] hover:bg-rose-500 pointer-events-auto transition-transform hover:scale-110">
                                  <XCircle size={24} className="md:w-7 md:h-7" />
                              </button>
                              
                              {caughtWordsCount > 0 && gameState === 'playing' && !isRecycling && (
                                  <button onClick={startContainerAnalysis} className="bg-purple-700 border-2 border-purple-400 text-white font-black px-4 py-2 rounded-xl shadow-[0_0_15px_rgba(168,85,247,0.5)] hover:bg-purple-600 hover:scale-105 active:scale-95 transition-all flex items-center gap-2 pointer-events-auto text-sm md:text-lg">
                                      <Database size={20} /> <span className="hidden md:inline">ANALIZAR REFUGIOS</span> ({caughtWordsCount})
                                  </button>
                              )}
                          </div>
                          
                          <div className="flex flex-col md:flex-row gap-2 md:gap-4 items-end md:items-start">
                              <div className="bg-slate-900/80 backdrop-blur px-3 md:px-4 py-1.5 md:py-2 rounded-xl border-2 border-slate-600 font-black text-sm md:text-xl flex items-center gap-1 text-slate-400">
                                  {[...Array(3)].map((_, i) => (
                                      <span key={i} className={i < consecutiveErrors ? "text-rose-500" : "text-slate-600"}>X</span>
                                  ))}
                              </div>
                              <div className="bg-slate-900/80 backdrop-blur px-3 md:px-6 py-1.5 md:py-2 rounded-xl border-2 border-rose-400 text-rose-400 font-black text-lg md:text-3xl flex items-center gap-2 shadow-[0_0_15px_rgba(244,63,94,0.3)]">
                                  {'❤️'.repeat(Math.max(0, lives))}
                              </div>
                              <div className="bg-slate-900/80 backdrop-blur px-3 md:px-6 py-1.5 md:py-2 rounded-xl border-2 border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.5)] text-cyan-400 font-black text-lg md:text-3xl flex items-center gap-2 drop-shadow-[0_0_5px_rgba(34,211,238,0.8)]">
                                  SCORE {gameScore}
                              </div>
                              <div className={`bg-slate-900/80 backdrop-blur px-3 md:px-6 py-1.5 md:py-2 rounded-xl border-2 shadow-lg font-black text-lg md:text-3xl flex items-center gap-2 
                                  ${fallenCount >= maxFallenAllowed - 3 ? 'text-red-500 border-red-500 animate-pulse drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]' : 'text-amber-400 border-amber-400 drop-shadow-[0_0_5px_rgba(251,191,36,0.8)]'}`}>
                                  BASURA {fallenCount}/{maxFallenAllowed}
                              </div>
                          </div>
                      </div>

                      {/* RENDERIZADO PALABRAS NEÓN Y BASURA */}
                      {gameWords.map(w => {
                          if (w.status === 'caught' || w.status === 'archived') return null;

                          let transitionClass = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                          if (w.status === 'dragging' || w.status === 'failing' || w.status === 'fallen') transitionClass = 'none';
                          if (w.status === 'recycling_gather') transitionClass = 'all 1.5s ease-in-out';
                          if (w.status === 'recycling_explode') transitionClass = 'all 1.5s ease-out';

                          let style = { 
                              position: 'fixed', 
                              left: w.x, 
                              top: w.y,
                              transform: `translate(-50%, -50%) rotate(${w.status === 'fallen' || w.status === 'failing' || w.status.startsWith('recycling') ? w.rotation : 0}deg)`,
                              transition: transitionClass
                          };

                          if (w.status === 'fallen' || w.status.startsWith('recycling')) {
                              style.opacity = w.status === 'recycling_explode' ? 0 : 0.9;
                              style.zIndex = 10;
                          } else if (w.status === 'dragging') {
                              style.zIndex = 100;
                          } else {
                              style.zIndex = 30;
                          }

                          return (
                              <div 
                                 key={w.id}
                                 onPointerDown={(e) => {
                                     if (w.status === 'fallen' || w.status === 'failing' || w.status.startsWith('recycling')) return;
                                     handlePointerDown(e, w.id);
                                 }}
                                 onPointerMove={handlePointerMove}
                                 onPointerUp={(e) => handlePointerUp(e, w.id)}
                                 onPointerCancel={(e) => handlePointerUp(e, w.id)}
                                 style={style}
                                 className={`font-black px-4 md:px-6 py-2 md:py-3 rounded-xl border-2 whitespace-nowrap font-sans select-none
                                     ${w.status === 'dragging' ? 'bg-amber-900 border-amber-400 text-amber-300 scale-125 cursor-grabbing shadow-[0_0_25px_rgba(251,191,36,0.8)] drop-shadow-[0_0_5px_rgba(251,191,36,1)]' : 
                                       w.status === 'fallen' || w.status.startsWith('recycling') ? 'bg-red-950 border-red-500 text-red-400 cursor-not-allowed shadow-[0_0_15px_rgba(239,68,68,0.7)] drop-shadow-[0_0_5px_rgba(239,68,68,0.9)]' : 
                                       w.status === 'failing' ? 'bg-red-600 border-white text-white scale-110 cursor-not-allowed shadow-[0_0_30px_rgba(239,68,68,1)]' : 
                                       'bg-slate-800 border-cyan-400 text-cyan-300 hover:scale-110 cursor-grab shadow-[0_0_15px_rgba(34,211,238,0.6)] drop-shadow-[0_0_2px_rgba(34,211,238,1)]'}
                                     ${w.w.length > 8 ? 'text-lg md:text-2xl' : 'text-xl md:text-4xl'}`}
                              >
                                  {w.w}
                              </div>
                          )
                      })}

                      {/* OVERLAY: ANÁLISIS DE CONTENEDORES */}
                      {gameState === 'analyzing' && analysisQueue.length > 0 && (
                          <div className="absolute inset-0 z-[300] bg-slate-950/95 backdrop-blur-md flex flex-col items-center justify-center p-4 font-mono pointer-events-auto">
                              <h2 className="text-3xl md:text-5xl font-black text-purple-400 mb-2 drop-shadow-[0_0_10px_rgba(168,85,247,0.8)] uppercase">Análisis de Refugios</h2>
                              <p className="text-slate-400 mb-8 text-xl">Palabras en cola: <span className="text-white font-bold">{analysisQueue.length}</span></p>
                              
                              <div className="bg-slate-900 border-4 border-purple-500 p-6 md:p-10 rounded-3xl shadow-[0_0_30px_rgba(168,85,247,0.4)] max-w-3xl w-full relative">
                                  <div className="text-center mb-8">
                                      <div className="text-5xl md:text-6xl font-black text-white mb-2 drop-shadow-lg">{analysisQueue[0].w}</div>
                                      <div className="text-xl md:text-2xl font-bold text-purple-300 uppercase tracking-widest">
                                          Contenedor: {cyclesData[cycle].find(c => c.id === analysisQueue[0].mappedTag)?.label}
                                      </div>
                                  </div>

                                  <div className="space-y-4 md:space-y-6 mb-10">
                                      {getActiveTraitsForWord(analysisQueue[0], cycle, analysisQueue[0].mappedTag, modalState?.tempSelections || {}).map(trait => (
                                          <div key={trait.key} className="flex flex-col md:flex-row items-center gap-4 bg-slate-800/80 p-4 rounded-xl border border-purple-900/50">
                                              <span className="text-purple-300 font-bold md:w-32 text-center md:text-right uppercase text-lg">{trait.title}:</span>
                                              <div className="flex flex-wrap gap-2 md:gap-3 flex-1 justify-center md:justify-start">
                                                  {trait.getOptions(analysisQueue[0].mappedTag).map(opt => (
                                                      <button 
                                                          key={opt.id} 
                                                          onClick={() => handleArcadeTraitSelect(trait.key, opt.id)} 
                                                          className={`px-4 py-2 rounded-lg border-2 font-bold text-sm md:text-lg transition-all ${modalState?.tempSelections?.[trait.key] === opt.id ? 'bg-purple-600 border-purple-400 text-white shadow-[0_0_15px_rgba(168,85,247,0.8)] scale-105' : 'bg-slate-900 border-slate-600 text-slate-300 hover:border-purple-400 hover:text-purple-200'}`}
                                                      >
                                                          {opt.label}
                                                      </button>
                                                  ))}
                                              </div>
                                          </div>
                                      ))}
                                  </div>

                                  {modalState?.error && (
                                      <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-600 text-white text-lg md:text-2xl font-black px-6 md:px-8 py-4 rounded-2xl shadow-[0_0_30px_rgba(220,38,38,1)] animate-pulse border-4 border-white whitespace-nowrap z-50">
                                          {modalState.error}
                                      </div>
                                  )}

                                  <div className="flex justify-center mt-4">
                                      <button 
                                          onClick={handleComprobarArcade} 
                                          disabled={!!modalState?.error}
                                          className="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 disabled:scale-100 text-white font-black px-10 py-4 rounded-2xl shadow-[0_0_20px_rgba(16,185,129,0.5)] transition-transform hover:scale-105 active:scale-95 text-2xl flex items-center gap-3"
                                      >
                                          <CheckCircle size={32} /> VALIDAR DATOS
                                      </button>
                                  </div>
                              </div>
                          </div>
                      )}

                      {/* GAME OVER */}
                      {gameState === 'over' && (
                          <div className="absolute inset-0 z-[400] bg-slate-950/95 backdrop-blur-md flex flex-col items-center justify-center text-center pointer-events-auto p-4">
                              <h2 className="text-5xl md:text-8xl font-black text-rose-500 mb-4 uppercase tracking-widest drop-shadow-[0_0_15px_rgba(225,29,72,0.8)] font-mono">GAME OVER</h2>
                              <p className="text-lg md:text-3xl text-slate-400 mb-10 font-mono">
                                  {lives <= 0 ? 'Te has quedado sin vidas.' : 'El sistema ha colapsado por exceso de basura.'}
                              </p>
                              <p className="text-xl md:text-4xl mb-12 text-cyan-400 font-bold font-mono flex items-center">PUNTUACIÓN FINAL: <span className="font-black text-4xl md:text-7xl text-cyan-300 ml-4 drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]">{gameScore}</span></p>
                              
                              {/* Option to analyze even if failed */}
                              {gameWords.some(w => w.status === 'caught') && (
                                  <button onClick={startContainerAnalysis} className="mb-6 bg-purple-700 hover:bg-purple-600 text-white font-black px-8 py-4 rounded-xl shadow-[0_0_20px_rgba(168,85,247,0.5)] transition-transform hover:scale-105 active:scale-95 text-xl flex items-center gap-3 justify-center">
                                      <Database size={28} /> ANALIZAR REFUGIOS (Ganar Puntos Extra)
                                  </button>
                              )}

                              <div className="flex flex-col sm:flex-row gap-6">
                                  <button onClick={startGame} className="bg-emerald-600 border-2 border-emerald-400 hover:bg-emerald-500 text-white font-black px-8 py-4 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.5)] transition-transform hover:scale-105 active:scale-95 text-lg md:text-xl flex items-center justify-center gap-3">
                                      <RefreshCw size={28} /> REINTENTAR
                                  </button>
                                  <button onClick={() => setInputMode('auto')} className="bg-slate-800 border-2 border-slate-600 hover:bg-slate-700 text-white font-black px-8 py-4 rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95 text-lg md:text-xl flex items-center justify-center gap-3">
                                      <XCircle size={28} /> SALIR AL MENÚ
                                  </button>
                              </div>
                          </div>
                      )}
                  </div>
              );
          }

          // 2. MODO NORMAL (PIZARRA Y ALEATORIO)
          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8 overflow-x-hidden pb-32">
              <style>{`
                @keyframes cloudPop { 0% { transform: scale(0.5); opacity: 0; } 15% { transform: scale(1.1); opacity: 1; } 25% { transform: scale(1); opacity: 1; } 85% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.8); opacity: 0; } }
                .animate-cloud-pop { animation: cloudPop 4s ease-in-out forwards; }
              `}</style>

              <div className="max-w-6xl mx-auto space-y-6">

                <div className="bg-green-100 rounded-3xl p-4 md:p-5 shadow-md border-2 border-green-200 relative">
                  <div className="flex flex-col gap-3 md:gap-4">
                      
                      <div className="flex flex-col sm:flex-row justify-center items-center w-full gap-3 mt-2 z-20">
                          <button 
                              onClick={() => { setInputMode('auto'); setIsCustomTextLoaded(false); }}
                              className={`flex items-center gap-2 px-5 py-2.5 rounded-full font-bold text-sm md:text-base transition-transform shadow-sm border-2 w-full sm:w-auto justify-center ${inputMode === 'auto' ? 'bg-indigo-600 text-white border-indigo-700 scale-105' : 'bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50'}`}
                          >
                              <RefreshCw size={18} /> Modo Aleatorio
                          </button>
                          
                          <button 
                              onClick={() => { setInputMode('manual'); setIsCustomTextLoaded(false); }}
                              className={`flex items-center gap-2 px-5 py-2.5 rounded-full font-bold text-sm md:text-base transition-transform shadow-sm border-2 w-full sm:w-auto justify-center ${inputMode === 'manual' ? 'bg-indigo-600 text-white border-indigo-700 scale-105' : 'bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50'}`}
                          >
                              <Edit3 size={18} /> Pizarra Libre
                          </button>

                          <button 
                              onClick={() => { setInputMode('game'); setIsCustomTextLoaded(false); }}
                              className={`flex items-center gap-2 px-5 py-2.5 rounded-full font-bold text-sm md:text-base transition-transform shadow-sm border-2 w-full sm:w-auto justify-center ${inputMode === 'game' ? 'bg-indigo-600 text-white border-indigo-700 scale-105' : 'bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50'}`}
                          >
                              <GamepadIcon size={18} /> Atrapa Palabras
                          </button>
                      </div>

                      <header className="text-center mt-4">
                        <h1 className="text-2xl md:text-3xl font-extrabold text-green-900 mb-4 flex items-center justify-center gap-2">
                          <Layers className="text-green-700" size={28} /> Análisis morfológico
                        </h1>
                        {errorMessage && (
                          <div className="absolute -bottom-2 left-1/2 transform -translate-x-1/2 bg-red-600 text-white font-bold px-4 py-1.5 text-sm rounded-xl shadow-lg animate-pulse z-10 w-max">
                            {errorMessage}
                          </div>
                        )}
                        <div className="flex justify-center gap-3 mb-3">
                          {[1, 2, 3].map(c => (
                            <button
                              key={c}
                              onClick={() => { setCycle(c); setModalState(null); }}
                              className={`px-5 py-1.5 rounded-full font-bold transition-all shadow-sm border-2 text-sm md:text-base
                                ${cycle === c ? 'bg-green-700 text-white border-green-800 scale-105' : 'bg-white text-green-800 border-green-300 hover:bg-green-50'}
                              `}
                            >
                              Ciclo {c}
                            </button>
                          ))}
                        </div>
                        <p className="text-green-800 font-medium text-xs md:text-sm bg-white/50 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg mb-1">
                          <MousePointerClick size={16}/> Pulsa sobre una palabra para comenzar su análisis
                        </p>
                      </header>

                      <div className="flex flex-wrap gap-1.5 md:gap-2 justify-center">
                        {cyclesData[cycle].map((cat) => (
                          <div key={cat.id} className={`flex flex-col items-center justify-center px-2 py-1.5 rounded-lg border-2 shadow-sm min-w-[75px] md:min-w-[85px] ${cat.bg} ${cat.border}`}>
                            <span className={`text-[0.65rem] md:text-xs font-bold uppercase tracking-wider ${cat.color}`}>{cat.label}</span>
                          </div>
                        ))}
                      </div>
                  </div>
                </div>

                {inputMode === 'manual' && !isCustomTextLoaded && (
                    <div className="bg-white p-6 md:p-10 rounded-3xl shadow-lg border-2 border-indigo-200 relative animate-fade-in">
                        
                        <div className="absolute top-6 right-6">
                             <button 
                                onClick={fetchFromBVMC}
                                disabled={isFetchingBVMC}
                                className="flex items-center gap-2 px-4 py-2 bg-rose-100 hover:bg-rose-200 text-rose-800 font-bold text-sm rounded-xl shadow-sm border border-rose-300 transition-colors disabled:opacity-50"
                            >
                                {isFetchingBVMC ? <RefreshCw size={16} className="animate-spin" /> : <BookOpen size={16} />}
                                <span className="hidden md:inline">{isFetchingBVMC ? "Buscando..." : "Importar de Cervantes"}</span>
                            </button>
                        </div>

                        <h2 className="text-2xl font-bold text-indigo-900 mb-4 flex items-center gap-2">
                            <Edit3 className="text-indigo-600"/> Pizarra Libre para Profesorado
                        </h2>
                        
                        <p className="text-slate-600 mb-4 font-medium mt-6">
                            Escribe el texto a continuación o impórtalo desde la BVMC. En este modo tú decides la respuesta válida durante la clase.
                        </p>
                        <textarea 
                            className="w-full h-48 p-4 border-2 border-slate-300 rounded-xl text-lg font-medium text-slate-700 focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 outline-none transition-all"
                            placeholder="Érase una vez..."
                            value={rawCustomText}
                            onChange={(e) => setRawCustomText(e.target.value)}
                            disabled={isFetchingBVMC}
                        />
                        <div className="flex justify-center mt-6">
                            <button 
                                onClick={loadCustomText}
                                disabled={!rawCustomText.trim()}
                                className="flex items-center gap-2 px-8 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-400 text-white font-bold text-xl rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95"
                            >
                                <Edit3 size={24}/> Comenzar Pizarra
                            </button>
                        </div>
                    </div>
                )}

                {((inputMode === 'auto') || (inputMode === 'manual' && isCustomTextLoaded)) && (
                    <div className="bg-blue-50 p-6 md:p-10 rounded-3xl shadow-lg border-2 border-blue-100 select-none relative animate-fade-in">
                    <div className={`${textClasses}`}>
                        {textData.map((paragraph, pIndex) => (
                        <p key={pIndex} className="mb-10 text-justify indent-8 md:indent-12 leading-[2.5] md:leading-[3]">
                            {paragraph.map((wordObj, wIndex) => {
                            
                            let containerStyle = "inline-flex flex-col items-center align-top mx-[2px] transition-transform duration-200 cursor-pointer ";
                            let wordStyle = "font-medium rounded px-1 transition-colors ";
                            
                            if (wordObj.isCorrect) {
                                wordStyle += `${wordObj.category.bg} ${wordObj.colorClass} font-extrabold shadow-sm`;
                            } else {
                                wordStyle += "text-slate-800 hover:bg-blue-200 hover:-translate-y-1";
                                if (!wordObj.isCustom && highlightRemaining && getCycleMappedTag(wordObj.t3, cycle)) {
                                   wordStyle += " ring-2 ring-red-400 ring-offset-2 bg-red-100 animate-pulse";
                                }
                            }

                            return (
                                <React.Fragment key={wordObj.id}>
                                {wordObj.pre && <span className="text-slate-800 font-medium">{wordObj.pre}</span>}
                                <span onClick={() => handleWordClick(pIndex, wIndex)} className={containerStyle}>
                                    <span className={wordStyle}>{wordObj.w}</span>
                                    {wordObj.isCorrect && wordObj.initials.length > 0 && (
                                    <span className={`text-sm md:text-base font-black text-slate-700 leading-none mt-1 pt-[2px] border-t-[3px] ${wordObj.category.lineColor} max-w-full text-center tracking-tighter`}>
                                        {wordObj.initials.join(" ")}
                                    </span>
                                    )}
                                </span>
                                {wordObj.s && <span className="text-slate-800 font-medium">{wordObj.s}</span>}
                                {" "}
                                </React.Fragment>
                            );
                            })}
                        </p>
                        ))}
                    </div>
                    </div>
                )}

                {/* BOTONES INFERIORES PIZARRA */}
                {((inputMode === 'auto') || (inputMode === 'manual' && isCustomTextLoaded)) && (
                    <div className="flex flex-wrap justify-center gap-4 pb-8 animate-fade-in">
                    {inputMode === 'auto' ? (
                        <button
                            onClick={() => generateNewText(cycle)}
                            className="flex items-center gap-2 px-8 py-4 bg-slate-800 hover:bg-slate-900 text-white font-bold text-lg rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95"
                        >
                            <RefreshCw size={24} /> Generar Nuevo Texto
                        </button>
                    ) : (
                        <button
                            onClick={() => setIsCustomTextLoaded(false)}
                            className="flex items-center gap-2 px-8 py-4 bg-slate-600 hover:bg-slate-700 text-white font-bold text-lg rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95"
                        >
                            <Edit3 size={24} /> Editar Texto
                        </button>
                    )}
                    <button
                        onClick={handleFinalizar}
                        className="flex items-center gap-2 px-8 py-4 bg-amber-500 hover:bg-amber-600 text-white font-bold text-lg rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95"
                    >
                        <Star size={24} /> Finalizar y Ver Nubes
                    </button>
                    </div>
                )}

              </div>

              {/* NUBES DE PALABRAS GLOBALES */}
              {isCloudVisible && showClouds.length > 0 && (
                <div 
                  className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/95 backdrop-blur-md transition-opacity p-4 md:p-8"
                  onClick={() => setIsCloudVisible(false)}
                >
                   <div className="text-center w-full pointer-events-none max-h-screen overflow-y-auto pb-10">
                       <h2 className="text-4xl md:text-6xl font-black mb-10 uppercase tracking-widest text-white drop-shadow-2xl mt-10">
                         ¡Reto Superado!
                       </h2>
                       <div className="flex flex-wrap justify-center gap-4 md:gap-8 items-center max-w-6xl mx-auto px-4">
                         {showClouds.map((item, i) => {
                           const sizeClass = ['text-2xl', 'text-4xl', 'text-3xl', 'text-5xl', 'text-4xl'][i % 5];
                           const animationClass = ['hover:scale-110 transition-transform duration-500', 'hover:-rotate-6 transition-transform duration-500', 'hover:rotate-6 transition-transform duration-500'][i % 3];
                           return (
                             <span key={i} className={`font-extrabold ${sizeClass} ${animationClass} ${item.cat.bg} ${item.cat.color} border-4 ${item.cat.border} px-4 py-2 md:px-6 md:py-3 rounded-3xl shadow-[0_10px_20px_rgba(0,0,0,0.3)] inline-block animate-fade-in`}>
                               {item.w}
                             </span>
                           )
                         })}
                       </div>
                       <p className="text-xl md:text-3xl text-amber-300 font-bold animate-pulse mt-16">
                         Pulsa cualquier tecla (o haz clic) para continuar
                       </p>
                   </div>
                </div>
              )}

              {/* MODAL POPUP DE ANÁLISIS MODO PIZARRA */}
              {modalState && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                  <div className="bg-white w-full max-w-2xl rounded-3xl shadow-2xl border-4 border-indigo-200 overflow-hidden flex flex-col">
                    <div className="bg-indigo-600 text-white p-5 flex justify-between items-center relative">
                      <h2 className="text-2xl font-black">
                        Analizando: <span className="text-yellow-300">"{textData[modalState.p][modalState.w].w}"</span>
                      </h2>
                      <button onClick={() => setModalState(null)} className="hover:text-red-300 transition-colors">
                        <XCircle size={32} />
                      </button>
                    </div>

                    <div className="p-6 md:p-8 relative">
                      {(modalState.error || modalState.hint) && (
                        <div className="absolute top-4 left-1/2 transform -translate-x-1/2 flex flex-col items-center gap-2 z-10 w-11/12 max-w-lg">
                          {modalState.error && (
                            <div className="bg-red-600 text-white font-bold px-4 py-2 rounded-lg shadow-lg animate-pulse text-center w-full">
                              {modalState.error}
                            </div>
                          )}
                          {modalState.hint && (
                            <div className="bg-green-600 text-white px-5 py-3 rounded-lg shadow-lg border-2 border-green-300 animate-fade-in text-center w-full">
                              <span className="uppercase text-green-200 text-xs font-black block mb-1 tracking-widest">💡 Pista</span>
                              <span className="font-bold text-lg">{modalState.hint}</span>
                            </div>
                          )}
                        </div>
                      )}

                      {modalState.step === 1 ? (
                        <div className={`transition-opacity ${modalState.error ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                          {textData[modalState.p][modalState.w].isCustom && !textData[modalState.p][modalState.w].apiAnalyzed && (
                             <div className="bg-indigo-50 border border-indigo-200 text-indigo-800 p-3 rounded-xl mb-6 text-center font-medium">
                                ✏️ <strong>Pizarra Libre:</strong> Tú decides la categoría correcta de la palabra seleccionada.
                             </div>
                          )}
                          <h3 className="text-xl font-bold text-slate-700 mb-6 text-center">1. ¿Qué tipo de palabra es?</h3>
                          <div className="flex flex-wrap gap-3 justify-center">
                            {cyclesData[cycle].map(cat => (
                              <button key={cat.id} onClick={() => handleCategorySelect(cat)} className={`px-4 py-3 rounded-xl font-bold border-2 transition-transform hover:scale-105 active:scale-95 ${cat.bg} ${cat.color} ${cat.border}`}>
                                {cat.label}
                              </button>
                            ))}
                          </div>
                        </div>
                      ) : (
                        <div className={`transition-opacity ${modalState.error ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                          <div className="mb-4 text-center">
                            <span className={`inline-block px-4 py-1 rounded-full font-bold text-sm ${modalState.category.bg} ${modalState.category.color}`}>
                              {modalState.category.label}
                            </span>
                          </div>
                          <h3 className="text-xl font-bold text-slate-700 mb-6 text-center border-b pb-4">
                            2. Selecciona las opciones
                          </h3>

                          <div className="space-y-6">
                            {activeTraitsToRender.length === 0 ? (
                              <div className="text-center p-6 bg-slate-100 rounded-xl">
                                <p className="text-lg font-bold text-slate-600">Análisis completado en este nivel.</p>
                                <p className="text-slate-500 text-sm">Haz clic en Confirmar.</p>
                              </div>
                            ) : (
                              activeTraitsToRender.map(trait => (
                                <div key={trait.key} className="flex flex-col md:flex-row items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                  <span className="font-bold text-slate-600 w-24 text-center md:text-right uppercase text-sm">
                                    {trait.title}:
                                  </span>
                                  <div className="flex flex-wrap gap-2 flex-1 justify-center md:justify-start">
                                    {trait.getOptions(modalState.category.id).map(opt => (
                                      <button key={opt.id} onClick={() => handleTraitSelect(trait.key, opt.id)} className={`px-4 py-2 rounded-lg font-bold transition-colors border-2 ${modalState.tempSelections[trait.key] === opt.id ? 'bg-indigo-600 text-white border-indigo-700' : 'bg-white text-slate-700 border-slate-300 hover:bg-indigo-50 hover:border-indigo-300'}`}>
                                        {opt.label}
                                      </button>
                                    ))}
                                  </div>
                                </div>
                              ))
                            )}
                          </div>

                          <div className="mt-8 flex justify-center">
                            <button onClick={handleComprobar} className="flex items-center gap-2 px-8 py-3 bg-green-600 hover:bg-green-700 disabled:bg-slate-300 text-white font-bold text-xl rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95">
                              <CheckCircle size={24} /> Confirmar Análisis
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* BOTÓN FLOTANTE: ANALIZADOR CERVANTES */}
              <a 
                href="https://data.cervantesvirtual.com/analizador"
                target="_blank"
                rel="noopener noreferrer"
                className="fixed top-4 right-4 flex items-center gap-1.5 px-3 py-1.5 bg-indigo-800 hover:bg-indigo-900 text-white font-bold text-xs rounded-full shadow-md transition-transform hover:scale-105 active:scale-95 z-[500]"
                title="Abrir Analizador Cervantes"
              >
                <BookOpen size={14} />
                <span className="hidden sm:inline">Analizador Cervantes</span>
                <span className="sm:hidden">Cervantes</span>
              </a>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
