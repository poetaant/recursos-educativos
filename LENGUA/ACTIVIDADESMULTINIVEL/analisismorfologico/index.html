              createW("escolar", "adjetivo", { gen: "INV", num: "S", s: "." }),
              
              createW("Pronto", "adverbio", { advType: "Tiempo", gen: "INV", s: "," }),
              createW(p2.name, "sustantivo propio", { gen: p2.gen, num: "S" }),
              createW(verbsDict.organizar[t].S, "verbo", { per: "3ª", num: "S", tense: t, verbForm: "Personal", conjugation: verbsDict.organizar.conj }),
              createW("su", "posesivo", { gen: "INV", num: "S" }), 
              createW("mochila", "sustantivo común", { gen: "F", num: "S", s: "." }),
              
              createW("Rápidamente", "adverbio", { advType: "Modo", gen: "INV", s: "," }),
              createW(verbsDict.debatir[t].P, "verbo", { per: "3ª", num: "P", tense: t, verbForm: "Personal", conjugation: verbsDict.debatir.conj }),
              createW("estos", "demostrativo", { gen: "M", num: "P", dist: "Cercanía" }),
              createW("temas", "sustantivo común", { gen: "M", num: "P" }),
              createW("actuales", "adjetivo", { gen: "INV", num: "P", s: "." }),
              
              createW("Hoy", "adverbio", { advType: "Tiempo", gen: "INV", s: "," }),
              createW(verbsDict.pintar[t].P, "verbo", { per: "3ª", num: "P", tense: t, verbForm: "Personal", conjugation: verbsDict.pintar.conj }),
              createW("esa", "demostrativo", { gen: "F", num: "S", dist: "Dist. media" }),
              createW(lF, "sustantivo común", { gen: "F", num: "S" }),
              createW("preciosa", "adjetivo", { gen: "F", num: "S", s: "." })
            ];
          },
          (p1, p2, t) => { 
            const oF = getRandomF_P();
            const oM = getRandomM_S(); 
            return [
              createW("Hoy", "adverbio", { advType: "Tiempo", gen: "INV", s: "," }),
              createW(p1.name, "sustantivo propio", { gen: p1.gen, num: "S" }),
              createW("está", "verbo", { per: "3ª", num: "S", tense: "presente", verbForm: "Personal", conjugation: "1ª AR" }),
              createW(verbsDict.cuidar.ger, "verbo", { verbForm: "Gerundio", conjugation: verbsDict.cuidar.conj }),
              createW("tres", "numeral", { type: "Cardinal", gen: "INV", num: "P" }), 
              createW("plantas", "sustantivo común", { gen: "F", num: "P", s: "." }),
              
              createW("Luego", "adverbio", { advType: "Tiempo", gen: "INV", s: "," }),
              createW(p2.name, "sustantivo propio", { gen: p2.gen, num: "S" }),
              createW(verbsDict.comprar[t].S, "verbo", { per: "3ª", num: "S", tense: t, verbForm: "Personal", conjugation: verbsDict.comprar.conj }),
              createW("aquella", "demostrativo", { gen: "F", num: "S", dist: "Lejanía" }),
              createW("ropa", "sustantivo común", { gen: "F", num: "S" }),
              createW("nueva", "adjetivo", { gen: "F", num: "S", s: "." }),
              
              createW("Allí", "adverbio", { advType: "Lugar", gen: "INV", s: "," }),
              createW("los", "artículo", { type: "DET", gen: "M", num: "P" }),
              createW("niños", "sustantivo común", { gen: "M", num: "P" }),
              createW(verbsDict.hacer[t].P, "verbo", { per: "3ª", num: "P", tense: t, verbForm: "Personal", conjugation: verbsDict.hacer.conj }),
              createW("bastantes", "indefinido", { gen: "INV", num: "P" }),
              createW("manualidades", "sustantivo común", { gen: "F", num: "P", s: "." }),
              
              createW("Siempre", "adverbio", { advType: "Tiempo", gen: "INV", s: "," }),
              createW(verbsDict.jugar[t].P, "verbo", { per: "3ª", num: "P", tense: t, verbForm: "Personal", conjugation: verbsDict.jugar.conj }),
              createW("con", "preposición", { gen: "INV" }),
              createW("esas", "demostrativo", { gen: "F", num: "P", dist: "Dist. media" }),
              createW(oF, "sustantivo común", { gen: "F", num: "P" }),
              createW("brillantes", "adjetivo", { gen: "INV", num: "P", s: "." })
            ];
          }
        ];

        const getCycleMappedTag = (t3, cycle) => {
          if (!t3) return null;
          if (cycle === 1) {
            if (t3.includes("sustantivo")) return "sustantivo";
            if (t3 === "adjetivo") return "adjetivo";
            if (t3.includes("verbo")) return "verbo";
            return null;
          }
          if (cycle === 2 || cycle === 3) {
            if (t3 === "artículo" || t3 === "sustantivo común" || t3 === "sustantivo propio" || 
                t3 === "adjetivo" || t3 === "demostrativo" || t3 === "posesivo" || t3 === "preposición" ||
                t3 === "numeral" || t3 === "indefinido") {
              return t3;
            }
            if (t3.includes("verbo")) return "verbo";
            
            if (cycle === 3) {
              if (t3 === "adverbio" || t3 === "conjunción" || t3 === "interjección") return t3;
            }
            return null;
          }
          return null; 
        };

        // --- FUNCIÓN PARA OBTENER LAS LETRAS DEL TIPO DE PALABRA ---
        const getCategoryAbbreviation = (catId) => {
          if (catId === "sustantivo común") return "S. COM";
          if (catId === "sustantivo propio") return "S. PRO";
          if (catId.includes("sustantivo")) return "SUS";
          if (catId.includes("verbo")) return "VER";
          if (catId === "numeral") return "NUM";
          if (catId === "indefinido") return "IND";
          
          switch(catId) {
            case "artículo": return "ART";
            case "adjetivo": return "ADJ";
            case "demostrativo": return "DEM";
            case "posesivo": return "POS";
            case "preposición": return "PRE";
            case "conjunción": return "CON";
            case "adverbio": return "ADV";
            case "interjección": return "INT";
            default: return catId.substring(0, 3).toUpperCase();
          }
        };

        // --- FUNCIÓN PARA FILTRAR RASGOS MORFOLÓGICOS ---
        const getActiveTraitsForWord = (wordObj, currentCycle, categoryId, tempSelections) => {
          let traits = [];
          
          // Lógica para Texto Propio
          if (wordObj.isCustom) {
              let applicableKeys = [];
              if (categoryId === 'artículo') applicableKeys = ['type', 'gen', 'num'];
              else if (categoryId.includes('sustantivo')) applicableKeys = ['gen', 'num'];
              else if (categoryId === 'adjetivo') applicableKeys = ['gen', 'num'];
              else if (categoryId === 'demostrativo') applicableKeys = ['gen', 'num', 'dist'];
              else if (categoryId === 'posesivo') applicableKeys = ['gen', 'num'];
              else if (categoryId === 'numeral') applicableKeys = ['type', 'gen', 'num'];
              else if (categoryId === 'indefinido') applicableKeys = ['gen', 'num'];
              else if (categoryId === 'preposición' || categoryId === 'interjección') applicableKeys = ['gen'];
              else if (categoryId === 'adverbio') applicableKeys = ['advType', 'gen'];
              else if (categoryId === 'conjunción') applicableKeys = ['conjType', 'gen'];
              else if (categoryId === 'verbo') applicableKeys = ['tense', 'per', 'gen', 'num', 'verbForm', 'conjugation'];
              
              traits = traitDefs.filter(t => applicableKeys.includes(t.key));
          } 
          // Lógica para Texto Autogenerado
          else {
              traits = traitDefs.filter(t => wordObj[t.key] !== "-" && wordObj[t.key] !== undefined);
          }
          
          // Reglas especiales para Verbos
          if (categoryId === "verbo") {
            if (currentCycle === 1) {
              traits = traits.filter(t => t.key === "tense");
            } else {
              traits = traits.filter(t => {
                if (['tense', 'per', 'num'].includes(t.key)) {
                  return tempSelections && tempSelections.verbForm === 'Personal';
                }
                return true;
              });
            }
            
            const verbOrder = ['tense', 'per', 'gen', 'num', 'verbForm', 'conjugation'];
            traits.sort((a, b) => {
              let indexA = verbOrder.indexOf(a.key);
              let indexB = verbOrder.indexOf(b.key);
              indexA = indexA === -1 ? 99 : indexA;
              indexB = indexB === -1 ? 99 : indexB;
              return indexA - indexB;
            });
          }

          if (categoryId === "numeral" && !wordObj.isCustom) {
              traits = traits.filter(t => ['type', 'gen', 'num'].includes(t.key));
          }
          if (categoryId === "indefinido" && !wordObj.isCustom) {
              traits = traits.filter(t => ['gen', 'num'].includes(t.key));
          }
          
          return traits;
        };

        // --- AUDIOS ---
        const playErrorBeep = () => {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
          } catch (e) {}
        };

        const playSuccessChime = () => {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
          } catch (e) {}
        };

        // --- COMPONENTE PRINCIPAL APP ---
        function App() {
          const [inputMode, setInputMode] = useState('auto'); // 'auto' o 'custom'
          const [rawCustomText, setRawCustomText] = useState("");
          const [isCustomTextLoaded, setIsCustomTextLoaded] = useState(false);
          
          const [cycle, setCycle] = useState(1);
          const [textData, setTextData] = useState([]);
          const [modalState, setModalState] = useState(null);
          
          const [highlightRemaining, setHighlightRemaining] = useState(false);
          const [errorMessage, setErrorMessage] = useState("");
          const [showClouds, setShowClouds] = useState([]);
          const [cloudIndex, setCloudIndex] = useState(-1);

          const generateNewText = useCallback((targetCycle = cycle) => {
            let availableStudents = shuffle([...studentsData]);
            let availableStories = shuffle(stories);

            const paragraphs = [];
            const numParagraphs = targetCycle === 1 ? 1 : 2;

            for (let p = 0; p < numParagraphs; p++) {
              const storyGenerator = availableStories[p % availableStories.length];
              if (availableStudents.length < 2) availableStudents = shuffle([...studentsData]);
              const p1 = availableStudents.pop();
              const p2 = availableStudents.pop();
              const t = getRandomTense();

              const paragraphWords = storyGenerator(p1, p2, t).map((wordObj, i) => ({
                ...wordObj,
                id: `a-p${p}-w${i}`,
                initials: []
              }));
              paragraphs.push(paragraphWords);
            }
            setTextData(paragraphs);
            setModalState(null);
            setShowClouds([]);
            setCloudIndex(-1);
          }, [cycle]);

          useEffect(() => {
            if (inputMode === 'auto') {
              generateNewText(cycle);
            }
          }, [cycle, inputMode, generateNewText]);

          useEffect(() => {
            if (cloudIndex >= 0 && cloudIndex < showClouds.length) {
              const timer = setTimeout(() => {
                setCloudIndex(prev => prev + 1);
              }, 4000); 
              return () => clearTimeout(timer);
            }
          }, [cloudIndex, showClouds.length]);

          useEffect(() => {
            if (showClouds.length > 0 && cloudIndex === showClouds.length) {
              const handleContinue = () => {
                setCloudIndex(-1);
                setShowClouds([]);
              };
              window.addEventListener('keydown', handleContinue);
              return () => window.removeEventListener('keydown', handleContinue);
            }
          }, [cloudIndex, showClouds.length]);

          const loadCustomText = () => {
            if (!rawCustomText.trim()) return;
            const paragraphs = rawCustomText.split('\n').filter(p => p.trim() !== "");
            const newTextData = paragraphs.map((p, pIndex) => {
                const words = p.split(/\s+/).filter(w => w.trim() !== "");
                return words.map((rawWord, wIndex) => {
                   const match = rawWord.match(/^([^a-záéíóúüñÁÉÍÓÚÜÑ]*)([a-záéíóúüñÁÉÍÓÚÜÑ]+)([^a-záéíóúüñÁÉÍÓÚÜÑ]*)$/i);
                   if (match) {
                      return { id: `c-p${pIndex}-w${wIndex}`, pre: match[1]||"", w: match[2], s: match[3]||"", isCustom: true, isCorrect: false, initials: [] };
                   } else {
                      return { id: `c-p${pIndex}-w${wIndex}`, pre: "", w: rawWord, s: "", isCustom: true, isCorrect: false, initials: [] };
                   }
                });
            });
            setTextData(newTextData);
            setIsCustomTextLoaded(true);
            setModalState(null);
            setShowClouds([]);
            setCloudIndex(-1);
          };

          const handleWordClick = (p, w) => {
            const wordObj = textData[p][w];
            if (wordObj.isCorrect) return;

            if (!wordObj.isCustom) {
                const mappedExpectedTag = getCycleMappedTag(wordObj.t3, cycle);
                if (!mappedExpectedTag) return;
            }

            setModalState({ p, w, step: 1, category: null, tempSelections: {}, error: "", hint: "" });
          };

          const handleCategorySelect = (clickedCat) => {
            const wordObj = textData[modalState.p][modalState.w];

            if (wordObj.isCustom) {
                setModalState(prev => ({ ...prev, step: 2, category: clickedCat, error: "", hint: "" }));
                return;
            }

            const mappedExpectedTag = getCycleMappedTag(wordObj.t3, cycle);

            if (clickedCat.id === mappedExpectedTag) {
              const traits = getActiveTraitsForWord(wordObj, cycle, clickedCat.id, {});
              
              if (traits.length === 0) {
                  // Completar de forma automática al no haber opciones en este ciclo para esta palabra
                  playSuccessChime();
                  
                  const initials = [getCategoryAbbreviation(clickedCat.id)];
                  const newData = [...textData];
                  newData[modalState.p][modalState.w] = {
                    ...wordObj,
                    isCorrect: true,
                    colorClass: clickedCat.color,
                    category: clickedCat,
                    initials
                  };
                  setTextData(newData);
                  setModalState(null);
              } else {
                  setModalState(prev => ({ ...prev, step: 2, category: clickedCat, error: "", hint: "" }));
              }
            } else {
              playErrorBeep();
              const hintMsg = hintsDict[mappedExpectedTag] || "Fíjate bien en la función que cumple en la oración.";
              setModalState(prev => ({ 
                ...prev, error: "Categoría incorrecta, inténtalo de nuevo.", hint: hintMsg
              }));
              setTimeout(() => setModalState(prev => prev ? { ...prev, error: "", hint: "" } : null), 5000);
            }
          };

          const handleTraitSelect = (key, val) => {
            setModalState(prev => ({
              ...prev,
              tempSelections: { ...prev.tempSelections, [key]: val }
            }));
          };

          const handleComprobar = () => {
            const wordObj = textData[modalState.p][modalState.w];
            let isCorrect = true;

            if (!wordObj.isCustom) {
                let requiredKeys = traitDefs.map(t => t.key).filter(k => wordObj[k] !== "-" && wordObj[k] !== undefined);
                if (modalState.category.id === "verbo" && cycle === 1) requiredKeys = requiredKeys.filter(k => k === 'tense');
                if (modalState.category.id === "numeral") requiredKeys = requiredKeys.filter(k => ['type', 'gen', 'num'].includes(k));
                if (modalState.category.id === "indefinido") requiredKeys = requiredKeys.filter(k => ['gen', 'num'].includes(k));
                
                isCorrect = requiredKeys.every(k => wordObj[k] === modalState.tempSelections[k]);
            } else {
                const shownTraits = getActiveTraitsForWord(wordObj, cycle, modalState.category.id, modalState.tempSelections);
                isCorrect = shownTraits.every(t => modalState.tempSelections[t.key] !== undefined);
            }

            if (isCorrect) {
              playSuccessChime();
              
              const initials = [];
              initials.push(getCategoryAbbreviation(modalState.category.id));

              if (modalState.category.id === "verbo") {
                if (modalState.tempSelections.tense) {
                  const t = modalState.tempSelections.tense;
                  initials.push(t === "presente" ? "PRES" : t === "pasado" ? "PAS" : "FUT");
                }
                if (modalState.tempSelections.per) initials.push(modalState.tempSelections.per);
                if (modalState.tempSelections.gen) initials.push(modalState.tempSelections.gen);
                if (modalState.tempSelections.num) initials.push(modalState.tempSelections.num);
                if (modalState.tempSelections.verbForm) {
                  const vf = modalState.tempSelections.verbForm;
                  initials.push(vf === "Personal" ? "PERS" : vf.substring(0,3).toUpperCase()); 
                }
                if (modalState.tempSelections.conjugation) {
                  initials.push(modalState.tempSelections.conjugation.split(' ')[0]);
                }
              } else {
                if (modalState.tempSelections.type) {
                    if (modalState.category.id === "numeral") {
                        initials.push(modalState.tempSelections.type.substring(0,3).toUpperCase());
                    } else {
                        initials.push(modalState.tempSelections.type); 
                    }
                }
                if (modalState.tempSelections.gen) initials.push(modalState.tempSelections.gen);   
                if (modalState.tempSelections.num) initials.push(modalState.tempSelections.num);   
                if (modalState.tempSelections.dist) {
                  if (modalState.tempSelections.dist === "Cercanía") initials.push("CERC");
                  else if (modalState.tempSelections.dist === "Dist. media") initials.push("MED");
                  else initials.push("LEJ");
                }
                if (modalState.tempSelections.per) initials.push(modalState.tempSelections.per);   
                if (modalState.tempSelections.advType) {
                  initials.push(modalState.tempSelections.advType.substring(0,3).toUpperCase()); 
                }
                if (modalState.tempSelections.conjType) {
                  initials.push(modalState.tempSelections.conjType.substring(0,3).toUpperCase()); 
                }
              }

              const newData = [...textData];
              newData[modalState.p][modalState.w] = {
                ...wordObj,
                isCorrect: true,
                colorClass: modalState.category.color,
                category: modalState.category,
                initials
              };
              setTextData(newData);
              setModalState(null);
            } else {
              playErrorBeep();
              if (wordObj.isCustom) {
                  setModalState(prev => ({ 
                    ...prev, error: "¡Faltan opciones por seleccionar!", hint: "Por favor, completa todos los rasgos morfológicos de esta palabra."
                  }));
              } else {
                  setModalState(prev => ({ 
                    ...prev, error: "¡Revisa los rasgos morfológicos, hay errores!", hint: "Comprueba las opciones (género, número, tiempo, persona, clase o forma) de la palabra."
                  }));
              }
              setTimeout(() => setModalState(prev => prev ? { ...prev, error: "", hint: "" } : null), 5000);
            }
          };

          const handleFinalizar = () => {
            const unanalyzedWords = [];
            const categoriesMap = {};
            let isCustomModeActive = false;

            textData.forEach(paragraph => {
              paragraph.forEach(wordObj => {
                if (wordObj.isCustom) isCustomModeActive = true;

                if (wordObj.isCustom) {
                    if (wordObj.isCorrect && wordObj.category) {
                        const catId = wordObj.category.id;
                        if (!categoriesMap[catId]) categoriesMap[catId] = new Set();
                        categoriesMap[catId].add(wordObj.w);
                    }
                } else {
                    const expectedTag = getCycleMappedTag(wordObj.t3, cycle);
                    if (expectedTag) {
                      if (!wordObj.isCorrect) {
                        unanalyzedWords.push(wordObj.w);
                      } else {
                        if (!categoriesMap[expectedTag]) categoriesMap[expectedTag] = new Set();
                        categoriesMap[expectedTag].add(wordObj.w);
                      }
                    }
                }
              });
            });

            if (!isCustomModeActive && unanalyzedWords.length > 0) {
              playErrorBeep();
              setErrorMessage(`¡Aún faltan ${unanalyzedWords.length} palabras por analizar!`);
              setHighlightRemaining(true);
              setTimeout(() => {
                setErrorMessage("");
                setHighlightRemaining(false);
              }, 3500);
              return;
            }

            if (isCustomModeActive && Object.keys(categoriesMap).length === 0) {
               playErrorBeep();
               setErrorMessage(`¡No has analizado ninguna palabra!`);
               setTimeout(() => setErrorMessage(""), 3500);
               return;
            }

            const clouds = Object.keys(categoriesMap).map(tag => {
              const catInfo = cyclesData[cycle].find(c => c.id === tag) || { label: tag.toUpperCase(), bg: 'bg-indigo-100', color: 'text-indigo-800' };
              return {
                id: tag,
                label: catInfo.label,
                bgClass: catInfo.bg,
                colorClass: catInfo.color,
                words: Array.from(categoriesMap[tag])
              };
            });

            setShowClouds(clouds);
            setCloudIndex(0);
          };

          const textClasses = cycle === 1 ? "text-4xl md:text-5xl" : "text-2xl md:text-3xl";

          const activeTraitsToRender = modalState && modalState.step === 2 
            ? getActiveTraitsForWord(textData[modalState.p][modalState.w], cycle, modalState.category.id, modalState.tempSelections) 
            : [];

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8 overflow-x-hidden pb-32">
              
              <style>{`
                @keyframes cloudPop {
                  0% { transform: scale(0.5); opacity: 0; }
                  15% { transform: scale(1.1); opacity: 1; }
                  25% { transform: scale(1); opacity: 1; }
                  85% { transform: scale(1); opacity: 1; }
                  100% { transform: scale(0.8); opacity: 0; }
                }
                .animate-cloud-pop {
                  animation: cloudPop 4s ease-in-out forwards;
                }
                .word-float-1 { animation: float1 3s ease-in-out infinite alternate; }
                .word-float-2 { animation: float2 4s ease-in-out infinite alternate; }
                .word-float-3 { animation: float3 3.5s ease-in-out infinite alternate; }
                @keyframes float1 { 0% { transform: translateY(0px) rotate(-3deg); } 100% { transform: translateY(-10px) rotate(2deg); } }
                @keyframes float2 { 0% { transform: translateY(0px) rotate(4deg); } 100% { transform: translateY(-12px) rotate(-1deg); } }
                @keyframes float3 { 0% { transform: translateY(0px) rotate(-1deg); } 100% { transform: translateY(-8px) rotate(3deg); } }
              `}</style>

              <div className="max-w-6xl mx-auto space-y-6">

                {/* CAJA DEL MENÚ PRINCIPAL VERDE */}
                <div className="bg-green-100 rounded-3xl p-4 md:p-5 shadow-md border-2 border-green-200 relative">
                  
                  {/* CONTENEDOR PRINCIPAL DEL MENÚ (Usa grid/flex para organizar elementos) */}
                  <div className="flex flex-col gap-3 md:gap-4">
                      
                      {/* BOTONES DE MODO DE TEXTO (Alineados a los extremos) */}
                      <div className="flex flex-col sm:flex-row justify-between items-center w-full gap-3">
                          <button 
                              onClick={() => { setInputMode('auto'); setIsCustomTextLoaded(false); }}
                              className={`flex items-center gap-2 px-4 py-2 rounded-full font-bold text-sm md:text-base transition-transform shadow-sm border-2 w-full sm:w-auto justify-center ${inputMode === 'auto' ? 'bg-indigo-600 text-white border-indigo-700 scale-105' : 'bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50'}`}
                          >
                              <RefreshCw size={18} />
                              Generador Aleatorio
                          </button>
                          
                          {/* El título se mueve al centro si hay espacio, o se queda como bloque aparte */}
                          <div className="hidden md:block absolute left-1/2 transform -translate-x-1/2 top-5 text-center w-full pointer-events-none">
                             <h1 className="text-2xl md:text-3xl font-extrabold text-green-900 flex items-center justify-center gap-2">
                                <Layers className="text-green-700" size={28} />
                                Análisis morfológico multinivel
                             </h1>
                          </div>
                          
                          <button 
                              onClick={() => setInputMode('custom')}
                              className={`flex items-center gap-2 px-4 py-2 rounded-full font-bold text-sm md:text-base transition-transform shadow-sm border-2 w-full sm:w-auto justify-center ${inputMode === 'custom' ? 'bg-indigo-600 text-white border-indigo-700 scale-105' : 'bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50'}`}
                          >
                              <Edit3 size={18} />
                              Texto Propio Externo
                          </button>
                      </div>

                      {/* CABECERA (Título en móvil y controles de ciclo) */}
                      <header className="text-center mt-1 md:mt-8">
                        {/* Título solo visible en móvil (en desktop está absoluto arriba) */}
                        <h1 className="md:hidden text-2xl font-extrabold text-green-900 mb-3 flex items-center justify-center gap-2">
                          <Layers className="text-green-700" size={24} />
                          Análisis morfológico
                        </h1>
                        
                        {errorMessage && (
                          <div className="absolute -bottom-2 left-1/2 transform -translate-x-1/2 bg-red-600 text-white font-bold px-4 py-1.5 text-sm rounded-xl shadow-lg animate-pulse z-10 w-max">
                            {errorMessage}
                          </div>
                        )}

                        <div className="flex justify-center gap-3 mb-3">
                          {[1, 2, 3].map(c => (
                            <button
                              key={c}
                              onClick={() => { setCycle(c); setModalState(null); }}
                              className={`px-5 py-1.5 rounded-full font-bold transition-all shadow-sm border-2 text-sm md:text-base
                                ${cycle === c ? 'bg-green-700 text-white border-green-800 scale-105' : 'bg-white text-green-800 border-green-300 hover:bg-green-50'}
                              `}
                            >
                              Ciclo {c}
                            </button>
                          ))}
                        </div>
                        <p className="text-green-800 font-medium text-xs md:text-sm bg-white/50 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg mb-1">
                          <MousePointerClick size={16}/> Pulsa sobre una palabra para comenzar su análisis
                        </p>
                      </header>

                      {/* LEYENDA DE CATEGORÍAS */}
                      <div className="flex flex-wrap gap-1.5 md:gap-2 justify-center">
                        {cyclesData[cycle].map((cat) => (
                          <div key={cat.id} className={`flex flex-col items-center justify-center px-2 py-1.5 rounded-lg border-2 shadow-sm min-w-[75px] md:min-w-[85px] ${cat.bg} ${cat.border}`}>
                            <span className={`text-[0.65rem] md:text-xs font-bold uppercase tracking-wider ${cat.color}`}>{cat.label}</span>
                          </div>
                        ))}
                      </div>
                  </div>
                </div>

                {/* ÁREA DE TEXTO O INPUT */}
                {inputMode === 'custom' && !isCustomTextLoaded ? (
                    <div className="bg-white p-6 md:p-10 rounded-3xl shadow-lg border-2 border-indigo-200">
                        <h2 className="text-2xl font-bold text-indigo-900 mb-4">Introduce tu propio texto</h2>
                        <p className="text-slate-600 mb-4">Pega o escribe aquí el texto que deseas analizar con tus alumnos. Al aceptar, podrás seleccionar cualquier palabra y categorizarla libremente.</p>
                        <textarea 
                            className="w-full h-48 p-4 border-2 border-slate-300 rounded-xl text-lg font-medium text-slate-700 focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 outline-none transition-all"
                            placeholder="Escribe el texto aquí..."
                            value={rawCustomText}
                            onChange={(e) => setRawCustomText(e.target.value)}
                        />
                        <div className="flex justify-center mt-6">
                            <button 
                                onClick={loadCustomText}
                                disabled={!rawCustomText.trim()}
                                className="flex items-center gap-2 px-8 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-400 text-white font-bold text-xl rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95"
                            >
                                Comenzar Análisis
                            </button>
                        </div>
                    </div>
                ) : (
                    <div className="bg-blue-50 p-6 md:p-10 rounded-3xl shadow-lg border-2 border-blue-100 select-none relative">
                    <div className={`${textClasses}`}>
                        {textData.map((paragraph, pIndex) => (
                        <p key={pIndex} className="mb-10 text-justify indent-8 md:indent-12 leading-[2.5] md:leading-[3]">
                            {paragraph.map((wordObj, wIndex) => {
                            
                            let containerStyle = "inline-flex flex-col items-center align-top mx-[2px] transition-transform duration-200 cursor-pointer ";
                            let wordStyle = "font-medium rounded px-1 transition-colors ";
                            
                            if (wordObj.isCorrect) {
                                wordStyle += `${wordObj.category.bg} ${wordObj.colorClass} font-extrabold shadow-sm`;
                            } else {
                                wordStyle += "text-slate-800 hover:bg-blue-200 hover:-translate-y-1";
                                
                                if (!wordObj.isCustom && highlightRemaining && getCycleMappedTag(wordObj.t3, cycle)) {
                                wordStyle += " ring-2 ring-red-400 ring-offset-2 bg-red-100 animate-pulse";
                                }
                            }

                            return (
                                <React.Fragment key={wordObj.id}>
                                {wordObj.pre && <span className="text-slate-800 font-medium">{wordObj.pre}</span>}
                                <span onClick={() => handleWordClick(pIndex, wIndex)} className={containerStyle}>
                                    <span className={wordStyle}>{wordObj.w}</span>
                                    
                                    {wordObj.isCorrect && wordObj.initials.length > 0 && (
                                    <span className={`text-sm md:text-base font-black text-slate-700 leading-none mt-1 pt-[2px] border-t-[3px] ${wordObj.category.lineColor} max-w-full text-center tracking-tighter`}>
                                        {wordObj.initials.join(" ")}
                                    </span>
                                    )}
                                </span>
                                {wordObj.s && <span className="text-slate-800 font-medium">{wordObj.s}</span>}
                                {" "}
                                </React.Fragment>
                            );
                            })}
                        </p>
                        ))}
                    </div>
                    </div>
                )}

                {/* BOTONES INFERIORES */}
                {(inputMode === 'auto' || isCustomTextLoaded) && (
                    <div className="flex flex-wrap justify-center gap-4 pb-8">
                    {inputMode === 'auto' ? (
                        <button
                            onClick={() => generateNewText(cycle)}
                            className="flex items-center gap-2 px-8 py-4 bg-slate-800 hover:bg-slate-900 text-white font-bold text-lg rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95"
                        >
                            <RefreshCw size={24} />
                            Generar Nuevo Texto
                        </button>
                    ) : (
                        <button
                            onClick={() => setIsCustomTextLoaded(false)}
                            className="flex items-center gap-2 px-8 py-4 bg-slate-600 hover:bg-slate-700 text-white font-bold text-lg rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95"
                        >
                            <Edit3 size={24} />
                            Editar Texto
                        </button>
                    )}
                    
                    <button
                        onClick={handleFinalizar}
                        className="flex items-center gap-2 px-8 py-4 bg-amber-500 hover:bg-amber-600 text-white font-bold text-lg rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95"
                    >
                        <Star size={24} />
                        Finalizar y Ver Nubes
                    </button>
                    </div>
                )}

              </div>

              {/* SUPERPOSICIÓN: NUBES DE PALABRAS ANIMADAS O MENSAJE FINAL */}
              {cloudIndex >= 0 && showClouds.length > 0 && (
                <div 
                  className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-md transition-opacity"
                  onClick={() => {
                    if (cloudIndex === showClouds.length) {
                      setCloudIndex(-1);
                      setShowClouds([]);
                    }
                  }}
                >
                  {cloudIndex < showClouds.length ? (
                    <div key={cloudIndex} className="text-center w-full animate-cloud-pop pointer-events-none">
                       <h2 className="text-4xl md:text-6xl font-black mb-16 uppercase tracking-widest text-white drop-shadow-2xl">
                         {showClouds[cloudIndex].label}
                       </h2>
                       <div className="flex flex-wrap justify-center gap-6 md:gap-10 items-center max-w-5xl mx-auto px-4">
                         {showClouds[cloudIndex].words.map((w, i) => {
                           const sizeClass = ['text-3xl', 'text-5xl', 'text-4xl', 'text-6xl', 'text-5xl'][i % 5];
                           const animationClass = ['word-float-1', 'word-float-2', 'word-float-3'][i % 3];
                           const colorClass = showClouds[cloudIndex].colorClass; 
                           const bgClass = showClouds[cloudIndex].bgClass; 
                           return (
                             <span key={i} className={`font-extrabold ${sizeClass} ${animationClass} ${bgClass} ${colorClass} px-6 py-3 rounded-3xl shadow-2xl border-4 border-white/20 inline-block`}>
                               {w}
                             </span>
                           )
                         })}
                       </div>
                    </div>
                  ) : (
                    <div className="text-center animate-fade-in select-none cursor-pointer">
                       <h2 className="text-4xl md:text-6xl font-black text-white mb-6 drop-shadow-2xl">
                         ¡Excelente trabajo!
                       </h2>
                       <p className="text-xl md:text-3xl text-amber-300 font-bold animate-pulse">
                         Pulsa cualquier tecla (o haz clic) para continuar
                       </p>
                    </div>
                  )}
                </div>
              )}

              {/* MODAL POPUP DE ANÁLISIS */}
              {modalState && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                  <div className="bg-white w-full max-w-2xl rounded-3xl shadow-2xl border-4 border-indigo-200 overflow-hidden flex flex-col">
                    
                    <div className="bg-indigo-600 text-white p-5 flex justify-between items-center relative">
                      <h2 className="text-2xl font-black">
                        Analizando: <span className="text-yellow-300">"{textData[modalState.p][modalState.w].w}"</span>
                      </h2>
                      <button onClick={() => setModalState(null)} className="hover:text-red-300 transition-colors">
                        <XCircle size={32} />
                      </button>
                    </div>

                    <div className="p-6 md:p-8 relative">
                      
                      {(modalState.error || modalState.hint) && (
                        <div className="absolute top-4 left-1/2 transform -translate-x-1/2 flex flex-col items-center gap-2 z-10 w-11/12 max-w-lg">
                          {modalState.error && (
                            <div className="bg-red-600 text-white font-bold px-4 py-2 rounded-lg shadow-lg animate-pulse text-center w-full">
                              {modalState.error}
                            </div>
                          )}
                          {modalState.hint && (
                            <div className="bg-green-600 text-white px-5 py-3 rounded-lg shadow-lg border-2 border-green-300 animate-fade-in text-center w-full">
                              <span className="uppercase text-green-200 text-xs font-black block mb-1 tracking-widest">💡 Pista</span>
                              <span className="font-bold text-lg">{modalState.hint}</span>
                            </div>
                          )}
                        </div>
                      )}

                      {modalState.step === 1 ? (
                        <div className={`transition-opacity ${modalState.error ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                          {textData[modalState.p][modalState.w].isCustom && (
                             <div className="bg-indigo-50 border border-indigo-200 text-indigo-800 p-3 rounded-xl mb-6 text-center font-medium">
                                ✏️ <strong>Modo Libre:</strong> Como es tu propio texto, elige la categoría que consideres correcta.
                             </div>
                          )}
                          <h3 className="text-xl font-bold text-slate-700 mb-6 text-center">1. ¿Qué tipo de palabra es?</h3>
                          <div className="flex flex-wrap gap-3 justify-center">
                            {cyclesData[cycle].map(cat => (
                              <button
                                key={cat.id}
                                onClick={() => handleCategorySelect(cat)}
                                className={`px-4 py-3 rounded-xl font-bold border-2 transition-transform hover:scale-105 active:scale-95 ${cat.bg} ${cat.color} ${cat.border}`}
                              >
                                {cat.label}
                              </button>
                            ))}
                          </div>
                        </div>
                      ) : (
                        <div className={`transition-opacity ${modalState.error ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                          <div className="mb-4 text-center">
                            <span className={`inline-block px-4 py-1 rounded-full font-bold text-sm ${modalState.category.bg} ${modalState.category.color}`}>
                              {modalState.category.label}
                            </span>
                          </div>
                          <h3 className="text-xl font-bold text-slate-700 mb-6 text-center border-b pb-4">
                            2. Selecciona las opciones adecuadas
                          </h3>

                          <div className="space-y-6">
                            {activeTraitsToRender.length === 0 ? (
                              <div className="text-center p-6 bg-slate-100 rounded-xl">
                                <p className="text-lg font-bold text-slate-600">Análisis completado en este nivel.</p>
                                <p className="text-slate-500 text-sm">No hay más opciones que analizar para esta palabra. Haz clic en Confirmar.</p>
                              </div>
                            ) : (
                              activeTraitsToRender.map(trait => (
                                <div key={trait.key} className="flex flex-col md:flex-row items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                  <span className="font-bold text-slate-600 w-24 text-center md:text-right uppercase text-sm">
                                    {trait.title}:
                                  </span>
                                  <div className="flex flex-wrap gap-2 flex-1 justify-center md:justify-start">
                                    {trait.getOptions(modalState.category.id).map(opt => (
                                      <button
                                        key={opt.id}
                                        onClick={() => handleTraitSelect(trait.key, opt.id)}
                                        className={`px-4 py-2 rounded-lg font-bold transition-colors border-2 ${
                                          modalState.tempSelections[trait.key] === opt.id
                                            ? 'bg-indigo-600 text-white border-indigo-700'
                                            : 'bg-white text-slate-700 border-slate-300 hover:bg-indigo-50 hover:border-indigo-300'
                                        }`}
                                      >
                                        {opt.label}
                                      </button>
                                    ))}
                                  </div>
                                </div>
                              ))
                            )}
                          </div>

                          <div className="mt-8 flex justify-center">
                            <button
                              onClick={handleComprobar}
                              className="flex items-center gap-2 px-8 py-3 bg-green-600 hover:bg-green-700 disabled:bg-slate-300 text-white font-bold text-xl rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95"
                            >
                              <CheckCircle size={24} /> Confirmar Análisis
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // --- RENDERIZADO INICIAL ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
