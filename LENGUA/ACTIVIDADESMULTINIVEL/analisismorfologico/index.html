            if (t3.includes("verbo")) return "verbo";
            if (cycle === 3 && (t3 === "adverbio" || t3 === "conjunción" || t3 === "interjección" || t3 === "pronombre personal")) return t3;

          if (catId === "indefinido") return "IND";

          let traits = [];
          if (wordObj.isCustom && !wordObj.apiAnalyzed) {
              let applicableKeys = [];
              if (categoryId === 'artículo') applicableKeys = ['type', 'gen', 'num'];
              else if (categoryId.includes('sustantivo')) applicableKeys = ['gen', 'num'];
              else if (categoryId === 'adjetivo') applicableKeys = ['gen', 'num'];
              else if (categoryId === 'demostrativo') applicableKeys = ['gen', 'num', 'dist'];
              else if (categoryId === 'posesivo') applicableKeys = ['gen', 'num'];
              else if (categoryId === 'numeral') applicableKeys = ['type', 'gen', 'num'];
              else if (categoryId === 'indefinido') applicableKeys = ['gen', 'num'];
              else if (categoryId === 'preposición' || categoryId === 'interjección') applicableKeys = ['gen'];
              else if (categoryId === 'adverbio') applicableKeys = ['advType', 'gen'];
              else if (categoryId === 'conjunción') applicableKeys = ['conjType', 'gen'];
              else if (categoryId === 'verbo') applicableKeys = ['tense', 'per', 'gen', 'num', 'verbForm', 'conjugation'];
              else if (categoryId === 'pronombre personal') applicableKeys = ['per', 'gen', 'num'];
              traits = traitDefs.filter(t => applicableKeys.includes(t.key));

              traits = traits.filter(t => t.key === "tense");

              traits = traits.filter(t => {
                if (['tense', 'per', 'num'].includes(t.key)) return tempSelections && tempSelections.verbForm === 'Personal';
                return true;
              });
            }

            traits.sort((a, b) => {
              let indexA = verbOrder.indexOf(a.key); let indexB = verbOrder.indexOf(b.key);
              indexA = indexA === -1 ? 99 : indexA; indexB = indexB === -1 ? 99 : indexB;
              return indexA - indexB;

              traits = traits.filter(t => ['type', 'gen', 'num'].includes(t.key));

          if (categoryId === "indefinido" && !(wordObj.isCustom && !wordObj.apiAnalyzed)) {

        const playSound = (type) => {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
            } else if (type === 'magic') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 1.5);
            } else {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);
            }
            
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (type === 'magic' ? 1.5 : 0.3));
            
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + (type === 'magic' ? 1.5 : 0.3));
