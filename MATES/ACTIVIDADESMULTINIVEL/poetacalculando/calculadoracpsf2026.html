<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máquina de Operaciones</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Estilos adicionales para ocultar las flechas de los input de tipo número */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* Animaciones para los botones colgantes */
        @keyframes swing {
            0% { transform: rotate(15deg); }
            50% { transform: rotate(-15deg); }
            100% { transform: rotate(15deg); }
        }
        .hanging-container {
            transform-origin: top center;
            animation: swing 3s ease-in-out infinite alternate;
            position: absolute;
            left: 50%;
            top: 100%;
            margin-left: -28px; /* Centrado exacto: la mitad de los 56px de ancho */
            width: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            pointer-events: none; /* Para que no bloquee los clics */
        }
        .hanging-rope {
            width: 3px;
            background-color: #8b5a2b; /* Color madera/cuerda */
            transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* Animación de estiramiento con un pequeño rebote */
        }
        .hanging-badge {
            width: 56px; /* Circulitos más grandes */
            height: 56px;
            border-width: 4px; /* Borde un poco más grueso para compensar */
            border-style: solid;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 2.4rem; /* Símbolo matemático más grande */
            margin-top: -2px;
            box-shadow: 0 6px 8px -2px rgba(0, 0, 0, 0.5); /* Sombra un poco más fuerte */
        }
        /* Diferentes retardos para que no se balanceen todos a la vez */
        .delay-1 { animation-delay: 0s; }
        .delay-2 { animation-delay: -0.7s; }
        .delay-3 { animation-delay: -1.4s; }
        .delay-4 { animation-delay: -2.1s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- ICONOS SVG ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Check = ({ className }) => <Icon className={className}><polyline points="20 6 9 17 4 12"></polyline></Icon>;
        const CheckCircle2 = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></Icon>;
        const ChevronRight = ({ className }) => <Icon className={className}><polyline points="9 18 15 12 9 6"></polyline></Icon>;
        const ArrowDown = ({ className }) => <Icon className={className}><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></Icon>;
        const HelpCircle = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></Icon>;
        const RefreshCw = ({ className }) => <Icon className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></Icon>;

        // --- UTILS & MATH GENERATORS ---
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const generateNumber = (digits) => {
            if (digits === 1) return randomInt(1, 9);
            const min = Math.pow(10, digits - 1);
            const max = Math.pow(10, digits) - 1;
            return randomInt(min, max);
        };

        // --- COMPONENTS ---

        const DigitInput = ({ value, onChange, className = "", isSmall = false, readOnly = false, id, isHelped = false }) => {
            return (
                <input
                id={id}
                type="text"
                maxLength={1}
                value={value}
                onChange={(e) => {
                    const val = e.target.value.replace(/[^0-9]/g, '');
                    onChange(val);
                    if (val !== '' && id) {
                        const parts = id.split('-');
                        const lastIdx = parts.length - 1;
                        parts[lastIdx] = parseInt(parts[lastIdx]) + 1;
                        const nextId = parts.join('-');
                        const nextEl = document.getElementById(nextId);
                        if (nextEl) nextEl.focus();
                    }
                }}
                readOnly={readOnly}
                className={`text-center font-mono border-2 rounded-md focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-colors
                    ${isSmall ? 'w-6 h-8 text-sm' : 'w-10 h-12 text-2xl'} 
                    ${isHelped ? 'animate-pulse !bg-green-200 !text-green-800 !border-green-500 font-bold' : readOnly ? 'bg-gray-100 border-gray-300' : 'bg-white border-blue-300'}
                    ${className}`}
                />
            );
        };

        // Componente Separador de Miles, Millones, etc. (Sólo resultados)
        const DotSeparator = ({ isSmall }) => (
            <span className={`absolute ${isSmall ? '-left-[4px] bottom-[2px] text-lg' : '-left-[6px] sm:-left-[8px] bottom-[4px] text-3xl'} font-extrabold text-slate-800 pointer-events-none z-20 select-none`}>.</span>
        );

        // --- OPERATION BOARDS ---

        const AdditionBoard = ({ config, isManual, onNext, autoSolve }) => {
            const [addends, setAddends] = useState([]);
            const [setupMode, setSetupMode] = useState(isManual);
            const [inputs, setInputs] = useState({});
            const [carries, setCarries] = useState({});
            const [helpedFields, setHelpedFields] = useState({});
            const [status, setStatus] = useState('playing'); 

            useEffect(() => {
                if (!isManual) {
                const newAddends = [];
                for (let i = 0; i < config.numAddends; i++) {
                    const digits = i === 0 ? config.maxDigits : randomInt(1, config.maxDigits);
                    newAddends.push(generateNumber(digits));
                }
                setAddends(newAddends);
                resetState();
                } else {
                setAddends(Array(config.numAddends).fill(''));
                setSetupMode(true);
                resetState();
                }
            }, [config, isManual]);

            const maxLen = Math.max(...addends.map(a => String(a).length), 1);
            const cols = maxLen + 2; 
            const maxPower = maxLen; 

            const prevAutoSolve = useRef(autoSolve);
            useEffect(() => {
                if (autoSolve > prevAutoSolve.current) {
                    prevAutoSolve.current = autoSolve;
                    if (!setupMode && addends.length > 0) {
                        const newInputs = {};
                        const newCarries = {};
                        
                        const expectedStr = String(addends.reduce((acc, curr) => acc + (parseInt(curr, 10) || 0), 0));
                        
                        for (let i = 0; i < expectedStr.length; i++) {
                            newInputs[`res-${i}`] = expectedStr[expectedStr.length - 1 - i];
                        }

                        let currentCarry = 0;
                        for (let power = 0; power <= maxPower; power++) {
                            if (currentCarry > 0 && power > 0 && power < maxLen) {
                                newCarries[`c-${power}`] = String(currentCarry);
                            }
                            let colSum = currentCarry;
                            addends.forEach(addend => {
                                const numStr = String(addend);
                                const charIdx = numStr.length - 1 - power;
                                if (charIdx >= 0 && charIdx < numStr.length) {
                                    colSum += parseInt(numStr[charIdx], 10) || 0;
                                }
                            });
                            currentCarry = Math.floor(colSum / 10);
                        }

                        setInputs({...newInputs});
                        setCarries({...newCarries});
                        setHelpedFields({});
                        setStatus('correct');
                    }
                }
            }, [autoSolve, setupMode, addends, maxPower, maxLen]);

            const resetState = () => {
                if (!isManual) setSetupMode(false);
                setInputs({});
                setCarries({});
                setHelpedFields({});
                setStatus('playing');
            }

            const handleHelp = () => {
                const expectedStr = String(addends.reduce((acc, curr) => acc + (parseInt(curr, 10) || 0), 0));
                let currentCarry = 0;
                
                for (let power = 0; power <= maxPower; power++) {
                    if (currentCarry > 0 && power > 0 && power < maxLen) {
                        const carryKey = `c-${power}`;
                        if (carries[carryKey] !== String(currentCarry)) {
                            setCarries(prev => ({...prev, [carryKey]: String(currentCarry)}));
                            setHelpedFields({ [carryKey]: true });
                            return;
                        }
                    }

                    let colSum = currentCarry;
                    addends.forEach(addend => {
                        const numStr = String(addend);
                        const charIdx = numStr.length - 1 - power;
                        if (charIdx >= 0 && charIdx < numStr.length) {
                            colSum += parseInt(numStr[charIdx], 10) || 0;
                        }
                    });
                    currentCarry = Math.floor(colSum / 10);

                    if (power < expectedStr.length) {
                        const expectedChar = expectedStr[expectedStr.length - 1 - power];
                        const resKey = `res-${power}`;
                        if (inputs[resKey] !== expectedChar) {
                            setInputs(prev => ({...prev, [resKey]: expectedChar}));
                            setHelpedFields({ [resKey]: true });
                            return;
                        }
                    }
                }
            };

            const checkResult = () => {
                const sum = addends.reduce((acc, curr) => acc + (parseInt(curr, 10) || 0), 0);
                let userStr = '';
                for (let power = maxPower; power >= 0; power--) {
                    userStr += (inputs[`res-${power}`] || '0');
                }
                if (parseInt(userStr, 10) === sum) setStatus('correct');
                else setStatus('incorrect');
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-6">
                    <h3 className="text-3xl font-bold text-gray-700 mb-2">Introduce los sumandos</h3>
                    {addends.map((a, i) => (
                    <div key={i} className="flex items-center space-x-4">
                        <span className="font-bold text-2xl whitespace-nowrap">Sumando {i + 1}:</span>
                        <input 
                        type="number" 
                        className="border-4 border-blue-300 rounded-xl p-4 text-3xl font-mono w-64"
                        value={a}
                        onChange={(e) => {
                            const newAddends = [...addends];
                            newAddends[i] = e.target.value;
                            setAddends(newAddends);
                        }}
                        />
                    </div>
                    ))}
                    <button 
                    onClick={() => {
                        if (addends.every(a => String(a).trim() !== '')) setSetupMode(false);
                    }}
                    className="bg-blue-500 text-white px-8 py-4 mt-4 text-2xl rounded-2xl font-bold hover:bg-blue-600 flex items-center shadow-lg"
                    >
                    <Check className="mr-3 w-8 h-8" /> Comenzar Suma
                    </button>
                </div>
                );
            }

            return (
                <div className="flex flex-col items-center">
                <div className="bg-white p-8 rounded-xl shadow-lg border-2 border-blue-100 relative">
                    <div className="grid gap-2" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                    
                    {/* Carries Row */}
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        return (
                            <div key={`carry-${power}`} className="flex justify-center mb-2">
                            {power > 0 && power < maxLen && (
                                <DigitInput
                                    isSmall
                                    value={carries[`c-${power}`] || ''}
                                    onChange={(v) => setCarries({ ...carries, [`c-${power}`]: v })}
                                    className="bg-yellow-50 border-yellow-300 text-yellow-700"
                                    isHelped={helpedFields[`c-${power}`]}
                                />
                            )}
                            </div>
                        );
                    })}

                    {/* Addends */}
                    {addends.map((addend, rIndex) => {
                        const numStr = String(addend);
                        return (
                        <React.Fragment key={`row-${rIndex}`}>
                            <div className="flex items-center justify-center font-bold text-2xl text-blue-500">
                                {rIndex === addends.length - 1 ? '+' : ''}
                            </div>
                            {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                                const power = cols - 2 - cIndex;
                                const charIdx = numStr.length - 1 - power;
                                const char = charIdx >= 0 && charIdx < numStr.length ? numStr[charIdx] : '';
                                return (
                                    <div key={`c-${rIndex}-${power}`} className="flex justify-center">
                                        <div className="w-10 h-12 flex items-center justify-center text-3xl font-mono">
                                            {char}
                                        </div>
                                    </div>
                                );
                            })}
                        </React.Fragment>
                        );
                    })}

                    {/* Divider */}
                    <div className={`col-span-${cols} border-b-4 border-black my-2`}></div>

                    {/* Result Row (AQUÍ SÍ HAY PUNTOS SEPARADORES) */}
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        const hasHigherInput = Object.keys(inputs).some(k => k.startsWith('res-') && parseInt(k.split('-')[1]) > power && inputs[k] !== '');
                        return (
                            <div key={`res-${power}`} className="flex justify-center">
                                <div className="relative">
                                    {power % 3 === 2 && hasHigherInput && <DotSeparator />}
                                    <DigitInput
                                        id={`add-res-${cIndex}`}
                                        value={inputs[`res-${power}`] || ''}
                                        onChange={(v) => setInputs({ ...inputs, [`res-${power}`]: v })}
                                        className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : ''}
                                        isHelped={helpedFields[`res-${power}`]}
                                    />
                                </div>
                            </div>
                        );
                    })}

                    </div>
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 flex items-center shadow-md">
                    <CheckCircle2 className="mr-2" /> Comprobar
                    </button>
                    <button onClick={onNext} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 flex items-center shadow-md">
                    Siguiente <ChevronRight className="ml-2" />
                    </button>
                </div>
                
                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡Correcto! ¡Muy bien!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Hay un error, revisa la operación.</p>}
                </div>
            );
        };

        const SubtractionBoard = ({ config, isManual, onNext, autoSolve }) => {
            const [minuend, setMinuend] = useState('');
            const [subtrahend, setSubtrahend] = useState('');
            const [setupMode, setSetupMode] = useState(isManual);
            const [inputs, setInputs] = useState({});
            const [carries, setCarries] = useState({});
            const [helpedFields, setHelpedFields] = useState({});
            const [status, setStatus] = useState('playing');

            useEffect(() => {
                if (!isManual) {
                let m = generateNumber(config.digitsMin);
                let s = generateNumber(config.digitsSub);
                if (s > m) [m, s] = [s, m];
                setMinuend(String(m));
                setSubtrahend(String(s));
                resetState();
                } else {
                setMinuend('');
                setSubtrahend('');
                setSetupMode(true);
                resetState();
                }
            }, [config, isManual]);

            const cols = Math.max(minuend.length, subtrahend.length) + 1;
            const maxPower = cols - 2;

            const prevAutoSolve = useRef(autoSolve);
            useEffect(() => {
                if (autoSolve > prevAutoSolve.current) {
                    prevAutoSolve.current = autoSolve;
                    if (!setupMode && minuend && subtrahend) {
                        const newInputs = {};
                        const newCarries = {};
                        
                        const expectedStr = String(parseInt(minuend || 0, 10) - parseInt(subtrahend || 0, 10));
                        for (let i = 0; i < expectedStr.length; i++) {
                            newInputs[`res-${i}`] = expectedStr[expectedStr.length - 1 - i];
                        }

                        let currentCarry = 0;
                        for (let power = 0; power <= maxPower; power++) {
                            if (currentCarry > 0 && power > 0) {
                                newCarries[`c-${power}`] = String(currentCarry);
                            }
                            const charIdxM = minuend.length - 1 - power;
                            const topDigit = charIdxM >= 0 && charIdxM < minuend.length ? (parseInt(minuend[charIdxM], 10) || 0) : 0;
                            const charIdxS = subtrahend.length - 1 - power;
                            const botDigitBase = charIdxS >= 0 && charIdxS < subtrahend.length ? (parseInt(subtrahend[charIdxS], 10) || 0) : 0;
                            
                            const bottomDigit = botDigitBase + currentCarry;
                            let resDigit = topDigit - bottomDigit;
                            let nextCarry = 0;
                            if (resDigit < 0) {
                                nextCarry = 1;
                            }
                            currentCarry = nextCarry;
                        }

                        setInputs({...newInputs});
                        setCarries({...newCarries});
                        setHelpedFields({});
                        setStatus('correct');
                    }
                }
            }, [autoSolve, setupMode, minuend, subtrahend, maxPower]);

            const resetState = () => {
                if (!isManual) setSetupMode(false);
                setInputs({});
                setCarries({});
                setHelpedFields({});
                setStatus('playing');
            };

            const handleHelp = () => {
                const expectedStr = String(parseInt(minuend || 0, 10) - parseInt(subtrahend || 0, 10));
                let currentCarry = 0;
                
                for (let power = 0; power <= maxPower; power++) {
                    if (currentCarry > 0 && power > 0) {
                        const carryKey = `c-${power}`;
                        if (carries[carryKey] !== String(currentCarry)) {
                            setCarries(prev => ({...prev, [carryKey]: String(currentCarry)}));
                            setHelpedFields({ [carryKey]: true });
                            return;
                        }
                    }

                    const charIdxM = minuend.length - 1 - power;
                    const topDigit = charIdxM >= 0 && charIdxM < minuend.length ? (parseInt(minuend[charIdxM], 10) || 0) : 0;
                    const charIdxS = subtrahend.length - 1 - power;
                    const botDigitBase = charIdxS >= 0 && charIdxS < subtrahend.length ? (parseInt(subtrahend[charIdxS], 10) || 0) : 0;
                    
                    const bottomDigit = botDigitBase + currentCarry;
                    let resDigit = topDigit - bottomDigit;
                    let nextCarry = 0;
                    if (resDigit < 0) { nextCarry = 1; }

                    if (power < expectedStr.length) {
                        const expectedChar = expectedStr[expectedStr.length - 1 - power];
                        const resKey = `res-${power}`;
                        if (inputs[resKey] !== expectedChar) {
                            setInputs(prev => ({...prev, [resKey]: expectedChar}));
                            setHelpedFields({ [resKey]: true });
                            return;
                        }
                    }
                    currentCarry = nextCarry;
                }
            };

            const checkResult = () => {
                const res = parseInt(minuend, 10) - parseInt(subtrahend, 10);
                let userStr = '';
                for (let power = maxPower; power >= 0; power--) {
                    userStr += (inputs[`res-${power}`] || '0');
                }
                if (parseInt(userStr, 10) === res) setStatus('correct');
                else setStatus('incorrect');
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-6">
                    <h3 className="text-3xl font-bold text-gray-700 mb-2">Introduce los números</h3>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Minuendo (arriba):</span>
                    <input type="number" className="border-4 border-blue-300 rounded-xl p-4 text-3xl font-mono w-64" value={minuend} onChange={(e) => setMinuend(e.target.value)} />
                    </div>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Sustraendo (abajo):</span>
                    <input type="number" className="border-4 border-blue-300 rounded-xl p-4 text-3xl font-mono w-64" value={subtrahend} onChange={(e) => setSubtrahend(e.target.value)} />
                    </div>
                    <button 
                    onClick={() => {
                        if (minuend && subtrahend && parseInt(minuend, 10) >= parseInt(subtrahend, 10)) setSetupMode(false);
                        else alert("Por favor, asegúrate de que el minuendo sea mayor o igual al sustraendo.");
                    }}
                    className="bg-blue-500 text-white px-8 py-4 mt-4 text-2xl rounded-2xl font-bold hover:bg-blue-600 flex items-center shadow-lg"
                    >
                    <Check className="mr-3 w-8 h-8" /> Comenzar Resta
                    </button>
                </div>
                );
            }

            const renderRow = (numStr, isSubtrahend = false) => {
                return (
                <React.Fragment>
                    <div className="flex items-center justify-center font-bold text-2xl text-red-500">
                    {isSubtrahend ? '-' : ''}
                    </div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        const charIdx = numStr.length - 1 - power;
                        const char = charIdx >= 0 && charIdx < numStr.length ? numStr[charIdx] : '';
                        return (
                            <div key={`c-${power}`} className="flex flex-col items-center justify-center relative h-16">
                                <div className="text-3xl font-mono leading-none">
                                    {char}
                                </div>
                                {isSubtrahend && charIdx >= -1 && charIdx < numStr.length && power > 0 && (
                                    <div className="absolute -bottom-5 left-1/2 transform -translate-x-1/2">
                                    <DigitInput
                                        isSmall
                                        value={carries[`c-${power}`] || ''}
                                        onChange={(v) => setCarries({ ...carries, [`c-${power}`]: v })}
                                        className="bg-orange-50 border-orange-300 text-orange-700 text-xs w-5 h-6"
                                        isHelped={helpedFields[`c-${power}`]}
                                    />
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </React.Fragment>
                );
            };

            return (
                <div className="flex flex-col items-center">
                <div className="bg-white p-8 pb-12 rounded-xl shadow-lg border-2 border-red-100">
                    <div className="grid gap-x-2 gap-y-4 items-end" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                    {renderRow(minuend, false)}
                    {renderRow(subtrahend, true)}

                    <div className={`col-span-${cols} border-b-4 border-black mt-4 mb-2`}></div>

                    {/* Result Row (AQUÍ SÍ HAY PUNTOS SEPARADORES) */}
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        const hasHigherInput = Object.keys(inputs).some(k => k.startsWith('res-') && parseInt(k.split('-')[1]) > power && inputs[k] !== '');
                        return (
                            <div key={`res-${power}`} className="flex justify-center">
                                <div className="relative">
                                    {power % 3 === 2 && hasHigherInput && <DotSeparator />}
                                    <DigitInput
                                        id={`sub-res-${cIndex}`}
                                        value={inputs[`res-${power}`] || ''}
                                        onChange={(v) => setInputs({ ...inputs, [`res-${power}`]: v })}
                                        className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : ''}
                                        isHelped={helpedFields[`res-${power}`]}
                                    />
                                </div>
                            </div>
                        );
                    })}
                    </div>
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 shadow-md">
                    Comprobar
                    </button>
                    <button onClick={onNext} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 shadow-md">
                    Siguiente
                    </button>
                </div>
                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡Perfecto!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Revisa la resta y las llevadas.</p>}
                </div>
            );
        };

        const MultiplicationBoard = ({ config, isManual, onNext, autoSolve }) => {
            const [multiplicand, setMultiplicand] = useState('');
            const [multiplier, setMultiplier] = useState('');
            const [setupMode, setSetupMode] = useState(isManual);
            const [inputs, setInputs] = useState({});
            const [carries, setCarries] = useState({});
            const [helpedFields, setHelpedFields] = useState({});
            const [status, setStatus] = useState('playing');

            useEffect(() => {
                if (!isManual) setMinuendOrMul();
                else {
                setMultiplicand('');
                setMultiplier('');
                setSetupMode(true);
                resetState();
                }
            }, [config, isManual]);

            const L = multiplicand.length;
            const M = multiplier.length;
            const cols = L + M + 2;
            const numPartials = multiplier.length;

            const prevAutoSolve = useRef(autoSolve);
            useEffect(() => {
                if (autoSolve > prevAutoSolve.current) {
                    prevAutoSolve.current = autoSolve;
                    if (!setupMode && multiplicand && multiplier) {
                        const m1 = parseInt(multiplicand || 0, 10);
                        const m2Str = String(multiplier || 0);
                        const newInputs = {};
                        const newCarries = {};
                        
                        if (m2Str.length > 1) {
                            for (let rIndex = 0; rIndex < m2Str.length; rIndex++) {
                                const digit = parseInt(m2Str[m2Str.length - 1 - rIndex], 10) || 0;
                                const pStr = digit === 0 ? '0'.repeat(String(m1).length) : String(m1 * digit);
                                for (let j = 0; j < pStr.length; j++) {
                                    const char = pStr[pStr.length - 1 - j];
                                    const power = rIndex + j;
                                    newInputs[`p-${rIndex}-${power}`] = char;
                                }
                            }
                        }
                        const totalStr = String(m1 * (parseInt(multiplier, 10) || 0));
                        for(let j = 0; j < totalStr.length; j++){
                            const char = totalStr[totalStr.length - 1 - j];
                            newInputs[`res-${j}`] = char;
                        }

                        if (m2Str.length > 0) {
                            const firstDigit = parseInt(m2Str[m2Str.length - 1], 10) || 0;
                            let carry = 0;
                            const m1Str = String(m1);
                            for (let i = m1Str.length - 1; i >= 0; i--) {
                                const topDigit = parseInt(m1Str[i], 10) || 0;
                                const prod = topDigit * firstDigit + carry;
                                carry = Math.floor(prod / 10);
                                const power = m1Str.length - 1 - i + 1;
                                if (carry > 0 && power < L) {
                                    newCarries[`c-${power}`] = String(carry);
                                }
                            }
                        }

                        setInputs({...newInputs});
                        setCarries({...newCarries});
                        setHelpedFields({});
                        setStatus('correct');
                    }
                }
            }, [autoSolve, setupMode, multiplicand, multiplier, L]);

            const setMinuendOrMul = () => {
                setMultiplicand(String(generateNumber(config.digitsMultiplicand)));
                setMultiplier(String(generateNumber(config.digitsMultiplier)));
                resetState();
            }

            const resetState = () => {
                if (!isManual) setSetupMode(false);
                setInputs({});
                setCarries({});
                setHelpedFields({});
                setStatus('playing');
            }

            const clearCarries = () => setCarries({});

            const handleHelp = () => {
                const m1 = parseInt(multiplicand || 0, 10);
                const m2Str = String(multiplier || 0);

                if (m2Str.length > 1) {
                    for (let rIndex = 0; rIndex < m2Str.length; rIndex++) {
                        const digit = parseInt(m2Str[m2Str.length - 1 - rIndex], 10) || 0;
                        const pStr = digit === 0 ? '0'.repeat(String(m1).length) : String(m1 * digit);
                        for (let j = 0; j < pStr.length; j++) {
                            const power = rIndex + j;
                            const expectedChar = pStr[pStr.length - 1 - j];
                            const key = `p-${rIndex}-${power}`;
                            if (inputs[key] !== expectedChar) {
                                setInputs(prev => ({...prev, [key]: expectedChar}));
                                setHelpedFields({ [key]: true });
                                return;
                            }
                        }
                    }
                }

                const totalStr = String(m1 * (parseInt(multiplier, 10) || 0));
                for(let j = 0; j < totalStr.length; j++){
                    const key = `res-${j}`; 
                    const expectedChar = totalStr[totalStr.length - 1 - j];
                    if (inputs[key] !== expectedChar) {
                        setInputs(prev => ({...prev, [key]: expectedChar}));
                        setHelpedFields({ [key]: true });
                        return;
                    }
                }
            };

            const checkResult = () => {
                const m1 = parseInt(multiplicand, 10);
                const m2 = parseInt(multiplier, 10);
                
                let userTotalStr = '';
                for (let power = L + M; power >= 0; power--) {
                    userTotalStr += (inputs[`res-${power}`] || '0');
                }

                if (parseInt(userTotalStr, 10) === m1 * m2) setStatus('correct');
                else setStatus('incorrect');
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-6">
                    <h3 className="text-3xl font-bold text-gray-700 mb-2">Introduce los números</h3>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Multiplicando:</span>
                    <input type="number" className="border-4 border-purple-300 rounded-xl p-4 text-3xl font-mono w-64" value={multiplicand} onChange={(e) => setMultiplicand(e.target.value)} />
                    </div>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Multiplicador:</span>
                    <input type="number" className="border-4 border-purple-300 rounded-xl p-4 text-3xl font-mono w-64" value={multiplier} onChange={(e) => setMultiplier(e.target.value)} />
                    </div>
                    <button 
                    onClick={() => {
                        if (multiplicand && multiplier) {
                        setSetupMode(false);
                        resetState();
                        }
                    }}
                    className="bg-purple-500 text-white px-8 py-4 mt-4 text-2xl rounded-2xl font-bold hover:bg-purple-600 flex items-center shadow-lg"
                    >
                    <Check className="mr-3 w-8 h-8" /> Comenzar
                    </button>
                </div>
                );
            }

            const renderTopNumber = (numStr, sign) => {
                return (
                <React.Fragment>
                    <div className="flex items-center justify-center font-bold text-2xl text-purple-500">
                    {sign}
                    </div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        const charIdx = numStr.length - 1 - power;
                        const char = charIdx >= 0 && charIdx < numStr.length ? numStr[charIdx] : '';
                        return (
                            <div key={`top-${power}`} className="flex justify-center items-center h-12 text-3xl font-mono">
                                {char}
                            </div>
                        );
                    })}
                </React.Fragment>
                );
            };

            return (
                <div className="flex flex-col items-center">
                <div className="bg-white p-8 rounded-xl shadow-lg border-2 border-purple-100 relative">
                    <button 
                    onClick={clearCarries}
                    className="absolute top-2 right-2 text-xs bg-yellow-100 text-yellow-800 px-2 py-1 rounded hover:bg-yellow-200 border border-yellow-300"
                    >
                    Borrar Llevadas
                    </button>

                    <div className="grid gap-y-2 gap-x-1" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                    
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        return (
                            <div key={`carry-${power}`} className="flex justify-center mb-2">
                            {power > 0 && power < L && (
                                <DigitInput
                                    isSmall
                                    value={carries[`c-${power}`] || ''}
                                    onChange={(v) => setCarries({ ...carries, [`c-${power}`]: v })}
                                    className="bg-yellow-50 border-yellow-300 text-yellow-700"
                                />
                            )}
                            </div>
                        );
                    })}

                    {renderTopNumber(multiplicand, '')}
                    {renderTopNumber(multiplier, '×')}

                    <div className={`col-span-${cols} border-b-4 border-black my-2`}></div>

                    {numPartials > 1 && Array.from({ length: numPartials }).map((_, rIndex) => (
                        <React.Fragment key={`partial-${rIndex}`}>
                        <div className="flex items-center justify-center font-bold text-2xl text-purple-500">
                            {rIndex === numPartials - 1 ? '+' : ''}
                        </div>
                        {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                            const power = cols - 2 - cIndex;
                            const isInput = power >= rIndex && power <= rIndex + L;
                            
                            if (!isInput) return <div key={`p-${rIndex}-${power}`} className="w-10 h-12"></div>;

                            return (
                            <div key={`p-${rIndex}-${power}`} className="flex justify-center">
                                <DigitInput
                                    id={`mul-p-${rIndex}-${cIndex}`}
                                    value={inputs[`p-${rIndex}-${power}`] || ''}
                                    onChange={(v) => setInputs({ ...inputs, [`p-${rIndex}-${power}`]: v })}
                                    className="bg-blue-50 border-blue-200"
                                    isHelped={helpedFields[`p-${rIndex}-${power}`]}
                                />
                            </div>
                            );
                        })}
                        </React.Fragment>
                    ))}

                    {numPartials > 1 && <div className={`col-span-${cols} border-b-4 border-black my-2`}></div>}

                    {/* Result Row (AQUÍ SÍ HAY PUNTOS SEPARADORES) */}
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        const hasHigherInput = Object.keys(inputs).some(k => k.startsWith('res-') && parseInt(k.split('-')[1]) > power && inputs[k] !== '');
                        return (
                            <div key={`res-${power}`} className="flex justify-center">
                                <div className="relative">
                                    {power % 3 === 2 && hasHigherInput && <DotSeparator />}
                                    <DigitInput
                                        id={`mul-res-${cIndex}`}
                                        value={inputs[`res-${power}`] || ''}
                                        onChange={(v) => setInputs({ ...inputs, [`res-${power}`]: v })}
                                        className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : 'bg-gray-50 border-gray-300 font-bold'}
                                        isHelped={helpedFields[`res-${power}`]}
                                    />
                                </div>
                            </div>
                        );
                    })}

                    </div>
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 shadow-md">
                    Comprobar
                    </button>
                    <button onClick={onNext} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 shadow-md">
                    Siguiente
                    </button>
                </div>
                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡Genial!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Comprueba tus multiplicaciones y la suma final.</p>}
                </div>
            );
        };


        // --- DIVISION COMPONENT ---
        const DivisionBoard = ({ config, isManual, onNext, autoSolve }) => {
            const [dividend, setDividend] = useState('');
            const [divisor, setDivisor] = useState('');
            const [setupMode, setSetupMode] = useState(isManual);
            
            const [arcLen, setArcLen] = useState(0);
            const [stepRows, setStepRows] = useState([]); 
            const [quotientInputs, setQuotientInputs] = useState([]); 
            const [status, setStatus] = useState('select_arc'); 
            const [showTableFor, setShowTableFor] = useState(null);
            const [helpedFields, setHelpedFields] = useState({});

            useEffect(() => {
                if (!isManual) {
                let D = generateNumber(config.digitsDividend);
                let d = generateNumber(config.digitsDivisor);
                if (d === 0) d = 1;
                if (D < d) [D, d] = [d, D];
                setDividend(String(D));
                setDivisor(String(d));
                resetBoard();
                } else {
                setDividend('');
                setDivisor('');
                setSetupMode(true);
                resetBoard();
                }
            }, [config, isManual]);

            const prevAutoSolve = useRef(autoSolve);
            useEffect(() => {
                if (autoSolve > prevAutoSolve.current) {
                    prevAutoSolve.current = autoSolve;
                    if (!setupMode && dividend && divisor) {
                        const D = String(dividend);
                        const d = parseInt(divisor, 10);
                        if(d === 0) return;

                        let correctLen = 1;
                        while (parseInt(D.substring(0, correctLen), 10) < d && correctLen < D.length) {
                            correctLen++;
                        }
                        setArcLen(correctLen); 
                        
                        let currentVal = parseInt(D.substring(0, correctLen), 10);
                        const totalSteps = D.length - correctLen + 1;
                        
                        const newRows = [];
                        const newQ = [];

                        for (let step = 0; step < totalSteps; step++) {
                            const qDigit = Math.floor(currentVal / d);
                            newQ[step] = String(qDigit);
                            
                            const rem = currentVal % d;
                            const remStr = String(rem);
                            
                            const remainderInputs = {};
                            for (let i = 0; i < remStr.length; i++) {
                                const c = (correctLen - 1 + step) - i;
                                remainderInputs[c] = remStr[remStr.length - 1 - i];
                            }
                            
                            let droppedChar = null;
                            let dropColIndex = null;
                            if (step < totalSteps - 1) {
                                dropColIndex = correctLen + step;
                                droppedChar = D[dropColIndex];
                                remainderInputs[dropColIndex] = droppedChar; 
                                currentVal = parseInt(remStr + droppedChar, 10);
                            }

                            newRows.push({
                                remainderInputs,
                                droppedChar,
                                dropColIndex,
                            });
                        }
                        
                        setStepRows([...newRows]);
                        setQuotientInputs([...newQ]);
                        setHelpedFields({});
                        setStatus('correct');
                    }
                }
            }, [autoSolve, setupMode, dividend, divisor]);


            const resetBoard = () => {
                if (!isManual) setSetupMode(false);
                setArcLen(0);
                setStepRows([]);
                setQuotientInputs([]);
                setStatus('select_arc');
                setShowTableFor(null);
                setHelpedFields({});
            }

            const selectArc = (len) => {
                setArcLen(len);
                setStatus('playing');
                
                const newRows = [];
                const totalSteps = dividend.length - len + 1;
                for (let i = 0; i < totalSteps; i++) {
                newRows.push({
                    remainderInputs: {},
                    droppedChar: i < totalSteps - 1 ? dividend[len + i] : null,
                    dropColIndex: i < totalSteps - 1 ? len + i : null,
                });
                }
                setStepRows(newRows);
            };

            const handleRemainderChange = (rowIndex, colIndex, val) => {
                const newRows = [...stepRows];
                newRows[rowIndex].remainderInputs[colIndex] = val;
                setStepRows(newRows);
            };

            const handleQuotientChange = (idx, val) => {
                const newQ = [...quotientInputs];
                newQ[idx] = val;
                setQuotientInputs(newQ);
            };

            const getExpectedDivision = () => {
                if (arcLen === 0) return { expRem: {}, expQ: {} };
                const expRem = {};
                const expQ = {};
                const D = String(dividend);
                const d = parseInt(divisor, 10);
                
                let currentVal = parseInt(D.substring(0, arcLen), 10);
                
                for (let step = 0; step < D.length - arcLen + 1; step++) {
                const qDigit = Math.floor(currentVal / d);
                expQ[step] = String(qDigit);
                
                const rem = currentVal % d;
                const remStr = String(rem);
                
                for (let i = 0; i < remStr.length; i++) {
                    const c = (arcLen - 1 + step) - i;
                    expRem[`${step}-${c}`] = remStr[remStr.length - 1 - i];
                }
                if (step < D.length - arcLen) {
                    const dropCol = arcLen + step;
                    const dropChar = D[dropCol];
                    currentVal = parseInt(remStr + dropChar, 10);
                }
                }
                return { expRem, expQ };
            };

            const handleHelp = () => {
                if (arcLen === 0) {
                let len = 1;
                while (parseInt(dividend.substring(0, len), 10) < parseInt(divisor, 10) && len < dividend.length) len++;
                selectArc(len);
                return;
                }

                const { expRem, expQ } = getExpectedDivision();
                const totalSteps = dividend.length - arcLen + 1;

                for (let step = 0; step < totalSteps; step++) {
                if (quotientInputs[step] !== expQ[step]) {
                    handleQuotientChange(step, expQ[step]);
                    setHelpedFields(prev => ({...prev, [`q-${step}`]: true}));
                    return;
                }
                
                const rightmostC = arcLen - 1 + step;
                for (let c = rightmostC; c >= 0; c--) {
                    const expVal = expRem[`${step}-${c}`];
                    if (expVal !== undefined) {
                        const actualVal = stepRows[step]?.remainderInputs[c];
                        if (actualVal !== expVal) {
                            handleRemainderChange(step, c, expVal);
                            setHelpedFields(prev => ({...prev, [`rem-${step}-${c}`]: true}));
                            return;
                        }
                    }
                }

                if (step < totalSteps - 1) {
                    const dropCol = arcLen + step;
                    const expDrop = dividend[dropCol];
                    const actualVal = stepRows[step]?.remainderInputs[dropCol];
                    if (actualVal !== expDrop) {
                        handleRemainderChange(step, dropCol, expDrop);
                        setHelpedFields(prev => ({...prev, [`rem-${step}-${dropCol}`]: true}));
                        return;
                    }
                }
                }
            };

            const checkResult = () => {
                const expectedQ = String(Math.floor(parseInt(dividend, 10) / parseInt(divisor, 10)));
                const expectedRemStr = String(parseInt(dividend, 10) % parseInt(divisor, 10));

                const userQ = quotientInputs.join('');
                const lastRow = stepRows[stepRows.length - 1];

                const userRemStr = Object.keys(lastRow.remainderInputs)
                    .sort((a,b) => parseInt(a, 10) - parseInt(b, 10))
                    .map(k => lastRow.remainderInputs[k])
                    .join('');

                const isQCorrect = userQ === expectedQ;
                const isRemCorrect = userRemStr !== '' && parseInt(userRemStr, 10) === parseInt(expectedRemStr, 10);

                if (isQCorrect && isRemCorrect) setStatus('correct');
                else setStatus('incorrect');
            };

            const renderArc = () => {
                if (arcLen === 0) return null;
                const widthPerChar = 40; 
                const width = arcLen * widthPerChar;
                return (
                <svg className="absolute -top-3 left-0" width={width} height="16" style={{ pointerEvents: 'none' }}>
                    <path d={`M 4 12 Q ${width/2} -4 ${width-4} 12`} fill="none" stroke="#0d9488" strokeWidth="3" strokeLinecap="round"/>
                </svg>
                );
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-6">
                    <h3 className="text-3xl font-bold text-gray-700 mb-2">Introduce los números</h3>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Dividendo:</span>
                    <input type="number" className="border-4 border-teal-300 rounded-xl p-4 text-3xl font-mono w-64" value={dividend} onChange={(e) => setDividend(e.target.value)} />
                    </div>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Divisor:</span>
                    <input type="number" className="border-4 border-teal-300 rounded-xl p-4 text-3xl font-mono w-64" value={divisor} onChange={(e) => setDivisor(e.target.value)} />
                    </div>
                    <button 
                    onClick={() => {
                        if (dividend && divisor && parseInt(divisor, 10) > 0) {
                        setSetupMode(false);
                        resetBoard();
                        } else alert("Números inválidos. Asegúrate de que el divisor no sea 0.");
                    }}
                    className="bg-teal-500 text-white px-8 py-4 mt-4 text-2xl rounded-2xl font-bold hover:bg-teal-600 flex items-center shadow-lg"
                    >
                    <Check className="mr-3 w-8 h-8" /> Comenzar División
                    </button>
                </div>
                );
            }

            return (
                <div className="flex flex-col items-center">
                
                {status === 'select_arc' && (
                    <div className="mb-6 p-4 bg-teal-50 rounded-xl border border-teal-200 text-center animate-pulse">
                    <p className="font-bold text-teal-800 mb-2">¿Cuántas cifras coges para empezar?</p>
                    <div className="flex justify-center space-x-2">
                        {dividend.split('').map((_, i) => (
                        <button key={i} onClick={() => selectArc(i+1)} className="px-4 py-2 bg-white border-2 border-teal-500 rounded font-bold hover:bg-teal-500 hover:text-white">
                            {i + 1}
                        </button>
                        ))}
                    </div>
                    </div>
                )}

                <div className="flex items-start max-w-full">
                    <div className="bg-white p-8 rounded-xl shadow-lg border-2 border-teal-100 overflow-x-auto min-w-[300px]">
                    
                    <div className="flex items-start">
                        
                        <div className="flex flex-col items-end pr-4 relative">
                        
                        <div className="flex relative mb-2">
                            {renderArc()}
                            {dividend.split('').map((char, i) => {
                                return (
                                    <div key={i} className="w-10 h-12 flex items-center justify-center text-3xl font-mono font-bold tracking-widest relative">
                                        {char}
                                        {stepRows.some((r) => r.dropColIndex === i) && (
                                        <ArrowDown className="absolute -bottom-6 text-orange-500 h-6 w-6 z-10" />
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        {arcLen > 0 && stepRows.map((row, rIndex) => (
                            <div key={`rem-row-${rIndex}`} className="flex mt-1 relative">
                            
                            {Array.from({ length: dividend.length }).map((_, cIndex) => {
                                const maxActiveCol = row.dropColIndex !== null ? row.dropColIndex : (arcLen - 1 + rIndex); 
                                
                                if (cIndex <= maxActiveCol) {

                                    if (row.droppedChar && cIndex === row.dropColIndex) {
                                        return (
                                        <div key={`rem-${rIndex}-${cIndex}`} className="w-10 h-12 relative">
                                            <div className="relative w-full h-full">
                                                <DigitInput
                                                    isSmall
                                                    readOnly={status === 'correct'}
                                                    value={row.remainderInputs[cIndex] || ''}
                                                    onChange={(v) => handleRemainderChange(rIndex, cIndex, v)}
                                                    className={`w-full h-full text-xl font-bold border-blue-300 text-blue-600 bg-blue-50 focus:bg-blue-100 ${status === 'incorrect' ? 'border-red-300' : ''}`}
                                                    isHelped={helpedFields[`rem-${rIndex}-${cIndex}`]}
                                                />
                                            </div>
                                        </div>
                                        )
                                    }

                                    return (
                                        <div key={`rem-${rIndex}-${cIndex}`} className="w-10 h-12 relative">
                                            <div className="relative w-full h-full">
                                                <DigitInput
                                                    isSmall
                                                    readOnly={status === 'correct'}
                                                    value={row.remainderInputs[cIndex] || ''}
                                                    onChange={(v) => handleRemainderChange(rIndex, cIndex, v)}
                                                    className={`w-full h-full text-xl border-gray-300 ${status === 'incorrect' ? 'border-red-300' : ''}`}
                                                    isHelped={helpedFields[`rem-${rIndex}-${cIndex}`]}
                                                />
                                            </div>
                                        </div>
                                    );
                                }
                                
                                return <div key={`rem-${rIndex}-${cIndex}`} className="w-10 h-12"></div>;
                            })}

                            {status === 'correct' && rIndex === stepRows.length - 1 && (
                                <svg className="absolute -bottom-5 right-0" width="30" height="15">
                                <path d="M 0 0 Q 15 15 30 0" fill="none" stroke="#16a34a" strokeWidth="3" strokeLinecap="round"/>
                                </svg>
                            )}
                            </div>
                        ))}

                        </div>

                        <div className="flex flex-col">
                        <div 
                            className="border-l-4 border-b-4 border-black pl-3 pb-2 flex cursor-pointer hover:bg-teal-50 transition-colors"
                            title="Pulsa para ver la tabla del divisor"
                            onClick={() => setShowTableFor(divisor)}
                        >
                            {divisor.split('').map((char, i) => (
                            <div key={i} className="w-6 flex items-center justify-center text-3xl font-mono font-bold tracking-widest pointer-events-none">{char}</div>
                            ))}
                        </div>
                        
                        <div className="pl-4 pt-2 flex space-x-1">
                            {/* Cociente (AQUÍ SÍ HAY PUNTOS SEPARADORES) */}
                            {arcLen > 0 && Array.from({ length: dividend.length - arcLen + 1 }).map((_, i) => {
                                const power = (dividend.length - arcLen) - i;
                                const hasHigher = quotientInputs.some((val, idx) => idx < i && val !== '');
                                return (
                                    <div key={`q-${i}`} className="relative">
                                        {power % 3 === 2 && hasHigher && <DotSeparator isSmall />}
                                        <DigitInput
                                            isSmall
                                            readOnly={status === 'correct'}
                                            value={quotientInputs[i] || ''}
                                            onChange={(v) => handleQuotientChange(i, v)}
                                            className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : 'bg-teal-50'}
                                            isHelped={helpedFields[`q-${i}`]}
                                        />
                                    </div>
                                );
                            })}
                        </div>
                        </div>

                    </div>
                    </div>

                    {showTableFor && (
                    <div className="ml-8 p-5 bg-yellow-50 border-2 border-yellow-400 rounded-xl shadow-md min-w-[160px]">
                        <h4 className="font-bold text-center mb-3 border-b-2 border-yellow-300 pb-2 text-yellow-800">
                        Tabla del {showTableFor}
                        </h4>
                        <div className="space-y-1">
                        {Array.from({ length: 9 }).map((_, i) => (
                            <div key={i} className="font-mono text-lg text-yellow-900 flex justify-between">
                            <span>{showTableFor} × {i + 1}</span>
                            <span className="font-bold ml-2 text-yellow-700">= {parseInt(showTableFor, 10) * (i + 1)}</span>
                            </div>
                        ))}
                        </div>
                        <button 
                        onClick={() => setShowTableFor(null)} 
                        className="mt-4 text-sm bg-red-100 text-red-600 px-3 py-2 rounded-lg hover:bg-red-200 w-full font-bold transition-colors"
                        >
                        Cerrar tabla
                        </button>
                    </div>
                    )}
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    {status === 'incorrect' && (
                    <button onClick={resetBoard} className="bg-orange-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-600 flex items-center shadow-md">
                        <RefreshCw className="mr-2" /> Elegir otro arco
                    </button>
                    )}
                    {status === 'playing' || status === 'incorrect' ? (
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 shadow-md">
                        Comprobar Operación
                    </button>
                    ) : null}
                    <button onClick={onNext} className="bg-teal-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-teal-600 shadow-md">
                    Siguiente Operación
                    </button>
                </div>

                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡División completada correctamente!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Hay algún fallo. Revisa la operación o elige otro arco para empezar de nuevo.</p>}
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [hasStarted, setHasStarted] = useState(false);
            const [operation, setOperation] = useState('add'); 
            const [mode, setMode] = useState('auto'); 
            const [level, setLevel] = useState(3);
            const [refreshKey, setRefreshKey] = useState(0);
            const [autoSolveCount, setAutoSolveCount] = useState(0);

            const config = useMemo(() => {
                switch(level) {
                case 1: return { numAddends: 2, maxDigits: 1, digitsMin: 1, digitsSub: 1, digitsMultiplicand: 1, digitsMultiplier: 1, digitsDividend: 2, digitsDivisor: 1 };
                case 2: return { numAddends: 2, maxDigits: 2, digitsMin: 2, digitsSub: 2, digitsMultiplicand: 2, digitsMultiplier: 1, digitsDividend: 3, digitsDivisor: 1 };
                case 3: return { numAddends: 3, maxDigits: 3, digitsMin: 3, digitsSub: 3, digitsMultiplicand: 3, digitsMultiplier: 1, digitsDividend: 3, digitsDivisor: 2 };
                case 4: return { numAddends: 3, maxDigits: 4, digitsMin: 4, digitsSub: 4, digitsMultiplicand: 3, digitsMultiplier: 2, digitsDividend: 4, digitsDivisor: 2 };
                case 5: return { numAddends: 4, maxDigits: 5, digitsMin: 5, digitsSub: 5, digitsMultiplicand: 4, digitsMultiplier: 3, digitsDividend: 5, digitsDivisor: 2 };
                case 6: return { numAddends: 4, maxDigits: 6, digitsMin: 6, digitsSub: 6, digitsMultiplicand: 4, digitsMultiplier: 3, digitsDividend: 5, digitsDivisor: 3 };
                default: return { numAddends: 2, maxDigits: 2, digitsMin: 2, digitsSub: 2, digitsMultiplicand: 2, digitsMultiplier: 1, digitsDividend: 2, digitsDivisor: 1 };
                }
            }, [level]);

            const nextOperation = () => {
                setRefreshKey(prev => prev + 1);
                setAutoSolveCount(0);
            };

            const handleSecretClick = () => {
                const pwd = prompt("Introduce la contraseña secreta:");
                if (pwd === "cpsf2026") {
                    setAutoSolveCount(prev => prev + 1);
                } else if (pwd && pwd.toLowerCase() === "salir") {
                    setHasStarted(false);
                } else if (pwd !== null && pwd !== "") {
                    alert("Contraseña incorrecta.");
                }
            };

            const activeClasses = "bg-white text-blue-600 shadow-md rounded-xl font-extrabold border-2 border-blue-200 scale-105";
            const inactiveClasses = "text-gray-500 hover:text-gray-700 hover:bg-gray-200 rounded-xl transition-colors border-2 border-transparent font-semibold";

            // Configuramos colores específicos para cada medalla
            const operationsConfig = [
                { id: 'add', name: 'Suma', sym: '+', delay: 'delay-1', bg: '#3b82f6', border: '#1d4ed8', text: '#ffffff' },
                { id: 'sub', name: 'Resta', sym: '−', delay: 'delay-2', bg: '#ef4444', border: '#b91c1c', text: '#ffffff' },
                { id: 'mul', name: 'Multiplicación', sym: '×', delay: 'delay-3', bg: '#D4AF37', border: '#998022', text: '#ffffff' },
                { id: 'div', name: 'División', sym: '÷', delay: 'delay-4', bg: '#C0C0C0', border: '#808080', text: '#000000' },
            ];

            if (!hasStarted) {
                return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                    <div
                        className="w-64 h-64 md:w-80 md:h-80 grid grid-cols-2 grid-rows-2 cursor-pointer hover:scale-105 transition-transform duration-300 drop-shadow-2xl rounded-3xl overflow-hidden border-8 border-white shadow-2xl"
                        onClick={() => setHasStarted(true)}
                        title="Comenzar"
                    >
                        <div className="flex items-center justify-center bg-blue-500 text-white text-6xl md:text-8xl font-bold">+</div>
                        <div className="flex items-center justify-center bg-red-500 text-white text-6xl md:text-8xl font-bold">−</div>
                        <div className="flex items-center justify-center bg-[#D4AF37] text-white text-6xl md:text-8xl font-bold">×</div>
                        <div className="flex items-center justify-center bg-[#C0C0C0] text-black text-6xl md:text-8xl font-bold">÷</div>
                    </div>
                    <p 
                    className="mt-12 text-3xl font-bold text-blue-600 animate-pulse cursor-pointer text-center" 
                    onClick={() => setHasStarted(true)}
                    >
                    ¡Pulsa aquí para comenzar!
                    </p>
                </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans p-4 overflow-x-hidden">
                <div className="w-[98%] max-w-[1600px] mx-auto">
                    
                    {/* Quitamos márgenes inferiores enormes para que la pizarra suba más arriba */}
                    <div className="w-full overflow-x-auto pb-28 -mb-16 pt-2 px-2 z-20 relative">
                        
                        <div className="bg-white p-4 lg:p-6 rounded-2xl shadow-md mb-2 flex flex-nowrap gap-6 lg:gap-10 items-center justify-between border-4 border-gray-200 min-w-max mx-auto">
                        
                        <div className="flex bg-gray-100 p-2 rounded-2xl gap-2 shrink-0">
                            {operationsConfig.map((op) => {
                                const isActive = operation === op.id;
                                return (
                                <div key={op.id} className="relative">
                                    <button 
                                        onClick={() => { setOperation(op.id); setAutoSolveCount(0); }} 
                                        className={`px-6 sm:px-8 py-3 text-xl lg:text-2xl transition-all z-10 relative whitespace-nowrap ${isActive ? activeClasses : inactiveClasses}`}
                                    >
                                        {op.name}
                                    </button>
                                    <div className={`hanging-container ${op.delay}`}>
                                        <div 
                                            className="hanging-rope"
                                            style={{ height: isActive ? '45px' : '15px' }} /* La cuerda crece si está seleccionada */
                                        ></div>
                                        <div 
                                            className="hanging-badge" 
                                            style={{ backgroundColor: op.bg, borderColor: op.border, color: op.text }}
                                        >
                                            {op.sym}
                                        </div>
                                    </div>
                                </div>
                                );
                            })}
                        </div>

                        {/* Bloque de símbolos que reemplaza al poeta */}
                        <div
                            className="h-20 w-20 lg:h-24 lg:w-24 rounded-2xl shadow-lg cursor-pointer hover:scale-110 transition-transform shrink-0 mx-2 lg:mx-4 flex flex-wrap bg-white border-4 border-gray-200 overflow-hidden"
                            onClick={handleSecretClick}
                            title="Opciones mágicas"
                        >
                            <div className="w-1/2 h-1/2 flex items-center justify-center bg-blue-500 text-white text-2xl lg:text-3xl font-bold">+</div>
                            <div className="w-1/2 h-1/2 flex items-center justify-center bg-red-500 text-white text-2xl lg:text-3xl font-bold">−</div>
                            <div className="w-1/2 h-1/2 flex items-center justify-center bg-[#D4AF37] text-white text-2xl lg:text-3xl font-bold">×</div>
                            <div className="w-1/2 h-1/2 flex items-center justify-center bg-[#C0C0C0] text-black text-2xl lg:text-3xl font-bold">÷</div>
                        </div>

                        <div className="flex items-center space-x-6 lg:space-x-8 shrink-0">
                            <div className="flex items-center space-x-3">
                            <span className="text-gray-700 font-extrabold text-xl lg:text-2xl whitespace-nowrap">Nivel:</span>
                            <select 
                                value={level} 
                                onChange={(e) => { setLevel(parseInt(e.target.value)); setAutoSolveCount(0); }}
                                disabled={mode === 'manual'}
                                className="border-2 border-gray-300 rounded-xl shadow-sm focus:border-blue-400 focus:ring focus:ring-blue-200 focus:ring-opacity-50 disabled:bg-gray-200 text-xl lg:text-2xl py-2 px-4 font-bold text-gray-700 cursor-pointer"
                            >
                                {[1,2,3,4,5,6].map(l => <option key={l} value={l}>{l}º Primaria</option>)}
                            </select>
                            </div>

                            <div className="flex bg-gray-100 p-2 rounded-2xl gap-2">
                            <button onClick={() => { setMode('auto'); setAutoSolveCount(0); }} className={`px-6 py-2 text-xl lg:text-2xl whitespace-nowrap ${mode === 'auto' ? activeClasses : inactiveClasses}`}>Auto</button>
                            <button onClick={() => { setMode('manual'); setAutoSolveCount(0); }} className={`px-6 py-2 text-xl lg:text-2xl whitespace-nowrap ${mode === 'manual' ? activeClasses : inactiveClasses}`}>Manual</button>
                            </div>
                        </div>

                        </div>
                    </div>

                    {/* Contenedor principal de la pizarra, rediseñado para expandirse a óvalo si es necesario */}
                    <main className="min-h-[500px] flex items-center sm:items-start lg:items-center justify-center pt-2 pb-8 overflow-auto relative z-10">
                        <div className={`relative flex items-center justify-center p-12 md:p-24 w-fit h-fit min-w-[95vw] lg:min-w-[850px] min-h-[95vw] lg:min-h-[850px] border-[16px] sm:border-[24px] shadow-[inset_0_0_80px_rgba(0,0,0,0.8),0_20px_40px_rgba(0,0,0,0.4)] transition-all duration-500 ${
                            mode === 'manual' ? 'bg-[#EAE0C8]' : 'bg-[#2A3B32]'
                        } ${
                            operation === 'add' ? 'border-blue-500' :
                            operation === 'sub' ? 'border-red-500' :
                            operation === 'mul' ? 'border-[#D4AF37]' :
                            'border-[#C0C0C0]'
                        }`} style={{ borderRadius: '50%' }}>
                            
                            {/* Textura sutil de tiza/ruido para la pizarra */}
                            <div className="absolute inset-0 opacity-20 pointer-events-none" style={{ borderRadius: '50%', backgroundImage: 'url("data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.7%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E")'}}></div>
                            
                            {/* Contenido interior. Ya no forzamos un w-full h-full para que el padre pueda crecer y volverse ovalado */}
                            <div className="z-10 flex items-center justify-center max-w-full">
                                <div className="transform scale-[0.60] sm:scale-75 md:scale-90 lg:scale-100 origin-center transition-transform flex items-center justify-center">
                                    {operation === 'add' && <AdditionBoard key={`add-${refreshKey}`} config={config} isManual={mode === 'manual'} onNext={nextOperation} autoSolve={autoSolveCount} />}
                                    {operation === 'sub' && <SubtractionBoard key={`sub-${refreshKey}`} config={config} isManual={mode === 'manual'} onNext={nextOperation} autoSolve={autoSolveCount} />}
                                    {operation === 'mul' && <MultiplicationBoard key={`mul-${refreshKey}`} config={config} isManual={mode === 'manual'} onNext={nextOperation} autoSolve={autoSolveCount} />}
                                    {operation === 'div' && <DivisionBoard key={`div-${refreshKey}`} config={config} isManual={mode === 'manual'} onNext={nextOperation} autoSolve={autoSolveCount} />}
                                </div>
                            </div>
                        </div>
                    </main>

                </div>
                </div>
            );
        }

        // --- RENDER ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
