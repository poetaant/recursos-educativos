                  </div>
                </div>

              </div>

              <button onClick={() => setIsPanelOpen(!isPanelOpen)} className="absolute right-[-40px] top-1/2 -translate-y-1/2 w-10 h-24 bg-white/95 backdrop-blur-md border-y-4 border-r-4 border-sky-400 rounded-r-2xl shadow-[5px_0_15px_rgba(0,0,0,0.2)] flex items-center justify-center pointer-events-auto hover:bg-sky-50 text-sky-600 transition-all z-30" title={isPanelOpen ? "Ocultar panel" : "Mostrar panel"}>
                <span className="text-2xl font-black drop-shadow-md">{isPanelOpen ? '◀' : '▶'}</span>
              </button>
            </div>

            {/* --- PANEL DERECHO (Herramientas de Dibujo y Fondos) --- */}
            <div className={`absolute top-1/2 -translate-y-1/2 flex items-center z-20 transition-transform duration-500 ease-in-out pointer-events-none ${isRightPanelOpen ? 'right-6 translate-x-0' : 'right-0 translate-x-full'}`}>
              
              <button 
                onClick={() => setIsRightPanelOpen(!isRightPanelOpen)} 
                className="absolute left-[-40px] top-1/2 -translate-y-1/2 w-10 h-24 bg-white/95 backdrop-blur-md border-y-4 border-l-4 border-slate-400 rounded-l-2xl shadow-[-5px_0_15px_rgba(0,0,0,0.2)] flex items-center justify-center pointer-events-auto hover:bg-slate-50 text-slate-600 transition-all z-30" 
                title={isRightPanelOpen ? "Ocultar herramientas" : "Mostrar herramientas"}
              >
                <span className="text-2xl font-black drop-shadow-md">{isRightPanelOpen ? '▶' : '◀'}</span>
              </button>

              <div className="bg-white/90 backdrop-blur-md p-3 rounded-2xl shadow-xl pointer-events-auto flex flex-col gap-3 border border-slate-200 items-center max-h-[90vh] overflow-y-auto hide-scrollbar shrink-0">
              
                <button onClick={() => setActiveTool(null)} className={`w-10 h-10 rounded-xl flex items-center justify-center text-xl transition-all ${!activeTool ? 'bg-sky-100 ring-2 ring-sky-400 shadow-md scale-110' : 'hover:bg-slate-100 bg-white'}`} title="Modo Mover/Seleccionar (👆)&#10;Haz clic en dibujos y pulsa Suprimir para borrar">
                  👆
                </button>

                <div className="w-full h-px bg-slate-200 rounded-full my-1"></div>

                {/* Herramienta Bolígrafo */}
                <div className="flex flex-col items-center w-full">
                  <button 
                    onClick={() => { 
                      if (activeTool !== 'pen') { setActiveTool('pen'); setActiveDrawColor('#000000'); } 
                      else { setActiveTool(null); }
                    }} 
                    className={`w-10 h-10 rounded-xl flex items-center justify-center text-xl transition-all ${activeTool === 'pen' ? 'bg-sky-100 ring-2 ring-sky-400 shadow-md scale-110' : 'hover:bg-slate-100 bg-white'}`} 
                    title="Bolígrafo"
                  >
                    🖊️
                  </button>
                  <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest text-center mt-1">Boli</span>
                  
                  {activeTool === 'pen' && (
                    <div className="grid grid-cols-2 gap-1.5 mt-2 fade-in">
                      {[{ c: '#000000', n: 'Negro' }, { c: '#ffffff', n: 'Blanco' }, { c: '#ef4444', n: 'Rojo' }, { c: '#22c55e', n: 'Verde' }, { c: '#eab308', n: 'Amarillo' }, { c: '#3b82f6', n: 'Azul' }].map(item => (
                        <button key={item.c} onClick={() => { setActiveDrawColor(item.c); }} className={`w-5 h-5 rounded-full shadow-inner transition-transform border border-slate-300 ${activeDrawColor === item.c ? 'scale-125 ring-2 ring-offset-1 ring-slate-400 z-10' : 'hover:scale-110'}`} style={{ backgroundColor: item.c }} title={item.n} />
                      ))}
                    </div>
                  )}
                </div>

                {/* Herramienta Subrayador */}
                <div className="flex flex-col items-center w-full mt-1">
                  <button 
                    onClick={() => { 
                      if (activeTool !== 'highlighter') { setActiveTool('highlighter'); setActiveDrawColor('#fef08a'); } 
                      else { setActiveTool(null); }
                    }} 
                    className={`w-10 h-10 rounded-xl flex items-center justify-center text-xl transition-all ${activeTool === 'highlighter' ? 'bg-sky-100 ring-2 ring-sky-400 shadow-md scale-110' : 'hover:bg-slate-100 bg-white'}`} 
                    title="Subrayador"
                  >
                    🖍️
                  </button>
                  <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest text-center mt-1">Subra.</span>
                  
                  {activeTool === 'highlighter' && (
                    <div className="grid grid-cols-2 gap-1.5 mt-2 fade-in">
                      {[{ c: '#fef08a', n: 'Amarillo' }, { c: '#bbf7d0', n: 'Verde claro' }, { c: '#bae6fd', n: 'Azul claro' }, { c: '#fbcfe8', n: 'Rosa' }].map(item => (
                        <button key={item.c} onClick={() => { setActiveDrawColor(item.c); }} className={`w-5 h-5 rounded-full shadow-inner transition-transform border border-slate-300 ${activeDrawColor === item.c ? 'scale-125 ring-2 ring-offset-1 ring-slate-400 z-10' : 'hover:scale-110'}`} style={{ backgroundColor: item.c }} title={item.n} />
                      ))}
                    </div>
                  )}
                </div>

                <button onClick={clearDrawing} className="w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-red-100 hover:text-red-500 flex items-center justify-center transition-colors mt-2" title="Borrar todos los dibujos">
                  🗑️
                </button>

                {/* BOTONES A (Aristas), C (Caras) y V (Vértices) APILADOS */}
                <div className="w-full h-px bg-slate-200 rounded-full my-1"></div>
                <div className="flex flex-col gap-1.5 w-full items-center">
                  <button 
                    onClick={() => setEdgesHighlighted(!edgesHighlighted)} 
                    className={`w-8 h-8 rounded-lg flex items-center justify-center text-[13px] font-black transition-all ${edgesHighlighted ? 'bg-amber-400 text-amber-900 shadow-inner' : 'bg-slate-100 text-slate-500 hover:bg-amber-100 hover:text-amber-600'}`} 
                    title="Resaltar Aristas (Wireframe)"
                  >
                    A
                  </button>
                  <button 
                    onClick={() => setActiveTool(activeTool === 'face' ? null : 'face')} 
                    className={`w-8 h-8 rounded-lg flex items-center justify-center text-[13px] font-black transition-all ${activeTool === 'face' ? 'bg-indigo-400 text-indigo-900 shadow-inner' : 'bg-slate-100 text-slate-500 hover:bg-indigo-100 hover:text-indigo-600'}`} 
                    title="Editar Caras y Extruir (No aplicable en Curvas)"
                  >
                    C
                  </button>
                  <button 
                    onClick={() => setActiveTool(activeTool === 'vertex' ? null : 'vertex')} 
                    className={`w-8 h-8 rounded-lg flex items-center justify-center text-[13px] font-black transition-all ${activeTool === 'vertex' ? 'bg-sky-400 text-sky-900 shadow-inner' : 'bg-slate-100 text-slate-500 hover:bg-sky-100 hover:text-sky-600'}`} 
                    title="Editar Vértices y Deformar (No aplicable en Curvas)"
                  >
                    V
                  </button>
                </div>

                <div className="w-full h-px bg-slate-200 rounded-full my-1"></div>

                <div className="flex flex-col items-center gap-2 w-full">
                  <div className="text-[9px] font-black text-slate-400 text-center uppercase tracking-widest">Fondo</div>
                  <button onClick={() => setBgColor('#0f172a')} className={`w-8 h-8 rounded-full bg-slate-900 shadow-inner transition-transform ${bgColor === '#0f172a' ? 'ring-2 ring-offset-2 ring-slate-900 scale-110' : 'border border-slate-300 hover:scale-110'}`} title="Negro 3D"></button>
                  <button onClick={() => setBgColor('#ffffff')} className={`w-8 h-8 rounded-full bg-white shadow-inner transition-transform ${bgColor === '#ffffff' ? 'ring-2 ring-offset-2 ring-slate-400 scale-110' : 'border border-slate-300 hover:scale-110'}`} title="Blanco 3D"></button>
                  <button onClick={() => setBgColor('#bae6fd')} className={`w-8 h-8 rounded-full bg-sky-200 shadow-inner transition-transform ${bgColor === '#bae6fd' ? 'ring-2 ring-offset-2 ring-sky-400 scale-110' : 'border border-slate-300 hover:scale-110'}`} title="Azul 3D"></button>
                </div>
              </div>
            </div>

            {showPoetaTopRight && (
              <div className="absolute top-6 right-6 pointer-events-auto z-50 fade-in">
                <img src="poeta.jpg" alt="Poeta Copiado" className="w-48 h-48 object-cover rounded-3xl shadow-2xl border-4 border-white cursor-pointer hover:scale-105 transition-transform" onClick={() => setShowPoetaTopRight(false)} title="Haz clic para cerrar" onError={(e) => e.target.style.display='none'} />
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
