    const I18nContext = createContext();

    /* --- ICONOS (MANTENIDOS) --- */
    const Star = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    const ArrowLeft = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
    const CheckCircle2 = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>;
    const PlayIcon = ({ size=24, className="", fill="currentColor" }) => <svg viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const AlertCircle = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const ChevronLeft = ({ size=24, className="", strokeWidth=2 }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polyline points="15 18 9 12 15 6"/></svg>;
    const ChevronRight = ({ size=24, className="", strokeWidth=2 }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polyline points="9 18 15 12 9 6"/></svg>;
    const ChevronsDown = ({ size=24, className="", strokeWidth=2 }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/></svg>;
    const RulerIcon = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><rect x="2" y="8" width="20" height="8" rx="2"/><line x1="6" y1="8" x2="6" y2="11"/><line x1="10" y1="8" x2="10" y2="12"/><line x1="14" y1="8" x2="14" y2="11"/><line x1="18" y1="8" x2="18" y2="12"/></svg>;
    const ProtractorIcon = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><path d="M 2 16 A 10 10 0 0 1 22 16 Z"/><line x1="2" y1="16" x2="22" y2="16"/><circle cx="12" cy="16" r="1.5"/><line x1="12" y1="6" x2="12" y2="8"/><line x1="6.5" y1="10.5" x2="8" y2="11.5"/><line x1="17.5" y1="10.5" x2="16" y2="11.5"/></svg>;

    /* --- COMPONENTE PRINCIPAL --- */
    function App() {
      const [lang, setLang] = useState('es');
      const [currentView, setCurrentView] = useState('menu');
      const [stars, setStars] = useState(0);
      const [completedTopics, setCompletedTopics] = useState([]);

      const t = (key) => TRANSLATIONS[lang][key] || key;

      const topics = [
        { id: 'poligonos', title: t('top_pol'), color: 'bg-blue-400', emoji: '🔷' },
        { id: 'triangulos', title: t('top_tri'), color: 'bg-green-400', emoji: '📐' },
        { id: 'cuadrilateros', title: t('top_cua'), color: 'bg-yellow-400', emoji: '🟪' },
        { id: 'perimetro', title: t('top_per'), color: 'bg-orange-400', emoji: '📏' },
        { id: 'area', title: t('top_are'), color: 'bg-purple-400', emoji: '🔲' },
        { id: 'circulo', title: t('top_cir'), color: 'bg-pink-400', emoji: '⭕' },
        { id: 'mesa', title: t('top_mes'), color: 'bg-amber-500', emoji: '🖍️' },
        { id: 'juego', title: t('top_jue'), color: 'bg-indigo-500', emoji: '🕹️' },
      ];

      const handleCorrectAnswer = (topicId) => {
        if (!completedTopics.includes(topicId)) {
          setStars(stars + 1);
          setCompletedTopics([...completedTopics, topicId]);
        }
      };

      return (
        <I18nContext.Provider value={{ lang, setLang, t }}>
          <div className="min-h-screen bg-sky-50 font-sans text-slate-800">
            {currentView !== 'mesa' && currentView !== 'juego' && (
              <header className="bg-white shadow-sm p-4 sticky top-0 z-10">
                <div className="max-w-4xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    {currentView !== 'menu' && (
                      <button 
                        onClick={() => setCurrentView('menu')}
                        className="p-2 bg-sky-100 hover:bg-sky-200 rounded-full text-sky-700 transition-colors"
                      >
                        <ArrowLeft size={24} />
                      </button>
                    )}
                    <h1 className="text-2xl font-bold text-sky-600">
                      {currentView === 'menu' ? t('appTitle') : topics.find(tp => tp.id === currentView)?.title}
                    </h1>
                  </div>
                  <div className="flex items-center gap-2 bg-yellow-100 px-4 py-2 rounded-full border-2 border-yellow-400">
                    <Star className="text-yellow-500" size={24} />
                    <span className="text-xl font-bold text-yellow-700">{stars}</span>
                  </div>
                </div>
              </header>
            )}

            <main className={`mx-auto p-4 py-8 ${(currentView === 'mesa' || currentView === 'juego') ? 'max-w-[98%] xl:max-w-[1800px] w-full' : 'max-w-4xl'}`}>
              {currentView === 'menu' ? (
                <div className="flex flex-col gap-10">
                  <div className="flex flex-col sm:flex-row justify-center items-center gap-6 md:gap-12">
                    
                    {topics.filter(tp => tp.id === 'mesa').map((topic) => (
                      <button
                        key={topic.id}
                        onClick={() => setCurrentView(topic.id)}
                        className={`${topic.color} text-white p-8 rounded-[2rem] shadow-xl transform hover:-translate-y-2 hover:scale-105 transition-all duration-300 flex flex-col items-center justify-center text-center gap-4 border-b-8 border-black/20 relative overflow-hidden w-full sm:w-80`}
                      >
                        <span className="text-8xl drop-shadow-lg">{topic.emoji}</span>
                        <h2 className="text-3xl font-extrabold leading-tight drop-shadow-md">{topic.title}</h2>
                      </button>
                    ))}

                    <div className="flex flex-col items-center">
                      <div className="w-56 h-56 md:w-64 md:h-64 flex-shrink-0 transform hover:scale-105 hover:rotate-2 transition-all duration-300 z-10">
                        <img 
                          src="poetadibujando.jpg" 
                          alt="Poeta dibujando geometría" 
                          className="w-full h-full object-cover rounded-[2rem] shadow-xl border-4 border-sky-100 bg-white p-2"
                          onError={(e) => { e.target.style.display = 'none'; }}
                        />
                      </div>
                      {/* BOTONES DE IDIOMA */}
                      <div className="flex gap-2 mt-4 z-20">
                         <button onClick={(e) => {e.stopPropagation(); setLang('es');}} className={`px-4 py-2 font-bold rounded-xl shadow-md transition-all ${lang==='es' ? 'bg-sky-600 text-white scale-110' : 'bg-white text-sky-700 hover:bg-sky-100'}`}>CAS</button>
                         <button onClick={(e) => {e.stopPropagation(); setLang('ast');}} className={`px-4 py-2 font-bold rounded-xl shadow-md transition-all ${lang==='ast' ? 'bg-sky-600 text-white scale-110' : 'bg-white text-sky-700 hover:bg-sky-100'}`}>AST</button>
                         <button onClick={(e) => {e.stopPropagation(); setLang('en');}} className={`px-4 py-2 font-bold rounded-xl shadow-md transition-all ${lang==='en' ? 'bg-sky-600 text-white scale-110' : 'bg-white text-sky-700 hover:bg-sky-100'}`}>ING</button>
                      </div>
                    </div>

                    {topics.filter(tp => tp.id === 'juego').map((topic) => (
                      <button
                        key={topic.id}
                        onClick={() => setCurrentView(topic.id)}
                        className={`${topic.color} text-white p-8 rounded-[2rem] shadow-xl transform hover:-translate-y-2 hover:scale-105 transition-all duration-300 flex flex-col items-center justify-center text-center gap-4 border-b-8 border-black/20 relative overflow-hidden w-full sm:w-80`}
                      >
                        <span className="text-8xl drop-shadow-lg">{topic.emoji}</span>
                        <h2 className="text-3xl font-extrabold leading-tight drop-shadow-md">{topic.title}</h2>
                      </button>
                    ))}

                  </div>

                  <div className="relative flex py-5 items-center">
                      <div className="flex-grow border-t-4 border-sky-200/50 rounded-full"></div>
                      <span className="flex-shrink-0 mx-6 text-sky-700 font-extrabold text-2xl uppercase tracking-wider">{t('lessonsTitle')}</span>
                      <div className="flex-grow border-t-4 border-sky-200/50 rounded-full"></div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    {topics.filter(tp => tp.id !== 'mesa' && tp.id !== 'juego').map((topic) => (
                      <button
                        key={topic.id}
                        onClick={() => setCurrentView(topic.id)}
                        className={`${topic.color} text-white p-6 rounded-3xl shadow-lg transform hover:-translate-y-2 transition-all duration-300 flex flex-col items-center justify-center text-center gap-4 border-b-8 border-black/20 relative overflow-hidden`}
                      >
                        {completedTopics.includes(topic.id) && (
                          <div className="absolute top-3 right-3 bg-white rounded-full p-1">
                            <CheckCircle2 className="text-green-500" size={24} />
                          </div>
                        )}
                        <span className="text-6xl drop-shadow-md">{topic.emoji}</span>
                        <h2 className="text-xl font-bold leading-tight">{topic.title}</h2>
                      </button>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="bg-white rounded-3xl shadow-xl p-6 sm:p-10 border-4 border-sky-100">
                  {currentView === 'poligonos' && <LessonPoligonos onComplete={() => handleCorrectAnswer('poligonos')} isCompleted={completedTopics.includes('poligonos')} />}
                  {currentView === 'triangulos' && <LessonTriangulos onComplete={() => handleCorrectAnswer('triangulos')} isCompleted={completedTopics.includes('triangulos')} />}
                  {currentView === 'cuadrilateros' && <LessonCuadrilateros onComplete={() => handleCorrectAnswer('cuadrilateros')} isCompleted={completedTopics.includes('cuadrilateros')} />}
                  {currentView === 'perimetro' && <LessonPerimetro onComplete={() => handleCorrectAnswer('perimetro')} isCompleted={completedTopics.includes('perimetro')} />}
                  {currentView === 'area' && <LessonArea onComplete={() => handleCorrectAnswer('area')} isCompleted={completedTopics.includes('area')} />}
                  {currentView === 'circulo' && <LessonCirculo onComplete={() => handleCorrectAnswer('circulo')} isCompleted={completedTopics.includes('circulo')} />}
                  {currentView === 'mesa' && <MesaDeDibujo onBack={() => setCurrentView('menu')} />}
                  {currentView === 'juego' && <JuegoFormas onBack={() => setCurrentView('menu')} />}
                </div>
              )}
            </main>
          </div>
        </I18nContext.Provider>
      );
    }

    const LessonContainer = ({ children, isCompleted }) => (
      <div className="space-y-8 animate-fade-in relative">
        {isCompleted && (
          <div className="absolute -top-4 -right-4 bg-green-500 text-white px-4 py-2 rounded-full font-bold shadow-md flex items-center gap-2 rotate-3">
            <Star className="text-white" size={20} /> <span className="text-sm font-bold ml-1">OK</span>
          </div>
        )}
        {children}
      </div>
    );

    const QuizSection = ({ question, options, correctAnswer, onCorrect, isCompleted }) => {
      const { t } = useContext(I18nContext);
      const [selected, setSelected] = useState(null);
      const [showError, setShowError] = useState(false);

      const handleSelect = (idx) => {
        if (isCompleted) return;
        setSelected(idx);
        if (idx === correctAnswer) {
          setShowError(false);
          onCorrect();
        } else {
          setShowError(true);
          setTimeout(() => setShowError(false), 2000);
        }
      };

      return (
        <div className="mt-12 bg-sky-50 p-6 rounded-2xl border-2 border-sky-200">
          <h3 className="text-2xl font-bold text-sky-800 mb-6 flex items-center gap-3">
            <PlayIcon className="text-sky-500" /> {t('qz_play')}
          </h3>
          <p className="text-xl mb-6 font-medium text-slate-700">{question}</p>
          
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {options.map((option, idx) => (
              <button
                key={idx}
                onClick={() => handleSelect(idx)}
                disabled={isCompleted}
                className={`p-4 text-lg font-bold rounded-xl border-b-4 transition-all duration-200
                  ${isCompleted && idx === correctAnswer 
                    ? 'bg-green-400 border-green-600 text-white' 
                    : selected === idx && showError 
                      ? 'bg-red-400 border-red-600 text-white animate-shake'
                      : 'bg-white border-sky-200 text-sky-700 hover:bg-sky-100 hover:border-sky-300'
                  }
                `}
              >
                {option}
              </button>
            ))}
          </div>
          {showError && (
            <p className="text-red-500 font-bold mt-4 flex items-center gap-2">
              <AlertCircle /> {t('qz_err')}
            </p>
          )}
          {isCompleted && (
            <p className="text-green-600 font-bold mt-4 flex items-center gap-2 text-xl">
              <Star className="text-green-600" /> {t('qz_ok')}
            </p>
          )}
        </div>
      );
    };

    const LessonPoligonos = ({ onComplete, isCompleted }) => {
      const { t } = useContext(I18nContext);
      return (
      <LessonContainer isCompleted={isCompleted}>
        <div className="flex flex-col md:flex-row gap-8 items-center">
          <div className="flex-1">
            <h2 className="text-3xl font-extrabold text-blue-600 mb-4">{t('pol_tit')}</h2>
            <p className="text-xl text-slate-600 mb-4">{t('pol_p1')}</p>
            <ul className="text-lg text-slate-700 space-y-3 bg-blue-50 p-4 rounded-xl">
              <li><strong>{t('pol_l1')}</strong> {t('pol_l1d')}</li>
              <li><strong>{t('pol_l2')}</strong> {t('pol_l2d')}</li>
              <li><strong>{t('pol_l3')}</strong> {t('pol_l3d')}</li>
            </ul>
          </div>
          <div className="flex-1 relative bg-slate-100 p-8 rounded-2xl flex justify-center">
            <svg viewBox="0 0 100 100" className="w-48 h-48 drop-shadow-xl">
              <polygon points="50,10 90,40 75,90 25,90 10,40" fill="#60A5FA" stroke="#2563EB" strokeWidth="3" />
              <circle cx="50" cy="10" r="4" fill="#EF4444" />
              <text x="35" y="10" fontSize="8" fill="#EF4444" fontWeight="bold">{t('vert_lbl')}</text>
              <path d="M 40,20 Q 50,25 60,20" fill="none" stroke="#F59E0B" strokeWidth="2" />
              <text x="45" y="32" fontSize="8" fill="#F59E0B" fontWeight="bold">{t('angle_lbl')}</text>
              <line x1="90" y1="40" x2="75" y2="90" stroke="#10B981" strokeWidth="4" />
              <text x="85" y="70" fontSize="8" fill="#10B981" fontWeight="bold">{t('side_lbl')}</text>
            </svg>
          </div>
        </div>
        <QuizSection question={t('pol_q')} options={t('pol_opt')} correctAnswer={1} onCorrect={onComplete} isCompleted={isCompleted} />

      const [rulerState, setRulerState] = useState({ x: 600, y: 150, angle: 0 });

      const [showProtractor, setShowProtractor] = useState(false);
      const [protractorState, setProtractorState] = useState({ x: 400, y: 250, angle: 0 });

      const [isTestMode, setIsTestMode] = useState(false);
      const [currentTest, setCurrentTest] = useState(null);
      const [testAnswers, setTestAnswers] = useState({});
      const [testResults, setTestResults] = useState(null);

      const gridSize = 40;
      const snap = (val) => Math.round(val / gridSize) * gridSize;
      const canvasHeight = isTestMode ? 1200 : 800;

      const getCoords = (e) => {
        if (!svgRef.current) return null;
        const pt = svgRef.current.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const svgP = pt.matrixTransform(svgRef.current.getScreenCTM().inverse());
        const x = Math.max(0, Math.min(1600, snap(svgP.x)));
        const y = Math.max(0, Math.min(canvasHeight, snap(svgP.y)));
        return { x, y, exactX: svgP.x, exactY: svgP.y };
      };

      const startDrag = (e, actionBuilder, forceAllow = false) => {
        if (!forceAllow && (activeTool !== 'move' || isTestMode)) return;
        e.stopPropagation();
        const coords = getCoords(e);
        if (!coords) return;
        
        try { e.target.setPointerCapture(e.pointerId); } catch(err) {}
        setDragAction(actionBuilder(coords));
        setIsDragging(false); 
      };

      const handlePointerMove = (e) => {
        const coords = getCoords(e);
        if (!coords) return;
        if (!isTestMode) setCursorPos(coords);

        if (dragAction) {
          setIsDragging(true);

          if (dragAction.type === 'ruler-body') {
            const dx = coords.exactX - dragAction.startX;
            const dy = coords.exactY - dragAction.startY;
            setRulerState(prev => ({ ...prev, x: dragAction.initialPos.x + dx, y: dragAction.initialPos.y + dy }));
            return;
          }
          if (dragAction.type === 'ruler-rotate') {
            const angle = Math.atan2(coords.exactY - dragAction.originY, coords.exactX - dragAction.originX) * 180 / Math.PI;
            setRulerState(prev => ({ ...prev, angle }));
            return;
          }

          if (dragAction.type === 'protractor-body') {
            const dx = coords.exactX - dragAction.startX;
            const dy = coords.exactY - dragAction.startY;
            setProtractorState(prev => ({ ...prev, x: dragAction.initialPos.x + dx, y: dragAction.initialPos.y + dy }));
            return;
          }
          if (dragAction.type === 'protractor-rotate') {
            const angle = Math.atan2(coords.exactY - dragAction.originY, coords.exactX - dragAction.originX) * 180 / Math.PI;
            setProtractorState(prev => ({ ...prev, angle }));
            return;
          }

          if (isTestMode) return;

          const dx = coords.x - dragAction.startX;
          const dy = coords.y - dragAction.startY;

          if (dragAction.type === 'poly-vertex') {
            setPolygons(prev => {
              const newPolys = [...prev];
              const poly = [...newPolys[dragAction.polyIdx]];
              poly[dragAction.vertIdx] = { x: coords.x, y: coords.y };
              newPolys[dragAction.polyIdx] = poly;
              return newPolys;
            });
          } else if (dragAction.type === 'poly-body') {
            setPolygons(prev => {
              const newPolys = [...prev];
              newPolys[dragAction.polyIdx] = dragAction.initialPoly.map(p => ({ x: p.x + dx, y: p.y + dy }));
              return newPolys;
            });
          } else if (dragAction.type === 'circle-body') {
            setCircles(prev => {
              const newCircles = [...prev];
              newCircles[dragAction.circleIdx].center = { x: dragAction.initialCenter.x + dx, y: dragAction.initialCenter.y + dy };
              return newCircles;
            });
          } else if (dragAction.type === 'circle-edge') {
            setCircles(prev => {
              const newCircles = [...prev];
              const c = newCircles[dragAction.circleIdx];
              c.radius = Math.max(gridSize, snap(Math.hypot(coords.x - c.center.x, coords.y - c.center.y)));
              return newCircles;
            });
          } else if (dragAction.type === 'segment-body') {
            setSegments(prev => {
              const newSegs = [...prev];
              newSegs[dragAction.segIdx] = {
                ...dragAction.initialSeg,
                p1: { x: dragAction.initialSeg.p1.x + dx, y: dragAction.initialSeg.p1.y + dy },
                p2: { x: dragAction.initialSeg.p2.x + dx, y: dragAction.initialSeg.p2.y + dy }
              };
              return newSegs;
            });
          } else if (dragAction.type === 'segment-endpoint') {
            setSegments(prev => {
              const newSegs = [...prev];
              newSegs[dragAction.segIdx][dragAction.point] = { x: coords.x, y: coords.y };
              return newSegs;
            });
          }
        }
      };

      const handlePointerUp = (e) => {
        if (dragAction) {
          setDragAction(null);
          setTimeout(() => setIsDragging(false), 100);
        }
      };

      const handleSvgClick = (e) => {
        if (isTestMode) return;
        const now = Date.now();
        if (now - (lastTap.current['svg_click'] || 0) < 150) return; 
        lastTap.current['svg_click'] = now;

        const coords = getCoords(e);
        if (!coords) return;
        
        if (activeTool === 'arrow') {
          if (!isDragging) setSelectedElements({});
          return;
        }

        if (activeTool === 'pencil') {
          setCurrentPoints([...currentPoints, { x: coords.x, y: coords.y }]);
        } else if (activeTool === 'compass') {
          if (!currentCenter) {
            setCurrentCenter({ x: coords.x, y: coords.y });
          } else {
            const radius = Math.hypot(coords.x - currentCenter.x, coords.y - currentCenter.y);
            if (radius > 0) setCircles([...circles, { center: currentCenter, radius, filled: false }]);
            setCurrentCenter(null);
          }
        } else if (activeTool === 'segment') {
          if (!currentSegmentStart) {
            setCurrentSegmentStart({ x: coords.x, y: coords.y });
          } else {
            setSegments([...segments, { p1: currentSegmentStart, p2: { x: coords.x, y: coords.y }, color: segmentColor }]);
            setCurrentSegmentStart(null);
          }
        }
      };

      const handleClosePolygon = (e) => {
        e.stopPropagation();
        if (activeTool !== 'pencil' || isTestMode) return;
        if (currentPoints.length >= 3) {
          setPolygons([...polygons, currentPoints]);
          setCurrentPoints([]);
          setCursorPos(null);
        }
      };

      const toggleSelect = (e, id) => {
        if (activeTool !== 'arrow' || isTestMode) return;
        e.stopPropagation();
        if (isDragging) return;
        
        const now = Date.now();
        if (now - (lastTap.current['toggle_' + id] || 0) < 150) return; 
        lastTap.current['toggle_' + id] = now;

        setSelectedElements(prev => {
          const next = { ...prev };
          if (next[id]) delete next[id];
          else next[id] = true;
          return next;
        });
      };

      const handleInteriorClick = (e, pIdx) => {
        if (activeTool !== 'arrow' || isTestMode) return;
        e.stopPropagation();
        if (isDragging) return;

        const poly = polygons[pIdx];
        const now = Date.now();
        const tapKey = `poly-${pIdx}-interior`;
        const timeSinceLastTap = now - (lastTap.current[tapKey] || 0);

        if (timeSinceLastTap < 150) return; 

        if (poly.length === 3 && timeSinceLastTap < 400 && cycle !== 1) {
          const info = getPolygonInfo(poly, cycle);
          let currentType = 'Escaleno';
          if (info.name.includes(t('tri_equ'))) currentType = 'Equilátero';
          else if (info.name.includes(t('tri_iso'))) currentType = 'Isósceles';

          setTriangleTypeInput({ polyIdx: pIdx, currentType });
          
          setSelectedElements(prev => {
            const next = { ...prev };
            delete next[tapKey];
            return next;
          });
          lastTap.current[tapKey] = 0;
        } else {
          toggleSelect(e, tapKey);
          lastTap.current[tapKey] = now;
        }
      };

      const handleApplyTriangleType = (targetType) => {
        if (!triangleTypeInput) return;
        const pIdx = triangleTypeInput.polyIdx;
        
        setPolygons(prev => {
          const newPolys = [...prev];
          const poly = newPolys[pIdx];
          const p0 = poly[0];
          const p1 = poly[1];
          let p2 = poly[2];

          const dx = p1.x - p0.x;
          const dy = p1.y - p0.y;
          const L = Math.hypot(dx, dy);

          if (L > 0) {
            const midX = (p0.x + p1.x) / 2;
            const midY = (p0.y + p1.y) / 2;
            const nx = -dy / L;
            const ny = dx / L;

            const v2x = p2.x - p0.x;
            const v2y = p2.y - p0.y;
            const h = v2x * nx + v2y * ny;
            const signH = h >= 0 ? 1 : -1;
            const absH = Math.max(Math.abs(h), 40); 

            if (targetType === 'Equilátero') {
              const heightEqui = L * (Math.sqrt(3) / 2);
              p2 = { x: midX + nx * heightEqui * signH, y: midY + ny * heightEqui * signH };
            } else if (targetType === 'Isósceles') {
              p2 = { x: midX + nx * absH * signH, y: midY + ny * absH * signH };
            } else if (targetType === 'Escaleno') {
              const ux = dx / L;
              const uy = dy / L;
              p2 = { x: midX + ux * (L * 0.25) + nx * absH * signH, y: midY + uy * (L * 0.25) + ny * absH * signH };
            }
            
            newPolys[pIdx] = [p0, p1, p2];
          }
          return newPolys;
        });
        setTriangleTypeInput(null);
      };

      const handleVertexClick = (e, pIdx, i) => {
        if (activeTool !== 'arrow' || isTestMode) return;
        e.stopPropagation();
        if (isDragging) return;

        const now = Date.now();
        const tapKey = `poly-${pIdx}-vert-${i}`;
        const timeSinceLastTap = now - (lastTap.current[tapKey] || 0);

        if (timeSinceLastTap < 150) return; 

        if (timeSinceLastTap < 400 && cycle !== 1) { 
          toggleSelect(e, `poly-${pIdx}-angle-${i}`); 
          setSelectedElements(prev => {
            const next = { ...prev };
            delete next[tapKey];
            return next;
          });
          lastTap.current[tapKey] = 0; 
        } else {
          toggleSelect(e, tapKey);
          lastTap.current[tapKey] = now;
        }
      };

      const handleEdgeClick = (e, type, idx1, idx2 = null) => {
        if (activeTool !== 'arrow' || isTestMode) return;
        e.stopPropagation();
        if (isDragging) return;

        const now = Date.now();
        const tapKey = type === 'poly' ? `poly-${idx1}-edge-${idx2}` : `segment-${idx1}`;
        const timeSinceLastTap = now - (lastTap.current[tapKey] || 0);

        if (timeSinceLastTap < 150) return; 

        if (timeSinceLastTap < 400) {
          let currentPx, anchor;
          if (type === 'poly') {
            const poly = polygons[idx1];
            const p1 = poly[idx2];
            const p2 = poly[(idx2 + 1) % poly.length];
            currentPx = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            anchor = {
              x: poly.reduce((acc, p) => acc + p.x, 0) / poly.length,
              y: poly.reduce((acc, p) => acc + p.y, 0) / poly.length
            };
          } else {
            const seg = segments[idx1];
            currentPx = Math.hypot(seg.p2.x - seg.p1.x, seg.p2.y - seg.p1.y);
            anchor = { x: (seg.p1.x + seg.p2.x) / 2, y: (seg.p1.y + seg.p2.y) / 2 };
          }
          
          if (currentPx === 0) {
              lastTap.current[tapKey] = 0;
              return;
          }

          const currentCm = formatLength(currentPx / 40, cycle);
          setEdgeInput({ type, polyIdx: idx1, edgeIdx: idx2, segIdx: idx1, currentCm, currentPx, anchor });
          
          setSelectedElements(prev => {
            const next = { ...prev };
            delete next[tapKey];
            return next;
          });
          lastTap.current[tapKey] = 0;
        } else {
          toggleSelect(e, tapKey);
          lastTap.current[tapKey] = now;
        }
      };

      const handleApplyEdgeLength = (newCm) => {
        if (!edgeInput || isNaN(newCm) || newCm <= 0 || edgeInput.currentPx === 0) {
           setEdgeInput(null);
           return;
        }
        
        const targetPx = newCm * 40;
        const factor = targetPx / edgeInput.currentPx;
        const anchor = edgeInput.anchor;

        if (edgeInput.type === 'poly') {
          setPolygons(prev => {
            const newPolys = [...prev];
            newPolys[edgeInput.polyIdx] = newPolys[edgeInput.polyIdx].map(p => ({
              x: anchor.x + (p.x - anchor.x) * factor,
              y: anchor.y + (p.y - anchor.y) * factor
            }));
            return newPolys;
          });
        } else if (edgeInput.type === 'segment') {
          setSegments(prev => {
            const newSegs = [...prev];
            const seg = newSegs[edgeInput.segIdx];
            newSegs[edgeInput.segIdx] = {
              ...seg,
              p1: { x: anchor.x + (seg.p1.x - anchor.x) * factor, y: anchor.y + (seg.p1.y - anchor.y) * factor },
              p2: { x: anchor.x + (seg.p2.x - anchor.x) * factor, y: anchor.y + (seg.p2.y - anchor.y) * factor }
            };
            return newSegs;
          });
        }
        setEdgeInput(null);
      };

      const handleFillCircle = (e, idx) => {
        if (activeTool !== 'arrow' || isTestMode) return;
        e.stopPropagation();
        if (isDragging) return;
        const newCircles = [...circles];
        newCircles[idx].filled = true;
        setCircles(newCircles);
        toggleSelect(e, `circle-${idx}-interior`);
      };

      const clearBoard = () => {
        setPolygons([]); setCircles([]); setSegments([]); setCurrentPoints([]);
        setCurrentCenter(null); setCurrentSegmentStart(null); setSelectedElements({});
      };

      const TEST_SHAPES_DATA = getTestShapes(t);

      const startTestMode = () => {
        clearBoard(); setIsTestMode(true); setActiveTool('test');
        setCurrentTest(TEST_SHAPES_DATA[Math.floor(Math.random() * TEST_SHAPES_DATA.length)]);
        setTestAnswers({}); setTestResults(null);
      };

      const changeTestShape = () => {
        let randomShape;
        do { randomShape = TEST_SHAPES_DATA[Math.floor(Math.random() * TEST_SHAPES_DATA.length)];
        } while (TEST_SHAPES_DATA.length > 1 && randomShape === currentTest); 
        setCurrentTest(randomShape); setTestAnswers({}); setTestResults(null);
      };

      const exitTestMode = () => { setIsTestMode(false); setCurrentTest(null); setActiveTool('pencil'); clearBoard(); };

      const checkTest = () => {
        if (!currentTest) return;
        const results = {};
        currentTest.questions.filter(q => q.cycles.includes(cycle)).forEach(q => {
           const userAns = cleanStr(testAnswers[q.id] || '');
           const validAnswers = typeof q.answer === 'function' ? q.answer(cycle) : q.answer;
           results[q.id] = validAnswers.some(ans => cleanStr(ans) === userAns);
        });
        setTestResults(results);
      };

      const isSelected = (id) => selectedElements[id];

      const getPolygonInfo = (poly, currentCycle) => {
        const numSides = poly.length;
        if (numSides === 3) {
          if (currentCycle === 1) return { name: 'Triángulo', color: 'rgba(34, 197, 94, 0.6)' };
          const d1 = Math.hypot(poly[0].x - poly[1].x, poly[0].y - poly[1].y);
          const d2 = Math.hypot(poly[1].x - poly[2].x, poly[1].y - poly[2].y);
          const d3 = Math.hypot(poly[2].x - poly[0].x, poly[2].y - poly[0].y);
          const approxEqual = (a, b) => Math.abs(a - b) <= 5;
          let type = t('tri_esc');
          if (approxEqual(d1, d2) && approxEqual(d2, d3)) type = t('tri_equ');
          else if (approxEqual(d1, d2) || approxEqual(d2, d3) || approxEqual(d1, d3)) type = t('tri_iso');
          return { name: `Triángulo ${type}`, color: 'rgba(34, 197, 94, 0.6)' }; 
        }
        switch(numSides) {
          case 4: return { name: t('b_cua').includes('uad')? 'Cuadrilátero':'Quadrilateral', color: 'rgba(59, 130, 246, 0.6)' }; 
          case 5: return { name: t('b_pen'), color: 'rgba(239, 68, 68, 0.6)' }; 
          case 6: return { name: t('b_hex'), color: 'rgba(168, 85, 247, 0.6)' }; 
          default: return { name: 'Polígono', color: 'rgba(156, 163, 175, 0.6)' }; 
        }
      };

      const getAngleInfo = (poly, i) => {
        const p1 = poly[(i - 1 + poly.length) % poly.length];
        const p2 = poly[i];
        const p3 = poly[(i + 1) % poly.length];
        let sum = 0;
        for (let j = 0; j < poly.length; j++) {
          const current = poly[j]; const next = poly[(j + 1) % poly.length];
          sum += (next.x - current.x) * (next.y + current.y);
        }
        const isClockwise = sum > 0;
        let a1 = Math.atan2(p1.y - p2.y, p1.x - p2.x);
        let a2 = Math.atan2(p3.y - p2.y, p3.x - p2.x);
        let startAngle = isClockwise ? a1 : a2; let endAngle = isClockwise ? a2 : a1;
        let angleDiff = endAngle - startAngle;
        if (angleDiff < 0) angleDiff += 2 * Math.PI;
        const deg = angleDiff * 180 / Math.PI;
        
        let typeStr = 'Recto';
        if(t('mq8_o')) {
           const o = t('mq8_o');
           typeStr = Math.abs(deg - 90) <= 1 ? o[2].split(' ')[0] : deg < 90 ? o[0] : deg < 180 ? o[1] : 'Cóncavo';
        }

        const r = 35; 
        const x1 = p2.x + r * Math.cos(startAngle); const y1 = p2.y + r * Math.sin(startAngle);
        const x2 = p2.x + r * Math.cos(endAngle); const y2 = p2.y + r * Math.sin(endAngle);
        const largeArc = angleDiff > Math.PI ? 1 : 0; const sweep = 1;
        const path = `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} ${sweep} ${x2} ${y2} L ${p2.x} ${p2.y} Z`;
        const arcOnly = `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} ${sweep} ${x2} ${y2}`;
        const midAngle = startAngle + angleDiff / 2;
        const midX = p2.x + (r + 15) * Math.cos(midAngle); const midY = p2.y + (r + 15) * Math.sin(midAngle);
        const outDist = r + 40; 
        const outX = p2.x + outDist * Math.cos(midAngle + Math.PI); const outY = p2.y + outDist * Math.sin(midAngle + Math.PI);
        return { path, arcOnly, type: typeStr, midX, midY, outX, outY, deg };
      };

      return (
        <div className="animate-fade-in flex flex-col lg:flex-row gap-6 relative w-full items-start">
          <div className="w-full lg:w-48 flex-shrink-0 bg-white p-4 rounded-3xl shadow-xl border-4 border-sky-100 flex flex-col gap-3 sticky top-4 z-10">
            <button onClick={onBack} className="bg-sky-100 text-sky-800 border-2 border-sky-200 p-2 rounded-xl text-sm font-bold shadow-sm hover:bg-sky-200 transition-all flex items-center justify-center gap-2 mb-1">
              <ArrowLeft size={16} /> {t('back')}
            </button>
            <h3 className="text-lg font-bold text-sky-800 text-center border-b-2 border-sky-100 pb-2">{t('md_tit')}</h3>
            {!isTestMode ? (
              <div className="flex flex-col gap-2">
                <button onClick={() => { setActiveTool('pencil'); setCurrentCenter(null); setCurrentPoints([]); setSelectedElements({}); setCurrentSegmentStart(null); }} className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${activeTool === 'pencil' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}>🖍️ {t('md_pen')}</button>
                <button onClick={() => { setActiveTool('arrow'); setCurrentCenter(null); setCurrentPoints([]); setCurrentSegmentStart(null); }} className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${activeTool === 'arrow' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}>↖️ {t('md_sel')}</button>
                <button onClick={() => { setActiveTool('move'); setCurrentCenter(null); setCurrentPoints([]); setCurrentSegmentStart(null); }} className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${activeTool === 'move' ? 'bg-indigo-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}>🖐️ {t('md_mov')}</button>
                <div className="h-px w-full bg-slate-200 my-1"></div>
                <div className="flex flex-col bg-slate-50 p-2 rounded-xl border border-slate-200">
                  <span className="text-[11px] font-bold text-slate-500 mb-1 px-1 text-center">{t('md_niv')}</span>
                  <div className="flex flex-col gap-1">
                    <button onClick={() => {setCycle(1); setSelectedElements({}); setShowProtractor(false);}} className={`px-2 py-1 text-xs font-bold rounded-lg transition-all ${cycle === 1 ? 'bg-white shadow text-sky-600' : 'text-slate-500 hover:bg-slate-200'}`}>{t('md_c1')}</button>
                    <button onClick={() => {setCycle(2); setSelectedElements({});}} className={`px-2 py-1 text-xs font-bold rounded-lg transition-all ${cycle === 2 ? 'bg-white shadow text-sky-600' : 'text-slate-500 hover:bg-slate-200'}`}>{t('md_c2')}</button>
                    <button onClick={() => {setCycle(3); setSelectedElements({});}} className={`px-2 py-1 text-xs font-bold rounded-lg transition-all ${cycle === 3 ? 'bg-white shadow text-sky-600' : 'text-slate-500 hover:bg-slate-200'}`}>{t('md_c3')}</button>
                  </div>
                </div>
                {cycle !== 1 && (
                  <><div className="h-px w-full bg-slate-200 my-1"></div>
                  <button onClick={() => { setActiveTool('compass'); setCurrentCenter(null); setCurrentPoints([]); setSelectedElements({}); setCurrentSegmentStart(null); }} className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${activeTool === 'compass' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}>🧭 {t('md_com')}</button></>
                )}
                <div className="flex flex-col gap-2">
                  <button onClick={() => { setActiveTool('segment'); setCurrentCenter(null); setCurrentPoints([]); setSelectedElements({}); setCurrentSegmentStart(null); }} className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${activeTool === 'segment' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}>📏 {t('md_seg')}</button>
                  {activeTool === 'segment' && (
                    <div className="flex justify-center gap-3 p-2 bg-slate-50 rounded-xl border border-slate-200">
                      <button onClick={() => setSegmentColor('#EF4444')} className={`w-6 h-6 rounded-full bg-red-500 border-2 transition-all ${segmentColor === '#EF4444' ? 'border-slate-800 scale-110 shadow-md' : 'border-transparent hover:scale-105'}`} title="Rojo" />
                      <button onClick={() => setSegmentColor('#10B981')} className={`w-6 h-6 rounded-full bg-emerald-500 border-2 transition-all ${segmentColor === '#10B981' ? 'border-slate-800 scale-110 shadow-md' : 'border-transparent hover:scale-105'}`} title="Verde" />

                <button onClick={startTestMode} className="mt-1 bg-gradient-to-r from-purple-500 to-indigo-500 text-white p-2 rounded-xl text-sm font-bold shadow-lg hover:shadow-xl hover:scale-105 transition-all flex items-center justify-center gap-1 border-2 border-white">🎯 {t('md_test')}</button>

                <button onClick={() => setShowRuler(!showRuler)} className={`p-3 rounded-xl font-bold shadow-lg transition-all flex items-center justify-center gap-2 text-sm ${showRuler ? 'bg-amber-500 text-white' : 'bg-amber-100 text-amber-800 hover:bg-amber-200'}`}><RulerIcon size={18} /> {showRuler ? t('md_hideR') : t('md_showR')}</button>
                {cycle !== 1 && (
                  <button onClick={() => setShowProtractor(!showProtractor)} className={`p-3 rounded-xl font-bold shadow-lg transition-all flex items-center justify-center gap-2 text-sm ${showProtractor ? 'bg-sky-500 text-white' : 'bg-sky-100 text-sky-800 hover:bg-sky-200'}`}><ProtractorIcon size={18} /> {showProtractor ? t('md_hideT') : t('md_tra')}</button>
                )}
                <div className="h-px w-full bg-slate-200 my-1"></div>

              </div>
            )}

          <div className="flex-1 flex flex-col gap-6 min-w-0 w-full relative">
            {!isTestMode && (
              <div className="bg-amber-50 border-2 border-amber-200 p-4 rounded-2xl text-amber-900 shadow-sm w-full">
                <h3 className="font-bold text-amber-800 mb-2 flex items-center gap-2 text-lg">
                  <span className="text-2xl">💡</span> {t('md_tips_tit')}
                </h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 text-sm">
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm"><span className="font-bold text-sky-600 block mb-1">↖️ {t('md_sel')}</span><p>👉 <strong>{t('md_t1')}</strong></p></div>
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm"><span className="font-bold text-sky-600 block mb-1">↖️ {t('md_sel')}</span><p>📏 <strong>{t('md_t2')}</strong></p></div>
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm"><span className="font-bold text-sky-600 block mb-1">↖️ {t('md_sel')}</span><p>✌️ <strong>{t('md_t3')}</strong></p></div>
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm"><span className="font-bold text-sky-600 block mb-1">↖️ {t('md_sel')}</span><p>🔄 <strong>{t('md_t4')}</strong></p></div>
                </div>
                <p className="mt-3 text-sm text-indigo-700 font-medium bg-indigo-50 p-2 rounded-lg inline-block border border-indigo-100">

              : activeTool === 'compass' ? 'border-pink-400 cursor-crosshair' 
              : activeTool === 'segment' ? 'border-emerald-400 cursor-crosshair' 
              : activeTool === 'move' ? 'border-indigo-400 cursor-grab active:cursor-grabbing' 
              : 'border-blue-400 cursor-default'}
            `}>
              <svg ref={svgRef} viewBox={`0 0 1600 ${canvasHeight}`} className="w-full h-auto touch-none" style={{ touchAction: 'none' }} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp} onClick={handleSvgClick}>
                <defs>
                  <pattern id="grid-table" width={gridSize} height={gridSize} patternUnits="userSpaceOnUse"><path d={`M ${gridSize} 0 L 0 0 0 ${gridSize}`} fill="none" stroke="#E6D5B8" strokeWidth="1.5" /></pattern>
                  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1E293B" /></marker>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid-table)" />

                {!isTestMode && (
                  <g>
                    {circles.map((c, i) => {
                      const rCmRaw = c.radius / 40; const rCm = formatLength(rCmRaw, cycle); const dCm = formatLength(rCmRaw * 2, cycle);
                      const circPerim = formatLength(2 * Math.PI * rCmRaw, cycle) + " cm"; const circArea = formatLength(Math.PI * rCmRaw * rCmRaw, cycle) + " cm²";
                      return (
                      <g key={`circle-${i}`}>
                        <circle cx={c.center.x} cy={c.center.y} r={c.radius} fill={c.filled ? "#C0C0C0" : "transparent"} className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-grab' : 'pointer-events-none'} onClick={(e) => c.filled ? toggleSelect(e, `circle-${i}-interior`) : handleFillCircle(e, i)} onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'circle-body', circleIdx: i, startX: coords.x, startY: coords.y, initialCenter: {...c.center} }))} />
                        <line x1={c.center.x} y1={c.center.y - c.radius} x2={c.center.x} y2={c.center.y + c.radius} stroke="#0EA5E9" strokeWidth="3" strokeDasharray="6 6" className="pointer-events-none" />
                        <line x1={c.center.x} y1={c.center.y - c.radius} x2={c.center.x} y2={c.center.y + c.radius} stroke="transparent" strokeWidth="20" className={activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} onClick={(e) => toggleSelect(e, `circle-${i}-diameter`)} />
                        <line x1={c.center.x} y1={c.center.y} x2={c.center.x + c.radius} y2={c.center.y} stroke="#8B5CF6" strokeWidth="3" strokeDasharray="6 6" className="pointer-events-none" />
                        <line x1={c.center.x} y1={c.center.y} x2={c.center.x + c.radius} y2={c.center.y} stroke="transparent" strokeWidth="20" className={activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} onClick={(e) => toggleSelect(e, `circle-${i}-radius`)} />
                        <circle cx={c.center.x} cy={c.center.y} r={c.radius} fill="none" stroke="#DB2777" strokeWidth="4" className="pointer-events-none" />
                        <circle cx={c.center.x} cy={c.center.y} r={c.radius} fill="none" stroke="transparent" strokeWidth="20" className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-ns-resize' : 'pointer-events-none'} onClick={(e) => toggleSelect(e, `circle-${i}-border`)} onPointerDown={(e) => startDrag(e, () => ({ type: 'circle-edge', circleIdx: i }))} />
                        {isSelected(`circle-${i}-interior`) && (<InfoCard x={c.center.x} y={c.center.y + c.radius + 30} name={t('b_cir')} perimeter={circPerim} area={circArea} currentCycle={cycle} />)}
                        {isSelected(`circle-${i}-border`) && <FloatingLabel text={t('b_crc')} x={c.center.x + c.radius} y={c.center.y - c.radius/2} width={180} color="#DB2777" />}
                        {isSelected(`circle-${i}-radius`) && <FloatingLabel text={`${t('rad_lbl')}: ${rCm} cm`} x={c.center.x + c.radius/2} y={c.center.y} color="#8B5CF6" width={180} />}
                        {isSelected(`circle-${i}-diameter`) && <FloatingLabel text={`${t('diam_lbl')}: ${dCm} cm`} x={c.center.x} y={c.center.y - c.radius/2} color="#0EA5E9" width={220} />}
                      </g>
                    )})}
                    {segments.map((seg, i) => {
                      const isSel = isSelected(`segment-${i}`);
                      const midX = (seg.p1.x + seg.p2.x) / 2; const midY = (seg.p1.y + seg.p2.y) / 2;
                      const distPx = Math.hypot(seg.p1.x - seg.p2.x, seg.p1.y - seg.p2.y);
                      const distCm = formatLength(distPx / 40, cycle);
                      return (
                        <g key={`segment-${i}`}>

                          <line x1={seg.p1.x} y1={seg.p1.y} x2={seg.p2.x} y2={seg.p2.y} stroke={seg.color} strokeWidth={isSel ? "6" : "4"} className="pointer-events-none transition-all" />

                            <g>
                              <circle cx={seg.p1.x} cy={seg.p1.y} r="24" fill="transparent" className="cursor-grab active:cursor-grabbing" onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'segment-endpoint', segIdx: i, point: 'p1', startX: coords.x, startY: coords.y }))} />
                              <circle cx={seg.p2.x} cy={seg.p2.y} r="24" fill="transparent" className="cursor-grab active:cursor-grabbing" onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'segment-endpoint', segIdx: i, point: 'p2', startX: coords.x, startY: coords.y }))} />
                              <circle cx={seg.p1.x} cy={seg.p1.y} r="8" fill="#FCD34D" className="pointer-events-none shadow-sm" />
                              <circle cx={seg.p2.x} cy={seg.p2.y} r="8" fill="#FCD34D" className="pointer-events-none shadow-sm" />
                            </g>
                          )}
                          {isSel && <FloatingLabel text={`${t('md_seg')}: ${distCm} cm`} x={midX} y={midY} color={seg.color} width={220} />}
                        </g>
                      );
                    })}
                    {polygons.map((poly, pIdx) => {
                      const info = getPolygonInfo(poly, cycle);
                      const cx = poly.reduce((acc, p) => acc + p.x, 0) / poly.length; const cy = poly.reduce((acc, p) => acc + p.y, 0) / poly.length;
                      const perimeterPx = poly.reduce((sum, pt, idx) => { const nextPt = poly[(idx + 1) % poly.length]; return sum + Math.hypot(pt.x - nextPt.x, pt.y - nextPt.y); }, 0);
                      const perimeterCm = formatLength(perimeterPx / 40, cycle);
                      let areaPx = 0;
                      for (let j = 0; j < poly.length; j++) { const next = (j + 1) % poly.length; areaPx += poly[j].x * poly[next].y - poly[next].x * poly[j].y; }
                      const areaCmRaw = Math.abs(areaPx) / 2 / (40 * 40); const areaCm = formatLength(areaCmRaw, cycle);
                      const minX = Math.min(...poly.map(p => p.x)); const maxX = Math.max(...poly.map(p => p.x)); const maxY = Math.max(...poly.map(p => p.y));
                      const boxX = (minX + maxX) / 2; const boxY = maxY + 40;
                      const allEdgesSelected = poly.length >= 3 && poly.every((_, i) => isSelected(`poly-${pIdx}-edge-${i}`));

                      return (
                        <g key={`poly-${pIdx}`}>
                          <polygon points={poly.map(p => `${p.x},${p.y}`).join(' ')} fill={info.color} stroke="transparent" className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-grab' : 'pointer-events-none'} onClick={(e) => handleInteriorClick(e, pIdx)} onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'poly-body', polyIdx: pIdx, startX: coords.x, startY: coords.y, initialPoly: [...poly] }))} />
                          {poly.map((p, i) => {
                            const angleInfo = getAngleInfo(poly, i);
                            const isSel = isSelected(`poly-${pIdx}-angle-${i}`);
                            if (!isSel || cycle === 1) return null;
                            const labelX = cycle === 3 ? angleInfo.outX : angleInfo.midX; const labelY = cycle === 3 ? angleInfo.outY : angleInfo.midY;
                            const labelText = cycle === 3 ? `${t('angle_lbl')} ${angleInfo.type} (${Math.round(angleInfo.deg)}º)` : `${t('angle_lbl')} ${angleInfo.type}`;
                            return (
                              <g key={`angle-${pIdx}-${i}`}>
                                <path d={angleInfo.path} fill="rgba(245, 158, 11, 0.4)" className="pointer-events-none transition-colors" />
                                <path d={angleInfo.arcOnly} fill="none" stroke="#D97706" strokeWidth="4" className="pointer-events-none" />
                                <FloatingLabel text={labelText} x={labelX} y={labelY} width={cycle === 3 ? 280 : 200} color="#D97706" />
                              </g>
                            );
                          })}
                          {poly.map((p, i) => {
                            const nextP = poly[(i + 1) % poly.length];
                            const midX = (p.x + nextP.x) / 2; const midY = (p.y + nextP.y) / 2;
                            const isSel = isSelected(`poly-${pIdx}-edge-${i}`);
                            const distPx = Math.hypot(p.x - nextP.x, p.y - nextP.y);
                            const distCm = formatLength(distPx / 40, cycle);
                            return (
                              <g key={`edge-${pIdx}-${i}`}>
                                <line x1={p.x} y1={p.y} x2={nextP.x} y2={nextP.y} stroke="transparent" strokeWidth="30" className={activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} onClick={(e) => handleEdgeClick(e, 'poly', pIdx, i)} />
                                <line x1={p.x} y1={p.y} x2={nextP.x} y2={nextP.y} stroke={isSel ? "#EF4444" : "#475569"} strokeWidth={isSel ? "6" : "4"} className="pointer-events-none transition-all" />
                                {isSel && <FloatingLabel text={`${t('side_lbl')}: ${distCm} cm`} x={midX} y={midY} color="#EF4444" width={180} />}
                              </g>
                            );
                          })}
                          {poly.map((p, i) => {
                            const isSel = isSelected(`poly-${pIdx}-vert-${i}`);
                            return (
                              <g key={`vert-${pIdx}-${i}`}>
                                <circle cx={p.x} cy={p.y} r="24" fill="transparent" className={activeTool === 'move' ? 'cursor-grab active:cursor-grabbing' : activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'poly-vertex', polyIdx: pIdx, vertIdx: i, startX: coords.x, startY: coords.y }))} onClick={(e) => handleVertexClick(e, pIdx, i)} />
                                <circle cx={p.x} cy={p.y} r={isSel ? "10" : "8"} fill={isSel ? "#3B82F6" : "#1E293B"} className="pointer-events-none transition-all" />
                                {isSel && <FloatingLabel text={t('vert_lbl')} x={p.x} y={p.y} color="#3B82F6" width={120} />}
                              </g>
                            );
                          })}
                          {(isSelected(`poly-${pIdx}-interior`) || allEdgesSelected) && (
                            <InfoCard x={boxX} y={boxY} name={info.name} perimeter={`${perimeterCm} cm`} area={`${areaCm} cm²`} currentCycle={cycle} />
                          )}
                          {allEdgesSelected && !isSelected(`poly-${pIdx}-interior`) && (
                             <g transform={`translate(${cx}, ${cy})`} className="pointer-events-none z-50">
                                <g className="animate-fade-in">
                                  <rect x="-138" y="-18" width="280" height="40" fill="rgba(0,0,0,0.2)" rx="20" />
                                  <rect x="-140" y="-20" width="280" height="40" fill="#10B981" rx="20" />
                                  <text x="0" y="2" fill="white" fontSize="20" textAnchor="middle" dominantBaseline="middle" fontWeight="bold">
                                    {t('md_perim_info').replace('{val}', perimeterCm)}
                                  </text>
                                </g>
                             </g>
                          )}
                        </g>
                      );
                    })}

                    {activeTool === 'compass' && currentCenter && cursorPos && (
                      <g className="pointer-events-none">
                        <circle cx={currentCenter.x} cy={currentCenter.y} r="4" fill="#DB2777" />
                        <line x1={currentCenter.x} y1={currentCenter.y} x2={cursorPos.x} y2={cursorPos.y} stroke="#DB2777" strokeWidth="2" strokeDasharray="4 4" />
                        <circle cx={currentCenter.x} cy={currentCenter.y} r={Math.hypot(cursorPos.x - currentCenter.x, cursorPos.y - currentCenter.y)} fill="none" stroke="#DB2777" strokeWidth="2" strokeDasharray="8 8" opacity="0.6" />
                      </g>
                    )}

                    {activeTool === 'segment' && currentSegmentStart && cursorPos && (
                      <g className="pointer-events-none">
                        <circle cx={currentSegmentStart.x} cy={currentSegmentStart.y} r="6" fill={segmentColor} />
                        <line x1={currentSegmentStart.x} y1={currentSegmentStart.y} x2={cursorPos.x} y2={cursorPos.y} stroke={segmentColor} strokeWidth="4" strokeDasharray="6 6" opacity="0.7" />
                      </g>
                    )}

                    {activeTool === 'pencil' && currentPoints.map((p, i) => {
                      if (i < currentPoints.length - 1) return <line key={`current-line-${i}`} x1={p.x} y1={p.y} x2={currentPoints[i+1].x} y2={currentPoints[i+1].y} stroke="#6B7280" strokeWidth="4" className="pointer-events-none" />;
                      return null;
                    })}

                    {activeTool === 'pencil' && currentPoints.map((p, i) => {
                      const isFirst = i === 0;
                      return (
                        <g key={`current-point-${i}`}>
                          {isFirst && currentPoints.length >= 3 && (<><circle cx={p.x} cy={p.y} r="28" fill="transparent" className="cursor-pointer" onClick={handleClosePolygon} /><circle cx={p.x} cy={p.y} r="12" fill="#10B981" className="animate-pulse pointer-events-none" /></>)}
                          {(!isFirst || currentPoints.length < 3) && (<circle cx={p.x} cy={p.y} r="6" fill="#4B5563" className="pointer-events-none" />)}
                        </g>
                      );
                    })}

                    {activeTool === 'pencil' && currentPoints.length > 0 && cursorPos && (
                      <line x1={currentPoints[currentPoints.length - 1].x} y1={currentPoints[currentPoints.length - 1].y} x2={cursorPos.x} y2={cursorPos.y} stroke="#9CA3AF" strokeWidth="4" strokeDasharray="8 8" className="pointer-events-none opacity-60" />

                    {cursorPos && activeTool !== 'arrow' && activeTool !== 'pencil' && (
                      <g transform={`translate(${cursorPos.exactX}, ${cursorPos.exactY})`} className="pointer-events-none transition-transform duration-75">
                        <text x="-5" y="-5" fontSize="48">{activeTool === 'compass' ? '🧭' : activeTool === 'segment' ? '📏' : activeTool === 'move' ? '🖐️' : ''}</text>
                      </g>

                  </g>

                {isTestMode && currentTest && (
                  <g className="animate-drop-in">
                    {currentTest.render(800, 400)}

                    {currentTest.questions.filter(q => q.cycles.includes(cycle)).map(q => (
                      <g key={q.id}>
                        {q.arrow && (<line x1={q.x + 160} y1={q.y + 60} x2={q.arrow.tx} y2={q.arrow.ty} stroke="#1E293B" strokeWidth="4" markerEnd="url(#arrow)" strokeDasharray="6 6" className="pointer-events-none" />)}
                        <foreignObject x={q.x} y={q.y} width="320" height="130" className="overflow-visible">
                          <div className="bg-white p-4 rounded-2xl shadow-xl border-4 border-indigo-200 flex flex-col relative">

                            <input type="text" className="w-full bg-slate-50 border-2 border-slate-300 rounded-lg p-2 text-2xl text-center font-bold text-slate-700 focus:outline-none focus:border-indigo-500" placeholder="..." value={testAnswers[q.id] || ''} onChange={(e) => setTestAnswers({...testAnswers, [q.id]: e.target.value})} />
                            {testResults && (<div className="absolute -right-6 -top-6 text-5xl">{testResults[q.id] ? '✅' : '❌'}</div>)}
                          </div>
                        </foreignObject>
                      </g>

                  </g>

                {showRuler && (
                  <g transform={`translate(${rulerState.x}, ${rulerState.y}) rotate(${rulerState.angle})`} className="pointer-events-auto" onClick={(e) => e.stopPropagation()}>

                    <rect x="-20" y="0" width="840" height="40" fill="rgba(253, 224, 71, 0.85)" stroke="#CA8A04" strokeWidth="2" rx="5" className="cursor-move" onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'ruler-body', startX: coords.exactX, startY: coords.exactY, initialPos: { ...rulerState } }), true)} />
                    {[...Array(21)].map((_, i) => (
                      <g key={`tick-${i}`} transform={`translate(${i * 40}, 0)`} className="pointer-events-none">
                        <line x1="0" y1="0" x2="0" y2={i % 5 === 0 ? "15" : "10"} stroke="#854D0E" strokeWidth="2" />
                        <text x="0" y="28" fill="#854D0E" fontSize="14" textAnchor="middle" fontWeight="bold">{i}</text>

                    {[...Array(37)].map((_, i) => {

                        </g>

                    <circle cx="0" cy="0" r="5" fill="#EF4444" className="pointer-events-none" />

                    <text x="240" y="0" fill="white" fontSize="22" textAnchor="middle" dominantBaseline="middle" className="pointer-events-none font-bold">↻</text>
                  </g>

          {edgeInput && (
            <div className="fixed inset-0 z-[400] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">

    const CLOUDS = Array.from({length: 25}).map(() => ({
        x: Math.random() * 100, y: Math.random() * 300, size: Math.random() * 3 + 2, opacity: Math.random() * 0.3 + 0.1
    }));

    const JuegoFormas = ({ onBack }) => {
      const { t } = useContext(I18nContext);

      const [capybaraState, setCapybaraState] = useState('none');
      const [questionModal, setQuestionModal] = useState(null);
      const [kickPlayer, setKickPlayer] = useState(false);
      const [selectedDifficulty, setSelectedDifficulty] = useState('dificil');

      const BINS = [

        { id: 'T. Escaleno', name: t('b_tes'), color: '#059669', shape: <polygon points="5,55 55,55 20,5" fill="currentColor"/> },

        { id: 'Rectángulo', name: t('b_rec'), color: '#3B82F6', shape: <rect x="5" y="15" width="50" height="30" fill="currentColor"/> },
        { id: 'Rombo', name: t('b_rom'), color: '#2563EB', shape: <polygon points="30,5 45,30 30,55 15,30" fill="currentColor"/> },

        { id: 'Pentágono', name: t('b_pen'), color: '#EF4444', shape: <polygon points="30,5 55,25 45,55 15,55 5,25" fill="currentColor"/> },

        { id: 'Círculo', name: t('b_cir'), color: '#F472B6', shape: <circle cx="30" cy="30" r="25" fill="currentColor"/> }
