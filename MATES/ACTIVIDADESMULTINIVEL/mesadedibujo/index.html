      const getMilestoneQuestions = () => [
        { svg: <polygon points="30,10 70,10 90,50 70,90 30,90 10,50" fill="#A855F7" stroke="#7E22CE" strokeWidth="4" />, q: t('mq1_q'), options: t('mq1_o'), answer: 2 },
        { svg: <polygon points="50,15 85,85 15,85" fill="#34D399" stroke="#059669" strokeWidth="4" />, q: t('mq2_q'), options: t('mq2_o'), answer: 3 },
        { svg: <circle cx="50" cy="50" r="40" fill="none" stroke="#DB2777" strokeWidth="6" />, q: t('mq3_q'), options: t('mq3_o'), answer: 1 },
        { svg: <rect x="20" y="20" width="60" height="60" fill="#FBBF24" stroke="#D97706" strokeWidth="4" />, q: t('mq4_q'), options: t('mq4_o'), answer: 2 },
        { svg: <polygon points="50,10 90,40 75,90 25,90 10,40" fill="#EF4444" stroke="#B91C1C" strokeWidth="4" />, q: t('mq5_q'), options: t('mq5_o'), answer: 1 },
        { svg: <g><circle cx="50" cy="50" r="40" fill="#F472B6" stroke="#DB2777" strokeWidth="4" /><line x1="50" y1="50" x2="90" y2="50" stroke="#000" strokeWidth="4" /><circle cx="50" cy="50" r="3" fill="#000"/></g>, q: t('mq6_q'), options: t('mq6_o'), answer: 2 },
        { svg: <polygon points="10,20 90,90 10,90" fill="#34D399" stroke="#059669" strokeWidth="4" />, q: t('mq7_q'), options: t('mq7_o'), answer: 2 },
        { svg: <g><path d="M 20 80 L 20 20 L 80 80 Z" fill="none" stroke="#3B82F6" strokeWidth="4"/><path d="M 20 60 L 40 60 L 40 80" fill="none" stroke="#EF4444" strokeWidth="4"/></g>, q: t('mq8_q'), options: t('mq8_o'), answer: 2 },
        { svg: <g><line x1="20" y1="50" x2="80" y2="50" stroke="#10B981" strokeWidth="6"/><circle cx="20" cy="50" r="4" fill="#000"/><circle cx="80" cy="50" r="4" fill="#000"/></g>, q: t('mq9_q'), options: t('mq9_o'), answer: 1 },
        { svg: <polygon points="50,10 90,50 50,90 10,50" fill="#FBBF24" stroke="#D97706" strokeWidth="4" />, q: t('mq10_q'), options: t('mq10_o'), answer: 3 }
      ];

      const stateRef = useRef({
        active: false, shape: null, pShots: [], eShots: [], enemies: [],
        score: 0, nextShieldScore: 2000, nextFreezeScore: 5000,
        shieldCharges: 0, shieldActiveTime: 0, freezeCharges: 0, freezeActiveTime: 0,
        feedback: null, feedbackTimer: 0, keys: {}, difficulty: 'dificil'
      });

      const spawnShape = () => {
        const targetIdx = Math.floor(Math.random() * BINS.length);
        return { binId: targetIdx, x: 50, y: 5 }; 
      };

      const startGame = () => {
        stateRef.current = {
            ...stateRef.current, active: true, difficulty: selectedDifficulty, score: 0,
            nextShieldScore: 2000, nextFreezeScore: 5000, shieldCharges: 0, shieldActiveTime: 0, freezeCharges: 0, freezeActiveTime: 0,
            shape: spawnShape(), pShots: [], eShots: [],
            enemies: [
                { id: 1, side: 'left', x: 2, baseY: 60, y: 60, active: true, state: 'troll', hp: 5, timer: 0, fireTimer: 0, level: 1, smurfTimer: 0, hitCooldown: 0 },
                { id: 2, side: 'right', x: 98, baseY: 140, y: 140, active: true, state: 'troll', hp: 5, timer: 0, fireTimer: 800, level: 1, smurfTimer: 0, hitCooldown: 0 },
                { id: 3, side: 'left', x: 2, baseY: 220, y: 220, active: true, state: 'troll', hp: 5, timer: 0, fireTimer: 1600, level: 1, smurfTimer: 0, hitCooldown: 0 }
            ],
            feedback: null, feedbackTimer: 0, keys: {}
        };
        setCapybaraState('none'); setQuestionModal(null); setKickPlayer(false); forceRender();
      };

      const triggerCapybara = () => {
        setCapybaraState('dancing'); setTimeout(() => setCapybaraState('spinning'), 7000); setTimeout(() => setCapybaraState('none'), 10000);
      };

      const handleAnswer = (index) => {
        if (index === questionModal.answer) {
            stateRef.current.score += 500;
            if (questionModal.reward === 'freeze') {
                stateRef.current.freezeCharges = (stateRef.current.freezeCharges || 0) + 1;
                stateRef.current.feedback = { text: `${t('g_ok')} +500 Pts / ❄️ x1 ${t('g_frz').replace(':','')}`, type: 'success' };
            } else {
                stateRef.current.shieldCharges = (stateRef.current.shieldCharges || 0) + 1;
                stateRef.current.feedback = { text: `${t('g_ok')} +500 Pts / 🛡️ x1 ${t('g_shd').replace(':','')}`, type: 'success' };
            }
            stateRef.current.feedbackTimer = 3000;
            setQuestionModal(null); triggerCapybara(); stateRef.current.keys = {};
        } else {
            setQuestionModal(null); setKickPlayer(true); setTimeout(() => { onBack(); }, 5000);
        }
      };

      useEffect(() => {
        const handleKeyDown = (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();
            if (['ControlLeft', 'AltLeft', 'KeyC'].includes(e.code)) e.preventDefault();
            stateRef.current.keys[e.code] = true;
            const st = stateRef.current;
            if (st.active && st.shape && !questionModal && !kickPlayer) {
                if ((e.code === 'Space' || e.key === ' ') && st.shieldCharges > 0 && st.shieldActiveTime <= 0) {
                    st.shieldCharges -= 1; st.shieldActiveTime = 8000;
                    st.feedback = { text: t('g_shield_on'), type: 'success' }; st.feedbackTimer = 1500;
                }
                if ((e.code === 'KeyC' || e.key.toLowerCase() === 'c') && st.freezeCharges > 0 && st.freezeActiveTime <= 0) {
                    st.freezeCharges -= 1; st.freezeActiveTime = 5000;
                    st.feedback = { text: t('g_freeze_on'), type: 'success' }; st.feedbackTimer = 1500;
                }
                if (e.code === 'ControlLeft' || e.key === 'Control') {
                    st.pShots.push({ id: Math.random(), x: st.shape.x, y: st.shape.y, dir: -1, binId: st.shape.binId });
                } else if (e.code === 'AltLeft' || e.key === 'Alt') {
                    st.pShots.push({ id: Math.random(), x: st.shape.x, y: st.shape.y, dir: 1, binId: st.shape.binId });
                }
            }
        };
        const handleKeyUp = (e) => { stateRef.current.keys[e.code] = false; };
        window.addEventListener('keydown', handleKeyDown, { passive: false }); window.addEventListener('keyup', handleKeyUp);
        return () => { window.removeEventListener('keydown', handleKeyDown); window.removeEventListener('keyup', handleKeyUp); };
      }, [questionModal, kickPlayer, t]);

      useEffect(() => {
        let rafId; let lastTime = performance.now();
        const tick = (now) => {
            rafId = requestAnimationFrame(tick);
            const dt = now - lastTime; lastTime = now; const st = stateRef.current;
            if (dt > 100 || !st.active || questionModal || kickPlayer) return;

            if (st.score >= st.nextFreezeScore) {
                st.nextFreezeScore += 5000;
                const MILES = getMilestoneQuestions();
                setQuestionModal({ ...MILES[Math.floor(Math.random() * MILES.length)], reward: 'freeze' });
                st.keys = {}; return;
            } else if (st.score >= st.nextShieldScore) {
                st.nextShieldScore += 2000;
                const MILES = getMilestoneQuestions();
                setQuestionModal({ ...MILES[Math.floor(Math.random() * MILES.length)], reward: 'shield' });
                st.keys = {}; return;
            }

            if (st.shieldActiveTime > 0) st.shieldActiveTime -= dt;
            if (st.freezeActiveTime > 0) st.freezeActiveTime -= dt;

            if (st.shape) {
                let dx = 0, dy = 0.08 * (dt / 16); 
                if (st.keys['ArrowLeft']) dx -= 0.4 * (dt / 16); 
                if (st.keys['ArrowRight']) dx += 0.4 * (dt / 16); 
                if (st.keys['ArrowUp']) dy -= 0.6 * (dt / 16); 
                if (st.keys['ArrowDown']) dy += 0.4 * (dt / 16); 

                st.shape.x += dx; st.shape.y += dy;
                st.shape.x = Math.max(2, Math.min(98, st.shape.x)); 
                st.shape.y = Math.max(0, st.shape.y); 

                if (st.shape.y >= 295) {
                    const binIndex = Math.floor((st.shape.x / 100) * BINS.length);
                    const landedBin = Math.min(BINS.length - 1, Math.max(0, binIndex));
                    if (st.shape.binId === landedBin) {
                        st.score += 100; st.feedback = { text: `${t('g_ok')} +100`, type: 'success' };
                    } else {
                        st.score = Math.max(0, st.score - 25); st.feedback = { text: `${t('g_err')} -25`, type: 'error' };
                    }
                    st.feedbackTimer = 1000; st.shape = spawnShape();
                }
            }

            st.pShots.forEach(s => s.x += s.dir * 1.8 * (dt / 16));
            st.pShots = st.pShots.filter(s => s.x >= -10 && s.x <= 110 && !s.dead);

            st.enemies.forEach(enemy => {
                if (enemy.active && st.shape && Math.hypot(st.shape.x - enemy.x, st.shape.y - enemy.y) < 6) {
                    if (st.shieldActiveTime > 0) {
                        // El escudo absorbe
                    } else if (!enemy.hitCooldown) {
                        st.score = Math.max(0, st.score - 50); st.feedback = { text: `${t('g_crash')} -50`, type: 'error' };
                        st.feedbackTimer = 1000; st.shape = spawnShape(); enemy.hitCooldown = 2000;
                    }
                }
                if (enemy.hitCooldown > 0) enemy.hitCooldown -= dt;

                if (st.freezeActiveTime <= 0) {
                    if (enemy.state === 'troll') {
                        const targetX = enemy.side === 'left' ? 2 : 98;
                        enemy.x += (targetX - enemy.x) * 0.05;
                        enemy.timer += dt;
                        if (enemy.timer > 20000) { enemy.side = enemy.side === 'left' ? 'right' : 'left'; enemy.timer = 0; }
                        enemy.y = enemy.baseY + Math.sin(now / 1500 + enemy.id) * 25; 
                        enemy.fireTimer += dt;
                        let currentFireInterval = 1500;
                        if (st.difficulty === 'medio') currentFireInterval = 2000;
                        if (st.difficulty === 'facil') currentFireInterval = 3000;

                        if (enemy.fireTimer > currentFireInterval) { 
                            const spawnX = enemy.side === 'left' ? 4 : 96; const dir = enemy.side === 'left' ? 1 : -1;
                            if (enemy.level === 1) { st.eShots.push({ id: Math.random(), x: spawnX, y: enemy.y, dir, vy: 0, isFlower: false }); }
                            else if (enemy.level === 2) {
                                st.eShots.push({ id: Math.random(), x: spawnX, y: enemy.y, dir, vy: -0.4, isFlower: false });
                                st.eShots.push({ id: Math.random(), x: spawnX, y: enemy.y, dir, vy: 0.4, isFlower: false });
                            } else {
                                st.eShots.push({ id: Math.random(), x: spawnX, y: enemy.y, dir, vy: -0.6, isFlower: false });
                                st.eShots.push({ id: Math.random(), x: spawnX, y: enemy.y, dir, vy: 0, isFlower: false });
                                st.eShots.push({ id: Math.random(), x: spawnX, y: enemy.y, dir, vy: 0.6, isFlower: false });
                            }
                            enemy.fireTimer = 0;
                        }
                    } else if (enemy.state === 'smurf') {
                        enemy.smurfTimer -= dt;
                        enemy.x += Math.sin(now / 500 + enemy.id) * 0.15; enemy.y += Math.cos(now / 400 + enemy.id) * 0.15;
                        enemy.x = Math.max(10, Math.min(90, enemy.x));
                        if (enemy.smurfTimer <= 0) {
                            enemy.state = 'troll'; enemy.hp = 5; enemy.level = Math.min(3, enemy.level + 1);
                            enemy.side = Math.random() > 0.5 ? 'left' : 'right';
                            st.feedback = { text: t('g_troll_lvl').replace('{lvl}', enemy.level), type: 'error' }; st.feedbackTimer = 2000;
                        }
                    }
                }
            });

            let eSpeed = 0.45; 
            if (st.difficulty === 'medio') eSpeed = 0.22; 
            if (st.difficulty === 'facil') eSpeed = 0.12; 
            
            if (st.freezeActiveTime <= 0) {
                st.eShots.forEach(s => {
                    if (s.isFlower) { s.x += s.vx * (dt / 16); s.y += s.vy * (dt / 16); }
                    else { s.x += s.dir * eSpeed * (dt / 16); s.y += s.vy * eSpeed * (dt / 16); }
                });
            }
            st.eShots = st.eShots.filter(s => s.x >= -10 && s.x <= 110 && s.y >= -50 && s.y <= 350 && !s.dead);

            st.pShots.forEach(p => {
                st.eShots.forEach(e => {
                    if (!p.dead && !e.dead && !e.isFlower && Math.abs(p.x - e.x) < 5 && Math.abs(p.y - e.y) < 3) {
                        p.dead = true; e.isFlower = true;
                        e.flowerEmoji = ['🌸', '🌼', '🌻', '🌺', '🌷'][Math.floor(Math.random()*5)];
                        e.vx = (Math.random() - 0.5) * 0.5; e.vy = -0.3 - Math.random() * 0.4;
                        st.score += 20; 
                    }
                });
            });

            st.enemies.forEach(enemy => {
                if (enemy.state === 'troll') {
                    st.pShots.forEach(p => {
                        if (!p.dead && Math.abs(p.x - enemy.x) < 5 && Math.abs(p.y - enemy.y) < 6) {
                            p.dead = true; enemy.hp -= 1;
                            if (enemy.hp <= 0) {
                                enemy.state = 'smurf'; enemy.smurfTimer = 6000; st.score += 300 * enemy.level;
                                st.feedback = { text: `${t('g_troll_tf')} +${300 * enemy.level}`, type: 'success' }; st.feedbackTimer = 1000;
                            }
                        }
                    });
                }
            });

            if (st.shape) {
                st.eShots.forEach(e => {
                    if (!e.dead && !e.isFlower && Math.hypot(st.shape.x - e.x, st.shape.y - e.y) < 4) {
                        e.dead = true;
                        if (st.shieldActiveTime > 0) { st.score += 10; }
                        else {
                            st.score = Math.max(0, st.score - 50); st.feedback = { text: `${t('g_fire')} -50`, type: 'error' };
                            st.feedbackTimer = 1000; st.shape = spawnShape(); 
                        }
                    }
                });
            }

            if (st.feedbackTimer > 0) { st.feedbackTimer -= dt; if (st.feedbackTimer <= 0) st.feedback = null; }
            forceRender();
        };

        rafId = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafId);
      }, [questionModal, kickPlayer, t]);

      const st = stateRef.current;
      const cameraY = Math.max(0, Math.min(200, (st.shape?.y || 0) - 30));

      return (
        <div className="fixed inset-0 z-[100] animate-fade-in flex flex-col bg-slate-900 overflow-hidden font-sans">
          <style>
            {`@keyframes anarchicDance { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 10% { transform: translate(30vw, -20vh) scale(1.5) rotate(45deg); } 20% { transform: translate(-30vw, 30vh) scale(0.8) rotate(-45deg); } 30% { transform: translate(40vw, 40vh) scale(2) rotate(120deg); } 40% { transform: translate(-20vw, -40vh) scale(1.2) rotate(-90deg); } 50% { transform: translate(20vw, 10vh) scale(0.5) rotate(180deg); } 60% { transform: translate(-40vw, 20vh) scale(1.8) rotate(-180deg); } 70% { transform: translate(10vw, -30vh) scale(1.1) rotate(60deg); } 80% { transform: translate(30vw, 30vh) scale(1.4) rotate(-60deg); } 90% { transform: translate(-10vw, -10vh) scale(0.7) rotate(90deg); } 100% { transform: translate(0, 0) scale(1) rotate(0deg); } } @keyframes crazySpin { 0% { transform: translate(0, 0) scale(1.5) rotate(0deg); opacity: 1; } 80% { transform: translate(0, 0) scale(0.5) rotate(2160deg); opacity: 1; } 100% { transform: translate(0, 0) scale(0.1) rotate(2880deg); opacity: 0; } } .capybara-dance { animation: anarchicDance 7s cubic-bezier(0.25, 0.1, 0.25, 1) infinite; } .capybara-spin { animation: crazySpin 3s cubic-bezier(0.5, 0, 0.5, 1) forwards; }`}
          </style>

          {capybaraState !== 'none' && (
            <div className="fixed inset-0 pointer-events-none z-[300] flex items-center justify-center overflow-hidden">
              <div className={`text-[150px] md:text-[250px] drop-shadow-2xl ${capybaraState === 'dancing' ? 'capybara-dance' : 'capybara-spin'}`}>🦫</div>
            </div>
          )}

          <div className="flex justify-between items-center w-full px-4 md:px-8 py-4 bg-slate-800 border-b-4 border-slate-700 shrink-0 shadow-lg z-50">
            <div className="flex items-center gap-4">
               <button onClick={onBack} className="bg-sky-500 text-white px-5 py-2 md:py-3 rounded-xl font-bold hover:bg-sky-600 transition-all flex items-center gap-2 shadow-md">
                  <ArrowLeft size={24} /> <span className="hidden sm:inline text-lg">{t('back')}</span>
               </button>
               <h2 className="text-2xl md:text-3xl font-extrabold text-sky-400 hidden lg:block drop-shadow-md">{t('g_tit')}</h2>
            </div>
            <div className="text-slate-300 font-medium hidden md:flex items-center gap-4 bg-slate-700/50 px-4 py-2 rounded-lg border border-slate-600 shadow-inner text-sm xl:text-base">
               <span>{t('g_mov')} <kbd className="bg-slate-900 px-2 py-1 rounded text-sky-300 border border-slate-600 shadow-inner">↕↔</kbd></span>
               <span>{t('g_sht')} <kbd className="bg-slate-900 px-2 py-1 rounded text-cyan-400 border border-slate-600 shadow-inner">Ctrl / Alt</kbd></span>
               <span>{t('g_shd')} <kbd className="bg-slate-900 px-2 py-1 rounded text-green-400 border border-slate-600 shadow-inner">Esp</kbd></span>
               <span>{t('g_frz')} <kbd className="bg-slate-900 px-2 py-1 rounded text-blue-300 border border-slate-600 shadow-inner">C</kbd></span>
            </div>
            <div className="flex items-center gap-4 bg-indigo-600 px-6 py-2 md:py-3 rounded-xl border-2 border-indigo-400 shadow-md">
               <span className="text-xl md:text-3xl font-bold text-white tracking-wide">{t('g_pts')} {st.score}</span>
               {st.shieldCharges > 0 && (<span className="text-xl md:text-3xl font-bold text-green-300 ml-4 border-l-2 border-indigo-400 pl-4 animate-pulse">🛡️ x{st.shieldCharges}</span>)}
               {st.freezeCharges > 0 && (<span className="text-xl md:text-3xl font-bold text-cyan-300 ml-4 border-l-2 border-indigo-400 pl-4 animate-pulse">❄️ x{st.freezeCharges}</span>)}
            </div>
          </div>

          <div className="flex-1 relative w-full flex flex-col overflow-hidden">
            {!st.active && !kickPlayer && (
              <div className="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center z-[150] backdrop-blur-sm p-4">
                <h2 className="text-6xl font-extrabold text-white mb-6 drop-shadow-xl text-center">{t('g_def')}</h2>
                <div className="text-xl text-slate-200 mb-6 max-w-3xl text-center leading-relaxed bg-slate-800/80 p-6 rounded-3xl border-2 border-slate-600 shadow-2xl">
                  <p className="mb-4">🛸 {t('g_p1')}</p>
                  <p className="mb-4">🔫 {t('g_p2')}</p>
                  <p className="mb-4">🔥 {t('g_p3')}</p>
                  <p>🗑️ {t('g_p4')}</p>
                </div>
                <div className="flex gap-4 mb-8 bg-slate-800/80 p-4 rounded-2xl border-2 border-slate-600 shadow-xl">
                    <button onClick={() => setSelectedDifficulty('facil')} className={`px-6 py-3 rounded-xl font-bold text-2xl transition-all ${selectedDifficulty === 'facil' ? 'bg-green-500 text-white shadow-lg scale-110' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>👶 {t('g_ez')}</button>
                    <button onClick={() => setSelectedDifficulty('medio')} className={`px-6 py-3 rounded-xl font-bold text-2xl transition-all ${selectedDifficulty === 'medio' ? 'bg-yellow-500 text-white shadow-lg scale-110' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>🤓 {t('g_md')}</button>
                    <button onClick={() => setSelectedDifficulty('dificil')} className={`px-6 py-3 rounded-xl font-bold text-2xl transition-all ${selectedDifficulty === 'dificil' ? 'bg-red-500 text-white shadow-lg scale-110' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>🔥 {t('g_hd')}</button>
                </div>
                <button onClick={startGame} className="bg-green-500 text-white text-4xl font-bold py-6 px-16 rounded-full shadow-2xl hover:bg-green-600 hover:scale-105 active:scale-95 transition-all flex items-center gap-4">
                  <PlayIcon fill="white" size={40} /> {t('g_start')}
                </button>
              </div>
            )}

            {kickPlayer && (
                <div className="absolute inset-0 bg-red-900/95 flex flex-col items-center justify-center z-[200] p-8 text-center backdrop-blur-md">
                    <h1 className="text-5xl md:text-7xl font-extrabold text-white mb-8 animate-shake">{t('g_go_tit')}</h1>
                    <p className="text-3xl md:text-5xl text-red-200 font-bold">{t('g_go_p1')}</p>
                    <p className="mt-8 text-xl text-red-400 animate-pulse">{t('g_go_p2')}</p>
                </div>
            )}

            {questionModal && (
                <div className="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center z-[150] p-4 backdrop-blur-sm">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-2xl w-full border-8 border-indigo-400 flex flex-col items-center animate-drop-in">
                        <h2 className="text-4xl font-extrabold text-indigo-700 mb-6 text-center">{t('g_q_tit')}</h2>
                        <div className="w-56 h-56 bg-slate-50 border-4 border-slate-200 rounded-3xl p-6 mb-8 shadow-inner flex justify-center items-center">
                            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-xl">{questionModal.svg}</svg>
                        </div>
                        <p className="text-2xl text-slate-700 font-bold mb-8 text-center">{questionModal.q}</p>
                        <div className="grid grid-cols-2 gap-4 w-full">
                            {questionModal.options.map((opt, i) => (
                                <button key={i} onClick={() => handleAnswer(i)} className="bg-indigo-100 border-b-4 border-indigo-300 hover:bg-indigo-500 hover:border-indigo-700 hover:text-white text-indigo-900 font-bold py-6 px-4 rounded-2xl text-xl sm:text-2xl transition-all shadow-md active:translate-y-1 active:border-b-0">{opt}</button>
                            ))}
                        </div>
                    </div>
                </div>
            )}

            {st.feedback && (
              <div className={`absolute top-1/4 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-2xl sm:text-4xl font-extrabold z-50 px-10 py-6 rounded-3xl shadow-2xl animate-bounce border-4 ${st.feedback.type === 'success' ? 'bg-green-400 text-white border-green-200' : 'bg-red-500 text-white border-red-200'}`}>
                {st.feedback.text}
              </div>
            )}

            <div className="flex-1 relative w-full overflow-hidden bg-gradient-to-b from-sky-400 to-sky-200">
                {st.freezeActiveTime > 0 && (
                    <div className="absolute inset-0 z-[5] pointer-events-none bg-blue-300/20 border-[12px] border-cyan-200/50 shadow-[inset_0_0_100px_rgba(165,243,252,0.6)] flex justify-center items-center">
                        <div className="text-[15rem] opacity-20 animate-pulse mix-blend-overlay">❄️</div>
                    </div>
                )}

                {CLOUDS.map((cloud, i) => (
                    <div key={i} className="absolute pointer-events-none" style={{ left: `${cloud.x}%`, top: `${cloud.y - cameraY}%`, fontSize: `${cloud.size}rem`, opacity: cloud.opacity, filter: 'blur(2px)' }}>☁️</div>
                ))}

                {st.enemies?.map(enemy => (
                    <div key={enemy.id} className="absolute z-10 transition-all duration-[80ms] ease-out pointer-events-none flex items-center justify-center" style={{ left: `${enemy.x}%`, top: `${enemy.y - cameraY}%`, transform: `translate(-50%, -50%) ${enemy.side === 'left' ? 'scaleX(1)' : 'scaleX(-1)'}`, fontSize: enemy.state === 'smurf' ? '4rem' : '5rem', opacity: 1, filter: enemy.state === 'troll' ? `drop-shadow(0 0 15px rgba(239, 68, 68, 0.8)) sepia(${100 - enemy.hp * 20}%) hue-rotate(-${(5 - enemy.hp) * 15}deg)` : 'drop-shadow(0 0 10px rgba(59, 130, 246, 0.8))' }}>
                        {enemy.state === 'troll' ? (
                            <div className="relative flex flex-col items-center justify-center">
                                <span>👹</span>
                                {enemy.level > 1 && (<span className="absolute -bottom-6 text-xl font-bold text-white bg-red-600 rounded-full px-3 py-1 border-2 border-white drop-shadow-md whitespace-nowrap" style={{ transform: enemy.side === 'left' ? 'scaleX(1)' : 'scaleX(-1)' }}>Nivel {enemy.level}</span>)}
                                {enemy.hp <= 4 && <span className="absolute -top-2 right-0 text-3xl opacity-80 animate-pulse">❄️</span>}
                                {enemy.hp <= 2 && <span className="absolute bottom-4 left-0 text-4xl animate-pulse">🥶</span>}
                                {enemy.hp === 1 && <span className="absolute top-2 left-4 text-5xl animate-bounce">🧊</span>}
                            </div>
                        ) : (
                            <div className="relative flex flex-col items-center justify-center animate-bounce">
                                <span>🧞‍♂️</span>
                                <span className="absolute -bottom-6 text-sm font-bold text-sky-900 bg-sky-200 rounded-full px-2 py-1 whitespace-nowrap shadow-lg border-2 border-sky-400" style={{ transform: enemy.side === 'left' ? 'scaleX(1)' : 'scaleX(-1)' }}>Pacífico</span>
                            </div>
                        )}
                    </div>
                ))}

                {st.eShots.map(shot => (
                    <div key={shot.id} className={`absolute z-10 pointer-events-none ${shot.isFlower ? 'animate-spin' : ''}`} style={{ left: `${shot.x}%`, top: `${shot.y - cameraY}%`, transform: `translate(-50%, -50%) ${shot.dir === 1 ? 'scaleX(-1)' : 'scaleX(1)'}`, fontSize: shot.isFlower ? '2.5rem' : '3rem', filter: shot.isFlower ? 'drop-shadow(0 0 5px rgba(255, 255, 255, 0.8))' : 'drop-shadow(0 0 10px rgba(245, 158, 11, 0.8))', animationDuration: '3s' }}>
                        {shot.isFlower ? shot.flowerEmoji : '🔥'}
                    </div>
                ))}

                {st.pShots.map(shot => (
                    <div key={shot.id} className="absolute z-20 pointer-events-none" style={{ left: `${shot.x}%`, top: `${shot.y - cameraY}%`, transform: `translate(-50%, -50%) ${shot.dir === 1 ? 'scaleX(1)' : 'scaleX(-1)'}`, opacity: 0.95 }}>
                        <div className="w-20 sm:w-32 h-6 sm:h-8 bg-cyan-100 rounded-full border-4 border-cyan-300 shadow-[0_0_20px_rgba(34,211,238,0.9)] flex items-center justify-around overflow-hidden px-1">
                            <div className="w-4 h-4 bg-white rounded-full opacity-90 animate-bounce" style={{animationDelay: '0ms'}}></div>
                            <div className="w-3 h-3 bg-cyan-50 rounded-full opacity-80 animate-bounce" style={{animationDelay: '100ms'}}></div>
                            <div className="w-5 h-5 bg-white rounded-full opacity-90 animate-bounce" style={{animationDelay: '200ms'}}></div>
                            <div className="w-2 h-2 bg-cyan-50 rounded-full opacity-80 animate-bounce" style={{animationDelay: '150ms'}}></div>
                            <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white to-transparent opacity-50 animate-pulse"></div>
                        </div>
                    </div>
                ))}

                {st.shape && st.active && !kickPlayer && (
                    <div className="absolute z-30 pointer-events-none" style={{ left: `${st.shape.x}%`, top: `${st.shape.y - cameraY}%`, width: `${100 / BINS.length}%`, transform: 'translate(-50%, -50%)', filter: 'drop-shadow(0 10px 15px rgba(0,0,0,0.3))' }}>
                        {st.shieldActiveTime > 0 && (
                            <div className="absolute inset-[-40%] bg-green-400/40 rounded-full border-4 border-green-300 animate-pulse shadow-[0_0_25px_rgba(74,222,128,0.8)] z-[-1]"></div>
                        )}
                        <svg viewBox="0 0 60 60" className="w-full relative z-10" style={{ color: BINS[st.shape.binId].color }}>
                            {BINS[st.shape.binId].shape}
                        </svg>
                    </div>
                )}
            </div>

            {/* BASES RECEPTORAS (FIJAS ABAJO) */}
            <div 
              className="w-full grid h-28 sm:h-36 md:h-48 border-t-[12px] border-slate-700 bg-slate-800 z-40 shrink-0 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]"
              style={{ gridTemplateColumns: `repeat(${BINS.length}, minmax(0, 1fr))` }}
            >
              {BINS.map((bin, i) => (
                <div key={i} className="border-r border-slate-600 flex flex-col items-center justify-center p-1 hover:bg-slate-700 transition-colors min-w-0">
                  <span className="text-[9px] sm:text-[11px] md:text-sm lg:text-lg font-bold text-center text-white leading-tight whitespace-pre-wrap break-words w-full">
                    {bin.name}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    /* --- INICIO DE LA APLICACIÓN --- */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
