                                                <label htmlFor="toggle-frac" className="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer" style={useFractions ? { backgroundColor: '#a855f7' } : {}}></label>
                                            </div>
                                            <label htmlFor="toggle-frac" className={`font-bold text-sm lg:text-base cursor-pointer whitespace-nowrap ${useFractions ? 'text-purple-700' : 'text-gray-500'}`}>
                                                Fracciones
                                            </label>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="flex bg-gray-100 p-2 rounded-2xl gap-2">
                                <button onClick={() => { setMode('auto'); setAutoSolveCount(0); }} className={`px-6 py-2 text-xl lg:text-2xl whitespace-nowrap ${mode === 'auto' ? activeClasses : inactiveClasses}`}>Auto</button>
                                <button onClick={() => { setMode('manual'); setAutoSolveCount(0); }} className={`px-6 py-2 text-xl lg:text-2xl whitespace-nowrap ${mode === 'manual' ? activeClasses : inactiveClasses}`}>Manual</button>
                            </div>
                        </div>

                        </div>
                    </div>

                    <main className="min-h-[500px] flex items-center sm:items-start lg:items-center justify-center pt-2 pb-8 overflow-auto relative z-10">
                        <div id="main-circle-container" className={`relative flex items-center justify-center p-12 md:p-24 w-fit h-fit min-w-[95vw] lg:min-w-[850px] min-h-[95vw] lg:min-h-[850px] border-[16px] sm:border-[24px] shadow-[inset_0_0_80px_rgba(0,0,0,0.8),0_20px_40px_rgba(0,0,0,0.4)] transition-transform duration-700 ease-in-out ${
                            mode === 'manual' ? 'bg-[#EAE0C8]' : 'bg-[#2A3B32]'
                        } ${
                            useFractions ? 'border-purple-500' :
                            operation === 'add' ? 'border-blue-500' :
                            operation === 'sub' ? 'border-red-500' :
                            operation === 'mul' ? 'border-[#D4AF37]' :
                            'border-[#C0C0C0]'
                        }`} style={{ borderRadius: '50%' }}>
                            
                            <div className="absolute inset-0 opacity-20 pointer-events-none" style={{ borderRadius: '50%', backgroundImage: 'url("data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.7%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E")'}}></div>
                            
                            <div className="z-10 flex items-center justify-center max-w-full">
                                <div className="transform scale-[0.60] sm:scale-75 md:scale-90 lg:scale-100 origin-center transition-transform flex items-center justify-center">
                                    {useFractions ? (
                                        <FractionBoard key={`frac-${operation}-${refreshKey}`} operation={operation} isManual={mode === 'manual'} onNext={nextOperation} autoSolve={autoSolveCount} onSetupModeChange={(isSetup) => setShiftMainCircle(!isSetup && (operation === 'add' || operation === 'sub'))} />
                                    ) : (
                                        <React.Fragment>
                                            {operation === 'add' && <AdditionBoard key={`add-${refreshKey}`} config={config} isManual={mode === 'manual'} onNext={nextOperation} autoSolve={autoSolveCount} useDecimals={useDecimals} level={level} />}
                                            {operation === 'sub' && <SubtractionBoard key={`sub-${refreshKey}`} config={config} isManual={mode === 'manual'} onNext={nextOperation} autoSolve={autoSolveCount} useDecimals={useDecimals} level={level} />}
                                            {operation === 'mul' && <MultiplicationBoard key={`mul-${refreshKey}`} config={config} isManual={mode === 'manual'} onNext={nextOperation} autoSolve={autoSolveCount} useDecimals={useDecimals} level={level} />}
                                            {operation === 'div' && <DivisionBoard key={`div-${refreshKey}`} config={config} isManual={mode === 'manual'} onNext={nextOperation} autoSolve={autoSolveCount} useDecimals={useDecimals} level={level} />}
                                        </React.Fragment>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>

                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
