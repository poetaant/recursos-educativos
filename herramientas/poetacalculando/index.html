<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máquina de Operaciones</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Estilos adicionales para ocultar las flechas de los input de tipo número */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS SVG (Reemplazo de lucide-react para un solo archivo) ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Check = ({ className }) => <Icon className={className}><polyline points="20 6 9 17 4 12"></polyline></Icon>;
        const CheckCircle2 = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></Icon>;
        const ChevronRight = ({ className }) => <Icon className={className}><polyline points="9 18 15 12 9 6"></polyline></Icon>;
        const ArrowDown = ({ className }) => <Icon className={className}><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></Icon>;
        const HelpCircle = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></Icon>;

        // --- UTILS & MATH GENERATORS ---
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const generateNumber = (digits) => {
            if (digits === 1) return randomInt(1, 9);
            const min = Math.pow(10, digits - 1);
            const max = Math.pow(10, digits) - 1;
            return randomInt(min, max);
        };

        // --- COMPONENTS ---

        // Generic single digit input box
        const DigitInput = ({ value, onChange, className = "", isSmall = false, readOnly = false, id, isHelped = false }) => {
            return (
                <input
                id={id}
                type="text"
                maxLength={1}
                value={value}
                onChange={(e) => {
                    const val = e.target.value.replace(/[^0-9]/g, '');
                    onChange(val);
                    // Auto-focus next if typed
                    if (val !== '' && id) {
                    const parts = id.split('-');
                    const nextId = `${parts[0]}-${parts[1]}-${parseInt(parts[2]) + 1}`;
                    const nextEl = document.getElementById(nextId);
                    if (nextEl) nextEl.focus();
                    }
                }}
                readOnly={readOnly}
                className={`text-center font-mono border-2 rounded-md focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-colors
                    ${isSmall ? 'w-6 h-8 text-sm' : 'w-10 h-12 text-2xl'} 
                    ${isHelped ? 'animate-pulse !bg-green-200 !text-green-800 !border-green-500 font-bold' : readOnly ? 'bg-gray-100 border-gray-300' : 'bg-white border-blue-300'}
                    ${className}`}
                />
            );
        };

        // --- OPERATION BOARDS ---

        const AdditionBoard = ({ config, isManual, onNext }) => {
            const [addends, setAddends] = useState([]);
            const [setupMode, setSetupMode] = useState(isManual);
            const [inputs, setInputs] = useState({});
            const [carries, setCarries] = useState({});
            const [helpedFields, setHelpedFields] = useState({});
            const [status, setStatus] = useState('playing'); 

            useEffect(() => {
                if (!isManual) {
                const newAddends = [];
                for (let i = 0; i < config.numAddends; i++) {
                    const digits = i === 0 ? config.maxDigits : randomInt(1, config.maxDigits);
                    newAddends.push(generateNumber(digits));
                }
                setAddends(newAddends);
                resetState();
                } else {
                setAddends(Array(config.numAddends).fill(''));
                setSetupMode(true);
                resetState();
                }
            }, [config, isManual]);

            const resetState = () => {
                if (!isManual) setSetupMode(false);
                setInputs({});
                setCarries({});
                setHelpedFields({});
                setStatus('playing');
            }

            const maxLen = Math.max(...addends.map(a => String(a).length), 1);
            const cols = maxLen + 1; 

            const handleHelp = () => {
                let currentCarry = 0;
                const expectedSum = addends.reduce((acc, curr) => acc + parseInt(curr || 0, 10), 0);
                const expectedStr = String(expectedSum);
                const requiredPadding = cols - expectedStr.length;

                // Procesamos de derecha a izquierda columna por columna
                for (let cIndex = cols - 2; cIndex >= 0; cIndex--) {
                
                // 1. Si hay llevada generada, la colocamos arriba de esta columna primero
                if (currentCarry > 0) {
                    const carryKey = `c-${cIndex}`;
                    if (carries[carryKey] !== String(currentCarry)) {
                    setCarries(prev => ({...prev, [carryKey]: String(currentCarry)}));
                    setHelpedFields(prev => ({...prev, [carryKey]: true}));
                    return;
                    }
                }

                // Calculamos la suma de esta columna más la llevada
                let colSum = currentCarry;
                addends.forEach(addend => {
                    const numStr = String(addend);
                    const padding = cols - numStr.length;
                    const charIdx = (cIndex + 1) - padding;
                    if (charIdx >= 0 && charIdx < numStr.length) {
                    colSum += parseInt(numStr[charIdx], 10);
                    }
                });

                const expectedResDigit = String(colSum % 10);
                const nextCarry = Math.floor(colSum / 10);

                const actualCol = cIndex + 1;
                
                // 2. Comprobamos el resultado de la columna
                if (actualCol >= requiredPadding) {
                    const resKey = `res-${cIndex + 1}`;
                    if (inputs[resKey] !== expectedResDigit) {
                    setInputs(prev => ({...prev, [resKey]: expectedResDigit}));
                    setHelpedFields(prev => ({...prev, [resKey]: true}));
                    return;
                    }
                }

                currentCarry = nextCarry;
                }
            };

            const checkResult = () => {
                const sum = addends.reduce((acc, curr) => acc + parseInt(curr || 0, 10), 0);
                const expectedStr = String(sum);
                let userStr = '';
                for (let i = cols - 1; i >= cols - expectedStr.length; i--) {
                userStr = (inputs[`res-${i}`] || '0') + userStr;
                }
                if (parseInt(userStr, 10) === sum) setStatus('correct');
                else setStatus('incorrect');
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-4">
                    <h3 className="text-xl font-bold text-gray-700">Introduce los sumandos</h3>
                    {addends.map((a, i) => (
                    <div key={i} className="flex items-center space-x-2">
                        <span className="font-bold w-24">Sumando {i + 1}:</span>
                        <input 
                        type="number" 
                        className="border-2 border-blue-300 rounded p-2 text-xl font-mono w-48"
                        value={a}
                        onChange={(e) => {
                            const newAddends = [...addends];
                            newAddends[i] = e.target.value;
                            setAddends(newAddends);
                        }}
                        />
                    </div>
                    ))}
                    <button 
                    onClick={() => {
                        if (addends.every(a => String(a).trim() !== '')) setSetupMode(false);
                    }}
                    className="bg-blue-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-600 flex items-center"
                    >
                    <Check className="mr-2" /> Comenzar Suma
                    </button>
                </div>
                );
            }

            return (
                <div className="flex flex-col items-center">
                <div className="bg-white p-8 rounded-xl shadow-lg border-2 border-blue-100 relative">
                    <div className="grid gap-2" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                    {/* Carries Row */}
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, i) => (
                        <div key={`carry-${i}`} className="flex justify-center mb-2">
                        <DigitInput
                            isSmall
                            value={carries[`c-${i}`] || ''}
                            onChange={(v) => setCarries({ ...carries, [`c-${i}`]: v })}
                            className="bg-yellow-50 border-yellow-300 text-yellow-700"
                            isHelped={helpedFields[`c-${i}`]}
                        />
                        </div>
                    ))}

                    {/* Addends */}
                    {addends.map((addend, rIndex) => {
                        const numStr = String(addend);
                        const padding = cols - numStr.length;
                        return (
                        <React.Fragment key={`row-${rIndex}`}>
                            <div className="flex items-center justify-center font-bold text-2xl text-blue-500">
                            {rIndex === addends.length - 1 ? '+' : ''}
                            </div>
                            {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                            const actualCol = cIndex + 1;
                            const charIdx = actualCol - padding;
                            const char = charIdx >= 0 && charIdx < numStr.length ? numStr[charIdx] : '';
                            return (
                                <div key={`c-${rIndex}-${cIndex}`} className="flex justify-center">
                                <div className="w-10 h-12 flex items-center justify-center text-3xl font-mono">
                                    {char}
                                </div>
                                </div>
                            );
                            })}
                        </React.Fragment>
                        );
                    })}

                    {/* Divider */}
                    <div className={`col-span-${cols} border-b-4 border-black my-2`}></div>

                    {/* Result Row */}
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, i) => (
                        <div key={`res-${i}`} className="flex justify-center">
                        <DigitInput
                            id={`add-res-${i}`}
                            value={inputs[`res-${i+1}`] || ''}
                            onChange={(v) => setInputs({ ...inputs, [`res-${i+1}`]: v })}
                            className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : ''}
                            isHelped={helpedFields[`res-${i+1}`]}
                        />
                        </div>
                    ))}
                    </div>
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 flex items-center shadow-md">
                    <CheckCircle2 className="mr-2" /> Comprobar
                    </button>
                    <button onClick={onNext} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 flex items-center shadow-md">
                    Siguiente <ChevronRight className="ml-2" />
                    </button>
                </div>
                
                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡Correcto! ¡Muy bien!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Hay un error, revisa la operación.</p>}
                </div>
            );
        };

        const SubtractionBoard = ({ config, isManual, onNext }) => {
            const [minuend, setMinuend] = useState('');
            const [subtrahend, setSubtrahend] = useState('');
            const [setupMode, setSetupMode] = useState(isManual);
            const [inputs, setInputs] = useState({});
            const [carries, setCarries] = useState({});
            const [helpedFields, setHelpedFields] = useState({});
            const [status, setStatus] = useState('playing');

            useEffect(() => {
                if (!isManual) {
                let m = generateNumber(config.digitsMin);
                let s = generateNumber(config.digitsSub);
                if (s > m) [m, s] = [s, m];
                setMinuend(String(m));
                setSubtrahend(String(s));
                resetState();
                } else {
                setMinuend('');
                setSubtrahend('');
                setSetupMode(true);
                resetState();
                }
            }, [config, isManual]);

            const resetState = () => {
                if (!isManual) setSetupMode(false);
                setInputs({});
                setCarries({});
                setHelpedFields({});
                setStatus('playing');
            };

            const cols = Math.max(minuend.length, subtrahend.length) + 1;

            const handleHelp = () => {
                let currentCarry = 0;
                const expectedStr = String(parseInt(minuend || 0) - parseInt(subtrahend || 0));
                const requiredPadding = cols - expectedStr.length;

                for (let cIndex = cols - 2; cIndex >= 0; cIndex--) {
                
                // 1. Ayudar primero con la llevada abajo si hay una arrastrada
                if (currentCarry > 0) {
                    const carryKey = `c-${cIndex}`;
                    if (carries[carryKey] !== String(currentCarry)) {
                        setCarries(prev => ({...prev, [carryKey]: String(currentCarry)}));
                        setHelpedFields(prev => ({...prev, [carryKey]: true}));
                        return;
                    }
                }

                const actualCol = cIndex + 1;
                const paddingM = cols - minuend.length;
                const charIdxM = actualCol - paddingM;
                const topDigit = charIdxM >= 0 && charIdxM < minuend.length ? parseInt(minuend[charIdxM], 10) : 0;
                
                const paddingS = cols - subtrahend.length;
                const charIdxS = actualCol - paddingS;
                const botDigitBase = charIdxS >= 0 && charIdxS < subtrahend.length ? parseInt(subtrahend[charIdxS], 10) : 0;
                
                const bottomDigit = botDigitBase + currentCarry;
                
                let resDigit = topDigit - bottomDigit;
                let nextCarry = 0;
                if (resDigit < 0) {
                    resDigit += 10;
                    nextCarry = 1;
                }
                
                // 2. Ayudar rellenando el resultado de esta columna si hace falta
                if (actualCol >= requiredPadding) {
                    const resKey = `res-${cIndex + 1}`;
                    if (inputs[resKey] !== String(resDigit)) {
                        setInputs(prev => ({...prev, [resKey]: String(resDigit)}));
                        setHelpedFields(prev => ({...prev, [resKey]: true}));
                        return;
                    }
                }
                
                currentCarry = nextCarry;
                }
            };

            const checkResult = () => {
                const res = parseInt(minuend) - parseInt(subtrahend);
                const expectedStr = String(res);
                let userStr = '';
                for (let i = cols - 1; i >= cols - expectedStr.length; i--) {
                userStr = (inputs[`res-${i}`] || '0') + userStr;
                }
                if (parseInt(userStr, 10) === res) setStatus('correct');
                else setStatus('incorrect');
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-4">
                    <h3 className="text-xl font-bold text-gray-700">Introduce los números</h3>
                    <div className="flex items-center space-x-2">
                    <span className="font-bold w-32">Minuendo (arriba):</span>
                    <input type="number" className="border-2 border-blue-300 rounded p-2 text-xl font-mono w-48" value={minuend} onChange={(e) => setMinuend(e.target.value)} />
                    </div>
                    <div className="flex items-center space-x-2">
                    <span className="font-bold w-32">Sustraendo (abajo):</span>
                    <input type="number" className="border-2 border-blue-300 rounded p-2 text-xl font-mono w-48" value={subtrahend} onChange={(e) => setSubtrahend(e.target.value)} />
                    </div>
                    <button 
                    onClick={() => {
                        if (minuend && subtrahend && parseInt(minuend) >= parseInt(subtrahend)) setSetupMode(false);
                        else alert("Por favor, asegúrate de que el minuendo sea mayor o igual al sustraendo.");
                    }}
                    className="bg-blue-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-600 flex items-center"
                    >
                    <Check className="mr-2" /> Comenzar Resta
                    </button>
                </div>
                );
            }

            const renderRow = (numStr, isSubtrahend = false) => {
                const padding = cols - numStr.length;
                return (
                <React.Fragment>
                    <div className="flex items-center justify-center font-bold text-2xl text-red-500">
                    {isSubtrahend ? '-' : ''}
                    </div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                    const actualCol = cIndex + 1;
                    const charIdx = actualCol - padding;
                    const char = charIdx >= 0 && charIdx < numStr.length ? numStr[charIdx] : '';
                    return (
                        <div key={`c-${cIndex}`} className="flex flex-col items-center justify-center relative h-16">
                        <div className="text-3xl font-mono leading-none">{char}</div>
                        {isSubtrahend && charIdx >= -1 && charIdx < numStr.length && (
                            <div className="absolute -bottom-4 -left-2">
                            <DigitInput
                                isSmall
                                value={carries[`c-${cIndex}`] || ''}
                                onChange={(v) => setCarries({ ...carries, [`c-${cIndex}`]: v })}
                                className="bg-orange-50 border-orange-300 text-orange-700 text-xs w-5 h-6"
                                isHelped={helpedFields[`c-${cIndex}`]}
                            />
                            </div>
                        )}
                        </div>
                    );
                    })}
                </React.Fragment>
                );
            };

            return (
                <div className="flex flex-col items-center">
                <div className="bg-white p-8 pb-12 rounded-xl shadow-lg border-2 border-red-100">
                    <div className="grid gap-x-2 gap-y-4 items-end" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                    {renderRow(minuend, false)}
                    {renderRow(subtrahend, true)}

                    <div className={`col-span-${cols} border-b-4 border-black mt-4 mb-2`}></div>

                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, i) => (
                        <div key={`res-${i}`} className="flex justify-center">
                        <DigitInput
                            id={`sub-res-${i}`}
                            value={inputs[`res-${i+1}`] || ''}
                            onChange={(v) => setInputs({ ...inputs, [`res-${i+1}`]: v })}
                            className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : ''}
                            isHelped={helpedFields[`res-${i+1}`]}
                        />
                        </div>
                    ))}
                    </div>
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 shadow-md">
                    Comprobar
                    </button>
                    <button onClick={onNext} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 shadow-md">
                    Siguiente
                    </button>
                </div>
                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡Perfecto!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Revisa la resta y las llevadas.</p>}
                </div>
            );
        };

        const MultiplicationBoard = ({ config, isManual, onNext }) => {
            const [multiplicand, setMultiplicand] = useState('');
            const [multiplier, setMultiplier] = useState('');
            const [setupMode, setSetupMode] = useState(isManual);
            const [inputs, setInputs] = useState({});
            const [carries, setCarries] = useState({});
            const [helpedFields, setHelpedFields] = useState({});
            const [status, setStatus] = useState('playing');

            useEffect(() => {
                if (!isManual) setMinuendOrMul();
                else {
                setMultiplicand('');
                setMultiplier('');
                setSetupMode(true);
                resetState();
                }
            }, [config, isManual]);

            const setMinuendOrMul = () => {
                setMultiplicand(String(generateNumber(config.digitsMultiplicand)));
                setMultiplier(String(generateNumber(config.digitsMultiplier)));
                resetState();
            }

            const resetState = () => {
                if (!isManual) setSetupMode(false);
                setInputs({});
                setCarries({});
                setHelpedFields({});
                setStatus('playing');
            }

            const cols = multiplicand.length + multiplier.length + 1;
            const numPartials = multiplier.length;

            const clearCarries = () => setCarries({});

            const handleHelp = () => {
                const m1 = parseInt(multiplicand || 0);
                const m2Str = String(multiplier || 0);

                // Check partials first (from top to bottom, right to left)
                if (m2Str.length > 1) {
                for (let r = 0; r < m2Str.length; r++) {
                    const digit = parseInt(m2Str[m2Str.length - 1 - r]);
                    const pStr = String(m1 * digit);
                    for (let j = 0; j < pStr.length; j++) {
                    const c = (cols - 2 - r) - j;
                    const key = `p-${r}-${c}`;
                    const expectedChar = pStr[pStr.length - 1 - j];
                    if (inputs[key] !== expectedChar) {
                        setInputs(prev => ({...prev, [key]: expectedChar}));
                        setHelpedFields(prev => ({...prev, [key]: true}));
                        return;
                    }
                    }
                }
                }

                // Check final result
                const totalStr = String(m1 * parseInt(multiplier || 0));
                for(let j = 0; j < totalStr.length; j++){
                const key = `res-${cols - 1 - j}`; 
                const expectedChar = totalStr[totalStr.length - 1 - j];
                if (inputs[key] !== expectedChar) {
                    setInputs(prev => ({...prev, [key]: expectedChar}));
                    setHelpedFields(prev => ({...prev, [key]: true}));
                    return;
                }
                }
            };

            const checkResult = () => {
                const m1 = parseInt(multiplicand);
                const m2 = parseInt(multiplier);
                const expectedTotalStr = String(m1 * m2);
                
                let userTotalStr = '';
                for (let i = cols - 1; i >= cols - expectedTotalStr.length; i--) {
                userTotalStr = (inputs[`res-${i}`] || '0') + userTotalStr;
                }

                if (parseInt(userTotalStr, 10) === m1 * m2) setStatus('correct');
                else setStatus('incorrect');
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-4">
                    <h3 className="text-xl font-bold text-gray-700">Introduce los números</h3>
                    <div className="flex items-center space-x-2">
                    <span className="font-bold w-36">Multiplicando:</span>
                    <input type="number" className="border-2 border-purple-300 rounded p-2 text-xl font-mono w-48" value={multiplicand} onChange={(e) => setMultiplicand(e.target.value)} />
                    </div>
                    <div className="flex items-center space-x-2">
                    <span className="font-bold w-36">Multiplicador:</span>
                    <input type="number" className="border-2 border-purple-300 rounded p-2 text-xl font-mono w-48" value={multiplier} onChange={(e) => setMultiplier(e.target.value)} />
                    </div>
                    <button 
                    onClick={() => {
                        if (multiplicand && multiplier) {
                        setSetupMode(false);
                        resetState();
                        }
                    }}
                    className="bg-purple-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-purple-600 flex items-center"
                    >
                    <Check className="mr-2" /> Comenzar
                    </button>
                </div>
                );
            }

            const renderTopNumber = (numStr, sign) => {
                const padding = cols - numStr.length;
                return (
                <React.Fragment>
                    <div className="flex items-center justify-center font-bold text-2xl text-purple-500">
                    {sign}
                    </div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                    const actualCol = cIndex + 1;
                    const charIdx = actualCol - padding;
                    const char = charIdx >= 0 && charIdx < numStr.length ? numStr[charIdx] : '';
                    return (
                        <div key={`top-${cIndex}`} className="flex justify-center items-center h-12 text-3xl font-mono">
                        {char}
                        </div>
                    );
                    })}
                </React.Fragment>
                );
            };

            return (
                <div className="flex flex-col items-center">
                <div className="bg-white p-8 rounded-xl shadow-lg border-2 border-purple-100 relative">
                    <button 
                    onClick={clearCarries}
                    className="absolute top-2 right-2 text-xs bg-yellow-100 text-yellow-800 px-2 py-1 rounded hover:bg-yellow-200 border border-yellow-300"
                    >
                    Borrar Llevadas
                    </button>

                    <div className="grid gap-y-2 gap-x-1" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                    
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, i) => (
                        <div key={`carry-${i}`} className="flex justify-center mb-2">
                        <DigitInput
                            isSmall
                            value={carries[`c-${i}`] || ''}
                            onChange={(v) => setCarries({ ...carries, [`c-${i}`]: v })}
                            className="bg-yellow-50 border-yellow-300 text-yellow-700"
                        />
                        </div>
                    ))}

                    {renderTopNumber(multiplicand, '')}
                    {renderTopNumber(multiplier, '×')}

                    <div className={`col-span-${cols} border-b-4 border-black my-2`}></div>

                    {numPartials > 1 && Array.from({ length: numPartials }).map((_, rIndex) => (
                        <React.Fragment key={`partial-${rIndex}`}>
                        <div className="flex items-center justify-center font-bold text-2xl text-purple-500">
                            {rIndex === numPartials - 1 ? '+' : ''}
                        </div>
                        {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                            const isBlank = cIndex > (cols - 2 - rIndex);
                            if (isBlank) return <div key={`p-${rIndex}-${cIndex}`} className="w-10 h-12"></div>;
                            
                            return (
                            <div key={`p-${rIndex}-${cIndex}`} className="flex justify-center">
                                <DigitInput
                                id={`mul-p-${rIndex}-${cIndex}`}
                                value={inputs[`p-${rIndex}-${cIndex}`] || ''}
                                onChange={(v) => setInputs({ ...inputs, [`p-${rIndex}-${cIndex}`]: v })}
                                className="bg-blue-50 border-blue-200"
                                isHelped={helpedFields[`p-${rIndex}-${cIndex}`]}
                                />
                            </div>
                            );
                        })}
                        </React.Fragment>
                    ))}

                    {numPartials > 1 && <div className={`col-span-${cols} border-b-4 border-black my-2`}></div>}

                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, i) => (
                        <div key={`res-${i}`} className="flex justify-center">
                        <DigitInput
                            id={`mul-res-${i}`}
                            value={inputs[`res-${i+1}`] || ''}
                            onChange={(v) => setInputs({ ...inputs, [`res-${i+1}`]: v })}
                            className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : 'bg-gray-50 border-gray-300 font-bold'}
                            isHelped={helpedFields[`res-${i+1}`]}
                        />
                        </div>
                    ))}

                    </div>
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 shadow-md">
                    Comprobar
                    </button>
                    <button onClick={onNext} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 shadow-md">
                    Siguiente
                    </button>
                </div>
                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡Genial!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Comprueba tus multiplicaciones y la suma final.</p>}
                </div>
            );
        };


        // --- DIVISION COMPONENT ---
        const DivisionBoard = ({ config, isManual, onNext }) => {
            const [dividend, setDividend] = useState('');
            const [divisor, setDivisor] = useState('');
            const [setupMode, setSetupMode] = useState(isManual);
            
            const [arcLen, setArcLen] = useState(0);
            const [stepRows, setStepRows] = useState([]); 
            const [quotientInputs, setQuotientInputs] = useState([]); 
            const [status, setStatus] = useState('select_arc'); 
            const [showTableFor, setShowTableFor] = useState(null);
            const [helpedFields, setHelpedFields] = useState({});

            useEffect(() => {
                if (!isManual) {
                let D = generateNumber(config.digitsDividend);
                let d = generateNumber(config.digitsDivisor);
                if (d === 0) d = 1;
                if (D < d) [D, d] = [d, D];
                setDividend(String(D));
                setDivisor(String(d));
                resetBoard();
                } else {
                setDividend('');
                setDivisor('');
                setSetupMode(true);
                resetBoard();
                }
            }, [config, isManual]);

            const resetBoard = () => {
                setSetupMode(false);
                setArcLen(0);
                setStepRows([]);
                setQuotientInputs([]);
                setStatus('select_arc');
                setShowTableFor(null);
                setHelpedFields({});
            }

            const selectArc = (len) => {
                setArcLen(len);
                setStatus('playing');
                
                const newRows = [];
                const totalSteps = dividend.length - len + 1;
                for (let i = 0; i < totalSteps; i++) {
                newRows.push({
                    remainderInputs: {},
                    droppedChar: i > 0 ? dividend[len - 1 + i] : null,
                    dropColIndex: i > 0 ? len - 1 + i : null,
                });
                }
                setStepRows(newRows);
            };

            const handleRemainderChange = (rowIndex, colIndex, val) => {
                const newRows = [...stepRows];
                newRows[rowIndex].remainderInputs[colIndex] = val;
                setStepRows(newRows);
            };

            const handleQuotientChange = (idx, val) => {
                const newQ = [...quotientInputs];
                newQ[idx] = val;
                setQuotientInputs(newQ);
            };

            const getExpectedDivision = () => {
                if (arcLen === 0) return { expRem: {}, expQ: {} };
                const expRem = {};
                const expQ = {};
                const D = String(dividend);
                const d = parseInt(divisor);
                
                let currentVal = parseInt(D.substring(0, arcLen));
                
                for (let step = 0; step < D.length - arcLen + 1; step++) {
                const qDigit = Math.floor(currentVal / d);
                expQ[step] = String(qDigit);
                
                const rem = currentVal % d;
                const remStr = String(rem);
                
                for (let i = 0; i < remStr.length; i++) {
                    const c = (arcLen - 1 + step) - i;
                    expRem[`${step}-${c}`] = remStr[remStr.length - 1 - i];
                }
                if (step < D.length - arcLen) {
                    const dropCol = arcLen + step;
                    const dropChar = D[dropCol];
                    currentVal = parseInt(remStr + dropChar);
                }
                }
                return { expRem, expQ };
            };

            const handleHelp = () => {
                if (arcLen === 0) {
                let len = 1;
                while (parseInt(dividend.substring(0, len)) < parseInt(divisor) && len < dividend.length) len++;
                selectArc(len);
                return;
                }

                const { expRem, expQ } = getExpectedDivision();
                const totalSteps = dividend.length - arcLen + 1;

                for (let step = 0; step < totalSteps; step++) {
                if (quotientInputs[step] !== expQ[step]) {
                    handleQuotientChange(step, expQ[step]);
                    setHelpedFields(prev => ({...prev, [`q-${step}`]: true}));
                    return;
                }
                
                const rightmostC = arcLen - 1 + step;
                for (let c = rightmostC; c >= 0; c--) {
                    const expVal = expRem[`${step}-${c}`];
                    if (expVal !== undefined) {
                        const actualVal = stepRows[step]?.remainderInputs[c];
                        if (actualVal !== expVal) {
                            handleRemainderChange(step, c, expVal);
                            setHelpedFields(prev => ({...prev, [`rem-${step}-${c}`]: true}));
                            return;
                        }
                    }
                }

                if (step < totalSteps - 1) {
                    const dropCol = arcLen + step;
                    const expDrop = dividend[dropCol];
                    const actualVal = stepRows[step+1]?.remainderInputs[dropCol];
                    if (actualVal !== expDrop) {
                        handleRemainderChange(step+1, dropCol, expDrop);
                        setHelpedFields(prev => ({...prev, [`rem-${step+1}-${dropCol}`]: true}));
                        return;
                    }
                }
                }
            };

            const checkResult = () => {
                const expectedQ = String(Math.floor(parseInt(dividend) / parseInt(divisor)));
                const expectedRemStr = String(parseInt(dividend) % parseInt(divisor));

                const userQ = quotientInputs.join('');
                const lastRow = stepRows[stepRows.length - 1];

                const userRemStr = Object.keys(lastRow.remainderInputs)
                    .sort((a,b) => parseInt(a) - parseInt(b))
                    .map(k => lastRow.remainderInputs[k])
                    .join('');

                const isQCorrect = userQ === expectedQ;
                const isRemCorrect = userRemStr !== '' && parseInt(userRemStr) === parseInt(expectedRemStr);

                if (isQCorrect && isRemCorrect) setStatus('correct');
                else setStatus('incorrect');
            };

            const renderArc = () => {
                if (arcLen === 0) return null;
                const widthPerChar = 32; 
                const width = arcLen * widthPerChar;
                return (
                <svg className="absolute -top-3 left-0" width={width} height="16" style={{ pointerEvents: 'none' }}>
                    <path d={`M 4 12 Q ${width/2} -4 ${width-4} 12`} fill="none" stroke="#0d9488" strokeWidth="3" strokeLinecap="round"/>
                </svg>
                );
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-4">
                    <h3 className="text-xl font-bold text-gray-700">Introduce los números</h3>
                    <div className="flex items-center space-x-2">
                    <span className="font-bold w-36">Dividendo:</span>
                    <input type="number" className="border-2 border-teal-300 rounded p-2 text-xl font-mono w-48" value={dividend} onChange={(e) => setDividend(e.target.value)} />
                    </div>
                    <div className="flex items-center space-x-2">
                    <span className="font-bold w-36">Divisor:</span>
                    <input type="number" className="border-2 border-teal-300 rounded p-2 text-xl font-mono w-48" value={divisor} onChange={(e) => setDivisor(e.target.value)} />
                    </div>
                    <button 
                    onClick={() => {
                        if (dividend && divisor && parseInt(divisor) > 0) {
                        setSetupMode(false);
                        resetBoard();
                        } else alert("Números inválidos. Asegúrate de que el divisor no sea 0.");
                    }}
                    className="bg-teal-500 text-white px-6 py-2 rounded-lg font-bold hover:bg-teal-600 flex items-center"
                    >
                    <Check className="mr-2" /> Comenzar División
                    </button>
                </div>
                );
            }

            return (
                <div className="flex flex-col items-center">
                
                {status === 'select_arc' && (
                    <div className="mb-6 p-4 bg-teal-50 rounded-xl border border-teal-200 text-center animate-pulse">
                    <p className="font-bold text-teal-800 mb-2">¿Cuántas cifras coges para empezar?</p>
                    <div className="flex justify-center space-x-2">
                        {dividend.split('').map((_, i) => (
                        <button key={i} onClick={() => selectArc(i+1)} className="px-4 py-2 bg-white border-2 border-teal-500 rounded font-bold hover:bg-teal-500 hover:text-white">
                            {i + 1}
                        </button>
                        ))}
                    </div>
                    </div>
                )}

                <div className="flex items-start max-w-full">
                    <div className="bg-white p-8 rounded-xl shadow-lg border-2 border-teal-100 overflow-x-auto min-w-[300px]">
                    
                    <div className="flex items-start">
                        
                        <div className="flex flex-col items-end pr-4 relative">
                        
                        <div className="flex relative mb-2">
                            {renderArc()}
                            {dividend.split('').map((char, i) => (
                            <div key={i} className="w-8 h-10 flex items-center justify-center text-3xl font-mono font-bold tracking-widest relative">
                                {char}
                                {stepRows.some((r, rIdx) => rIdx > 0 && r.dropColIndex === i) && (
                                <ArrowDown className="absolute -bottom-6 text-orange-500 h-6 w-6 z-10" />
                                )}
                            </div>
                            ))}
                        </div>

                        {arcLen > 0 && stepRows.map((row, rIndex) => (
                            <div key={`rem-row-${rIndex}`} className="flex mt-1 relative">
                            
                            {Array.from({ length: dividend.length }).map((_, cIndex) => {
                                const maxActiveCol = arcLen - 1 + rIndex; 
                                
                                if (cIndex <= maxActiveCol) {
                                // CASILLA DE BAJADA MANUAL
                                if (row.droppedChar && cIndex === row.dropColIndex) {
                                    return (
                                    <div key={`rem-${rIndex}-${cIndex}`} className="w-8 h-10 ml-1 relative">
                                        <DigitInput
                                            isSmall
                                            readOnly={status === 'correct'}
                                            value={row.remainderInputs[cIndex] || ''}
                                            onChange={(v) => handleRemainderChange(rIndex, cIndex, v)}
                                            className={`w-full h-full text-xl font-bold border-blue-300 text-blue-600 bg-blue-50 focus:bg-blue-100 ${status === 'incorrect' ? 'border-red-300' : ''}`}
                                            isHelped={helpedFields[`rem-${rIndex}-${cIndex}`]}
                                        />
                                    </div>
                                    )
                                }

                                // CASILLA DE RESTO NORMAL
                                return (
                                    <div key={`rem-${rIndex}-${cIndex}`} className="w-8 h-10 ml-1 relative">
                                    <DigitInput
                                        isSmall
                                        readOnly={status === 'correct'}
                                        value={row.remainderInputs[cIndex] || ''}
                                        onChange={(v) => handleRemainderChange(rIndex, cIndex, v)}
                                        className={`w-full h-full text-xl border-gray-300 ${status === 'incorrect' ? 'border-red-300' : ''}`}
                                        isHelped={helpedFields[`rem-${rIndex}-${cIndex}`]}
                                    />
                                    </div>
                                );
                                }
                                
                                return <div key={`rem-${rIndex}-${cIndex}`} className="w-8 h-10 ml-1"></div>;
                            })}

                            {status === 'correct' && rIndex === stepRows.length - 1 && (
                                <svg className="absolute -bottom-5 right-0" width="30" height="15">
                                <path d="M 0 0 Q 15 15 30 0" fill="none" stroke="#16a34a" strokeWidth="3" strokeLinecap="round"/>
                                </svg>
                            )}
                            </div>
                        ))}

                        </div>

                        <div className="flex flex-col">
                        <div 
                            className="border-l-4 border-b-4 border-black pl-3 pb-2 flex cursor-pointer hover:bg-teal-50 transition-colors"
                            title="Pulsa para ver la tabla del divisor"
                            onClick={() => setShowTableFor(divisor)}
                        >
                            {divisor.split('').map((char, i) => (
                            <div key={i} className="w-6 flex items-center justify-center text-3xl font-mono font-bold tracking-widest pointer-events-none">{char}</div>
                            ))}
                        </div>
                        
                        <div className="pl-4 pt-2 flex space-x-1">
                            {arcLen > 0 && Array.from({ length: dividend.length - arcLen + 1 }).map((_, i) => (
                                <DigitInput
                                key={`q-${i}`}
                                isSmall
                                readOnly={status === 'correct'}
                                value={quotientInputs[i] || ''}
                                onChange={(v) => handleQuotientChange(i, v)}
                                className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : 'bg-teal-50'}
                                isHelped={helpedFields[`q-${i}`]}
                                />
                            ))}
                        </div>
                        </div>

                    </div>
                    </div>

                    {showTableFor && (
                    <div className="ml-8 p-5 bg-yellow-50 border-2 border-yellow-400 rounded-xl shadow-md min-w-[160px]">
                        <h4 className="font-bold text-center mb-3 border-b-2 border-yellow-300 pb-2 text-yellow-800">
                        Tabla del {showTableFor}
                        </h4>
                        <div className="space-y-1">
                        {Array.from({ length: 9 }).map((_, i) => (
                            <div key={i} className="font-mono text-lg text-yellow-900 flex justify-between">
                            <span>{showTableFor} × {i + 1}</span>
                            <span className="font-bold ml-2 text-yellow-700">= {parseInt(showTableFor) * (i + 1)}</span>
                            </div>
                        ))}
                        </div>
                        <button 
                        onClick={() => setShowTableFor(null)} 
                        className="mt-4 text-sm bg-red-100 text-red-600 px-3 py-2 rounded-lg hover:bg-red-200 w-full font-bold transition-colors"
                        >
                        Cerrar tabla
                        </button>
                    </div>
                    )}
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    {status === 'playing' || status === 'incorrect' ? (
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 shadow-md">
                        Comprobar Operación
                    </button>
                    ) : null}
                    <button onClick={onNext} className="bg-teal-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-teal-600 shadow-md">
                    Siguiente Operación
                    </button>
                </div>

                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡División completada correctamente!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Hay algún fallo en la operación. Revisa los restos o el cociente.</p>}
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [hasStarted, setHasStarted] = useState(false);
            const [operation, setOperation] = useState('add'); 
            const [mode, setMode] = useState('auto'); 
            const [level, setLevel] = useState(3);
            const [refreshKey, setRefreshKey] = useState(0);

            const getConfig = () => {
                switch(level) {
                case 1: return { numAddends: 2, maxDigits: 1, digitsMin: 1, digitsSub: 1, digitsMultiplicand: 1, digitsMultiplier: 1, digitsDividend: 2, digitsDivisor: 1 };
                case 2: return { numAddends: 2, maxDigits: 2, digitsMin: 2, digitsSub: 2, digitsMultiplicand: 2, digitsMultiplier: 1, digitsDividend: 3, digitsDivisor: 1 };
                case 3: return { numAddends: 3, maxDigits: 3, digitsMin: 3, digitsSub: 3, digitsMultiplicand: 3, digitsMultiplier: 1, digitsDividend: 3, digitsDivisor: 2 };
                case 4: return { numAddends: 3, maxDigits: 4, digitsMin: 4, digitsSub: 4, digitsMultiplicand: 3, digitsMultiplier: 2, digitsDividend: 4, digitsDivisor: 2 };
                case 5: return { numAddends: 4, maxDigits: 5, digitsMin: 5, digitsSub: 5, digitsMultiplicand: 4, digitsMultiplier: 3, digitsDividend: 5, digitsDivisor: 2 };
                case 6: return { numAddends: 4, maxDigits: 6, digitsMin: 6, digitsSub: 6, digitsMultiplicand: 4, digitsMultiplier: 3, digitsDividend: 5, digitsDivisor: 3 };
                default: return { numAddends: 2, maxDigits: 2, digitsMin: 2, digitsSub: 2, digitsMultiplicand: 2, digitsMultiplier: 1, digitsDividend: 2, digitsDivisor: 1 };
                }
            };

            const nextOperation = () => {
                setRefreshKey(prev => prev + 1);
            };

            const activeClasses = "bg-white text-blue-600 shadow-sm rounded-lg font-bold";
            const inactiveClasses = "text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg";

            if (!hasStarted) {
                return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                    <img 
                    src="poeta2.jpg" 
                    alt="¿Quieres que te ayude a calcular?" 
                    onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/600x400/e2e8f0/1e40af?text=Foto+del+Poeta+(poeta2.jpg)"; }}
                    className="max-w-xl w-full cursor-pointer hover:scale-105 transition-transform duration-300 drop-shadow-xl rounded-2xl"
                    onClick={() => setHasStarted(true)}
                    />
                    <p 
                    className="mt-8 text-2xl font-bold text-blue-600 animate-pulse cursor-pointer text-center" 
                    onClick={() => setHasStarted(true)}
                    >
                    ¡Pulsa en el poeta para comenzar!
                    </p>
                </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans p-4">
                <div className="max-w-4xl mx-auto">
                    
                    <header className="text-center mb-8">
                    <h1 className="text-4xl font-extrabold text-blue-600 drop-shadow-sm mb-2">
                        Máquina de Operaciones
                    </h1>
                    <p className="text-gray-600 font-medium">Practica matemáticas paso a paso</p>
                    </header>

                    <div className="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-4 items-center justify-between border border-gray-200">
                    
                    <div className="flex bg-gray-100 p-1 rounded-lg">
                        <button onClick={() => setOperation('add')} className={`px-4 py-2 ${operation === 'add' ? activeClasses : inactiveClasses}`}>Suma</button>
                        <button onClick={() => setOperation('sub')} className={`px-4 py-2 ${operation === 'sub' ? activeClasses : inactiveClasses}`}>Resta</button>
                        <button onClick={() => setOperation('mul')} className={`px-4 py-2 ${operation === 'mul' ? activeClasses : inactiveClasses}`}>Multiplicación</button>
                        <button onClick={() => setOperation('div')} className={`px-4 py-2 ${operation === 'div' ? activeClasses : inactiveClasses}`}>División</button>
                    </div>

                    {/* Imagen del poeta entre División y Nivel */}
                    <img 
                        src="poeta2.jpg" 
                        alt="Poeta calculador" 
                        onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/100x100/e2e8f0/1e40af?text=Poeta"; }}
                        className="h-24 w-auto object-contain rounded-lg shadow-md cursor-pointer hover:scale-105 transition-transform"
                        onClick={() => setHasStarted(false)}
                        title="Volver a la portada"
                    />

                    <div className="flex items-center space-x-4">
                        <div className="flex items-center space-x-2">
                        <span className="text-gray-700 font-bold text-sm">Nivel:</span>
                        <select 
                            value={level} 
                            onChange={(e) => setLevel(parseInt(e.target.value))}
                            disabled={mode === 'manual'}
                            className="border-gray-300 rounded-md shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 disabled:bg-gray-200"
                        >
                            {[1,2,3,4,5,6].map(l => <option key={l} value={l}>{l}º Primaria</option>)}
                        </select>
                        </div>

                        <div className="flex bg-gray-100 p-1 rounded-lg">
                        <button onClick={() => setMode('auto')} className={`px-3 py-1 text-sm ${mode === 'auto' ? activeClasses : inactiveClasses}`}>Auto</button>
                        <button onClick={() => setMode('manual')} className={`px-3 py-1 text-sm ${mode === 'manual' ? activeClasses : inactiveClasses}`}>Manual</button>
                        </div>
                    </div>

                    </div>

                    <main className="min-h-[500px] flex items-center justify-center py-8">
                    {operation === 'add' && <AdditionBoard key={`add-${refreshKey}`} config={getConfig()} isManual={mode === 'manual'} onNext={nextOperation} />}
                    {operation === 'sub' && <SubtractionBoard key={`sub-${refreshKey}`} config={getConfig()} isManual={mode === 'manual'} onNext={nextOperation} />}
                    {operation === 'mul' && <MultiplicationBoard key={`mul-${refreshKey}`} config={getConfig()} isManual={mode === 'manual'} onNext={nextOperation} />}
                    {operation === 'div' && <DivisionBoard key={`div-${refreshKey}`} config={getConfig()} isManual={mode === 'manual'} onNext={nextOperation} />}
                    </main>

                </div>
                </div>
            );
        }

        // --- RENDER ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
