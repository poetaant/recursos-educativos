<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máquina de Operaciones</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Estilos adicionales para ocultar las flechas de los input de tipo número */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* Animaciones para los botones colgantes */
        @keyframes swing {
            0% { transform: rotate(15deg); }
            50% { transform: rotate(-15deg); }
            100% { transform: rotate(15deg); }
        }
        .hanging-container {
            transform-origin: top center;
            animation: swing 3s ease-in-out infinite alternate;
            position: absolute;
            left: 50%;
            top: 100%;
            margin-left: -28px;
            width: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }
        .hanging-rope {
            width: 3px;
            background-color: #8b5a2b;
            transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hanging-badge {
            width: 56px;
            height: 56px;
            border-width: 4px;
            border-style: solid;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 2.4rem;
            margin-top: -2px;
            box-shadow: 0 6px 8px -2px rgba(0, 0, 0, 0.5);
        }
        .delay-1 { animation-delay: 0s; }
        .delay-2 { animation-delay: -0.7s; }
        .delay-3 { animation-delay: -1.4s; }
        .delay-4 { animation-delay: -2.1s; }
        
        /* Checkbox personalizado (Toggle) */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #10b981;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10b981;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- ICONOS SVG ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Check = ({ className }) => <Icon className={className}><polyline points="20 6 9 17 4 12"></polyline></Icon>;
        const CheckCircle2 = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></Icon>;
        const ChevronRight = ({ className }) => <Icon className={className}><polyline points="9 18 15 12 9 6"></polyline></Icon>;
        const ArrowDown = ({ className }) => <Icon className={className}><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></Icon>;
        const HelpCircle = ({ className }) => <Icon className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></Icon>;
        const RefreshCw = ({ className }) => <Icon className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></Icon>;

        // --- UTILS & MATH GENERATORS ---
        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const generateNumber = (digits) => {
            if (digits === 1) return randomInt(1, 9);
            const min = Math.pow(10, digits - 1);
            const max = Math.pow(10, digits) - 1;
            return randomInt(min, max);
        };

        const countDecimals = (numStr) => {
            if (!numStr) return 0;
            const parts = String(numStr).replace(',', '.').split('.');
            return parts.length > 1 ? parts[1].length : 0;
        };

        const stripDecimals = (numStr) => String(numStr || '').replace(/[.,]/g, '');

        const padDecimals = (numStr, maxDec) => {
            if (maxDec === 0) return String(numStr || '').replace(',', '.');
            let str = String(numStr || '0').replace(',', '.');
            if (!str.includes('.')) str += '.';
            let [int, dec] = str.split('.');
            return int + '.' + dec.padEnd(maxDec, '0');
        };

        const generateNumberWithDecimals = (digits, useDec, isDivisor = false) => {
            const num = generateNumber(digits);
            if (!useDec) return String(num);
            if (Math.random() > 0.5) {
                const decCount = randomInt(1, 2); 
                const decPart = String(randomInt(1, Math.pow(10, decCount) - 1)).padStart(decCount, '0');
                return `${num},${decPart}`;
            }
            return String(num);
        };

        const verifyCommas = (visualCommas, prefix, expectedPos) => {
            const commas = Object.keys(visualCommas).filter(k => k.startsWith(prefix) && visualCommas[k]);
            if (expectedPos >= 0) {
                return commas.length === 1 && commas[0] === `${prefix}${expectedPos}`;
            } else {
                return commas.length === 0;
            }
        };

        const getVisualNumberStrHelper = (raw, suffix, commaPrefix, vCommas) => {
            if (!raw) return '';
            const digits = stripDecimals(raw) + suffix;
            const commaKey = Object.keys(vCommas).find(k => k.startsWith(commaPrefix + '-') && vCommas[k]);
            if (commaKey) {
                const power = parseInt(commaKey.split('-')[1], 10);
                const pos = digits.length - 1 - power;
                if (pos >= 0 && pos < digits.length) {
                    let res = digits.slice(0, pos + 1) + ',' + digits.slice(pos + 1);
                    if (res.startsWith(',')) res = '0' + res; 
                    return res;
                }
            }
            return digits;
        };

        // --- COMPONENTS ---

        const DragPalette = ({ useDecimals, onDelD, onDelQ }) => {
            if (!useDecimals) return null;
            return (
                <div className="mb-4 flex flex-col items-center p-3 bg-blue-50 rounded-xl border-2 border-blue-400 shadow-md z-[60] w-fit transition-transform hover:scale-105">
                    <span className="text-xs font-bold text-blue-800 uppercase tracking-wide text-center leading-tight mb-2">Panel de ceros y comas<br/>(Arrastra o haz clic)</span>
                    <div className="flex space-x-3 mb-2">
                        <div draggable onDragStart={(e) => e.dataTransfer.setData('text/plain', '0')} className="w-12 h-12 flex items-center justify-center text-3xl font-mono font-bold border-2 border-dashed border-blue-500 bg-white text-blue-700 rounded-xl cursor-grab active:cursor-grabbing hover:bg-blue-100 shadow-sm" title="Arrastra el cero">0</div>
                        <div draggable onDragStart={(e) => e.dataTransfer.setData('text/plain', ',')} className="w-12 h-12 flex items-center justify-center text-3xl font-mono font-bold border-2 border-dashed border-blue-500 bg-white text-blue-700 rounded-xl cursor-grab active:cursor-grabbing hover:bg-blue-100 shadow-sm" title="Arrastra la coma">,</div>
                    </div>
                    {(onDelD || onDelQ) && (
                        <div className="flex space-x-2 w-full pt-2 border-t border-blue-200">
                            {onDelD && <button onClick={onDelD} className="text-[10px] flex-1 bg-red-100 text-red-700 rounded py-1 font-bold hover:bg-red-200 transition-colors shadow-sm" title="Borrar último del dividendo">Borrar 0 Div.</button>}
                            {onDelQ && <button onClick={onDelQ} className="text-[10px] flex-1 bg-red-100 text-red-700 rounded py-1 font-bold hover:bg-red-200 transition-colors shadow-sm" title="Borrar último del cociente">Borrar Coc.</button>}
                        </div>
                    )}
                </div>
            );
        };

        const DigitInput = ({ value, onChange, className = "", isSmall = false, readOnly = false, id, isHelped = false }) => {
            return (
                <input
                id={id}
                type="text"
                maxLength={1}
                value={value}
                onChange={(e) => {
                    const val = e.target.value.replace(/[^0-9]/g, '');
                    onChange(val);
                    if (val !== '' && id) {
                        const parts = id.split('-');
                        const lastIdx = parts.length - 1;
                        parts[lastIdx] = parseInt(parts[lastIdx]) + 1;
                        const nextId = parts.join('-');
                        const nextEl = document.getElementById(nextId);
                        if (nextEl) nextEl.focus();
                    }
                }}
                readOnly={readOnly}
                className={`text-center font-mono border-2 rounded-md focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-colors
                    ${isSmall ? 'w-6 h-8 text-sm' : 'w-10 h-12 text-2xl'} 
                    ${isHelped ? 'animate-pulse !bg-green-200 !text-green-800 !border-green-500 font-bold' : readOnly ? 'bg-gray-100 border-gray-300' : 'bg-white border-blue-300'}
                    ${className}`}
                />
            );
        };

        const DotSeparator = ({ isSmall }) => (
            <span className={`absolute ${isSmall ? '-left-[4px] bottom-[2px] text-lg' : '-left-[6px] sm:-left-[8px] bottom-[4px] text-3xl'} font-extrabold text-slate-800 pointer-events-none z-20 select-none`}>.</span>
        );

        const InteractiveComma = ({ id, commasMap, setCommasMap, isSmall }) => {
            const hasComma = commasMap[id];
            const lastClick = useRef(0);
            
            const handleClick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const now = Date.now();
                const timeDiff = now - lastClick.current;
                
                if (hasComma) {
                    if (timeDiff < 400) { // Doble clic para borrar
                        setCommasMap(prev => {
                            const next = {...prev};
                            delete next[id];
                            return next;
                        });
                        lastClick.current = 0;
                    } else {
                        lastClick.current = now;
                    }
                } else {
                    // Un clic para ponerla
                    setCommasMap(prev => ({ ...prev, [id]: true }));
                    lastClick.current = 0;
                }
            };

            const handleDrop = (e) => {
                e.preventDefault(); 
                e.stopPropagation();
                if (e.dataTransfer.getData('text/plain') === ',') {
                    setCommasMap(prev => ({ ...prev, [id]: true }));
                }
            };

            return (
                <div 
                    className={`absolute ${isSmall ? '-left-[8px] w-[16px]' : '-left-[12px] sm:-left-[14px] w-[24px]'} h-[120%] -bottom-[10%] z-[60] cursor-pointer flex items-end justify-center hover:bg-blue-300 hover:bg-opacity-30 rounded transition-colors group`}
                    onClick={handleClick}
                    onDragOver={e => e.preventDefault()} 
                    onDrop={handleDrop}
                    title={hasComma ? "Doble clic rápido para eliminar la coma" : "Haz clic o arrastra una coma aquí"}
                >
                    {hasComma && <span className={`text-red-600 font-extrabold select-none drop-shadow-sm leading-none ${isSmall ? 'text-2xl bottom-[2px]' : 'text-4xl bottom-0'} relative pointer-events-none group-hover:opacity-75`}>,</span>}
                    {!hasComma && <span className={`text-gray-300 font-extrabold select-none drop-shadow-sm leading-none ${isSmall ? 'text-2xl bottom-[2px]' : 'text-4xl bottom-0'} relative pointer-events-none opacity-0 group-hover:opacity-60`}>,</span>}
                </div>
            );
        };

        // --- COLUMNA DE FACTORIZACIÓN ---
        const FactorizationColumn = ({ number }) => {
            const [rows, setRows] = useState([{ left: String(number), right: '' }]);

            useEffect(() => {
                setRows([{ left: String(number), right: '' }]);
            }, [number]);

            const updateRow = (index, field, value) => {
                const val = value.replace(/[^0-9]/g, '');
                const newRows = [...rows];
                newRows[index][field] = val;
                
                // Añadir automáticamente fila siguiente si se escribió un factor y la fila actual es la última
                if (field === 'right' && index === rows.length - 1 && val !== '') {
                    newRows.push({ left: '', right: '' });
                }
                setRows(newRows);
            };

            return (
                <div className="flex flex-col items-center">
                    <div className="flex font-mono text-lg sm:text-xl md:text-2xl">
                        {/* Columna Izquierda: Cocientes */}
                        <div className="flex flex-col items-end pr-2 border-r-4 border-black border-solid min-w-[3rem]">
                            {rows.map((r, i) => (
                                i === 0 ? 
                                <div key={`l-${i}`} className="h-8 sm:h-10 md:h-12 flex items-center justify-end font-bold text-gray-800 px-1">{r.left}</div> :
                                <input 
                                    key={`l-${i}`} value={r.left} onChange={e => updateRow(i, 'left', e.target.value)} 
                                    maxLength={4} 
                                    className="w-12 h-8 sm:w-16 sm:h-10 md:h-12 text-right font-bold text-gray-800 border-2 border-transparent focus:border-blue-400 focus:bg-blue-50 outline-none bg-transparent" 
                                />
                            ))}
                        </div>
                        {/* Columna Derecha: Factores primos */}
                        <div className="flex flex-col items-start pl-2 min-w-[2.5rem]">
                            {rows.map((r, i) => (
                                (i === rows.length - 1 && rows[i].left === '1') ? 
                                <div key={`r-${i}`} className="h-8 sm:h-10 md:h-12 flex items-center text-gray-400 text-xs sm:text-sm italic">Fin</div> :
                                <input 
                                    key={`r-${i}`} value={r.right} onChange={e => updateRow(i, 'right', e.target.value)} 
                                    maxLength={2} 
                                    className="w-8 h-8 sm:w-12 sm:h-10 md:h-12 text-left font-bold text-red-600 border-2 border-transparent focus:border-red-400 focus:bg-red-50 outline-none bg-transparent" 
                                />
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- OPERATION BOARDS ---

        const AdditionBoard = ({ config, isManual, onNext, autoSolve, useDecimals, level }) => {
            const [addendsRaw, setAddendsRaw] = useState([]);
            const [setupMode, setSetupMode] = useState(isManual);
            const [inputs, setInputs] = useState({});
            const [carries, setCarries] = useState({});
            const [visualCommas, setVisualCommas] = useState({});
            const [helpedFields, setHelpedFields] = useState({});
            const [status, setStatus] = useState('playing'); 

            useEffect(() => {
                if (!isManual) {
                    const newAddends = [];
                    for (let i = 0; i < config.numAddends; i++) {
                        const digits = i === 0 ? config.maxDigits : randomInt(1, config.maxDigits);
                        newAddends.push(generateNumberWithDecimals(digits, useDecimals));
                    }
                    setAddendsRaw(newAddends);
                    resetState(newAddends);
                } else {
                    setAddendsRaw(Array(config.numAddends).fill(''));
                    setSetupMode(true);
                    setInputs({});
                    setCarries({});
                    setVisualCommas({});
                    setHelpedFields({});
                    setStatus('playing');
                }
            }, [config, isManual, useDecimals]);

            const maxDec = useDecimals ? Math.max(...addendsRaw.map(countDecimals)) : 0;
            const paddedAddends = addendsRaw.map(a => padDecimals(a, maxDec));
            const addends = paddedAddends.map(stripDecimals); 
            const expectedCommaPos = maxDec > 0 ? maxDec - 1 : -1;

            const resetState = (adds = addendsRaw) => {
                if (!isManual) setSetupMode(false);
                setInputs({});
                setCarries({});
                setHelpedFields({});
                setStatus('playing');

                const newCommas = {};
                if (useDecimals) {
                    const mDec = Math.max(...adds.map(countDecimals));
                    if (mDec > 0) {
                        adds.forEach((_, rIndex) => {
                            newCommas[`addend-${rIndex}-${mDec - 1}`] = true;
                        });
                    }
                }
                setVisualCommas(newCommas);
            }

            const maxLen = Math.max(...addends.map(a => String(a).length), 1);
            const cols = maxLen + 2; 
            const maxPower = maxLen; 

            const prevAutoSolve = useRef(autoSolve);
            useEffect(() => {
                if (autoSolve > prevAutoSolve.current) {
                    prevAutoSolve.current = autoSolve;
                    if (!setupMode && addendsRaw.length > 0) {
                        const newInputs = {};
                        const newCarries = {};
                        
                        const expectedStr = String(addends.reduce((acc, curr) => acc + (parseInt(curr, 10) || 0), 0));
                        
                        for (let i = 0; i < expectedStr.length; i++) {
                            newInputs[`res-${i}`] = expectedStr[expectedStr.length - 1 - i];
                        }

                        let currentCarry = 0;
                        for (let power = 0; power <= maxPower; power++) {
                            if (currentCarry > 0 && power > 0 && power < maxLen) {
                                newCarries[`c-${power}`] = String(currentCarry);
                            }
                            let colSum = currentCarry;
                            addends.forEach(addend => {
                                const numStr = String(addend);
                                const charIdx = numStr.length - 1 - power;
                                if (charIdx >= 0 && charIdx < numStr.length) {
                                    colSum += parseInt(numStr[charIdx], 10) || 0;
                                }
                            });
                            currentCarry = Math.floor(colSum / 10);
                        }

                        setInputs({...newInputs});
                        setCarries({...newCarries});
                        
                        setVisualCommas(prev => {
                            const next = {...prev};
                            Object.keys(next).forEach(k => { if (k.startsWith('res-')) delete next[k]; });
                            if (expectedCommaPos >= 0) next[`res-${expectedCommaPos}`] = true;
                            return next;
                        });

                        setHelpedFields({});
                        setStatus('playing');
                    }
                }
            }, [autoSolve, setupMode, addendsRaw, maxPower, maxLen, expectedCommaPos]);

            const handleHelp = () => {
                const expectedStr = String(addends.reduce((acc, curr) => acc + (parseInt(curr, 10) || 0), 0));
                let currentCarry = 0;
                
                for (let power = 0; power <= maxPower; power++) {
                    if (currentCarry > 0 && power > 0 && power < maxLen) {
                        const carryKey = `c-${power}`;
                        if (carries[carryKey] !== String(currentCarry)) {
                            setCarries(prev => ({...prev, [carryKey]: String(currentCarry)}));
                            setHelpedFields({ [carryKey]: true });
                            return;
                        }
                    }

                    let colSum = currentCarry;
                    addends.forEach(addend => {
                        const numStr = String(addend);
                        const charIdx = numStr.length - 1 - power;
                        if (charIdx >= 0 && charIdx < numStr.length) {
                            colSum += parseInt(numStr[charIdx], 10) || 0;
                        }
                    });
                    currentCarry = Math.floor(colSum / 10);

                    if (power < expectedStr.length) {
                        const expectedChar = expectedStr[expectedStr.length - 1 - power];
                        const resKey = `res-${power}`;
                        if (inputs[resKey] !== expectedChar) {
                            setInputs(prev => ({...prev, [resKey]: expectedChar}));
                            setHelpedFields({ [resKey]: true });
                            return;
                        }
                    }
                }

                if (useDecimals) {
                    const hasExtraCommas = Object.keys(visualCommas).some(k => k.startsWith('res-') && (expectedCommaPos < 0 || k !== `res-${expectedCommaPos}`) && visualCommas[k]);
                    if (hasExtraCommas || (expectedCommaPos >= 0 && !visualCommas[`res-${expectedCommaPos}`])) {
                        setVisualCommas(prev => {
                            const next = {...prev};
                            Object.keys(next).forEach(k => { if (k.startsWith('res-')) delete next[k]; });
                            if (expectedCommaPos >= 0) next[`res-${expectedCommaPos}`] = true;
                            return next;
                        });
                        return;
                    }
                }
            };

            const checkResult = () => {
                const sum = addends.reduce((acc, curr) => acc + (parseInt(curr, 10) || 0), 0);
                let userStr = '';
                for (let power = maxPower; power >= 0; power--) {
                    userStr += (inputs[`res-${power}`] || '0');
                }
                const isDigitsCorrect = parseInt(userStr, 10) === sum;
                const isCommaCorrect = !useDecimals || verifyCommas(visualCommas, 'res-', expectedCommaPos);

                if (isDigitsCorrect && isCommaCorrect) setStatus('correct');
                else setStatus('incorrect');
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-6">
                    <h3 className="text-3xl font-bold text-gray-700 mb-2">Introduce los sumandos</h3>
                    {addendsRaw.map((a, i) => (
                    <div key={i} className="flex items-center space-x-4">
                        <span className="font-bold text-2xl whitespace-nowrap">Sumando {i + 1}:</span>
                        <input 
                        type="text" 
                        pattern="[0-9.,]*"
                        className="border-4 border-blue-300 rounded-xl p-4 text-3xl font-mono w-64 focus:outline-none focus:border-blue-500"
                        value={a}
                        onChange={(e) => {
                            const val = useDecimals ? e.target.value.replace(/[^0-9.,]/g, '') : e.target.value.replace(/[^0-9]/g, '');
                            const newAddends = [...addendsRaw];
                            newAddends[i] = val;
                            setAddendsRaw(newAddends);
                        }}
                        />
                    </div>
                    ))}
                    <button 
                    onClick={() => {
                        if (addendsRaw.every(a => String(a).trim() !== '')) {
                            setSetupMode(false);
                            const newCommas = {};
                            const currentMaxDec = Math.max(...addendsRaw.map(countDecimals));
                            if (useDecimals && currentMaxDec > 0) {
                                addendsRaw.forEach((_, rIndex) => {
                                    newCommas[`addend-${rIndex}-${currentMaxDec - 1}`] = true;
                                });
                            }
                            setVisualCommas(newCommas);
                        }
                    }}
                    className="bg-blue-500 text-white px-8 py-4 mt-4 text-2xl rounded-2xl font-bold hover:bg-blue-600 flex items-center shadow-lg"
                    >
                    <Check className="mr-3 w-8 h-8" /> Comenzar Suma
                    </button>
                </div>
                );
            }

            return (
                <div className="flex flex-col items-center">
                <DragPalette useDecimals={useDecimals} />
                <div className="bg-white p-8 rounded-xl shadow-lg border-2 border-blue-100 relative mt-4">
                    <div className="grid gap-2" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                    
                    {/* Carries Row */}
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        return (
                            <div key={`carry-${power}`} className="flex justify-center mb-2">
                            {power > 0 && power < maxLen && (
                                <DigitInput
                                    isSmall
                                    value={carries[`c-${power}`] || ''}
                                    onChange={(v) => setCarries({ ...carries, [`c-${power}`]: v })}
                                    className="bg-yellow-50 border-yellow-300 text-yellow-700"
                                    isHelped={helpedFields[`c-${power}`]}
                                />
                            )}
                            </div>
                        );
                    })}

                    {/* Addends */}
                    {addends.map((addend, rIndex) => {
                        const numStr = String(addend);
                        return (
                        <React.Fragment key={`row-${rIndex}`}>
                            <div className="flex items-center justify-center font-bold text-2xl text-blue-500">
                                {rIndex === addends.length - 1 ? '+' : ''}
                            </div>
                            {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                                const power = cols - 2 - cIndex;
                                const charIdx = numStr.length - 1 - power;
                                const char = charIdx >= 0 && charIdx < numStr.length ? numStr[charIdx] : '';
                                return (
                                    <div key={`c-${rIndex}-${power}`} className="flex justify-center relative">
                                        {useDecimals && power >= 0 && <InteractiveComma id={`addend-${rIndex}-${power}`} commasMap={visualCommas} setCommasMap={setVisualCommas} />}
                                        <div className="w-10 h-12 flex items-center justify-center text-3xl font-mono">
                                            {char}
                                        </div>
                                    </div>
                                );
                            })}
                        </React.Fragment>
                        );
                    })}

                    {/* Divider */}
                    <div className={`col-span-${cols} border-b-4 border-black my-2`}></div>

                    {/* Result Row */}
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        const hasHigherInput = Object.keys(inputs).some(k => k.startsWith('res-') && parseInt(k.split('-')[1]) > power && inputs[k] !== '');
                        return (
                            <div key={`res-${power}`} className="flex justify-center relative">
                                {useDecimals && power >= 0 && <InteractiveComma id={`res-${power}`} commasMap={visualCommas} setCommasMap={setVisualCommas} />}
                                {!useDecimals && power % 3 === 2 && hasHigherInput && <DotSeparator />}
                                <DigitInput
                                    id={`add-res-${cIndex}`}
                                    value={inputs[`res-${power}`] || ''}
                                    onChange={(v) => setInputs({ ...inputs, [`res-${power}`]: v })}
                                    className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : ''}
                                    isHelped={helpedFields[`res-${power}`]}
                                />
                            </div>
                        );
                    })}

                    </div>
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 flex items-center shadow-md">
                    <CheckCircle2 className="mr-2" /> Comprobar
                    </button>
                    <button onClick={onNext} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 flex items-center shadow-md">
                    Siguiente <ChevronRight className="ml-2" />
                    </button>
                </div>
                
                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡Correcto! ¡Muy bien!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Hay un error. Revisa los números y la posición de la coma.</p>}
                </div>
            );
        };

        const SubtractionBoard = ({ config, isManual, onNext, autoSolve, useDecimals, level }) => {
            const [minuendRaw, setMinuendRaw] = useState('');
            const [subtrahendRaw, setSubtrahendRaw] = useState('');
            const [setupMode, setSetupMode] = useState(isManual);
            const [inputs, setInputs] = useState({});
            const [carries, setCarries] = useState({});
            const [visualCommas, setVisualCommas] = useState({});
            const [helpedFields, setHelpedFields] = useState({});
            const [status, setStatus] = useState('playing');

            useEffect(() => {
                if (!isManual) {
                    let m = parseFloat(generateNumberWithDecimals(config.digitsMin, useDecimals).replace(',', '.'));
                    let s = parseFloat(generateNumberWithDecimals(config.digitsSub, useDecimals).replace(',', '.'));
                    if (s > m) [m, s] = [s, m];
                    const newM = String(m).replace('.', ',');
                    const newS = String(s).replace('.', ',');
                    setMinuendRaw(newM);
                    setSubtrahendRaw(newS);
                    resetState(newM, newS);
                } else {
                    setMinuendRaw('');
                    setSubtrahendRaw('');
                    setSetupMode(true);
                    setInputs({});
                    setCarries({});
                    setVisualCommas({});
                    setHelpedFields({});
                    setStatus('playing');
                }
            }, [config, isManual, useDecimals]);

            const resetState = (mRaw, sRaw) => {
                if (!isManual) setSetupMode(false);
                setInputs({});
                setCarries({});
                setHelpedFields({});
                setStatus('playing');

                const newCommas = {};
                if (useDecimals) {
                    const mDec = Math.max(countDecimals(mRaw), countDecimals(sRaw));
                    if (mDec > 0) {
                        newCommas[`minuend-${mDec - 1}`] = true;
                        newCommas[`subtrahend-${mDec - 1}`] = true;
                    }
                }
                setVisualCommas(newCommas);
            };

            const maxDec = useDecimals ? Math.max(countDecimals(minuendRaw), countDecimals(subtrahendRaw)) : 0;
            const minuend = stripDecimals(padDecimals(minuendRaw, maxDec));
            const subtrahend = stripDecimals(padDecimals(subtrahendRaw, maxDec));
            const expectedCommaPos = maxDec > 0 ? maxDec - 1 : -1;

            const cols = Math.max(minuend.length, subtrahend.length) + 1;
            const maxPower = cols - 2;

            const prevAutoSolve = useRef(autoSolve);
            useEffect(() => {
                if (autoSolve > prevAutoSolve.current) {
                    prevAutoSolve.current = autoSolve;
                    if (!setupMode && minuend && subtrahend) {
                        const newInputs = {};
                        const newCarries = {};
                        
                        const expectedStr = String(parseInt(minuend || 0, 10) - parseInt(subtrahend || 0, 10));
                        for (let i = 0; i < expectedStr.length; i++) {
                            newInputs[`res-${i}`] = expectedStr[expectedStr.length - 1 - i];
                        }

                        let currentCarry = 0;
                        for (let power = 0; power <= maxPower; power++) {
                            if (currentCarry > 0 && power > 0) {
                                newCarries[`c-${power}`] = String(currentCarry);
                            }
                            const charIdxM = minuend.length - 1 - power;
                            const topDigit = charIdxM >= 0 && charIdxM < minuend.length ? (parseInt(minuend[charIdxM], 10) || 0) : 0;
                            const charIdxS = subtrahend.length - 1 - power;
                            const botDigitBase = charIdxS >= 0 && charIdxS < subtrahend.length ? (parseInt(subtrahend[charIdxS], 10) || 0) : 0;
                            
                            const bottomDigit = botDigitBase + currentCarry;
                            let resDigit = topDigit - bottomDigit;
                            let nextCarry = 0;
                            if (resDigit < 0) {
                                nextCarry = 1;
                            }
                            currentCarry = nextCarry;
                        }

                        setInputs({...newInputs});
                        setCarries({...newCarries});

                        setVisualCommas(prev => {
                            const next = {...prev};
                            Object.keys(next).forEach(k => { if (k.startsWith('res-')) delete next[k]; });
                            if (expectedCommaPos >= 0) next[`res-${expectedCommaPos}`] = true;
                            return next;
                        });

                        setHelpedFields({});
                        setStatus('playing');
                    }
                }
            }, [autoSolve, setupMode, minuend, subtrahend, maxPower, expectedCommaPos]);

            const handleHelp = () => {
                const expectedStr = String(parseInt(minuend || 0, 10) - parseInt(subtrahend || 0, 10));
                let currentCarry = 0;
                
                for (let power = 0; power <= maxPower; power++) {
                    if (currentCarry > 0 && power > 0) {
                        const carryKey = `c-${power}`;
                        if (carries[carryKey] !== String(currentCarry)) {
                            setCarries(prev => ({...prev, [carryKey]: String(currentCarry)}));
                            setHelpedFields({ [carryKey]: true });
                            return;
                        }
                    }

                    const charIdxM = minuend.length - 1 - power;
                    const topDigit = charIdxM >= 0 && charIdxM < minuend.length ? (parseInt(minuend[charIdxM], 10) || 0) : 0;
                    const charIdxS = subtrahend.length - 1 - power;
                    const botDigitBase = charIdxS >= 0 && charIdxS < subtrahend.length ? (parseInt(subtrahend[charIdxS], 10) || 0) : 0;
                    
                    const bottomDigit = botDigitBase + currentCarry;
                    let resDigit = topDigit - bottomDigit;
                    let nextCarry = 0;
                    if (resDigit < 0) { nextCarry = 1; }

                    if (power < expectedStr.length) {
                        const expectedChar = expectedStr[expectedStr.length - 1 - power];
                        const resKey = `res-${power}`;
                        if (inputs[resKey] !== expectedChar) {
                            setInputs(prev => ({...prev, [resKey]: expectedChar}));
                            setHelpedFields({ [resKey]: true });
                            return;
                        }
                    }
                    currentCarry = nextCarry;
                }

                if (useDecimals) {
                    const hasExtraCommas = Object.keys(visualCommas).some(k => k.startsWith('res-') && (expectedCommaPos < 0 || k !== `res-${expectedCommaPos}`) && visualCommas[k]);
                    if (hasExtraCommas || (expectedCommaPos >= 0 && !visualCommas[`res-${expectedCommaPos}`])) {
                        setVisualCommas(prev => {
                            const next = {...prev};
                            Object.keys(next).forEach(k => { if (k.startsWith('res-')) delete next[k]; });
                            if (expectedCommaPos >= 0) next[`res-${expectedCommaPos}`] = true;
                            return next;
                        });
                        return;
                    }
                }
            };

            const checkResult = () => {
                const res = parseInt(minuend, 10) - parseInt(subtrahend, 10);
                let userStr = '';
                for (let power = maxPower; power >= 0; power--) {
                    userStr += (inputs[`res-${power}`] || '0');
                }
                const isDigitsCorrect = parseInt(userStr, 10) === res;
                const isCommaCorrect = !useDecimals || verifyCommas(visualCommas, 'res-', expectedCommaPos);

                if (isDigitsCorrect && isCommaCorrect) setStatus('correct');
                else setStatus('incorrect');
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-6">
                    <h3 className="text-3xl font-bold text-gray-700 mb-2">Introduce los números</h3>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Minuendo (arriba):</span>
                    <input 
                        type="text" 
                        className="border-4 border-blue-300 rounded-xl p-4 text-3xl font-mono w-64 focus:outline-none focus:border-blue-500" 
                        value={minuendRaw} 
                        onChange={(e) => setMinuendRaw(useDecimals ? e.target.value.replace(/[^0-9.,]/g, '') : e.target.value.replace(/[^0-9]/g, ''))} 
                    />
                    </div>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Sustraendo (abajo):</span>
                    <input 
                        type="text" 
                        className="border-4 border-blue-300 rounded-xl p-4 text-3xl font-mono w-64 focus:outline-none focus:border-blue-500" 
                        value={subtrahendRaw} 
                        onChange={(e) => setSubtrahendRaw(useDecimals ? e.target.value.replace(/[^0-9.,]/g, '') : e.target.value.replace(/[^0-9]/g, ''))} 
                    />
                    </div>
                    <button 
                    onClick={() => {
                        const mVal = parseFloat(minuendRaw.replace(',','.'));
                        const sVal = parseFloat(subtrahendRaw.replace(',','.'));
                        if (minuendRaw && subtrahendRaw && mVal >= sVal) {
                            setSetupMode(false);
                            const newCommas = {};
                            const mDec = Math.max(countDecimals(minuendRaw), countDecimals(subtrahendRaw));
                            if (useDecimals && mDec > 0) {
                                newCommas[`minuend-${mDec - 1}`] = true;
                                newCommas[`subtrahend-${mDec - 1}`] = true;
                            }
                            setVisualCommas(newCommas);
                        }
                        else alert("Por favor, asegúrate de que el minuendo sea mayor o igual al sustraendo.");
                    }}
                    className="bg-blue-500 text-white px-8 py-4 mt-4 text-2xl rounded-2xl font-bold hover:bg-blue-600 flex items-center shadow-lg"
                    >
                    <Check className="mr-3 w-8 h-8" /> Comenzar Resta
                    </button>
                </div>
                );
            }

            const renderRow = (numStr, isSubtrahend = false) => {
                const idPrefix = isSubtrahend ? 'subtrahend' : 'minuend';
                return (
                <React.Fragment>
                    <div className="flex items-center justify-center font-bold text-2xl text-red-500">
                    {isSubtrahend ? '-' : ''}
                    </div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        const charIdx = numStr.length - 1 - power;
                        const char = charIdx >= 0 && charIdx < numStr.length ? numStr[charIdx] : '';
                        return (
                            <div key={`c-${power}`} className="flex flex-col items-center justify-center relative h-16">
                                {useDecimals && power >= 0 && <InteractiveComma id={`${idPrefix}-${power}`} commasMap={visualCommas} setCommasMap={setVisualCommas} />}
                                <div className="text-3xl font-mono leading-none">
                                    {char}
                                </div>
                                {isSubtrahend && charIdx >= -1 && charIdx < numStr.length && power > 0 && (
                                    <div className="absolute -bottom-5 left-1/2 transform -translate-x-1/2">
                                    <DigitInput
                                        isSmall
                                        value={carries[`c-${power}`] || ''}
                                        onChange={(v) => setCarries({ ...carries, [`c-${power}`]: v })}
                                        className="bg-orange-50 border-orange-300 text-orange-700 text-xs w-5 h-6"
                                        isHelped={helpedFields[`c-${power}`]}
                                    />
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </React.Fragment>
                );
            };

            return (
                <div className="flex flex-col items-center">
                <DragPalette useDecimals={useDecimals} />
                <div className="bg-white p-8 pb-12 rounded-xl shadow-lg border-2 border-red-100 mt-4">
                    <div className="grid gap-x-2 gap-y-4 items-end" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                    {renderRow(minuend, false)}
                    {renderRow(subtrahend, true)}

                    <div className={`col-span-${cols} border-b-4 border-black mt-4 mb-2`}></div>

                    {/* Result Row */}
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        const hasHigherInput = Object.keys(inputs).some(k => k.startsWith('res-') && parseInt(k.split('-')[1]) > power && inputs[k] !== '');
                        return (
                            <div key={`res-${power}`} className="flex justify-center relative">
                                {useDecimals && power >= 0 && <InteractiveComma id={`res-${power}`} commasMap={visualCommas} setCommasMap={setVisualCommas} />}
                                {!useDecimals && power % 3 === 2 && hasHigherInput && <DotSeparator />}
                                <DigitInput
                                    id={`sub-res-${cIndex}`}
                                    value={inputs[`res-${power}`] || ''}
                                    onChange={(v) => setInputs({ ...inputs, [`res-${power}`]: v })}
                                    className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : ''}
                                    isHelped={helpedFields[`res-${power}`]}
                                />
                            </div>
                        );
                    })}
                    </div>
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 shadow-md">
                    Comprobar
                    </button>
                    <button onClick={onNext} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 shadow-md">
                    Siguiente
                    </button>
                </div>
                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡Perfecto!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Revisa la resta, las llevadas y la posición de la coma.</p>}
                </div>
            );
        };

        const MultiplicationBoard = ({ config, isManual, onNext, autoSolve, useDecimals, level }) => {
            const [multiplicandRaw, setMultiplicandRaw] = useState('');
            const [multiplierRaw, setMultiplierRaw] = useState('');
            const [setupMode, setSetupMode] = useState(isManual);
            const [inputs, setInputs] = useState({});
            const [carries, setCarries] = useState({});
            const [visualCommas, setVisualCommas] = useState({});
            const [helpedFields, setHelpedFields] = useState({});
            const [status, setStatus] = useState('playing');
            const [showTableFor, setShowTableFor] = useState(null);

            useEffect(() => {
                if (!isManual) setMinuendOrMul();
                else {
                    setMultiplicandRaw('');
                    setMultiplierRaw('');
                    setSetupMode(true);
                    setInputs({});
                    setCarries({});
                    setVisualCommas({});
                    setHelpedFields({});
                    setStatus('playing');
                    setShowTableFor(null);
                }
            }, [config, isManual, useDecimals]);

            const setMinuendOrMul = () => {
                const m1 = generateNumberWithDecimals(config.digitsMultiplicand, useDecimals);
                const m2 = generateNumberWithDecimals(config.digitsMultiplier, useDecimals);
                setMultiplicandRaw(m1);
                setMultiplierRaw(m2);
                
                setSetupMode(false);
                setInputs({});
                setCarries({});
                setHelpedFields({});
                setStatus('playing');
                setShowTableFor(null);

                const newCommas = {};
                if (useDecimals) {
                    const cM1 = countDecimals(m1);
                    const cM2 = countDecimals(m2);
                    if (cM1 > 0) newCommas[`top-${cM1 - 1}`] = true;
                    if (cM2 > 0) newCommas[`bot-${cM2 - 1}`] = true;
                }
                setVisualCommas(newCommas);
            }

            const decM1 = useDecimals ? countDecimals(multiplicandRaw) : 0;
            const decM2 = useDecimals ? countDecimals(multiplierRaw) : 0;
            const totalDec = decM1 + decM2;
            const expectedCommaPos = totalDec > 0 ? totalDec - 1 : -1;

            const multiplicand = stripDecimals(multiplicandRaw);
            const multiplier = stripDecimals(multiplierRaw);

            const L = multiplicand.length;
            const M = multiplier.length;
            const cols = L + M + 2;
            const numPartials = multiplier.length;

            const prevAutoSolve = useRef(autoSolve);
            useEffect(() => {
                if (autoSolve > prevAutoSolve.current) {
                    prevAutoSolve.current = autoSolve;
                    if (!setupMode && multiplicand && multiplier) {
                        const m1 = parseInt(multiplicand || 0, 10);
                        const m2Str = String(multiplier || 0);
                        const newInputs = {};
                        const newCarries = {};
                        
                        if (m2Str.length > 1) {
                            for (let rIndex = 0; rIndex < m2Str.length; rIndex++) {
                                const digit = parseInt(m2Str[m2Str.length - 1 - rIndex], 10) || 0;
                                const pStr = digit === 0 ? '0'.repeat(String(m1).length) : String(m1 * digit);
                                for (let j = 0; j < pStr.length; j++) {
                                    const char = pStr[pStr.length - 1 - j];
                                    const power = rIndex + j;
                                    newInputs[`p-${rIndex}-${power}`] = char;
                                }
                            }
                        }
                        const totalStr = String(m1 * (parseInt(multiplier, 10) || 0));
                        for(let j = 0; j < totalStr.length; j++){
                            const char = totalStr[totalStr.length - 1 - j];
                            newInputs[`res-${j}`] = char;
                        }

                        if (m2Str.length > 0) {
                            const firstDigit = parseInt(m2Str[m2Str.length - 1], 10) || 0;
                            let carry = 0;
                            const m1Str = String(m1);
                            for (let i = m1Str.length - 1; i >= 0; i--) {
                                const topDigit = parseInt(m1Str[i], 10) || 0;
                                const prod = topDigit * firstDigit + carry;
                                carry = Math.floor(prod / 10);
                                const power = m1Str.length - 1 - i + 1;
                                if (carry > 0 && power < L) {
                                    newCarries[`c-${power}`] = String(carry);
                                }
                            }
                        }

                        setInputs({...newInputs});
                        setCarries({...newCarries});

                        setVisualCommas(prev => {
                            const next = {...prev};
                            Object.keys(next).forEach(k => { if (k.startsWith('res-')) delete next[k]; });
                            if (expectedCommaPos >= 0) next[`res-${expectedCommaPos}`] = true;
                            return next;
                        });

                        setHelpedFields({});
                        setStatus('playing');
                    }
                }
            }, [autoSolve, setupMode, multiplicand, multiplier, L, expectedCommaPos]);

            const clearCarries = () => setCarries({});

            const handleHelp = () => {
                const m1 = parseInt(multiplicand || 0, 10);
                const m2Str = String(multiplier || 0);

                if (m2Str.length > 1) {
                    for (let rIndex = 0; rIndex < m2Str.length; rIndex++) {
                        const digit = parseInt(m2Str[m2Str.length - 1 - rIndex], 10) || 0;
                        const pStr = digit === 0 ? '0'.repeat(String(m1).length) : String(m1 * digit);
                        for (let j = 0; j < pStr.length; j++) {
                            const power = rIndex + j;
                            const expectedChar = pStr[pStr.length - 1 - j];
                            const key = `p-${rIndex}-${power}`;
                            if (inputs[key] !== expectedChar) {
                                setInputs(prev => ({...prev, [key]: expectedChar}));
                                setHelpedFields({ [key]: true });
                                return;
                            }
                        }
                    }
                }

                const totalStr = String(m1 * (parseInt(multiplier, 10) || 0));
                for(let j = 0; j < totalStr.length; j++){
                    const key = `res-${j}`; 
                    const expectedChar = totalStr[totalStr.length - 1 - j];
                    if (inputs[key] !== expectedChar) {
                        setInputs(prev => ({...prev, [key]: expectedChar}));
                        setHelpedFields({ [key]: true });
                        return;
                    }
                }

                if (useDecimals) {
                    const hasExtraCommas = Object.keys(visualCommas).some(k => k.startsWith('res-') && (expectedCommaPos < 0 || k !== `res-${expectedCommaPos}`) && visualCommas[k]);
                    if (hasExtraCommas || (expectedCommaPos >= 0 && !visualCommas[`res-${expectedCommaPos}`])) {
                        setVisualCommas(prev => {
                            const next = {...prev};
                            Object.keys(next).forEach(k => { if (k.startsWith('res-')) delete next[k]; });
                            if (expectedCommaPos >= 0) next[`res-${expectedCommaPos}`] = true;
                            return next;
                        });
                        return;
                    }
                }
            };

            const checkResult = () => {
                const m1 = parseInt(multiplicand, 10);
                const m2 = parseInt(multiplier, 10);
                
                let userTotalStr = '';
                for (let power = L + M; power >= 0; power--) {
                    userTotalStr += (inputs[`res-${power}`] || '0');
                }

                const isDigitsCorrect = parseInt(userTotalStr, 10) === m1 * m2;
                const isCommaCorrect = !useDecimals || verifyCommas(visualCommas, 'res-', expectedCommaPos);

                if (isDigitsCorrect && isCommaCorrect) setStatus('correct');
                else setStatus('incorrect');
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-6">
                    <h3 className="text-3xl font-bold text-gray-700 mb-2">Introduce los números</h3>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Multiplicando:</span>
                    <input type="text" className="border-4 border-purple-300 rounded-xl p-4 text-3xl font-mono w-64 focus:outline-none focus:border-purple-500" value={multiplicandRaw} onChange={(e) => setMultiplicandRaw(useDecimals ? e.target.value.replace(/[^0-9.,]/g, '') : e.target.value.replace(/[^0-9]/g, ''))} />
                    </div>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Multiplicador:</span>
                    <input type="text" className="border-4 border-purple-300 rounded-xl p-4 text-3xl font-mono w-64 focus:outline-none focus:border-purple-500" value={multiplierRaw} onChange={(e) => setMultiplierRaw(useDecimals ? e.target.value.replace(/[^0-9.,]/g, '') : e.target.value.replace(/[^0-9]/g, ''))} />
                    </div>
                    <button 
                    onClick={() => {
                        if (multiplicandRaw && multiplierRaw) {
                            setSetupMode(false);
                            setInputs({});
                            setCarries({});
                            setHelpedFields({});
                            setStatus('playing');

                            const newCommas = {};
                            if (useDecimals) {
                                const cM1 = countDecimals(multiplicandRaw);
                                const cM2 = countDecimals(multiplierRaw);
                                if (cM1 > 0) newCommas[`top-${cM1 - 1}`] = true;
                                if (cM2 > 0) newCommas[`bot-${cM2 - 1}`] = true;
                            }
                            setVisualCommas(newCommas);
                        }
                    }}
                    className="bg-purple-500 text-white px-8 py-4 mt-4 text-2xl rounded-2xl font-bold hover:bg-purple-600 flex items-center shadow-lg"
                    >
                    <Check className="mr-3 w-8 h-8" /> Comenzar
                    </button>
                </div>
                );
            }

            const renderTopNumber = (numStr, sign, idPrefix) => {
                return (
                <React.Fragment>
                    <div className="flex items-center justify-center font-bold text-2xl text-purple-500">
                    {sign}
                    </div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        const charIdx = numStr.length - 1 - power;
                        const char = charIdx >= 0 && charIdx < numStr.length ? numStr[charIdx] : '';
                        const isClickable = idPrefix === 'bot' && char !== '';
                        return (
                            <div key={`top-${power}`} className="flex justify-center items-center h-12 text-3xl font-mono relative">
                                {useDecimals && power >= 0 && <InteractiveComma id={`${idPrefix}-${power}`} commasMap={visualCommas} setCommasMap={setVisualCommas} />}
                                {isClickable ? (
                                    <span 
                                        className="cursor-pointer hover:bg-purple-200 hover:text-purple-800 rounded px-2 transition-colors font-bold"
                                        onClick={() => setShowTableFor(char)}
                                        title={`Ver tabla del ${char}`}
                                    >
                                        {char}
                                    </span>
                                ) : (
                                    <span>{char}</span>
                                )}
                            </div>
                        );
                    })}
                </React.Fragment>
                );
            };

            return (
                <div className="flex flex-col items-center">
                <DragPalette useDecimals={useDecimals} />
                <div className="flex items-start max-w-full">
                <div className="bg-white p-8 rounded-xl shadow-lg border-2 border-purple-100 relative mt-4 overflow-x-auto min-w-[300px]">
                    <button 
                    onClick={clearCarries}
                    className="absolute top-2 right-2 text-xs bg-yellow-100 text-yellow-800 px-2 py-1 rounded hover:bg-yellow-200 border border-yellow-300 z-20"
                    >
                    Borrar Llevadas
                    </button>

                    <div className="grid gap-y-2 gap-x-1" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                    
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        return (
                            <div key={`carry-${power}`} className="flex justify-center mb-2">
                            {power > 0 && power < L && (
                                <DigitInput
                                    isSmall
                                    value={carries[`c-${power}`] || ''}
                                    onChange={(v) => setCarries({ ...carries, [`c-${power}`]: v })}
                                    className="bg-yellow-50 border-yellow-300 text-yellow-700"
                                />
                            )}
                            </div>
                        );
                    })}

                    {renderTopNumber(multiplicand, '', 'top')}
                    {renderTopNumber(multiplier, '×', 'bot')}

                    <div className={`col-span-${cols} border-b-4 border-black my-2`}></div>

                    {numPartials > 1 && Array.from({ length: numPartials }).map((_, rIndex) => (
                        <React.Fragment key={`partial-${rIndex}`}>
                        <div className="flex items-center justify-center font-bold text-2xl text-purple-500">
                            {rIndex === numPartials - 1 ? '+' : ''}
                        </div>
                        {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                            const power = cols - 2 - cIndex;
                            const isInput = power >= rIndex && power <= rIndex + L;
                            
                            if (!isInput) return <div key={`p-${rIndex}-${power}`} className="w-10 h-12"></div>;

                            return (
                            <div key={`p-${rIndex}-${power}`} className="flex justify-center">
                                <DigitInput
                                    id={`mul-p-${rIndex}-${cIndex}`}
                                    value={inputs[`p-${rIndex}-${power}`] || ''}
                                    onChange={(v) => setInputs({ ...inputs, [`p-${rIndex}-${power}`]: v })}
                                    className="bg-blue-50 border-blue-200"
                                    isHelped={helpedFields[`p-${rIndex}-${power}`]}
                                />
                            </div>
                            );
                        })}
                        </React.Fragment>
                    ))}

                    {numPartials > 1 && <div className={`col-span-${cols} border-b-4 border-black my-2`}></div>}

                    {/* Result Row */}
                    <div className="col-span-1"></div>
                    {Array.from({ length: cols - 1 }).map((_, cIndex) => {
                        const power = cols - 2 - cIndex;
                        const hasHigherInput = Object.keys(inputs).some(k => k.startsWith('res-') && parseInt(k.split('-')[1]) > power && inputs[k] !== '');
                        return (
                            <div key={`res-${power}`} className="flex justify-center relative">
                                {useDecimals && power >= 0 && <InteractiveComma id={`res-${power}`} commasMap={visualCommas} setCommasMap={setVisualCommas} />}
                                {!useDecimals && power % 3 === 2 && hasHigherInput && <DotSeparator />}
                                <DigitInput
                                    id={`mul-res-${cIndex}`}
                                    value={inputs[`res-${power}`] || ''}
                                    onChange={(v) => setInputs({ ...inputs, [`res-${power}`]: v })}
                                    className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : 'bg-gray-50 border-gray-300 font-bold'}
                                    isHelped={helpedFields[`res-${power}`]}
                                />
                            </div>
                        );
                    })}

                    </div>
                </div>

                {showTableFor && (
                    <div className="ml-8 p-5 bg-yellow-50 border-2 border-yellow-400 rounded-xl shadow-md min-w-[160px]">
                        <h4 className="font-bold text-center mb-3 border-b-2 border-yellow-300 pb-2 text-yellow-800">
                        Tabla del {showTableFor}
                        </h4>
                        <div className="space-y-1">
                        {Array.from({ length: 9 }).map((_, i) => (
                            <div key={i} className="font-mono text-lg text-yellow-900 flex justify-between">
                            <span>{showTableFor} × {i + 1}</span>
                            <span className="font-bold ml-2 text-yellow-700">= {parseInt(showTableFor, 10) * (i + 1)}</span>
                            </div>
                        ))}
                        </div>
                        <button 
                        onClick={() => setShowTableFor(null)} 
                        className="mt-4 text-sm bg-red-100 text-red-600 px-3 py-2 rounded-lg hover:bg-red-200 w-full font-bold transition-colors"
                        >
                        Cerrar tabla
                        </button>
                    </div>
                )}
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 shadow-md">
                    Comprobar
                    </button>
                    <button onClick={onNext} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 shadow-md">
                    Siguiente
                    </button>
                </div>
                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡Genial!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Revisa tus cuentas y la colocación de la coma.</p>}
                </div>
            );
        };


        // --- DIVISION COMPONENT ---
        const DivisionBoard = ({ config, isManual, onNext, autoSolve, useDecimals, level }) => {
            const [dividendRaw, setDividendRaw] = useState('');
            const [divisorRaw, setDivisorRaw] = useState('');
            const [setupMode, setSetupMode] = useState(isManual);
            
            const [arcLen, setArcLen] = useState(0);
            const [stepRows, setStepRows] = useState([]); 
            const [quotientInputs, setQuotientInputs] = useState([]);
            const [visualCommas, setVisualCommas] = useState({});
            const [status, setStatus] = useState('select_arc'); 
            const [showTableFor, setShowTableFor] = useState(null);
            const [helpedFields, setHelpedFields] = useState({});

            const [draggedDividendSuffix, setDraggedDividendSuffix] = useState('');
            const [draggedQuotientPrefix, setDraggedQuotientPrefix] = useState('');
            
            const [isTransformed, setIsTransformed] = useState(true);

            const safeDividendRaw = dividendRaw || '';
            const safeDivisorRaw = divisorRaw || '';
            const trueD = parseFloat(safeDividendRaw.replace(',','.'));
            const trued = parseFloat(safeDivisorRaw.replace(',','.'));

            useEffect(() => {
                if (!isManual) {
                    let D = generateNumber(config.digitsDividend);
                    let d = generateNumber(config.digitsDivisor);
                    if (d === 0) d = 1;
                    if (D < d) [D, d] = [d, D]; 
                    
                    let newDStr = String(D);
                    if (useDecimals && Math.random() > 0.5) {
                        const decCount = randomInt(1, 2); 
                        const decPart = String(randomInt(1, Math.pow(10, decCount) - 1)).padStart(decCount, '0');
                        newDStr = `${D},${decPart}`;
                    }
                    const newdStr = String(d);
                    
                    setDividendRaw(newDStr);
                    setDivisorRaw(newdStr);
                    resetBoard(newDStr, newdStr);
                } else {
                    setDividendRaw('');
                    setDivisorRaw('');
                    setSetupMode(true);
                    
                    setArcLen(0);
                    setStepRows([]);
                    setQuotientInputs([]);
                    setVisualCommas({});
                    setStatus('select_arc');
                    setShowTableFor(null);
                    setHelpedFields({});
                    setDraggedDividendSuffix('');
                    setDraggedQuotientPrefix('');
                    setIsTransformed(true);
                }
            }, [config, isManual, useDecimals]);

            const resetBoard = (dRaw, divRaw) => {
                if (!isManual) setSetupMode(false);
                setArcLen(0);
                setStepRows([]);
                setQuotientInputs([]);
                setShowTableFor(null);
                setHelpedFields({});
                setDraggedDividendSuffix('');
                setDraggedQuotientPrefix('');

                const newCommas = {};
                if (useDecimals) {
                    const cD = countDecimals(dRaw);
                    const cd = countDecimals(divRaw);
                    if (cD > 0) newCommas[`dividend-${cD - 1}`] = true;
                    if (cd > 0) newCommas[`divisor-${cd - 1}`] = true;
                    
                    if (cd > 0) {
                        setIsTransformed(false);
                        setStatus('transform_decimals');
                    } else {
                        setIsTransformed(true);
                        setStatus('select_arc');
                    }
                } else {
                    setIsTransformed(true);
                    setStatus('select_arc');
                }
                
                setVisualCommas(newCommas);
            }

            const userDStr = getVisualNumberStrHelper(safeDividendRaw, draggedDividendSuffix, 'dividend', visualCommas);
            const userdStr = getVisualNumberStrHelper(safeDivisorRaw, '', 'divisor', visualCommas);

            const effectiveDividend = stripDecimals(safeDividendRaw) + draggedDividendSuffix;
            const divisor = stripDecimals(userdStr);

            const decD_t = countDecimals(userDStr);
            const decd_t = countDecimals(userdStr); 

            const handleCheckTransformation = () => {
                const userDVal = parseFloat((userDStr || '0').replace(',', '.'));
                const userdVal = parseFloat((userdStr || '1').replace(',', '.'));
                const userRatio = userdVal !== 0 ? (userDVal / userdVal) : 0;
                const trueRatio = trued !== 0 ? (trueD / trued) : 0;
                
                const hasDivisorComma = userdStr.includes(',');

                if (!hasDivisorComma && Math.abs(userRatio - trueRatio) < 0.000001) {
                    setIsTransformed(true);
                    setStatus('select_arc');
                } else {
                    alert("Incorrecto. Recuerda: si quitas la coma del divisor (haciendo doble clic), debes mover la coma del dividendo a la derecha (o añadir ceros arrastrándolos) tantas posiciones como decimales tenía el divisor.");
                }
            };

            const prevAutoSolve = useRef(autoSolve);
            useEffect(() => {
                if (autoSolve > prevAutoSolve.current) {
                    prevAutoSolve.current = autoSolve;
                    
                    let targetDivSuffix = draggedDividendSuffix;
                    let targetQPrefix = draggedQuotientPrefix;
                    let targetCommas = {...visualCommas};

                    if (status === 'transform_decimals') {
                        const decd_orig = countDecimals(safeDivisorRaw);
                        const decD_orig = countDecimals(safeDividendRaw);
                        
                        Object.keys(targetCommas).forEach(k => { if (k.startsWith('divisor-')) delete targetCommas[k] });
                        Object.keys(targetCommas).forEach(k => { if (k.startsWith('dividend-')) delete targetCommas[k] });
                        
                        let newDecD = Math.max(0, decD_orig - decd_orig);
                        if (newDecD > 0) targetCommas[`dividend-${newDecD - 1}`] = true;
                        
                        let zeroesToAdd = Math.max(0, decd_orig - decD_orig);
                        if (zeroesToAdd > 0) {
                            targetDivSuffix = '0'.repeat(zeroesToAdd);
                        } else {
                            targetDivSuffix = '';
                        }
                        
                        setVisualCommas(targetCommas);
                        setDraggedDividendSuffix(targetDivSuffix);
                        setIsTransformed(true);
                    }

                    if (!setupMode && safeDividendRaw && safeDivisorRaw) {
                        if (trueD < trued && targetQPrefix === '') {
                            let tempD = trueD;
                            let z = 0;
                            while (tempD < trued) {
                                tempD *= 10;
                                z++;
                            }
                            targetQPrefix = '0,';
                            if (z > 1) targetQPrefix += '0'.repeat(z - 1);
                            targetDivSuffix += '0'.repeat(z);
                            
                            setDraggedDividendSuffix(targetDivSuffix);
                            setDraggedQuotientPrefix(targetQPrefix);
                        }

                        const currentDStr = getVisualNumberStrHelper(safeDividendRaw, targetDivSuffix, 'dividend', targetCommas);
                        const currentdStr = getVisualNumberStrHelper(safeDivisorRaw, '', 'divisor', targetCommas);

                        const D = stripDecimals(currentDStr);
                        const d = parseInt(stripDecimals(currentdStr), 10);
                        if(d === 0) return;

                        let correctLen = 1;
                        while (parseInt(D.substring(0, correctLen), 10) < d && correctLen < D.length) {
                            correctLen++;
                        }
                        
                        const currentDecD_t = countDecimals(currentDStr);
                        let intDigits_t = D.length - currentDecD_t;
                        if (intDigits_t <= 0) intDigits_t = 1;

                        if (useDecimals && currentDecD_t > 0 && correctLen > intDigits_t && targetQPrefix === '') {
                            correctLen = intDigits_t; 
                        }
