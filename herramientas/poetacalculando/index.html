                        setArcLen(correctLen); 
                        
                        let currentVal = parseInt(D.substring(0, correctLen), 10);
                        const totalSteps = D.length - correctLen + 1;
                        
                        const newRows = [];
                        const newQ = [];

                        for (let step = 0; step < totalSteps; step++) {
                            const qDigit = Math.floor(currentVal / d);
                            newQ[step] = String(qDigit);
                            
                            const rem = currentVal % d;
                            const remStr = String(rem);
                            
                            const remainderInputs = {};
                            for (let i = 0; i < remStr.length; i++) {
                                const c = (correctLen - 1 + step) - i;
                                remainderInputs[c] = remStr[remStr.length - 1 - i];
                            }
                            
                            let droppedChar = null;
                            let dropColIndex = null;
                            if (step < totalSteps - 1) {
                                dropColIndex = correctLen + step;
                                droppedChar = D[dropColIndex];
                                remainderInputs[dropColIndex] = droppedChar; 
                                currentVal = parseInt(remStr + droppedChar, 10);
                            }

                            newRows.push({
                                remainderInputs,
                                droppedChar,
                                dropColIndex,
                            });
                        }
                        
                        setStepRows([...newRows]);
                        setQuotientInputs([...newQ]);

                        Object.keys(targetCommas).forEach(k => { if (k.startsWith('q-')) delete targetCommas[k]; });
                        const currentDecd_t = countDecimals(currentdStr);
                        const expQDecs = Math.max(0, currentDecD_t - currentDecd_t);
                        const expectedCommaPos = expQDecs > 0 ? expQDecs - 1 : -1;
                        if (expectedCommaPos >= 0 && targetQPrefix === '') targetCommas[`q-${expectedCommaPos}`] = true;
                        
                        setVisualCommas(targetCommas);
                        setHelpedFields({});
                        setStatus('playing');
                    }
                }
            }, [autoSolve, setupMode, safeDividendRaw, safeDivisorRaw, useDecimals, draggedDividendSuffix, draggedQuotientPrefix, visualCommas, status, trueD, trued]);

            const selectArc = (len) => {
                setArcLen(len);
                setStatus('playing');
                
                const D = stripDecimals(userDStr);
                const newRows = [];
                const totalSteps = D.length - len + 1;
                for (let i = 0; i < totalSteps; i++) {
                newRows.push({
                    remainderInputs: {},
                    droppedChar: i < totalSteps - 1 ? D[len + i] : null,
                    dropColIndex: i < totalSteps - 1 ? len + i : null,
                });
                }
                setStepRows(newRows);
                setQuotientInputs(Array(totalSteps).fill(''));
            };

            const handleRemainderChange = (rowIndex, colIndex, val) => {
                const newRows = [...stepRows];
                newRows[rowIndex].remainderInputs[colIndex] = val;
                setStepRows(newRows);
            };

            const handleQuotientChange = (idx, val) => {
                const newQ = [...quotientInputs];
                newQ[idx] = val;
                setQuotientInputs(newQ);
            };

            const getExpectedDivision = () => {
                if (arcLen === 0) return { expRem: {}, expQ: {} };
                const expRem = {};
                const expQ = {};
                const D = stripDecimals(userDStr);
                const d = parseInt(stripDecimals(userdStr), 10);
                
                let currentVal = parseInt(D.substring(0, arcLen), 10);
                
                for (let step = 0; step < D.length - arcLen + 1; step++) {
                    const qDigit = Math.floor(currentVal / d);
                    expQ[step] = String(qDigit);
                    
                    const rem = currentVal % d;
                    const remStr = String(rem);
                    
                    for (let i = 0; i < remStr.length; i++) {
                        const c = (arcLen - 1 + step) - i;
                        expRem[`${step}-${c}`] = remStr[remStr.length - 1 - i];
                    }
                    if (step < D.length - arcLen) {
                        const dropCol = arcLen + step;
                        const dropChar = D[dropCol];
                        currentVal = parseInt(remStr + dropChar, 10);
                    }
                }
                return { expRem, expQ };
            };

            const handleHelp = () => {
                if (status === 'transform_decimals') {
                    const decd_orig = countDecimals(safeDivisorRaw);
                    const decD_orig = countDecimals(safeDividendRaw);
                    
                    let nextCommas = {...visualCommas};
                    Object.keys(nextCommas).forEach(k => { if (k.startsWith('divisor-')) delete nextCommas[k] });
                    Object.keys(nextCommas).forEach(k => { if (k.startsWith('dividend-')) delete nextCommas[k] });
                    
                    let newDecD = Math.max(0, decD_orig - decd_orig);
                    if (newDecD > 0) nextCommas[`dividend-${newDecD - 1}`] = true;
                    
                    let zeroesToAdd = Math.max(0, decd_orig - decD_orig);
                    if (zeroesToAdd > 0) {
                        setDraggedDividendSuffix('0'.repeat(zeroesToAdd));
                    } else {
                        setDraggedDividendSuffix('');
                    }
                    
                    setVisualCommas(nextCommas);
                    return;
                }
                
                if (trueD < trued && draggedQuotientPrefix === '') {
                    let tempD = trueD;
                    let z = 0;
                    while (tempD < trued) {
                        tempD *= 10;
                        z++;
                    }
                    let qPref = '0,';
                    if (z > 1) qPref += '0'.repeat(z - 1);
                    
                    setDraggedDividendSuffix('0'.repeat(z));
                    setDraggedQuotientPrefix(qPref);
                    return;
                }

                const D = stripDecimals(userDStr);
                if (arcLen === 0) {
                    let len = 1;
                    while (parseInt(D.substring(0, len), 10) < parseInt(stripDecimals(userdStr), 10) && len < D.length) len++;
                    let intDigits_t = D.length - decD_t;
                    if (intDigits_t <= 0) intDigits_t = 1;
                    if (useDecimals && decD_t > 0 && len > intDigits_t && draggedQuotientPrefix === '') len = intDigits_t;
                    selectArc(len);
                    return;
                }

                const { expRem, expQ } = getExpectedDivision();
                const totalSteps = D.length - arcLen + 1;

                for (let step = 0; step < totalSteps; step++) {
                    if (quotientInputs[step] !== expQ[step]) {
                        handleQuotientChange(step, expQ[step]);
                        setHelpedFields(prev => ({...prev, [`q-${step}`]: true}));
                        return;
                    }
                    
                    const rightmostC = arcLen - 1 + step;
                    for (let c = rightmostC; c >= 0; c--) {
                        const expVal = expRem[`${step}-${c}`];
                        if (expVal !== undefined) {
                            const actualVal = stepRows[step]?.remainderInputs[c];
                            if (actualVal !== expVal) {
                                handleRemainderChange(step, c, expVal);
                                setHelpedFields(prev => ({...prev, [`rem-${step}-${c}`]: true}));
                                return;
                            }
                        }
                    }

                    if (step < totalSteps - 1) {
                        const dropCol = arcLen + step;
                        const expDrop = D[dropCol];
                        const actualVal = stepRows[step]?.remainderInputs[dropCol];
                        if (actualVal !== expDrop) {
                            handleRemainderChange(step, dropCol, expDrop);
                            setHelpedFields(prev => ({...prev, [`rem-${step}-${dropCol}`]: true}));
                            return;
                        }
                    }
                }

                const expectedCommaPos = Math.max(0, decD_t - decd_t) > 0 ? Math.max(0, decD_t - decd_t) - 1 : -1;
                if (useDecimals && draggedQuotientPrefix === '') {
                    const qCommas = Object.keys(visualCommas).filter(k => k.startsWith('q-') && visualCommas[k]);
                    const hasWrongCommas = qCommas.some(k => expectedCommaPos < 0 || k !== `q-${expectedCommaPos}`);
                    if (hasWrongCommas || (expectedCommaPos >= 0 && !visualCommas[`q-${expectedCommaPos}`])) {
                        setVisualCommas(prev => {
                            const next = {...prev};
                            Object.keys(next).forEach(k => { if (k.startsWith('q-')) delete next[k]; });
                            if (expectedCommaPos >= 0) next[`q-${expectedCommaPos}`] = true;
                            return next;
                        });
                        return;
                    }
                }
            };

            const checkResult = () => {
                if (userdStr.includes(',')) {
                    setStatus('incorrect'); return;
                }

                let expectedQPrefix = '';
                if (trueD < trued) {
                    let tempD = trueD;
                    let z = 0;
                    while (tempD < trued) { tempD *= 10; z++; }
                    expectedQPrefix = '0,';
                    if (z > 1) expectedQPrefix += '0'.repeat(z - 1);
                }
                
                const isQPrefixCorrect = draggedQuotientPrefix === expectedQPrefix;

                let prefixMultiplier = 1;
                if (draggedQuotientPrefix === '0,') prefixMultiplier = 0.1;
                else if (draggedQuotientPrefix.startsWith('0,0')) {
                    prefixMultiplier = Math.pow(10, -(draggedQuotientPrefix.length - 1));
                }
                
                const userDVal = parseFloat((userDStr||'0').replace(',','.'));
                const userdVal = parseFloat((userdStr||'1').replace(',','.'));
                const userRatio = userdVal !== 0 ? (userDVal / userdVal) : 0;
                const trueRatio = trued !== 0 ? (trueD / trued) : 0;
                const isRatioCorrect = Math.abs((userRatio * prefixMultiplier) - trueRatio) < 0.000001;

                const { expRem, expQ } = getExpectedDivision();
                const expectedQStr = Object.keys(expQ).sort((a,b)=>a-b).map(k => expQ[k]).join('');
                
                const D = stripDecimals(userDStr);
                const totalSteps = D.length - arcLen + 1;
                const lastStep = totalSteps - 1;
                
                let expectedRemStr = '';
                if (lastStep >= 0) {
                    const keys = Object.keys(expRem).filter(k => k.startsWith(`${lastStep}-`)).sort((a,b) => parseInt(a.split('-')[1]) - parseInt(b.split('-')[1]));
                    expectedRemStr = keys.map(k => expRem[k]).join('');
                }

                const userQ = quotientInputs.join('');
                let userRemStr = '';
                if (stepRows.length > 0) {
                    const lastRow = stepRows[stepRows.length - 1];
                    userRemStr = Object.keys(lastRow.remainderInputs)
                        .sort((a,b) => parseInt(a, 10) - parseInt(b, 10))
                        .map(k => lastRow.remainderInputs[k])
                        .join('');
                }

                const isQCorrect = userQ === expectedQStr;
                const isRemCorrect = userRemStr !== '' && parseInt(userRemStr || '0', 10) === parseInt(expectedRemStr || '0', 10);
                
                const expectedCommaPos = Math.max(0, decD_t - decd_t) > 0 ? Math.max(0, decD_t - decd_t) - 1 : -1;
                const isCommaCorrect = (!useDecimals || draggedQuotientPrefix !== '') ? true : verifyCommas(visualCommas, 'q-', expectedCommaPos);

                if (isQCorrect && isRemCorrect && isCommaCorrect && isQPrefixCorrect && isRatioCorrect) {
                    setStatus('correct');
                } else {
                    setStatus('incorrect');
                }
            };

            const renderArc = () => {
                if (arcLen === 0) return null;
                const widthPerChar = 40; 
                const width = arcLen * widthPerChar;
                return (
                <svg className="absolute -top-3 left-0" width={width} height="16" style={{ pointerEvents: 'none' }}>
                    <path d={`M 4 12 Q ${width/2} -4 ${width-4} 12`} fill="none" stroke="#0d9488" strokeWidth="3" strokeLinecap="round"/>
                </svg>
                );
            };

            if (setupMode) {
                return (
                <div className="flex flex-col items-center space-y-6">
                    <h3 className="text-3xl font-bold text-gray-700 mb-2">Introduce los números</h3>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Dividendo:</span>
                    <input type="text" className="border-4 border-teal-300 rounded-xl p-4 text-3xl font-mono w-64 focus:outline-none focus:border-teal-500" value={dividendRaw} onChange={(e) => setDividendRaw(useDecimals ? e.target.value.replace(/[^0-9.,]/g, '') : e.target.value.replace(/[^0-9]/g, ''))} />
                    </div>
                    <div className="flex items-center space-x-4">
                    <span className="font-bold text-2xl whitespace-nowrap">Divisor:</span>
                    <input type="text" className="border-4 border-teal-300 rounded-xl p-4 text-3xl font-mono w-64 focus:outline-none focus:border-teal-500" value={divisorRaw} onChange={(e) => setDivisorRaw(useDecimals ? e.target.value.replace(/[^0-9.,]/g, '') : e.target.value.replace(/[^0-9]/g, ''))} />
                    </div>
                    <button 
                    onClick={() => {
                        let currentD = safeDividendRaw.replace(',', '.');
                        let currentd = safeDivisorRaw.replace(',', '.');
                        
                        if (!currentD || !currentd || parseFloat(currentd) === 0) {
                            alert("Números inválidos. Asegúrate de que el divisor no sea 0.");
                            return;
                        }

                        let mVal = parseFloat(currentD);
                        let sVal = parseFloat(currentd);
                        
                        if (mVal < sVal && level < 6) {
                            alert("Las divisiones manuales con dividendo menor que el divisor solo están permitidas seleccionando 6º curso.");
                            return;
                        }

                        setDividendRaw(currentD.replace('.', ','));
                        setDivisorRaw(currentd.replace('.', ','));
                        setSetupMode(false);
                        resetBoard(currentD.replace('.', ','), currentd.replace('.', ','));
                    }}
                    className="bg-teal-500 text-white px-8 py-4 mt-4 text-2xl rounded-2xl font-bold hover:bg-teal-600 flex items-center shadow-lg"
                    >
                    <Check className="mr-3 w-8 h-8" /> Comenzar División
                    </button>
                </div>
                );
            }

            const isDividendReady = parseFloat((userDStr||'0').replace(',','.')) >= parseFloat((userdStr||'1').replace(',','.'));
            const showDecimalsUI = useDecimals || (level === 6 && (!isDividendReady || draggedQuotientPrefix !== '' || draggedDividendSuffix !== ''));

            return (
                <div className="flex flex-col items-center relative">

                {/* --- PALETA PARA ARRASTRAR Y SOLTAR --- */}
                {showDecimalsUI && arcLen === 0 && (
                    <DragPalette 
                        useDecimals={true} 
                        onDelD={() => { 
                            if (draggedDividendSuffix.length > 0) {
                                setDraggedDividendSuffix(p => p.slice(0,-1)); 
                                setVisualCommas(prev => {
                                    const next = {};
                                    for (let k in prev) {
                                        if (k.startsWith('dividend-')) {
                                            const power = parseInt(k.split('-')[1], 10);
                                            if (power > 0) next[`dividend-${power - 1}`] = prev[k];
                                        } else {
                                            next[k] = prev[k];
                                        }
                                    }
                                    return next;
                                });
                                setArcLen(0); 
                                if(status==='playing') setStatus('select_arc'); 
                            }
                        }}
                        onDelQ={() => setDraggedQuotientPrefix(p => p.slice(0,-1))}
                    />
                )}

                {status === 'transform_decimals' ? (
                    <div className="mb-6 flex flex-col items-center p-4 bg-purple-50 rounded-xl border border-purple-400 shadow-md animate-pulse z-20 max-w-sm text-center">
                        <p className="font-bold text-purple-800 text-lg mb-2">El divisor tiene decimales.</p>
                        <p className="text-purple-700 text-sm mb-4"><strong>1.</strong> Haz doble clic en la coma del divisor para quitarla.<br/><strong>2.</strong> Arrastra ceros o haz clic en el dividendo para compensar.</p>
                        <button onClick={handleCheckTransformation} className="bg-purple-500 text-white px-6 py-2 rounded-xl font-bold shadow hover:bg-purple-600">
                            Comprobar Transformación
                        </button>
                    </div>
                ) : status === 'select_arc' && !isDividendReady ? (
                    <div className="mb-6 flex flex-col items-center p-4 bg-yellow-50 rounded-xl border border-yellow-400 shadow-md animate-pulse z-20">
                        <p className="font-bold text-yellow-800 text-lg text-center">El dividendo es menor que el divisor.<br/>¡Arrastra ceros al dividendo y '0,' al cociente!</p>
                    </div>
                ) : status === 'select_arc' && isDividendReady && (
                    <div className="mb-6 p-4 bg-teal-50 rounded-xl border border-teal-200 text-center animate-pulse z-20">
                        <p className="font-bold text-teal-800 mb-2">¿Cuántas cifras coges para empezar?</p>
                        <div className="flex justify-center space-x-2">
                            {effectiveDividend.split('').map((_, i) => {
                                const isValidArc = !useDecimals || decD_t === 0 || (i + 1) <= effectiveDividend.length - decD_t || draggedQuotientPrefix !== '';
                                return (
                                    <button 
                                        key={i} 
                                        onClick={() => selectArc(i+1)} 
                                        disabled={!isValidArc}
                                        className={`px-4 py-2 bg-white border-2 rounded font-bold ${isValidArc ? 'border-teal-500 hover:bg-teal-500 hover:text-white' : 'border-gray-200 text-gray-300 cursor-not-allowed'}`}
                                    >
                                        {i + 1}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                )}

                <div className="flex items-start max-w-full mt-2">
                    <div className="bg-white p-8 rounded-xl shadow-lg border-2 border-teal-100 overflow-x-auto min-w-[300px] relative">
                    
                    <div className="flex items-start">
                        
                        <div className="flex flex-col items-end pr-12 sm:pr-20 relative">
                        
                        <div className="flex relative mb-2 items-center">
                            {renderArc()}
                            {effectiveDividend.split('').map((char, i) => {
                                const power = effectiveDividend.length - 1 - i;
                                return (
                                    <div key={i} className="w-10 h-12 flex items-center justify-center text-3xl font-mono font-bold tracking-widest relative">
                                        {showDecimalsUI && power >= 0 && <InteractiveComma id={`dividend-${power}`} commasMap={visualCommas} setCommasMap={setVisualCommas} />}
                                        {char}
                                        {stepRows.some((r) => r.dropColIndex === i) && (
                                        <ArrowDown className="absolute -bottom-6 text-orange-500 h-6 w-6 z-10" />
                                        )}
                                    </div>
                                );
                            })}
                            
                            {/* ZONA DE CAÍDA DIVIDENDO */}
                            {((!isDividendReady || !isTransformed) && arcLen === 0) && (
                                <div
                                    onDragOver={(e) => e.preventDefault()}
                                    onDrop={(e) => {
                                        const val = e.dataTransfer.getData('text/plain');
                                        if (val === '0') {
                                            setDraggedDividendSuffix(prev => prev + val);
                                            setVisualCommas(prev => {
                                                const next = {};
                                                for (let k in prev) {
                                                    if (k.startsWith('dividend-')) {
                                                        const power = parseInt(k.split('-')[1], 10);
                                                        next[`dividend-${power + 1}`] = prev[k];
                                                    } else {
                                                        next[k] = prev[k];
                                                    }
                                                }
                                                return next;
                                            });
                                            setArcLen(0);
                                            if (status === 'playing') setStatus('select_arc');
                                        } else if (val === ',') {
                                            setVisualCommas(prev => ({...prev, [`dividend-0`]: true}));
                                        }
                                    }}
                                    className={`w-10 h-12 ml-2 border-2 border-dashed ${draggedDividendSuffix ? 'border-gray-400 bg-gray-50' : 'border-teal-400 bg-teal-50'} flex items-center justify-center text-xl font-mono text-gray-400 rounded-lg opacity-60 hover:opacity-100 hover:bg-gray-100 transition-all`}
                                    title="Suelta ceros o comas aquí para añadir al dividendo"
                                >
                                    <span className="animate-bounce">⬇️</span>
                                </div>
                            )}
                        </div>

                        {arcLen > 0 && stepRows.map((row, rIndex) => (
                            <div key={`rem-row-${rIndex}`} className="flex mt-1 relative">
                            
                            {Array.from({ length: effectiveDividend.length }).map((_, cIndex) => {
                                const maxActiveCol = row.dropColIndex !== null ? row.dropColIndex : (arcLen - 1 + rIndex); 
                                
                                if (cIndex <= maxActiveCol) {

                                    if (row.droppedChar && cIndex === row.dropColIndex) {
                                        return (
                                        <div key={`rem-${rIndex}-${cIndex}`} className="w-10 h-12 relative">
                                            <div className="relative w-full h-full">
                                                <DigitInput
                                                    isSmall
                                                    readOnly={status === 'correct'}
                                                    value={row.remainderInputs[cIndex] || ''}
                                                    onChange={(v) => handleRemainderChange(rIndex, cIndex, v)}
                                                    className={`w-full h-full text-xl font-bold border-blue-300 text-blue-600 bg-blue-50 focus:bg-blue-100 ${status === 'incorrect' ? 'border-red-300' : ''}`}
                                                    isHelped={helpedFields[`rem-${rIndex}-${cIndex}`]}
                                                />
                                            </div>
                                        </div>
                                        )
                                    }

                                    return (
                                        <div key={`rem-${rIndex}-${cIndex}`} className="w-10 h-12 relative">
                                            <div className="relative w-full h-full">
                                                <DigitInput
                                                    isSmall
                                                    readOnly={status === 'correct'}
                                                    value={row.remainderInputs[cIndex] || ''}
                                                    onChange={(v) => handleRemainderChange(rIndex, cIndex, v)}
                                                    className={`w-full h-full text-xl border-gray-300 ${status === 'incorrect' ? 'border-red-300' : ''}`}
                                                    isHelped={helpedFields[`rem-${rIndex}-${cIndex}`]}
                                                />
                                            </div>
                                        </div>
                                    );
                                }
                                
                                return <div key={`rem-${rIndex}-${cIndex}`} className="w-10 h-12"></div>;
                            })}

                            {status === 'correct' && rIndex === stepRows.length - 1 && (
                                <svg className="absolute -bottom-5 right-0" width="30" height="15">
                                <path d="M 0 0 Q 15 15 30 0" fill="none" stroke="#16a34a" strokeWidth="3" strokeLinecap="round"/>
                                </svg>
                            )}
                            </div>
                        ))}

                        </div>

                        <div className="flex flex-col">
                        <div className="border-l-4 border-b-4 border-black pl-3 pb-2 flex relative">
                            {divisor.split('').map((char, i) => {
                                const power = divisor.length - 1 - i;
                                return (
                                <div key={i} className="w-6 flex items-center justify-center text-3xl font-mono font-bold tracking-widest relative">
                                    {showDecimalsUI && power >= 0 && <InteractiveComma id={`divisor-${power}`} commasMap={visualCommas} setCommasMap={setVisualCommas} isSmall />}
                                    <span 
                                        className="cursor-pointer hover:text-teal-600 hover:bg-teal-100 rounded px-1 transition-colors"
                                        title={`Pulsa para ver la tabla del ${char}`}
                                        onClick={() => setShowTableFor(char)}
                                    >
                                        {char}
                                    </span>
                                </div>
                                );
                            })}
                        </div>
                        
                        <div className="pl-4 pt-2 flex space-x-1 items-end">
                            {/* ZONA DE CAÍDA COCIENTE */}
                            {(isTransformed && !isDividendReady && arcLen === 0) && (
                                <div
                                    onDragOver={(e) => e.preventDefault()}
                                    onDrop={(e) => {
                                        const val = e.dataTransfer.getData('text/plain');
                                        if (val === '0' || val === ',') {
                                            setDraggedQuotientPrefix(prev => prev + val);
                                        }
                                    }}
                                    className={`min-w-[40px] px-2 h-12 pb-1 border-2 border-dashed flex items-end justify-center text-3xl font-mono font-bold text-teal-800 rounded-lg select-none transition-all ${draggedQuotientPrefix ? 'border-transparent' : 'border-teal-400 bg-teal-50 opacity-60 hover:opacity-100 hover:bg-teal-100'} mr-1`}
                                    title="Suelta ceros o comas aquí para el cociente"
                                >
                                    {draggedQuotientPrefix || <span className="text-xl text-teal-600 pb-1 animate-bounce">⬇️</span>}
                                </div>
                            )}
                            
                            {((isDividendReady || arcLen > 0) && draggedQuotientPrefix) && (
                                 <div className="flex items-end justify-center h-12 pb-1 text-3xl font-mono font-bold text-teal-800 mr-1 select-none whitespace-nowrap">
                                    {draggedQuotientPrefix}
                                </div>
                            )}

                            {arcLen > 0 && Array.from({ length: effectiveDividend.length - arcLen + 1 }).map((_, i) => {
                                const power = (effectiveDividend.length - arcLen) - i;
                                const hasHigher = quotientInputs.some((val, idx) => idx < i && val !== '');
                                return (
                                    <div key={`q-${i}`} className="relative">
                                        {showDecimalsUI && power >= 0 && draggedQuotientPrefix === '' && <InteractiveComma id={`q-${power}`} commasMap={visualCommas} setCommasMap={setVisualCommas} isSmall />}
                                        {!showDecimalsUI && power % 3 === 2 && hasHigher && <DotSeparator isSmall />}
                                        <DigitInput
                                            isSmall
                                            readOnly={status === 'correct'}
                                            value={quotientInputs[i] || ''}
                                            onChange={(v) => handleQuotientChange(i, v)}
                                            className={status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : 'bg-teal-50'}
                                            isHelped={helpedFields[`q-${i}`]}
                                        />
                                    </div>
                                );
                            })}
                        </div>
                        </div>

                    </div>
                    </div>

                    {showTableFor && (
                        <div className="ml-8 p-5 bg-yellow-50 border-2 border-yellow-400 rounded-xl shadow-md min-w-[160px]">
                            <h4 className="font-bold text-center mb-3 border-b-2 border-yellow-300 pb-2 text-yellow-800">
                            Tabla del {showTableFor}
                            </h4>
                            <div className="space-y-1">
                            {Array.from({ length: 9 }).map((_, i) => (
                                <div key={i} className="font-mono text-lg text-yellow-900 flex justify-between">
                                <span>{showTableFor} × {i + 1}</span>
                                <span className="font-bold ml-2 text-yellow-700">= {parseInt(showTableFor, 10) * (i + 1)}</span>
                                </div>
                            ))}
                            </div>
                            <button 
                            onClick={() => setShowTableFor(null)} 
                            className="mt-4 text-sm bg-red-100 text-red-600 px-3 py-2 rounded-lg hover:bg-red-200 w-full font-bold transition-colors"
                            >
                            Cerrar tabla
                            </button>
                        </div>
                    )}
                </div>

                <div className="mt-8 flex space-x-4">
                    {status !== 'correct' && status !== 'transform_decimals' && (
                    <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    {status === 'transform_decimals' && (
                    <button onClick={handleHelp} className="bg-purple-300 text-purple-900 px-6 py-3 rounded-xl font-bold hover:bg-purple-400 flex items-center shadow-md">
                        <HelpCircle className="mr-2" /> Ayuda
                    </button>
                    )}
                    {status === 'incorrect' && (
                    <button onClick={() => resetBoard(safeDividendRaw, safeDivisorRaw)} className="bg-orange-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-orange-600 flex items-center shadow-md">
                        <RefreshCw className="mr-2" /> Elegir otro arco
                    </button>
                    )}
                    {(status === 'playing' || status === 'incorrect') && (
                    <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 shadow-md">
                        Comprobar Operación
                    </button>
                    )}
                    <button onClick={onNext} className="bg-teal-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-teal-600 shadow-md">
                    Siguiente Operación
                    </button>
                </div>

                {status === 'correct' && <p className="mt-4 text-green-600 font-bold text-xl animate-bounce">¡División completada correctamente!</p>}
                {status === 'incorrect' && <p className="mt-4 text-red-500 font-bold text-xl">Hay algún fallo. Revisa la operación o los ceros y comas.</p>}
                </div>
            );
        };

        // --- FRACTION BOARD COMPONENT ---
        const FractionBoard = ({ operation, isManual, onNext, autoSolve, onSetupModeChange }) => {
            const [fracs, setFracs] = useState([{n: '', d: ''}, {n: '', d: ''}]);
            const [steps, setSteps] = useState([{n: '', d: ''}, {n: '', d: ''}]);
            const [res, setRes] = useState({n: '', d: ''});
            const [simpRes, setSimpRes] = useState({n: '', d: ''});
            const [setupMode, setSetupMode] = useState(isManual);
            const [status, setStatus] = useState('playing');
            const [helpedFields, setHelpedFields] = useState({});

            const [lcmFactors, setLcmFactors] = useState([{b: '', e: ''}]);
            const [lcmResult, setLcmResult] = useState('');

            const symMap = { 'add': '+', 'sub': '−', 'mul': '×', 'div': '÷' };
            const symbol = symMap[operation];

            useEffect(() => {
                onSetupModeChange(setupMode);
            }, [setupMode, onSetupModeChange]);

            useEffect(() => {
                if (!isManual) {
                    const count = (operation === 'add') ? randomInt(2, 3) : 2;
                    const newFracs = Array.from({length: count}, () => ({
                        n: String(randomInt(1, 10)), 
                        d: String(randomInt(2, 10))
                    }));

                    if (operation === 'sub' && newFracs.length === 2) {
                        const v1 = parseInt(newFracs[0].n)/parseInt(newFracs[0].d);
                        const v2 = parseInt(newFracs[1].n)/parseInt(newFracs[1].d);
                        if (v1 < v2) {
                            const temp = newFracs[0];
                            newFracs[0] = newFracs[1];
                            newFracs[1] = temp;
                        }
                    } else if (operation === 'div') {
                        if (newFracs[1].n === '0') newFracs[1].n = '1';
                    }

                    setFracs(newFracs);
                    setSteps(Array.from({length: count}, () => ({n: '', d: ''})));
                    setRes({n: '', d: ''});
                    setSimpRes({n: '', d: ''});
                    setLcmFactors([{b: '', e: ''}]);
                    setLcmResult('');
                    setSetupMode(false);
                    setStatus('playing');
                    setHelpedFields({});
                } else {
                    setFracs([{n: '', d: ''}, {n: '', d: ''}]);
                    setSteps([{n: '', d: ''}, {n: '', d: ''}]);
                    setRes({n: '', d: ''});
                    setSimpRes({n: '', d: ''});
                    setLcmFactors([{b: '', e: ''}]);
                    setLcmResult('');
                    setSetupMode(true);
                    setStatus('playing');
                    setHelpedFields({});
                }
            }, [operation, isManual]);

            const changeAddends = (count) => {
                setFracs(Array.from({length: count}, (_, i) => fracs[i] || {n: '', d: ''}));
                setSteps(Array.from({length: count}, () => ({n: '', d: ''})));
            };

            const getGcd = (a, b) => b === 0 ? a : getGcd(b, a % b);
            const getLcm = (a, b) => (a * b) / getGcd(a, b);
            const getArrayLcm = (arr) => arr.reduce((acc, val) => getLcm(acc, val), 1);

            const getExpectedSteps = () => {
                const parsedFracs = fracs.map(f => ({ n: parseInt(f.n, 10)||0, d: parseInt(f.d, 10)||1 }));
                if (operation === 'add' || operation === 'sub') {
                    const trueLcm = getArrayLcm(parsedFracs.map(f => f.d));
                    return parsedFracs.map(f => ({
                        n: f.n * (trueLcm / f.d),
                        d: trueLcm
                    }));
                } else {
                    return parsedFracs;
                }
            };

            const getExpected = () => {
                const parsedFracs = fracs.map(f => ({ n: parseInt(f.n, 10)||0, d: parseInt(f.d, 10)||1 }));
                let rn = 0, rd = 1;
                
                if (operation === 'add') {
                    rd = getArrayLcm(parsedFracs.map(f => f.d));
                    rn = parsedFracs.reduce((acc, f) => acc + f.n * (rd / f.d), 0);
                } else if (operation === 'sub') {
                    rd = getArrayLcm(parsedFracs.map(f => f.d));
                    rn = (parsedFracs[0].n * (rd / parsedFracs[0].d)) - (parsedFracs[1].n * (rd / parsedFracs[1].d));
                } else if (operation === 'mul') {
                    rn = parsedFracs.reduce((acc, f) => acc * f.n, 1);
                    rd = parsedFracs.reduce((acc, f) => acc * f.d, 1);
                } else if (operation === 'div') {
                    rn = parsedFracs[0].n * parsedFracs[1].d;
                    rd = parsedFracs[0].d * parsedFracs[1].n;
                }
                return { n: rn, d: rd };
            };

            const expResCalculated = getExpected();
            const resGcd = getGcd(Math.abs(expResCalculated.n), Math.abs(expResCalculated.d));
            const needsSimplification = resGcd > 1 && expResCalculated.n !== 0;

            const prevAutoSolve = useRef(autoSolve);
            useEffect(() => {
                if (autoSolve > prevAutoSolve.current) {
                    prevAutoSolve.current = autoSolve;
                    if (!setupMode && fracs.every(f => f.n !== '' && f.d !== '')) {
                        const expSteps = getExpectedSteps();
                        const expRes = getExpected();
                        
                        if (operation === 'add' || operation === 'sub') {
                            setSteps(expSteps.map(s => ({n: String(s.n), d: String(s.d)})));
                        }
                        
                        setRes({n: String(expRes.n), d: String(expRes.d)});
                        
                        if (resGcd > 1 && expRes.n !== 0) {
                            setSimpRes({n: String(expRes.n / resGcd), d: String(expRes.d / resGcd)});
                        }

                        if (operation === 'add' || operation === 'sub') {
                            setLcmResult(String(getArrayLcm(fracs.map(f => parseInt(f.d, 10) || 1))));
                        }
                        setStatus('playing');
                    }
                }
            }, [autoSolve, setupMode, fracs, operation, resGcd]);

            const handleHelp = () => {
                const expSteps = getExpectedSteps();
                const expRes = getExpected();
                
                if (operation === 'add' || operation === 'sub') {
                    for (let i = 0; i < steps.length; i++) {
                        if (steps[i].n !== String(expSteps[i].n)) {
                            const newSteps = [...steps]; newSteps[i] = {...newSteps[i], n: String(expSteps[i].n)};
                            setSteps(newSteps); setHelpedFields({...helpedFields, [`s${i}n`]: true}); return;
                        }
                        if (steps[i].d !== String(expSteps[i].d)) {
                            const newSteps = [...steps]; newSteps[i] = {...newSteps[i], d: String(expSteps[i].d)};
                            setSteps(newSteps); setHelpedFields({...helpedFields, [`s${i}d`]: true}); return;
                        }
                    }
                }
                
                if (res.n !== String(expRes.n)) { setRes({...res, n: String(expRes.n)}); setHelpedFields({...helpedFields, rn: true}); return; }
                if (res.d !== String(expRes.d)) { setRes({...res, d: String(expRes.d)}); setHelpedFields({...helpedFields, rd: true}); return; }

                if (needsSimplification) {
                    if (simpRes.n !== String(expRes.n / resGcd)) { setSimpRes({...simpRes, n: String(expRes.n / resGcd)}); setHelpedFields({...helpedFields, srn: true}); return; }
                    if (simpRes.d !== String(expRes.d / resGcd)) { setSimpRes({...simpRes, d: String(expRes.d / resGcd)}); setHelpedFields({...helpedFields, srd: true}); return; }
                }

                if (operation === 'add' || operation === 'sub') {
                    const trueLcm = getArrayLcm(fracs.map(f => parseInt(f.d, 10) || 1));
                    if (lcmResult !== String(trueLcm)) {
                        setLcmResult(String(trueLcm));
                        return;
                    }
                }
            };

            const checkResult = () => {
                const parsedFracs = fracs.map(f => ({ n: parseInt(f.n, 10), d: parseInt(f.d, 10) }));
                const rn = parseInt(res.n, 10); const rd = parseInt(res.d, 10);

                if (isNaN(rn) || isNaN(rd) || rd === 0) {
                    setStatus('incorrect'); return;
                }

                const exp = getExpected();
                
                let stepsEquivalent = true;
                let hasCommonDenominatorIfRequired = true;
                let isLcmCorrect = true;

                // Solo verificamos pasos intermedios en sumas y restas
                if (operation === 'add' || operation === 'sub') {
                    const parsedSteps = steps.map(s => ({ n: parseInt(s.n, 10), d: parseInt(s.d, 10) }));
                    if (parsedSteps.some(s => isNaN(s.n) || isNaN(s.d) || s.d === 0)) {
                        setStatus('incorrect'); return;
                    }
                    stepsEquivalent = parsedSteps.every((s, i) => s.n * parsedFracs[i].d === s.d * parsedFracs[i].n);
                    const commonD = parsedSteps[0].d;
                    hasCommonDenominatorIfRequired = parsedSteps.every(s => s.d === commonD);
                    if (lcmResult !== '') {
                        isLcmCorrect = parseInt(lcmResult, 10) === getArrayLcm(parsedFracs.map(f => f.d));
                    }
                }

                const isResEquivalent = rn * exp.d === rd * exp.n;

                let isSimpCorrect = true;
                if (needsSimplification) {
                    const srn = parseInt(simpRes.n, 10);
                    const srd = parseInt(simpRes.d, 10);
                    if (isNaN(srn) || isNaN(srd) || srd === 0) {
                        setStatus('incorrect'); return;
                    }
                    const isSimpEquivalent = (srn * exp.d === srd * exp.n);
                    const isIrreducible = getGcd(Math.abs(srn), Math.abs(srd)) === 1;
                    isSimpCorrect = isSimpEquivalent && isIrreducible;
                }

                if (stepsEquivalent && hasCommonDenominatorIfRequired && isResEquivalent && isLcmCorrect && isSimpCorrect) {
                    setStatus('correct');
                } else {
                    setStatus('incorrect');
                }
            };

            const updateLcmFactor = (index, field, val) => {
                const cleanVal = val.replace(/[^0-9]/g, '');
                const newFactors = [...lcmFactors];
                newFactors[index][field] = cleanVal;
                
                if (index === lcmFactors.length - 1 && field === 'b' && cleanVal !== '' && lcmFactors.length < 5) {
                    newFactors.push({b: '', e: ''});
                }
                setLcmFactors(newFactors);
            };

            if (setupMode) {
                return (
                    <div className="flex flex-col items-center space-y-6">
                        <h3 className="text-3xl font-bold text-gray-700 mb-2">Introduce las fracciones</h3>
                        
                        {operation === 'add' && (
                            <div className="flex flex-col items-center space-y-4 mb-4">
                                <span className="font-bold text-xl text-gray-700">¿Cuántos sumandos?</span>
                                <div className="flex space-x-2">
                                    {[2, 3, 4].map(num => (
                                        <button key={num} onClick={() => changeAddends(num)} className={`px-4 py-2 border-2 rounded-xl font-bold transition-colors shadow-sm ${fracs.length === num ? 'bg-purple-500 text-white border-purple-500' : 'bg-white text-gray-700 hover:bg-purple-100 border-gray-300'}`}>{num}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="flex flex-wrap justify-center items-center gap-4 bg-white p-6 md:p-8 rounded-2xl shadow-md border-4 border-purple-200">
                            {fracs.map((f, i) => (
                                <React.Fragment key={`setup-${i}`}>
                                    {i > 0 && <div className="text-4xl md:text-5xl font-bold text-purple-500">{symbol}</div>}
                                    <div className="flex flex-col items-center space-y-2">
                                        <input type="text" className="w-16 h-16 text-center font-mono text-3xl border-4 border-blue-300 rounded-xl focus:border-blue-500 focus:outline-none" value={f.n} onChange={e => {const newF=[...fracs]; newF[i] = {...newF[i], n: e.target.value.replace(/[^0-9]/g, '')}; setFracs(newF);}} placeholder="N" />
                                        <div className="w-20 border-b-4 border-black"></div>
                                        <input type="text" className="w-16 h-16 text-center font-mono text-3xl border-4 border-blue-300 rounded-xl focus:border-blue-500 focus:outline-none" value={f.d} onChange={e => {const newF=[...fracs]; newF[i] = {...newF[i], d: e.target.value.replace(/[^0-9]/g, '')}; setFracs(newF);}} placeholder="D" />
                                    </div>
                                </React.Fragment>
                            ))}
                        </div>
                        <button 
                        onClick={() => {
                            if (fracs.some(f => !f.n || !f.d || parseInt(f.d, 10) === 0)) {
                                alert("Rellena todas las casillas. Los denominadores no pueden ser 0.");
                                return;
                            }
                            if (operation === 'sub' && (parseInt(fracs[0].n, 10)/parseInt(fracs[0].d, 10) < parseInt(fracs[1].n, 10)/parseInt(fracs[1].d, 10))) {
                                alert("Para restar, la primera fracción debe ser mayor o igual a la segunda.");
                                return;
                            }
                            if (operation === 'div' && parseInt(fracs[1].n, 10) === 0) {
                                alert("No puedes dividir por una fracción con numerador cero.");
                                return;
                            }
                            setSetupMode(false);
                        }}
                        className="bg-purple-500 text-white px-8 py-4 mt-4 text-2xl rounded-2xl font-bold hover:bg-purple-600 flex items-center shadow-lg"
                        >
                        <Check className="mr-3 w-8 h-8" /> Comenzar
                        </button>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center relative">
                    <div className="relative flex flex-col xl:flex-row items-center gap-8 xl:gap-12">
                        
                        {/* Pizarra Principal */}
                        <div className="bg-white p-6 md:p-8 rounded-3xl shadow-2xl border-4 border-purple-200 flex flex-wrap justify-center items-center gap-3 md:gap-5 mt-4 max-w-[95vw]">
                            {/* Fracciones Originales */}
                            {fracs.map((f, i) => (
                                <React.Fragment key={`orig-${i}`}>
                                    {i > 0 && <div className="text-3xl md:text-4xl font-bold text-purple-500 pb-1">{symbol}</div>}
                                    <div className="flex flex-col items-center space-y-1">
                                        <div className="text-2xl md:text-3xl font-mono font-bold text-gray-800">{f.n}</div>
                                        <div className="w-10 md:w-14 border-b-[4px] border-black rounded-full"></div>
                                        <div className="text-2xl md:text-3xl font-mono font-bold text-gray-800">{f.d}</div>
                                    </div>
                                </React.Fragment>
                            ))}

                            {/* Solo mostrar pasos intermedios en Suma y Resta */}
                            {(operation === 'add' || operation === 'sub') && (
                                <React.Fragment>
                                    <div className="text-3xl md:text-4xl font-bold text-gray-700 pb-1">=</div>

                                    {/* Fracciones Intermedias (Pasos) */}
                                    {steps.map((s, i) => (
                                        <React.Fragment key={`step-${i}`}>
                                            {i > 0 && <div className="text-3xl md:text-4xl font-bold text-purple-500 pb-1">{symbol}</div>}
                                            <div className="flex flex-col items-center space-y-2">
                                                <input 
                                                    type="text" value={s.n} onChange={e => {const nS=[...steps]; nS[i] = {...nS[i], n: e.target.value.replace(/[^0-9]/g, '')}; setSteps(nS);}} 
                                                    className={`w-12 h-12 md:w-14 md:h-14 text-center font-mono text-xl md:text-2xl font-bold border-4 rounded-xl focus:outline-none transition-colors ${status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : 'bg-white border-purple-300 focus:border-purple-500'} ${helpedFields[`s${i}n`] ? 'animate-pulse bg-green-200 border-green-500' : ''}`} 
                                                    readOnly={status === 'correct'}
                                                />
                                                <div className="w-14 md:w-16 border-b-[4px] border-black rounded-full"></div>
                                                <input 
                                                    type="text" value={s.d} onChange={e => {const nS=[...steps]; nS[i] = {...nS[i], d: e.target.value.replace(/[^0-9]/g, '')}; setSteps(nS);}} 
                                                    className={`w-12 h-12 md:w-14 md:h-14 text-center font-mono text-xl md:text-2xl font-bold border-4 rounded-xl focus:outline-none transition-colors ${status === 'correct' ? 'bg-green-100 border-green-500' : status === 'incorrect' ? 'bg-red-100 border-red-500' : 'bg-white border-purple-300 focus:border-purple-500'} ${helpedFields[`s${i}d`] ? 'animate-pulse bg-green-200 border-green-500' : ''}`} 
                                                    readOnly={status === 'correct'}
                                                />
                                            </div>
                                        </React.Fragment>
                                    ))}
                                </React.Fragment>
                            )}
                            
                            <div className="text-3xl md:text-4xl font-bold text-gray-700 pb-1">=</div>
                            
                            {/* Fracción Resultado */}
                            <div className="flex flex-col items-center space-y-2">
                                <input 
                                    type="text" value={res.n} onChange={e => setRes({...res, n: e.target.value.replace(/[^0-9]/g, '')})} 
                                    className={`w-14 h-14 md:w-16 md:h-16 text-center font-mono text-2xl md:text-3xl font-bold border-4 rounded-2xl focus:outline-none transition-colors ${status === 'correct' ? 'bg-green-100 border-green-500 text-green-800' : status === 'incorrect' ? 'bg-red-100 border-red-500 text-red-800' : 'bg-white border-purple-300 focus:border-purple-500 text-gray-800'} ${helpedFields.rn ? 'animate-pulse bg-green-200 border-green-500 text-green-800' : ''}`} 
                                    readOnly={status === 'correct'}
                                />
                                <div className="w-16 md:w-20 border-b-[6px] border-black rounded-full"></div>
                                <input 
                                    type="text" value={res.d} onChange={e => setRes({...res, d: e.target.value.replace(/[^0-9]/g, '')})} 
                                    className={`w-14 h-14 md:w-16 md:h-16 text-center font-mono text-2xl md:text-3xl font-bold border-4 rounded-2xl focus:outline-none transition-colors ${status === 'correct' ? 'bg-green-100 border-green-500 text-green-800' : status === 'incorrect' ? 'bg-red-100 border-red-500 text-red-800' : 'bg-white border-purple-300 focus:border-purple-500 text-gray-800'} ${helpedFields.rd ? 'animate-pulse bg-green-200 border-green-500 text-green-800' : ''}`} 
                                    readOnly={status === 'correct'}
                                />
                            </div>

                            {/* Fracción Simplificada (si aplica) */}
                            {needsSimplification && (
                                <React.Fragment>
                                    <div className="text-3xl md:text-4xl font-bold text-gray-700 pb-1">=</div>
                                    <div className="flex flex-col items-center space-y-2">
                                        <input 
                                            type="text" value={simpRes.n} onChange={e => setSimpRes({...simpRes, n: e.target.value.replace(/[^0-9]/g, '')})} 
                                            className={`w-14 h-14 md:w-16 md:h-16 text-center font-mono text-2xl md:text-3xl font-bold border-4 rounded-2xl focus:outline-none transition-colors ${status === 'correct' ? 'bg-green-100 border-green-500 text-green-800' : status === 'incorrect' ? 'bg-red-100 border-red-500 text-red-800' : 'bg-white border-purple-300 focus:border-purple-500 text-gray-800'} ${helpedFields.srn ? 'animate-pulse bg-green-200 border-green-500 text-green-800' : ''}`} 
                                            readOnly={status === 'correct'}
                                        />
                                        <div className="w-16 md:w-20 border-b-[6px] border-black rounded-full"></div>
                                        <input 
                                            type="text" value={simpRes.d} onChange={e => setSimpRes({...simpRes, d: e.target.value.replace(/[^0-9]/g, '')})} 
                                            className={`w-14 h-14 md:w-16 md:h-16 text-center font-mono text-2xl md:text-3xl font-bold border-4 rounded-2xl focus:outline-none transition-colors ${status === 'correct' ? 'bg-green-100 border-green-500 text-green-800' : status === 'incorrect' ? 'bg-red-100 border-red-500 text-red-800' : 'bg-white border-purple-300 focus:border-purple-500 text-gray-800'} ${helpedFields.srd ? 'animate-pulse bg-green-200 border-green-500 text-green-800' : ''}`} 
                                            readOnly={status === 'correct'}
                                        />
                                    </div>
                                </React.Fragment>
                            )}
                        </div>

                        {/* PANEL DE FACTORIZACIÓN (Fuera de la pizarra, seguro de superposiciones) */}
                        { (operation === 'add' || operation === 'sub') && !setupMode && (
                            <div className="xl:absolute xl:left-[calc(100%+2rem)] xl:top-1/2 xl:transform xl:-translate-y-1/2 bg-white p-6 rounded-3xl shadow-2xl border-4 border-blue-300 flex flex-col items-center gap-4 z-[70] min-w-max">
                                <span className="text-sm font-bold text-blue-800 uppercase tracking-wide">Descompón los denominadores</span>
                                <div className="flex gap-4 md:gap-8 flex-wrap justify-center">
                                    {fracs.map((f, i) => (
                                        <FactorizationColumn key={`fact-${i}`} number={f.d} />
                                    ))}
                                </div>
                                
                                {/* SECCIÓN DEL MÍNIMO COMÚN MÚLTIPLO */}
                                <div className="w-full pt-4 border-t-4 border-blue-200 flex flex-col items-center gap-3 mt-2">
                                    <span className="text-sm font-bold text-blue-800 uppercase tracking-wide">Mínimo Común Múltiplo</span>
                                    <div className="flex flex-wrap items-center justify-center gap-1 sm:gap-2">
                                        <span className="font-bold text-xl text-blue-700">mcm =</span>
                                        {lcmFactors.map((factor, i) => (
                                            <React.Fragment key={i}>
                                                {i > 0 && <span className="font-bold text-gray-400">×</span>}
                                                <div className="relative inline-block mt-2 mb-2 mr-2">
                                                    <input
                                                        value={factor.b}
                                                        onChange={e => updateLcmFactor(i, 'b', e.target.value)}
                                                        className="w-10 h-10 text-xl font-bold text-center border-2 border-blue-400 rounded-md focus:outline-none focus:border-blue-600"
                                                    />
                                                    <input
                                                        value={factor.e}
                                                        onChange={e => updateLcmFactor(i, 'e', e.target.value)}
                                                        className="absolute -top-3 -right-3 w-6 h-6 text-sm font-bold text-center border-2 border-blue-400 rounded-md bg-blue-50 focus:outline-none focus:border-blue-600 z-10"
                                                    />
                                                </div>
                                            </React.Fragment>
                                        ))}
                                        <span className="font-bold text-xl text-gray-700 ml-1">=</span>
                                        <input
                                            value={lcmResult}
                                            onChange={e => setLcmResult(e.target.value.replace(/[^0-9]/g, ''))}
                                            className={`w-16 h-12 text-center font-bold text-2xl border-4 rounded-xl focus:outline-none ml-1 ${status === 'correct' && lcmResult !== '' ? 'bg-green-100 border-green-500 text-green-800' : status === 'incorrect' && lcmResult !== '' ? 'bg-red-100 border-red-500 text-red-800' : 'border-blue-400 focus:border-blue-600 text-blue-800'}`}
                                        />
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="mt-10 flex space-x-4 z-50">
                        {status !== 'correct' && (
                        <button onClick={handleHelp} className="bg-yellow-400 text-yellow-900 px-6 py-3 rounded-xl font-bold hover:bg-yellow-500 flex items-center shadow-md">
                            <HelpCircle className="mr-2" /> Ayuda
                        </button>
                        )}
                        <button onClick={checkResult} className="bg-green-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-600 shadow-md flex items-center">
                            <CheckCircle2 className="mr-2" /> Comprobar
                        </button>
                        <button onClick={onNext} className="bg-blue-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 shadow-md flex items-center">
                            Siguiente <ChevronRight className="ml-2" />
                        </button>
                    </div>
                    {status === 'correct' && <p className="mt-6 text-green-600 font-bold text-2xl animate-bounce">¡Correcto! ¡Muy bien!</p>}
                    {status === 'incorrect' && <p className="mt-6 text-red-500 font-bold text-xl">Hay un error. Revisa tus cálculos.</p>}
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            const [hasStarted, setHasStarted] = useState(false);
            const [operation, setOperation] = useState('add'); 
            const [mode, setMode] = useState('auto'); 
            const [level, setLevel] = useState(3);
            const [useDecimals, setUseDecimals] = useState(false);
            const [useFractions, setUseFractions] = useState(false);
            const [refreshKey, setRefreshKey] = useState(0);
            const [autoSolveCount, setAutoSolveCount] = useState(0);
            
            const [shiftMainCircle, setShiftMainCircle] = useState(false);

            const config = useMemo(() => {
                switch(level) {
                case 1: return { numAddends: 2, maxDigits: 1, digitsMin: 1, digitsSub: 1, digitsMultiplicand: 1, digitsMultiplier: 1, digitsDividend: 2, digitsDivisor: 1 };
                case 2: return { numAddends: 2, maxDigits: 2, digitsMin: 2, digitsSub: 2, digitsMultiplicand: 2, digitsMultiplier: 1, digitsDividend: 3, digitsDivisor: 1 };
                case 3: return { numAddends: 3, maxDigits: 3, digitsMin: 3, digitsSub: 3, digitsMultiplicand: 3, digitsMultiplier: 1, digitsDividend: 3, digitsDivisor: 2 };
                case 4: return { numAddends: 3, maxDigits: 4, digitsMin: 4, digitsSub: 4, digitsMultiplicand: 3, digitsMultiplier: 2, digitsDividend: 4, digitsDivisor: 2 };
                case 5: return { numAddends: 4, maxDigits: 5, digitsMin: 5, digitsSub: 5, digitsMultiplicand: 4, digitsMultiplier: 3, digitsDividend: 5, digitsDivisor: 2 };
                case 6: return { numAddends: 4, maxDigits: 6, digitsMin: 6, digitsSub: 6, digitsMultiplicand: 4, digitsMultiplier: 3, digitsDividend: 5, digitsDivisor: 3 };
                default: return { numAddends: 2, maxDigits: 2, digitsMin: 2, digitsSub: 2, digitsMultiplicand: 2, digitsMultiplier: 1, digitsDividend: 2, digitsDivisor: 1 };
                }
            }, [level]);

            useEffect(() => {
                if (level < 5 && useDecimals) setUseDecimals(false);
                if (level < 6 && useFractions) setUseFractions(false);
            }, [level, useDecimals, useFractions]);

            useEffect(() => {
                const container = document.getElementById('main-circle-container');
                if (container) {
                    if (shiftMainCircle) {
                        container.classList.add('xl:-translate-x-[10vw]');
                    } else {
                        container.classList.remove('xl:-translate-x-[10vw]');
                    }
                }
            }, [shiftMainCircle]);

            const nextOperation = () => {
                setRefreshKey(prev => prev + 1);
                setAutoSolveCount(0);
            };

            const handlePoetClick = () => {
                const pwd = prompt("Introduce la contraseña del poeta:");
                if (pwd === "padm2026") {
                    setAutoSolveCount(prev => prev + 1);
                } else if (pwd && pwd.toLowerCase() === "salir") {
                    setHasStarted(false);
                } else if (pwd !== null && pwd !== "") {
                    alert("Contraseña incorrecta.");
                }
            };

            const activeClasses = "bg-white text-blue-600 shadow-md rounded-xl font-extrabold border-2 border-blue-200 scale-105";
            const inactiveClasses = "text-gray-500 hover:text-gray-700 hover:bg-gray-200 rounded-xl transition-colors border-2 border-transparent font-semibold";

            const operationsConfig = [
                { id: 'add', name: 'Suma', sym: '+', delay: 'delay-1', bg: '#3b82f6', border: '#1d4ed8', text: '#ffffff' },
                { id: 'sub', name: 'Resta', sym: '−', delay: 'delay-2', bg: '#ef4444', border: '#b91c1c', text: '#ffffff' },
                { id: 'mul', name: 'Multiplicación', sym: '×', delay: 'delay-3', bg: '#D4AF37', border: '#998022', text: '#ffffff' },
                { id: 'div', name: 'División', sym: '÷', delay: 'delay-4', bg: '#C0C0C0', border: '#808080', text: '#000000' },
            ];

            if (!hasStarted) {
                return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                    <img 
                    src="poeta2.jpg" 
                    alt="¿Quieres que te ayude a calcular?" 
                    onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/600x400/e2e8f0/1e40af?text=Foto+del+Poeta+(poeta2.jpg)"; }}
                    className="max-w-xl w-full cursor-pointer hover:scale-105 transition-transform duration-300 drop-shadow-xl rounded-2xl"
                    onClick={() => setHasStarted(true)}
                    />
                    <p 
                    className="mt-8 text-2xl font-bold text-blue-600 animate-pulse cursor-pointer text-center" 
                    onClick={() => setHasStarted(true)}
                    >
                    ¡Pulsa en el poeta para comenzar!
                    </p>
                </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans p-4 overflow-x-hidden">
                <div className="w-[98%] max-w-[1600px] mx-auto">
                    
                    <div className="w-full overflow-x-auto pb-28 -mb-16 pt-2 px-2 z-20 relative">
                        
                        <div className="bg-white p-4 lg:p-6 rounded-2xl shadow-md mb-2 flex flex-nowrap gap-6 lg:gap-10 items-center justify-between border-4 border-gray-200 min-w-max mx-auto">
                        
                        <div className="flex bg-gray-100 p-2 rounded-2xl gap-2 shrink-0">
                            {operationsConfig.map((op) => {
                                const isActive = operation === op.id;
                                return (
                                <div key={op.id} className="relative">
                                    <button 
                                        onClick={() => { setOperation(op.id); setAutoSolveCount(0); }} 
                                        className={`px-6 sm:px-8 py-3 text-xl lg:text-2xl transition-all z-10 relative whitespace-nowrap ${isActive ? activeClasses : inactiveClasses}`}
                                    >
                                        {op.name}
                                    </button>
                                    <div className={`hanging-container ${op.delay}`}>
                                        <div 
                                            className="hanging-rope"
                                            style={{ height: isActive ? '45px' : '15px' }}
                                        ></div>
                                        <div 
                                            className="hanging-badge" 
                                            style={{ backgroundColor: op.bg, borderColor: op.border, color: op.text }}
                                        >
                                            {op.sym}
                                        </div>
                                    </div>
                                </div>
                                );
                            })}
                        </div>

                        <img 
                            src="poeta2.jpg" 
                            alt="Poeta calculador" 
                            onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/100x100/e2e8f0/1e40af?text=Poeta"; }}
                            className="h-24 lg:h-32 w-auto object-contain rounded-xl shadow-lg cursor-pointer hover:scale-110 transition-transform shrink-0 mx-4"
                            onClick={handlePoetClick}
                            title="Opciones mágicas"
                        />

                        <div className="flex items-center space-x-6 lg:space-x-8 shrink-0">
                            <div className="flex flex-col items-center gap-2 w-full min-w-[280px]">
                                <div className="flex items-center space-x-3">
                                    <span className="text-gray-700 font-extrabold text-xl lg:text-2xl whitespace-nowrap">Nivel:</span>
                                    <select 
                                        value={level} 
                                        onChange={(e) => { setLevel(parseInt(e.target.value)); setAutoSolveCount(0); }}
                                        className="border-2 border-gray-300 rounded-xl shadow-sm focus:border-blue-400 focus:ring focus:ring-blue-200 focus:ring-opacity-50 disabled:bg-gray-200 text-xl lg:text-2xl py-2 px-4 font-bold text-gray-700 cursor-pointer"
                                    >
                                        {[1,2,3,4,5,6].map(l => <option key={l} value={l}>{l}º Primaria</option>)}
                                    </select>
                                </div>
                                
                                <div className="flex flex-row space-x-2 w-full justify-center">
                                    {level >= 5 && (
                                        <div className={`flex items-center justify-center px-3 py-1.5 rounded-xl border-2 transition-all ${useDecimals ? 'bg-green-100 border-green-400' : 'bg-gray-100 border-gray-300'} flex-1`}>
                                            <div className="relative inline-block w-9 mr-1 align-middle select-none transition duration-200 ease-in flex-shrink-0">
                                                <input 
                                                    type="checkbox" 
                                                    name="toggle-decimals" 
                                                    id="toggle-decimals" 
                                                    checked={useDecimals}
                                                    onChange={(e) => { 
                                                        setUseDecimals(e.target.checked); 
                                                        if (e.target.checked) setUseFractions(false);
                                                        setAutoSolveCount(0); 
                                                        setRefreshKey(prev => prev + 1); 
                                                    }}
                                                    className="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-gray-300 z-10"
                                                />
                                                <label htmlFor="toggle-decimals" className="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer"></label>
                                            </div>
                                            <label htmlFor="toggle-decimals" className={`font-bold text-sm lg:text-base cursor-pointer whitespace-nowrap ${useDecimals ? 'text-green-700' : 'text-gray-500'}`}>
                                                Decimales
                                            </label>
                                        </div>
                                    )}

                                    {level === 6 && (
                                        <div className={`flex items-center justify-center px-3 py-1.5 rounded-xl border-2 transition-all ${useFractions ? 'bg-purple-100 border-purple-400' : 'bg-gray-100 border-gray-300'} flex-1`}>
                                            <div className="relative inline-block w-9 mr-1 align-middle select-none transition duration-200 ease-in flex-shrink-0">
                                                <input 
                                                    type="checkbox" 
                                                    name="toggle-frac" 
                                                    id="toggle-frac" 
                                                    checked={useFractions}
                                                    onChange={(e) => { 
                                                        setUseFractions(e.target.checked); 
                                                        if (e.target.checked) setUseDecimals(false);
                                                        setAutoSolveCount(0); 
                                                        setRefreshKey(prev => prev + 1); 
                                                    }}
                                                    className="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-gray-300 z-10"
                                                    style={useFractions ? { right: 0, borderColor: '#a855f7' } : {}}
                                                />
