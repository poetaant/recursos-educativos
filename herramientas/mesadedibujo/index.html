    /* --- MESA DE DIBUJO --- */
    const MesaDeDibujo = ({ onBack }) => {
      const svgRef = React.useRef(null);
      const lastTap = React.useRef({}); 
      const [polygons, setPolygons] = useState([]);
      const [circles, setCircles] = useState([]);
      const [segments, setSegments] = useState([]); 
      const [currentPoints, setCurrentPoints] = useState([]);
      const [currentCenter, setCurrentCenter] = useState(null);
      const [currentSegmentStart, setCurrentSegmentStart] = useState(null); 
      const [segmentColor, setSegmentColor] = useState('#EF4444'); 
      const [cursorPos, setCursorPos] = useState(null);
      const [selectedElements, setSelectedElements] = useState({});
      const [activeTool, setActiveTool] = useState('pencil'); 
      
      const [dragAction, setDragAction] = useState(null);
      const [isDragging, setIsDragging] = useState(false);
      const [edgeInput, setEdgeInput] = useState(null);
      const [triangleTypeInput, setTriangleTypeInput] = useState(null);

      const [cycle, setCycle] = useState(3);
      
      // ESTADO DE LA REGLA VIRTUAL
      const [showRuler, setShowRuler] = useState(false);
      const [rulerState, setRulerState] = useState({ x: 600, y: 150, angle: 0 });

      // ESTADO DEL TRANSPORTADOR VIRTUAL
      const [showProtractor, setShowProtractor] = useState(false);
      const [protractorState, setProtractorState] = useState({ x: 400, y: 250, angle: 0 });

      // ESTADOS MODO PRUEBA
      const [isTestMode, setIsTestMode] = useState(false);
      const [currentTest, setCurrentTest] = useState(null);
      const [testAnswers, setTestAnswers] = useState({});
      const [testResults, setTestResults] = useState(null);

      const gridSize = 40;
      const snap = (val) => Math.round(val / gridSize) * gridSize;
      
      const canvasHeight = isTestMode ? 1200 : 800;

      const getCoords = (e) => {
        if (!svgRef.current) return null;
        const pt = svgRef.current.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const svgP = pt.matrixTransform(svgRef.current.getScreenCTM().inverse());
        const x = Math.max(0, Math.min(1600, snap(svgP.x)));
        const y = Math.max(0, Math.min(canvasHeight, snap(svgP.y)));
        return { x, y, exactX: svgP.x, exactY: svgP.y };
      };

      const startDrag = (e, actionBuilder, forceAllow = false) => {
        if (!forceAllow && (activeTool !== 'move' || isTestMode)) return;
        e.stopPropagation();
        const coords = getCoords(e);
        if (!coords) return;
        
        try { e.target.setPointerCapture(e.pointerId); } catch(err) {}
        setDragAction(actionBuilder(coords));
        setIsDragging(false); 
      };

      const handlePointerMove = (e) => {
        const coords = getCoords(e);
        if (!coords) return;
        
        if (!isTestMode) setCursorPos(coords);

        if (dragAction) {
          setIsDragging(true);

          // Arrastrar Regla (Funciona en todos los modos)
          if (dragAction.type === 'ruler-body') {
            const dx = coords.exactX - dragAction.startX;
            const dy = coords.exactY - dragAction.startY;
            setRulerState(prev => ({
              ...prev,
              x: dragAction.initialPos.x + dx,
              y: dragAction.initialPos.y + dy
            }));
            return;
          }
          if (dragAction.type === 'ruler-rotate') {
            const angle = Math.atan2(coords.exactY - dragAction.originY, coords.exactX - dragAction.originX) * 180 / Math.PI;
            setRulerState(prev => ({ ...prev, angle }));
            return;
          }

          // Arrastrar Transportador (Funciona en todos los modos)
          if (dragAction.type === 'protractor-body') {
            const dx = coords.exactX - dragAction.startX;
            const dy = coords.exactY - dragAction.startY;
            setProtractorState(prev => ({
              ...prev,
              x: dragAction.initialPos.x + dx,
              y: dragAction.initialPos.y + dy
            }));
            return;
          }
          if (dragAction.type === 'protractor-rotate') {
            const angle = Math.atan2(coords.exactY - dragAction.originY, coords.exactX - dragAction.originX) * 180 / Math.PI;
            setProtractorState(prev => ({ ...prev, angle }));
            return;
          }

          // Movimiento de figuras (Bloqueado en Modo Prueba)
          if (isTestMode) return;

          const dx = coords.x - dragAction.startX;
          const dy = coords.y - dragAction.startY;

          if (dragAction.type === 'poly-vertex') {
            setPolygons(prev => {
              const newPolys = [...prev];
              const poly = [...newPolys[dragAction.polyIdx]];
              poly[dragAction.vertIdx] = { x: coords.x, y: coords.y };
              newPolys[dragAction.polyIdx] = poly;
              return newPolys;
            });
          } else if (dragAction.type === 'poly-body') {
            setPolygons(prev => {
              const newPolys = [...prev];
              newPolys[dragAction.polyIdx] = dragAction.initialPoly.map(p => ({ x: p.x + dx, y: p.y + dy }));
              return newPolys;
            });
          } else if (dragAction.type === 'circle-body') {
            setCircles(prev => {
              const newCircles = [...prev];
              newCircles[dragAction.circleIdx].center = { x: dragAction.initialCenter.x + dx, y: dragAction.initialCenter.y + dy };
              return newCircles;
            });
          } else if (dragAction.type === 'circle-edge') {
            setCircles(prev => {
              const newCircles = [...prev];
              const c = newCircles[dragAction.circleIdx];
              c.radius = Math.max(gridSize, snap(Math.hypot(coords.x - c.center.x, coords.y - c.center.y)));
              return newCircles;
            });
          } else if (dragAction.type === 'segment-body') {
            setSegments(prev => {
              const newSegs = [...prev];
              newSegs[dragAction.segIdx] = {
                ...dragAction.initialSeg,
                p1: { x: dragAction.initialSeg.p1.x + dx, y: dragAction.initialSeg.p1.y + dy },
                p2: { x: dragAction.initialSeg.p2.x + dx, y: dragAction.initialSeg.p2.y + dy }
              };
              return newSegs;
            });
          } else if (dragAction.type === 'segment-endpoint') {
            setSegments(prev => {
              const newSegs = [...prev];
              newSegs[dragAction.segIdx][dragAction.point] = { x: coords.x, y: coords.y };
              return newSegs;
            });
          }
        }
      };

      const handlePointerUp = (e) => {
        if (dragAction) {
          setDragAction(null);
          setTimeout(() => setIsDragging(false), 100);
        }
      };

      const handleSvgClick = (e) => {
        if (isTestMode) return;
        const now = Date.now();
        if (now - (lastTap.current['svg_click'] || 0) < 150) return; 
        lastTap.current['svg_click'] = now;

        const coords = getCoords(e);
        if (!coords) return;
        
        if (activeTool === 'arrow') {
          if (!isDragging) setSelectedElements({});
          return;
        }

        if (activeTool === 'pencil') {
          setCurrentPoints([...currentPoints, { x: coords.x, y: coords.y }]);
        } else if (activeTool === 'compass') {
          if (!currentCenter) {
            setCurrentCenter({ x: coords.x, y: coords.y });
          } else {
            const radius = Math.hypot(coords.x - currentCenter.x, coords.y - currentCenter.y);
            if (radius > 0) {
              setCircles([...circles, { center: currentCenter, radius, filled: false }]);
            }
            setCurrentCenter(null);
          }
        } else if (activeTool === 'segment') {
          if (!currentSegmentStart) {
            setCurrentSegmentStart({ x: coords.x, y: coords.y });
          } else {
            setSegments([...segments, { p1: currentSegmentStart, p2: { x: coords.x, y: coords.y }, color: segmentColor }]);
            setCurrentSegmentStart(null);
          }
        }
      };

      const handleClosePolygon = (e) => {
        e.stopPropagation();
        if (activeTool !== 'pencil' || isTestMode) return;

        if (currentPoints.length >= 3) {
          setPolygons([...polygons, currentPoints]);
          setCurrentPoints([]);
          setCursorPos(null);
        }
      };

      const toggleSelect = (e, id) => {
        if (activeTool !== 'arrow' || isTestMode) return;
        e.stopPropagation();
        if (isDragging) return;
        
        const now = Date.now();
        if (now - (lastTap.current['toggle_' + id] || 0) < 150) return; 
        lastTap.current['toggle_' + id] = now;

        setSelectedElements(prev => {
          const next = { ...prev };
          if (next[id]) delete next[id];
          else next[id] = true;
          return next;
        });
      };

      const handleInteriorClick = (e, pIdx) => {
        if (activeTool !== 'arrow' || isTestMode) return;
        e.stopPropagation();
        if (isDragging) return;

        const poly = polygons[pIdx];
        const now = Date.now();
        const tapKey = `poly-${pIdx}-interior`;
        const timeSinceLastTap = now - (lastTap.current[tapKey] || 0);

        if (timeSinceLastTap < 150) return; 

        if (poly.length === 3 && timeSinceLastTap < 400 && cycle !== 1) {
          const info = getPolygonInfo(poly, cycle);
          let currentType = 'Escaleno';
          if (info.name.includes('Equilátero')) currentType = 'Equilátero';
          else if (info.name.includes('Isósceles')) currentType = 'Isósceles';

          setTriangleTypeInput({ polyIdx: pIdx, currentType });
          
          setSelectedElements(prev => {
            const next = { ...prev };
            delete next[tapKey];
            return next;
          });
          lastTap.current[tapKey] = 0;
        } else {
          toggleSelect(e, tapKey);
          lastTap.current[tapKey] = now;
        }
      };

      const handleApplyTriangleType = (targetType) => {
        if (!triangleTypeInput) return;
        const pIdx = triangleTypeInput.polyIdx;
        
        setPolygons(prev => {
          const newPolys = [...prev];
          const poly = newPolys[pIdx];
          const p0 = poly[0];
          const p1 = poly[1];
          let p2 = poly[2];

          const dx = p1.x - p0.x;
          const dy = p1.y - p0.y;
          const L = Math.hypot(dx, dy);

          if (L > 0) {
            const midX = (p0.x + p1.x) / 2;
            const midY = (p0.y + p1.y) / 2;
            const nx = -dy / L;
            const ny = dx / L;

            const v2x = p2.x - p0.x;
            const v2y = p2.y - p0.y;
            const h = v2x * nx + v2y * ny;
            const signH = h >= 0 ? 1 : -1;
            const absH = Math.max(Math.abs(h), 40); 

            if (targetType === 'Equilátero') {
              const heightEqui = L * (Math.sqrt(3) / 2);
              p2 = { x: midX + nx * heightEqui * signH, y: midY + ny * heightEqui * signH };
            } else if (targetType === 'Isósceles') {
              p2 = { x: midX + nx * absH * signH, y: midY + ny * absH * signH };
            } else if (targetType === 'Escaleno') {
              const ux = dx / L;
              const uy = dy / L;
              p2 = { x: midX + ux * (L * 0.25) + nx * absH * signH, y: midY + uy * (L * 0.25) + ny * absH * signH };
            }
            
            newPolys[pIdx] = [p0, p1, p2];
          }
          return newPolys;
        });
        setTriangleTypeInput(null);
      };

      const handleVertexClick = (e, pIdx, i) => {
        if (activeTool !== 'arrow' || isTestMode) return;
        e.stopPropagation();
        if (isDragging) return;

        const now = Date.now();
        const tapKey = `poly-${pIdx}-vert-${i}`;
        const timeSinceLastTap = now - (lastTap.current[tapKey] || 0);

        if (timeSinceLastTap < 150) return; 

        if (timeSinceLastTap < 400 && cycle !== 1) { 
          toggleSelect(e, `poly-${pIdx}-angle-${i}`); 
          setSelectedElements(prev => {
            const next = { ...prev };
            delete next[tapKey];
            return next;
          });
          lastTap.current[tapKey] = 0; 
        } else {
          toggleSelect(e, tapKey);
          lastTap.current[tapKey] = now;
        }
      };

      const handleEdgeClick = (e, type, idx1, idx2 = null) => {
        if (activeTool !== 'arrow' || isTestMode) return;
        e.stopPropagation();
        if (isDragging) return;

        const now = Date.now();
        const tapKey = type === 'poly' ? `poly-${idx1}-edge-${idx2}` : `segment-${idx1}`;
        const timeSinceLastTap = now - (lastTap.current[tapKey] || 0);

        if (timeSinceLastTap < 150) return; 

        if (timeSinceLastTap < 400) {
          let currentPx, anchor;
          if (type === 'poly') {
            const poly = polygons[idx1];
            const p1 = poly[idx2];
            const p2 = poly[(idx2 + 1) % poly.length];
            currentPx = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            anchor = {
              x: poly.reduce((acc, p) => acc + p.x, 0) / poly.length,
              y: poly.reduce((acc, p) => acc + p.y, 0) / poly.length
            };
          } else {
            const seg = segments[idx1];
            currentPx = Math.hypot(seg.p2.x - seg.p1.x, seg.p2.y - seg.p1.y);
            anchor = { x: (seg.p1.x + seg.p2.x) / 2, y: (seg.p1.y + seg.p2.y) / 2 };
          }
          
          if (currentPx === 0) {
              lastTap.current[tapKey] = 0;
              return;
          }

          const currentCm = formatLength(currentPx / 40, cycle);
          setEdgeInput({ type, polyIdx: idx1, edgeIdx: idx2, segIdx: idx1, currentCm, currentPx, anchor });
          
          setSelectedElements(prev => {
            const next = { ...prev };
            delete next[tapKey];
            return next;
          });
          lastTap.current[tapKey] = 0;
        } else {
          toggleSelect(e, tapKey);
          lastTap.current[tapKey] = now;
        }
      };

      const handleApplyEdgeLength = (newCm) => {
        if (!edgeInput || isNaN(newCm) || newCm <= 0 || edgeInput.currentPx === 0) {
           setEdgeInput(null);
           return;
        }
        
        const targetPx = newCm * 40;
        const factor = targetPx / edgeInput.currentPx;
        const anchor = edgeInput.anchor;

        if (edgeInput.type === 'poly') {
          setPolygons(prev => {
            const newPolys = [...prev];
            newPolys[edgeInput.polyIdx] = newPolys[edgeInput.polyIdx].map(p => ({
              x: anchor.x + (p.x - anchor.x) * factor,
              y: anchor.y + (p.y - anchor.y) * factor
            }));
            return newPolys;
          });
        } else if (edgeInput.type === 'segment') {
          setSegments(prev => {
            const newSegs = [...prev];
            const seg = newSegs[edgeInput.segIdx];
            newSegs[edgeInput.segIdx] = {
              ...seg,
              p1: { x: anchor.x + (seg.p1.x - anchor.x) * factor, y: anchor.y + (seg.p1.y - anchor.y) * factor },
              p2: { x: anchor.x + (seg.p2.x - anchor.x) * factor, y: anchor.y + (seg.p2.y - anchor.y) * factor }
            };
            return newSegs;
          });
        }
        setEdgeInput(null);
      };

      const handleFillCircle = (e, idx) => {
        if (activeTool !== 'arrow' || isTestMode) return;
        e.stopPropagation();
        if (isDragging) return;
        const newCircles = [...circles];
        newCircles[idx].filled = true;
        setCircles(newCircles);
        toggleSelect(e, `circle-${idx}-interior`);
      };

      const clearBoard = () => {
        setPolygons([]);
        setCircles([]);
        setSegments([]);
        setCurrentPoints([]);
        setCurrentCenter(null);
        setCurrentSegmentStart(null);
        setSelectedElements({});
      };

      const startTestMode = () => {
        clearBoard();
        setIsTestMode(true);
        setActiveTool('test');
        const randomShape = TEST_SHAPES[Math.floor(Math.random() * TEST_SHAPES.length)];
        setCurrentTest(randomShape);
        setTestAnswers({});
        setTestResults(null);
      };

      const changeTestShape = () => {
        let randomShape;
        do {
          randomShape = TEST_SHAPES[Math.floor(Math.random() * TEST_SHAPES.length)];
        } while (TEST_SHAPES.length > 1 && randomShape === currentTest); 
        
        setCurrentTest(randomShape);
        setTestAnswers({});
        setTestResults(null);
      };

      const exitTestMode = () => {
        setIsTestMode(false);
        setCurrentTest(null);
        setActiveTool('pencil');
        clearBoard();
      };

      const checkTest = () => {
        if (!currentTest) return;
        const results = {};
        currentTest.questions.filter(q => q.cycles.includes(cycle)).forEach(q => {
           const userAns = cleanStr(testAnswers[q.id] || '');
           const validAnswers = typeof q.answer === 'function' ? q.answer(cycle) : q.answer;
           results[q.id] = validAnswers.some(ans => cleanStr(ans) === userAns);
        });
        setTestResults(results);
      };

      const isSelected = (id) => selectedElements[id];

      const getPolygonInfo = (poly, currentCycle) => {
        const numSides = poly.length;
        if (numSides === 3) {
          if (currentCycle === 1) return { name: 'Triángulo', color: 'rgba(34, 197, 94, 0.6)' };

          const d1 = Math.hypot(poly[0].x - poly[1].x, poly[0].y - poly[1].y);
          const d2 = Math.hypot(poly[1].x - poly[2].x, poly[1].y - poly[2].y);
          const d3 = Math.hypot(poly[2].x - poly[0].x, poly[2].y - poly[0].y);
          const approxEqual = (a, b) => Math.abs(a - b) <= 5;
          
          let type = 'Escaleno';
          if (approxEqual(d1, d2) && approxEqual(d2, d3)) type = 'Equilátero';
          else if (approxEqual(d1, d2) || approxEqual(d2, d3) || approxEqual(d1, d3)) type = 'Isósceles';
          
          return { name: `Triángulo ${type}`, color: 'rgba(34, 197, 94, 0.6)' }; 
        }
        switch(numSides) {
          case 4: return { name: 'Cuadrilátero', color: 'rgba(59, 130, 246, 0.6)' }; 
          case 5: return { name: 'Pentágono', color: 'rgba(239, 68, 68, 0.6)' }; 
          case 6: return { name: 'Hexágono', color: 'rgba(168, 85, 247, 0.6)' }; 
          default: return { name: 'Polígono', color: 'rgba(156, 163, 175, 0.6)' }; 
        }
      };

      const getAngleInfo = (poly, i) => {
        const p1 = poly[(i - 1 + poly.length) % poly.length];
        const p2 = poly[i];
        const p3 = poly[(i + 1) % poly.length];

        let sum = 0;
        for (let j = 0; j < poly.length; j++) {
          const current = poly[j];
          const next = poly[(j + 1) % poly.length];
          sum += (next.x - current.x) * (next.y + current.y);
        }
        const isClockwise = sum > 0;

        let a1 = Math.atan2(p1.y - p2.y, p1.x - p2.x);
        let a2 = Math.atan2(p3.y - p2.y, p3.x - p2.x);

        let startAngle = isClockwise ? a1 : a2;
        let endAngle = isClockwise ? a2 : a1;

        let angleDiff = endAngle - startAngle;
        if (angleDiff < 0) angleDiff += 2 * Math.PI;

        const deg = angleDiff * 180 / Math.PI;
        const type = Math.abs(deg - 90) <= 1 ? 'Recto' : deg < 90 ? 'Agudo' : deg < 180 ? 'Obtuso' : 'Cóncavo';

        const r = 35; 
        const x1 = p2.x + r * Math.cos(startAngle);
        const y1 = p2.y + r * Math.sin(startAngle);
        const x2 = p2.x + r * Math.cos(endAngle);
        const y2 = p2.y + r * Math.sin(endAngle);
        const largeArc = angleDiff > Math.PI ? 1 : 0;
        const sweep = 1;

        const path = `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} ${sweep} ${x2} ${y2} L ${p2.x} ${p2.y} Z`;
        const arcOnly = `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} ${sweep} ${x2} ${y2}`;
        
        const midAngle = startAngle + angleDiff / 2;
        const midX = p2.x + (r + 15) * Math.cos(midAngle);
        const midY = p2.y + (r + 15) * Math.sin(midAngle);

        const outDist = r + 40; 
        const outX = p2.x + outDist * Math.cos(midAngle + Math.PI);
        const outY = p2.y + outDist * Math.sin(midAngle + Math.PI);

        return { path, arcOnly, type, midX, midY, outX, outY, deg };
      };

      return (
        <div className="animate-fade-in flex flex-col lg:flex-row gap-6 relative w-full items-start">
          
          <div className="w-full lg:w-48 flex-shrink-0 bg-white p-4 rounded-3xl shadow-xl border-4 border-sky-100 flex flex-col gap-3 sticky top-4 z-10">
            <button 
              onClick={onBack}
              className="bg-sky-100 text-sky-800 border-2 border-sky-200 p-2 rounded-xl text-sm font-bold shadow-sm hover:bg-sky-200 transition-all flex items-center justify-center gap-2 mb-1"
            >
              <ArrowLeft size={16} /> Volver al Menú
            </button>

            <h3 className="text-lg font-bold text-sky-800 text-center border-b-2 border-sky-100 pb-2">Herramientas</h3>
            
            {!isTestMode ? (
              <div className="flex flex-col gap-2">
                <button 
                  onClick={() => { setActiveTool('pencil'); setCurrentCenter(null); setCurrentPoints([]); setSelectedElements({}); setCurrentSegmentStart(null); }} 
                  className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${activeTool === 'pencil' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                >
                  🖍️ Lápiz
                </button>
                <button 
                  onClick={() => { setActiveTool('arrow'); setCurrentCenter(null); setCurrentPoints([]); setCurrentSegmentStart(null); }} 
                  className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${activeTool === 'arrow' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                >
                  ↖️ Seleccionar
                </button>
                <button 
                  onClick={() => { setActiveTool('move'); setCurrentCenter(null); setCurrentPoints([]); setCurrentSegmentStart(null); }} 
                  className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${activeTool === 'move' ? 'bg-indigo-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                >
                  🖐️ Mover
                </button>

                <div className="h-px w-full bg-slate-200 my-1"></div>

                <div className="flex flex-col bg-slate-50 p-2 rounded-xl border border-slate-200">
                  <span className="text-[11px] font-bold text-slate-500 mb-1 px-1 text-center">Nivel Escolar:</span>
                  <div className="flex flex-col gap-1">
                    <button onClick={() => {setCycle(1); setSelectedElements({}); setShowProtractor(false);}} className={`px-2 py-1 text-xs font-bold rounded-lg transition-all ${cycle === 1 ? 'bg-white shadow text-sky-600' : 'text-slate-500 hover:bg-slate-200'}`}>Ciclo 1 (Básico)</button>
                    <button onClick={() => {setCycle(2); setSelectedElements({});}} className={`px-2 py-1 text-xs font-bold rounded-lg transition-all ${cycle === 2 ? 'bg-white shadow text-sky-600' : 'text-slate-500 hover:bg-slate-200'}`}>Ciclo 2 (Medio)</button>
                    <button onClick={() => {setCycle(3); setSelectedElements({});}} className={`px-2 py-1 text-xs font-bold rounded-lg transition-all ${cycle === 3 ? 'bg-white shadow text-sky-600' : 'text-slate-500 hover:bg-slate-200'}`}>Ciclo 3 (Avanz.)</button>
                  </div>
                </div>

                {cycle !== 1 && (
                  <>
                    <div className="h-px w-full bg-slate-200 my-1"></div>
                    <button 
                      onClick={() => { setActiveTool('compass'); setCurrentCenter(null); setCurrentPoints([]); setSelectedElements({}); setCurrentSegmentStart(null); }} 
                      className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${activeTool === 'compass' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                    >
                      🧭 Compás
                    </button>
                  </>
                )}
                
                <div className="flex flex-col gap-2">
                  <button 
                    onClick={() => { setActiveTool('segment'); setCurrentCenter(null); setCurrentPoints([]); setSelectedElements({}); setCurrentSegmentStart(null); }} 
                    className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${activeTool === 'segment' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                  >
                    📏 Segmento
                  </button>
                  {activeTool === 'segment' && (
                    <div className="flex justify-center gap-3 p-2 bg-slate-50 rounded-xl border border-slate-200">
                      <button onClick={() => setSegmentColor('#EF4444')} className={`w-6 h-6 rounded-full bg-red-500 border-2 transition-all ${segmentColor === '#EF4444' ? 'border-slate-800 scale-110 shadow-md' : 'border-transparent hover:scale-105'}`} title="Rojo" />
                      <button onClick={() => setSegmentColor('#10B981')} className={`w-6 h-6 rounded-full bg-emerald-500 border-2 transition-all ${segmentColor === '#10B981' ? 'border-slate-800 scale-110 shadow-md' : 'border-transparent hover:scale-105'}`} title="Verde" />
                      <button onClick={() => setSegmentColor('#3B82F6')} className={`w-6 h-6 rounded-full bg-blue-500 border-2 transition-all ${segmentColor === '#3B82F6' ? 'border-slate-800 scale-110 shadow-md' : 'border-transparent hover:scale-105'}`} title="Azul" />
                    </div>
                  )}
                  
                  <button 
                    onClick={() => setShowRuler(!showRuler)} 
                    className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${showRuler ? 'bg-amber-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                  >
                    <RulerIcon size={18} /> Regla Virtual
                  </button>

                  {cycle !== 1 && (
                    <button 
                      onClick={() => setShowProtractor(!showProtractor)} 
                      className={`p-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm ${showProtractor ? 'bg-sky-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                    >
                      <ProtractorIcon size={18} /> Transportador
                    </button>
                  )}

                </div>

                <div className="h-px w-full bg-slate-200 my-1"></div>
                
                <button 
                  onClick={clearBoard}
                  className="bg-red-50 text-red-600 p-2 rounded-xl text-sm font-bold hover:bg-red-100 transition-colors flex items-center justify-center gap-2"
                >
                  🗑️ Limpiar
                </button>

                <button 
                  onClick={startTestMode}
                  className="mt-1 bg-gradient-to-r from-purple-500 to-indigo-500 text-white p-2 rounded-xl text-sm font-bold shadow-lg hover:shadow-xl hover:scale-105 transition-all flex items-center justify-center gap-1 border-2 border-white"
                >
                  🎯 Prueba
                </button>
              </div>
            ) : (
              <div className="flex flex-col gap-3">
                <span className="text-center text-sm font-extrabold text-indigo-700 bg-indigo-100 p-2 rounded-xl">MODO PRUEBA<br/>(Ciclo {cycle})</span>
                
                <button 
                  onClick={() => setShowRuler(!showRuler)} 
                  className={`p-3 rounded-xl font-bold shadow-lg transition-all flex items-center justify-center gap-2 text-sm ${showRuler ? 'bg-amber-500 text-white' : 'bg-amber-100 text-amber-800 hover:bg-amber-200'}`}
                >
                  <RulerIcon size={18} /> {showRuler ? 'Ocultar Regla' : 'Usar Regla'}
                </button>

                {cycle !== 1 && (
                  <button 
                    onClick={() => setShowProtractor(!showProtractor)} 
                    className={`p-3 rounded-xl font-bold shadow-lg transition-all flex items-center justify-center gap-2 text-sm ${showProtractor ? 'bg-sky-500 text-white' : 'bg-sky-100 text-sky-800 hover:bg-sky-200'}`}
                  >
                    <ProtractorIcon size={18} /> {showProtractor ? 'Ocultar Transp.' : 'Transportador'}
                  </button>
                )}

                <div className="h-px w-full bg-slate-200 my-1"></div>

                <button onClick={checkTest} className="bg-green-500 text-white p-3 rounded-xl font-bold shadow-lg hover:bg-green-600 transition-all flex items-center justify-center gap-2 text-sm">✅ Corregir</button>
                <button onClick={changeTestShape} className="bg-blue-500 text-white p-3 rounded-xl font-bold shadow-lg hover:bg-blue-600 transition-all flex items-center justify-center gap-2 text-sm">🔄 Cambiar</button>
                <button onClick={exitTestMode} className="bg-red-500 text-white p-3 rounded-xl font-bold shadow-lg hover:bg-red-600 transition-all flex items-center justify-center gap-2 text-sm">❌ Salir</button>
              </div>
            )}
          </div>

          <div className="flex-1 flex flex-col gap-6 min-w-0 w-full relative">
            
            {!isTestMode && (
              <div className="bg-amber-50 border-2 border-amber-200 p-4 rounded-2xl text-amber-900 shadow-sm w-full">
                <h3 className="font-bold text-amber-800 mb-2 flex items-center gap-2 text-lg">
                  <span className="text-2xl">💡</span> ¡Trucos Secretos!
                </h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 text-sm">
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm">
                    <span className="font-bold text-sky-600 block mb-1">↖️ Seleccionar</span>
                    <p>👉 <strong>Doble toque en el interior</strong> de un triángulo para cambiar su tipo.</p>
                  </div>
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm">
                    <span className="font-bold text-sky-600 block mb-1">↖️ Seleccionar</span>
                    <p>📏 <strong>Toca las líneas</strong> para medir (doble toque para cambiar medida).</p>
                  </div>
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm">
                    <span className="font-bold text-sky-600 block mb-1">↖️ Seleccionar</span>
                    <p>✌️ <strong>Doble toque en esquinas</strong> para ver su ángulo.</p>
                  </div>
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm">
                    <span className="font-bold text-sky-600 block mb-1">↖️ Seleccionar</span>
                    <p>🔄 <strong>Toca todos los lados</strong> para calcular el Perímetro.</p>
                  </div>
                </div>
                <p className="mt-3 text-sm text-indigo-700 font-medium bg-indigo-50 p-2 rounded-lg inline-block border border-indigo-100">
                  🖐️ <strong>Mover:</strong> Arrastra las esquinas de un polígono deformado y ¡mira cómo cambian sus medidas y ángulos en directo!
                </p>
              </div>
            )}

            <div className={`relative border-4 rounded-3xl overflow-hidden shadow-inner bg-[#FDF5E6] transition-colors duration-300 w-full
              ${isTestMode ? 'border-indigo-400 cursor-default'
              : activeTool === 'pencil' ? 'border-amber-400 cursor-crosshair' 
              : activeTool === 'compass' ? 'border-pink-400 cursor-crosshair' 
              : activeTool === 'segment' ? 'border-emerald-400 cursor-crosshair' 
              : activeTool === 'move' ? 'border-indigo-400 cursor-grab active:cursor-grabbing' 
              : 'border-blue-400 cursor-default'}
            `}>
              <svg 
                ref={svgRef}
                viewBox={`0 0 1600 ${canvasHeight}`}
                className="w-full h-auto touch-none"
                style={{ touchAction: 'none' }}
                onPointerMove={handlePointerMove}
                onPointerUp={handlePointerUp}
                onPointerLeave={handlePointerUp}
                onClick={handleSvgClick}
              >
                <defs>
                  <pattern id="grid-table" width={gridSize} height={gridSize} patternUnits="userSpaceOnUse">
                    <path d={`M ${gridSize} 0 L 0 0 0 ${gridSize}`} fill="none" stroke="#E6D5B8" strokeWidth="1.5" />
                  </pattern>
                  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E293B" />
                  </marker>
                </defs>

                <rect width="100%" height="100%" fill="url(#grid-table)" />

                {!isTestMode && (
                  <g>
                    {circles.map((c, i) => {
                      const rCmRaw = c.radius / 40;
                      const rCm = formatLength(rCmRaw, cycle);
                      const dCm = formatLength(rCmRaw * 2, cycle);
                      const circPerim = formatLength(2 * Math.PI * rCmRaw, cycle) + " cm";
                      const circArea = formatLength(Math.PI * rCmRaw * rCmRaw, cycle) + " cm²";

                      return (
                      <g key={`circle-${i}`}>
                        <circle 
                          cx={c.center.x} cy={c.center.y} r={c.radius} 
                          fill={c.filled ? "#C0C0C0" : "transparent"} 
                          className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-grab' : 'pointer-events-none'}
                          onClick={(e) => c.filled ? toggleSelect(e, `circle-${i}-interior`) : handleFillCircle(e, i)}
                          onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'circle-body', circleIdx: i, startX: coords.x, startY: coords.y, initialCenter: {...c.center} }))}
                        />

                        <line x1={c.center.x} y1={c.center.y - c.radius} x2={c.center.x} y2={c.center.y + c.radius} stroke="#0EA5E9" strokeWidth="3" strokeDasharray="6 6" className="pointer-events-none" />
                        <line x1={c.center.x} y1={c.center.y - c.radius} x2={c.center.x} y2={c.center.y + c.radius} stroke="transparent" strokeWidth="20" className={activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} onClick={(e) => toggleSelect(e, `circle-${i}-diameter`)} />
                        
                        <line x1={c.center.x} y1={c.center.y} x2={c.center.x + c.radius} y2={c.center.y} stroke="#8B5CF6" strokeWidth="3" strokeDasharray="6 6" className="pointer-events-none" />
                        <line x1={c.center.x} y1={c.center.y} x2={c.center.x + c.radius} y2={c.center.y} stroke="transparent" strokeWidth="20" className={activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} onClick={(e) => toggleSelect(e, `circle-${i}-radius`)} />

                        <circle 
                          cx={c.center.x} cy={c.center.y} r={c.radius} 
                          fill="none" stroke="#DB2777" strokeWidth="4"
                          className="pointer-events-none"
                        />
                        <circle 
                          cx={c.center.x} cy={c.center.y} r={c.radius} 
                          fill="none" stroke="transparent" strokeWidth="20"
                          className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-ns-resize' : 'pointer-events-none'}
                          onClick={(e) => toggleSelect(e, `circle-${i}-border`)}
                          onPointerDown={(e) => startDrag(e, () => ({ type: 'circle-edge', circleIdx: i }))}
                        />

                        {isSelected(`circle-${i}-interior`) && (
                          <InfoCard x={c.center.x} y={c.center.y + c.radius + 30} name="Círculo" perimeter={circPerim} area={circArea} currentCycle={cycle} />
                        )}
                        {isSelected(`circle-${i}-border`) && <FloatingLabel text="Circunferencia" x={c.center.x + c.radius} y={c.center.y - c.radius/2} width={180} color="#DB2777" />}
                        {isSelected(`circle-${i}-radius`) && <FloatingLabel text={`Radio: ${rCm} cm`} x={c.center.x + c.radius/2} y={c.center.y} color="#8B5CF6" width={180} />}
                        {isSelected(`circle-${i}-diameter`) && <FloatingLabel text={`Diámetro: ${dCm} cm`} x={c.center.x} y={c.center.y - c.radius/2} color="#0EA5E9" width={220} />}
                      </g>
                    )})}

                    {segments.map((seg, i) => {
                      const isSel = isSelected(`segment-${i}`);
                      const midX = (seg.p1.x + seg.p2.x) / 2;
                      const midY = (seg.p1.y + seg.p2.y) / 2;
                      const distPx = Math.hypot(seg.p1.x - seg.p2.x, seg.p1.y - seg.p2.y);
                      const distCm = formatLength(distPx / 40, cycle);

                      return (
                        <g key={`segment-${i}`}>
                          <line x1={seg.p1.x} y1={seg.p1.y} x2={seg.p2.x} y2={seg.p2.y} stroke="transparent" strokeWidth="30" 
                            className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-grab' : 'pointer-events-none'} 
                            onClick={(e) => handleEdgeClick(e, 'segment', i)} 
                            onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'segment-body', segIdx: i, startX: coords.x, startY: coords.y, initialSeg: {...seg} }))}
                          />
                          
                          <line x1={seg.p1.x} y1={seg.p1.y} x2={seg.p2.x} y2={seg.p2.y} stroke={seg.color} strokeWidth={isSel ? "6" : "4"} className="pointer-events-none transition-all" />
                          
                          {activeTool === 'move' && (
                            <g>
                              <circle cx={seg.p1.x} cy={seg.p1.y} r="24" fill="transparent" className="cursor-grab active:cursor-grabbing" 
                                onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'segment-endpoint', segIdx: i, point: 'p1', startX: coords.x, startY: coords.y }))} />
                              <circle cx={seg.p2.x} cy={seg.p2.y} r="24" fill="transparent" className="cursor-grab active:cursor-grabbing" 
                                onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'segment-endpoint', segIdx: i, point: 'p2', startX: coords.x, startY: coords.y }))} />
                              <circle cx={seg.p1.x} cy={seg.p1.y} r="8" fill="#FCD34D" className="pointer-events-none shadow-sm" />
                              <circle cx={seg.p2.x} cy={seg.p2.y} r="8" fill="#FCD34D" className="pointer-events-none shadow-sm" />
                            </g>
                          )}

                          {isSel && <FloatingLabel text={`Segmento: ${distCm} cm`} x={midX} y={midY} color={seg.color} width={220} />}
                        </g>
                      );
                    })}

                    {polygons.map((poly, pIdx) => {
                      const info = getPolygonInfo(poly, cycle);
                      
                      const cx = poly.reduce((acc, p) => acc + p.x, 0) / poly.length;
                      const cy = poly.reduce((acc, p) => acc + p.y, 0) / poly.length;
                      
                      const perimeterPx = poly.reduce((sum, pt, idx) => {
                        const nextPt = poly[(idx + 1) % poly.length];
                        return sum + Math.hypot(pt.x - nextPt.x, pt.y - nextPt.y);
                      }, 0);
                      const perimeterCm = formatLength(perimeterPx / 40, cycle);

                      let areaPx = 0;
                      for (let j = 0; j < poly.length; j++) {
                        const next = (j + 1) % poly.length;
                        areaPx += poly[j].x * poly[next].y - poly[next].x * poly[j].y;
                      }
                      const areaCmRaw = Math.abs(areaPx) / 2 / (40 * 40);
                      const areaCm = formatLength(areaCmRaw, cycle);

                      const minX = Math.min(...poly.map(p => p.x));
                      const maxX = Math.max(...poly.map(p => p.x));
                      const maxY = Math.max(...poly.map(p => p.y));
                      const boxX = (minX + maxX) / 2;
                      const boxY = maxY + 40;

                      const allEdgesSelected = poly.length >= 3 && poly.every((_, i) => isSelected(`poly-${pIdx}-edge-${i}`));

                      return (
                        <g key={`poly-${pIdx}`}>
                          <polygon 
                            points={poly.map(p => `${p.x},${p.y}`).join(' ')} 
                            fill={info.color} 
                            stroke="transparent" 
                            className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-grab' : 'pointer-events-none'}
                            onClick={(e) => handleInteriorClick(e, pIdx)}
                            onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'poly-body', polyIdx: pIdx, startX: coords.x, startY: coords.y, initialPoly: [...poly] }))}
                          />

                          {poly.map((p, i) => {
                            const angleInfo = getAngleInfo(poly, i);
                            const isSel = isSelected(`poly-${pIdx}-angle-${i}`);
                            
                            if (!isSel || cycle === 1) return null;

                            const labelX = cycle === 3 ? angleInfo.outX : angleInfo.midX;
                            const labelY = cycle === 3 ? angleInfo.outY : angleInfo.midY;
                            const labelText = cycle === 3 ? `Ángulo ${angleInfo.type} (${Math.round(angleInfo.deg)}º)` : `Ángulo ${angleInfo.type}`;

                            return (
                              <g key={`angle-${pIdx}-${i}`}>
                                <path d={angleInfo.path} fill="rgba(245, 158, 11, 0.4)" className="pointer-events-none transition-colors" />
                                <path d={angleInfo.arcOnly} fill="none" stroke="#D97706" strokeWidth="4" className="pointer-events-none" />
                                <FloatingLabel text={labelText} x={labelX} y={labelY} width={cycle === 3 ? 260 : 180} color="#D97706" />
                              </g>
                            );
                          })}

                          {poly.map((p, i) => {
                            const nextP = poly[(i + 1) % poly.length];
                            const midX = (p.x + nextP.x) / 2;
                            const midY = (p.y + nextP.y) / 2;
                            const isSel = isSelected(`poly-${pIdx}-edge-${i}`);
                            
                            const distPx = Math.hypot(p.x - nextP.x, p.y - nextP.y);
                            const distCm = formatLength(distPx / 40, cycle);
                            const labelText = `Lado: ${distCm} cm`;

                            return (
                              <g key={`edge-${pIdx}-${i}`}>
                                <line x1={p.x} y1={p.y} x2={nextP.x} y2={nextP.y} stroke="transparent" strokeWidth="30" className={activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} onClick={(e) => handleEdgeClick(e, 'poly', pIdx, i)} />
                                <line x1={p.x} y1={p.y} x2={nextP.x} y2={nextP.y} stroke={isSel ? "#EF4444" : "#475569"} strokeWidth={isSel ? "6" : "4"} className="pointer-events-none transition-all" />
                                {isSel && <FloatingLabel text={labelText} x={midX} y={midY} color="#EF4444" width={180} />}
                              </g>
                            );
                          })}

                          {poly.map((p, i) => {
                            const isSel = isSelected(`poly-${pIdx}-vert-${i}`);
                            return (
                              <g key={`vert-${pIdx}-${i}`}>
                                <circle 
                                  cx={p.x} cy={p.y} r="24" fill="transparent" 
                                  className={activeTool === 'move' ? 'cursor-grab active:cursor-grabbing' : activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} 
                                  onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'poly-vertex', polyIdx: pIdx, vertIdx: i, startX: coords.x, startY: coords.y }))}
                                  onClick={(e) => handleVertexClick(e, pIdx, i)} 
                                />
                                <circle cx={p.x} cy={p.y} r={isSel ? "10" : "8"} fill={isSel ? "#3B82F6" : "#1E293B"} className="pointer-events-none transition-all" />
                                {isSel && <FloatingLabel text="Vértice" x={p.x} y={p.y} color="#3B82F6" width={120} />}
                              </g>
                            );
                          })}

                          {(isSelected(`poly-${pIdx}-interior`) || allEdgesSelected) && (
                            <InfoCard x={boxX} y={boxY} name={info.name} perimeter={`${perimeterCm} cm`} area={`${areaCm} cm²`} currentCycle={cycle} />
                          )}
                          
                          {allEdgesSelected && !isSelected(`poly-${pIdx}-interior`) && (
                             <g transform={`translate(${cx}, ${cy})`} className="pointer-events-none z-50">
                                <g className="animate-fade-in">
                                  <rect x="-138" y="-18" width="280" height="40" fill="rgba(0,0,0,0.2)" rx="20" />
                                  <rect x="-140" y="-20" width="280" height="40" fill="#10B981" rx="20" />
                                  <text x="0" y="2" fill="white" fontSize="20" textAnchor="middle" dominantBaseline="middle" fontWeight="bold">
                                    ¡Perímetro: {perimeterCm} cm!
                                  </text>
                                </g>
                             </g>
                          )}
                        </g>
                      );
                    })}

                    {activeTool === 'compass' && currentCenter && cursorPos && (
                      <g className="pointer-events-none">
                        <circle cx={currentCenter.x} cy={currentCenter.y} r="4" fill="#DB2777" />
                        <line x1={currentCenter.x} y1={currentCenter.y} x2={cursorPos.x} y2={cursorPos.y} stroke="#DB2777" strokeWidth="2" strokeDasharray="4 4" />
                        <circle cx={currentCenter.x} cy={currentCenter.y} r={Math.hypot(cursorPos.x - currentCenter.x, cursorPos.y - currentCenter.y)} fill="none" stroke="#DB2777" strokeWidth="2" strokeDasharray="8 8" opacity="0.6" />
                      </g>
                    )}

                    {activeTool === 'segment' && currentSegmentStart && cursorPos && (
                      <g className="pointer-events-none">
                        <circle cx={currentSegmentStart.x} cy={currentSegmentStart.y} r="6" fill={segmentColor} />
                        <line x1={currentSegmentStart.x} y1={currentSegmentStart.y} x2={cursorPos.x} y2={cursorPos.y} stroke={segmentColor} strokeWidth="4" strokeDasharray="6 6" opacity="0.7" />
                      </g>
                    )}

                    {activeTool === 'pencil' && currentPoints.map((p, i) => {
                      if (i < currentPoints.length - 1) {
                        return <line key={`current-line-${i}`} x1={p.x} y1={p.y} x2={currentPoints[i+1].x} y2={currentPoints[i+1].y} stroke="#6B7280" strokeWidth="4" className="pointer-events-none" />;
                      }
                      return null;
                    })}

                    {activeTool === 'pencil' && currentPoints.map((p, i) => {
                      const isFirst = i === 0;
                      return (
                        <g key={`current-point-${i}`}>
                          {isFirst && currentPoints.length >= 3 && (
                            <>
                              <circle cx={p.x} cy={p.y} r="28" fill="transparent" className="cursor-pointer" onClick={handleClosePolygon} />
                              <circle cx={p.x} cy={p.y} r="12" fill="#10B981" className="animate-pulse pointer-events-none" />
                            </>
                          )}
                          {(!isFirst || currentPoints.length < 3) && (
                            <circle cx={p.x} cy={p.y} r="6" fill="#4B5563" className="pointer-events-none" />
                          )}
                        </g>
                      );
                    })}

                    {activeTool === 'pencil' && currentPoints.length > 0 && cursorPos && (
                      <line 
                        x1={currentPoints[currentPoints.length - 1].x} 
                        y1={currentPoints[currentPoints.length - 1].y} 
                        x2={cursorPos.x} 
                        y2={cursorPos.y} 
                        stroke="#9CA3AF" 
                        strokeWidth="4" 
                        strokeDasharray="8 8" 
                        className="pointer-events-none opacity-60" 
                      />
                    )}

                    {cursorPos && activeTool !== 'arrow' && activeTool !== 'pencil' && (
                      <g transform={`translate(${cursorPos.exactX}, ${cursorPos.exactY})`} className="pointer-events-none transition-transform duration-75">
                        <text x="-5" y="-5" fontSize="48">
                          {activeTool === 'compass' ? '🧭' : activeTool === 'segment' ? '📏' : activeTool === 'move' ? '🖐️' : ''}
                        </text>
                      </g>
                    )}
                  </g>
                )}

                {isTestMode && currentTest && (
                  <g className="animate-drop-in">
                    {currentTest.render(800, 400)}
                    {currentTest.renderGuides && currentTest.renderGuides()}
                    
                    {currentTest.questions.filter(q => q.cycles.includes(cycle)).map(q => (
                      <g key={q.id}>
                        {q.arrow && (
                           <line x1={q.x + 160} y1={q.y + 60} x2={q.arrow.tx} y2={q.arrow.ty} stroke="#1E293B" strokeWidth="4" markerEnd="url(#arrow)" strokeDasharray="6 6" className="pointer-events-none" />
                        )}
                        <foreignObject x={q.x} y={q.y} width="320" height="130" className="overflow-visible">
                          <div className="bg-white p-4 rounded-2xl shadow-xl border-4 border-indigo-200 flex flex-col relative">
                            <label className="text-lg font-extrabold text-indigo-700 mb-2">{q.label}</label>
                            <input 
                              type="text" 
                              className="w-full bg-slate-50 border-2 border-slate-300 rounded-lg p-2 text-2xl text-center font-bold text-slate-700 focus:outline-none focus:border-indigo-500"
                              placeholder="..."
                              value={testAnswers[q.id] || ''}
                              onChange={(e) => setTestAnswers({...testAnswers, [q.id]: e.target.value})}
                            />
                            {testResults && (
                              <div className="absolute -right-6 -top-6 text-5xl">
                                 {testResults[q.id] ? '✅' : '❌'}
                              </div>
                            )}
                          </div>
                        </foreignObject>
                      </g>
                    ))}
                  </g>
                )}

                {showRuler && (
                  <g 
                    transform={`translate(${rulerState.x}, ${rulerState.y}) rotate(${rulerState.angle})`} 
                    className="pointer-events-auto"
                    onClick={(e) => e.stopPropagation()}
                  >
                    <rect x="-20" y="0" width="840" height="40" fill="rgba(0,0,0,0.15)" rx="5" transform="translate(4, 4)" className="pointer-events-none" />
                    <rect x="-20" y="0" width="840" height="40" fill="rgba(253, 224, 71, 0.85)" stroke="#CA8A04" strokeWidth="2" rx="5"
                      className="cursor-move"
                      onPointerDown={(e) => startDrag(e, (coords) => ({
                        type: 'ruler-body',
                        startX: coords.exactX,
                        startY: coords.exactY,
                        initialPos: { ...rulerState }
                      }), true)}
                    />
                    {[...Array(21)].map((_, i) => (
                      <g key={`tick-${i}`} transform={`translate(${i * 40}, 0)`} className="pointer-events-none">
                        <line x1="0" y1="0" x2="0" y2={i % 5 === 0 ? "15" : "10"} stroke="#854D0E" strokeWidth="2" />
                        <text x="0" y="28" fill="#854D0E" fontSize="14" textAnchor="middle" fontWeight="bold">{i}</text>
                      </g>
                    ))}
                    {/* Punto de origen visible (El cero) */}
                    <circle cx="0" cy="0" r="4" fill="#EF4444" className="pointer-events-none" />
                    
                    {/* Tirador de Rotación */}
                    <circle cx="800" cy="20" r="24" fill="#EF4444" stroke="#FEE2E2" strokeWidth="3"
                      className="cursor-grab active:cursor-grabbing"
                      onPointerDown={(e) => startDrag(e, (coords) => ({
                        type: 'ruler-rotate',
                        originX: rulerState.x,
                        originY: rulerState.y
                      }), true)}
                    />
                    <text x="800" y="20" fill="white" fontSize="20" textAnchor="middle" dominantBaseline="middle" className="pointer-events-none font-bold">↻</text>
                  </g>
                )}

                {/* --- NUEVO TRANSPORTADOR VIRTUAL (Ampliado) --- */}
                {showProtractor && cycle !== 1 && (
                  <g
                    transform={`translate(${protractorState.x}, ${protractorState.y}) rotate(${protractorState.angle})`}
                    className="pointer-events-auto"
                    onClick={(e) => e.stopPropagation()}
                  >
                    {/* Sombra */}
                    <path d="M -200 0 A 200 200 0 0 1 200 0 L -200 0 Z" fill="rgba(0,0,0,0.15)" transform="translate(4, 4)" className="pointer-events-none" />
                    {/* Fondo semicírculo */}
                    <path d="M -200 0 A 200 200 0 0 1 200 0 Z" fill="rgba(14, 165, 233, 0.4)" stroke="#0284C7" strokeWidth="2"
                      className="cursor-move backdrop-blur-sm"
                      onPointerDown={(e) => startDrag(e, (coords) => ({
                        type: 'protractor-body',
                        startX: coords.exactX,
                        startY: coords.exactY,
                        initialPos: { ...protractorState }
                      }), true)}
                    />
                    {/* Hueco central para ver mejor el vértice */}
                    <path d="M -40 0 A 40 40 0 0 1 40 0" fill="none" stroke="#0284C7" strokeWidth="2" className="pointer-events-none" />

                    {/* Marcas del transportador */}
                    {[...Array(37)].map((_, i) => {
                      const angleDeg = i * 5; // Cada 5 grados (De 0 a 180)
                      const angleRad = Math.PI + (angleDeg * Math.PI / 180);
                      const isMajor = i % 2 === 0; // Cada 10 grados
                      const isLabel = isMajor && i % 6 === 0; // Cada 30 grados
                      
                      const r1 = 200;
                      const r2 = isMajor ? 175 : 188;
                      const x1 = r1 * Math.cos(angleRad);
                      const y1 = r1 * Math.sin(angleRad);
                      const x2 = r2 * Math.cos(angleRad);
                      const y2 = r2 * Math.sin(angleRad);
                      
                      const textR = 150;
                      const tx = textR * Math.cos(angleRad);
                      const ty = textR * Math.sin(angleRad);

                      return (
                        <g key={`prot-tick-${i}`} className="pointer-events-none">
                          <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#0369A1" strokeWidth={isMajor ? 2 : 1} />
                          {isLabel ? (
                            <text x={tx} y={ty} fill="#0369A1" fontSize="16" textAnchor="middle" dominantBaseline="middle" transform={`rotate(${angleDeg - 90}, ${tx}, ${ty})`} fontWeight="bold">
                              {180 - angleDeg}°
                            </text>
                          ) : isMajor && angleDeg !== 0 && angleDeg !== 180 ? (
                            <text x={tx} y={ty} fill="#0369A1" fontSize="12" textAnchor="middle" dominantBaseline="middle" transform={`rotate(${angleDeg - 90}, ${tx}, ${ty})`} fontWeight="normal">
                              {180 - angleDeg}
                            </text>
                          ) : null}
                        </g>
                      );
                    })}

                    {/* Base */}
                    <line x1="-200" y1="0" x2="200" y2="0" stroke="#0284C7" strokeWidth="2" className="pointer-events-none" />

                    {/* Centro */}
                    <circle cx="0" cy="0" r="5" fill="#EF4444" className="pointer-events-none" />
                    <line x1="0" y1="-10" x2="0" y2="10" stroke="#EF4444" strokeWidth="2" className="pointer-events-none" />
                    <line x1="-10" y1="0" x2="10" y2="0" stroke="#EF4444" strokeWidth="2" className="pointer-events-none" />

                    {/* Tirador de Rotación */}
                    <circle cx="240" cy="0" r="26" fill="#0EA5E9" stroke="#E0F2FE" strokeWidth="3"
                      className="cursor-grab active:cursor-grabbing"
                      onPointerDown={(e) => startDrag(e, (coords) => ({
                        type: 'protractor-rotate',
                        originX: protractorState.x,
                        originY: protractorState.y
                      }), true)}
                    />
                    <text x="240" y="0" fill="white" fontSize="22" textAnchor="middle" dominantBaseline="middle" className="pointer-events-none font-bold">↻</text>
                  </g>
                )}

              </svg>
            </div>
          </div>

          {edgeInput && (
            <div className="fixed inset-0 z-[400] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
              <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border-4 border-sky-200 animate-fade-in text-center">
                <h3 className="text-2xl font-bold text-sky-800 mb-4">Medida exacta</h3>
                <p className="text-slate-600 mb-6">Introduce la nueva medida. La figura ajustará su tamaño automáticamente.</p>
                <div className="flex items-center gap-3 mb-8">
                  <input 
                    type="number" 
                    step="0.1"
                    min="0.1"
                    defaultValue={edgeInput.currentCm}
                    id="edge-length-input"
                    className="w-full p-4 text-2xl border-4 border-sky-100 rounded-xl focus:outline-none focus:border-sky-400 font-bold text-center bg-slate-50"
                    autoFocus
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') handleApplyEdgeLength(parseFloat(e.target.value));
                      if (e.key === 'Escape') setEdgeInput(null);
                    }}
                  />
                  <span className="text-2xl font-bold text-slate-500">cm</span>
                </div>
                <div className="flex gap-4">
                  <button onClick={() => setEdgeInput(null)} className="flex-1 p-4 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Cancelar</button>
                  <button onClick={() => handleApplyEdgeLength(parseFloat(document.getElementById('edge-length-input').value))} className="flex-1 p-4 rounded-xl font-bold text-white bg-sky-500 hover:bg-sky-600 transition-colors shadow-lg hover:shadow-xl">Aplicar</button>
                </div>
              </div>
            </div>
          )}

          {triangleTypeInput && (
            <div className="fixed inset-0 z-[400] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
              <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border-4 border-green-200 animate-fade-in text-center">
                <h3 className="text-2xl font-bold text-green-700 mb-4">Transformar Triángulo</h3>
                <p className="text-slate-600 mb-6">Selecciona en qué tipo de triángulo quieres convertirlo.</p>
                <div className="flex flex-col gap-3 mb-8">
                  <button 
                    onClick={() => handleApplyTriangleType('Equilátero')} 
                    className={`p-4 rounded-xl font-bold transition-all text-lg ${triangleTypeInput.currentType === 'Equilátero' ? 'bg-green-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-700 hover:bg-green-100 border-2 border-slate-100'}`}
                  >
                    🔺 Equilátero
                    <span className="block text-xs font-normal mt-1 opacity-80">3 lados iguales</span>
                  </button>
                  <button 
                    onClick={() => handleApplyTriangleType('Isósceles')} 
                    className={`p-4 rounded-xl font-bold transition-all text-lg ${triangleTypeInput.currentType === 'Isósceles' ? 'bg-green-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-700 hover:bg-green-100 border-2 border-slate-100'}`}
                  >
                    📐 Isósceles
                    <span className="block text-xs font-normal mt-1 opacity-80">2 lados iguales</span>
                  </button>
                  <button 
                    onClick={() => handleApplyTriangleType('Escaleno')} 
                    className={`p-4 rounded-xl font-bold transition-all text-lg ${triangleTypeInput.currentType === 'Escaleno' ? 'bg-green-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-700 hover:bg-green-100 border-2 border-slate-100'}`}
                  >
                    ⛺ Escaleno
                    <span className="block text-xs font-normal mt-1 opacity-80">0 lados iguales</span>
                  </button>
                </div>
                <button onClick={() => setTriangleTypeInput(null)} className="w-full p-4 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Cancelar</button>
              </div>
            </div>
          )}

        </div>
      );
    };

    /* --- JUEGO DE FORMAS (CATCHER) --- */

    const BINS = [
      { id: 'T. Equilátero', name: 'Triángulo\nEquilátero', color: '#34D399', shape: <polygon points="30,5 55,55 5,55" fill="currentColor"/> },
      { id: 'T. Isósceles', name: 'Triángulo\nIsósceles', color: '#10B981', shape: <polygon points="30,5 45,55 15,55" fill="currentColor"/> },
      { id: 'T. Escaleno', name: 'Triángulo\nEscaleno', color: '#059669', shape: <polygon points="5,55 55,55 20,5" fill="currentColor"/> },
      { id: 'Cuadrado', name: 'Cuadrado', color: '#60A5FA', shape: <rect x="10" y="10" width="40" height="40" fill="currentColor"/> },
      { id: 'Rectángulo', name: 'Rectángulo', color: '#3B82F6', shape: <rect x="5" y="15" width="50" height="30" fill="currentColor"/> },
      { id: 'Rombo', name: 'Rombo', color: '#2563EB', shape: <polygon points="30,5 45,30 30,55 15,30" fill="currentColor"/> },
      { id: 'Trapecio', name: 'Trapecio', color: '#FCD34D', shape: <polygon points="15,15 45,15 55,45 5,45" fill="currentColor"/> },
      { id: 'Pentágono', name: 'Pentágono', color: '#EF4444', shape: <polygon points="30,5 55,25 45,55 15,55 5,25" fill="currentColor"/> },
      { id: 'Hexágono', name: 'Hexágono', color: '#A855F7', shape: <polygon points="15,10 45,10 55,30 45,50 15,50 5,30" fill="currentColor"/> },
      { id: 'Circunferencia', name: 'Circunferencia', color: '#DB2777', shape: <circle cx="30" cy="30" r="25" fill="none" stroke="currentColor" strokeWidth="6"/> },
      { id: 'Círculo', name: 'Círculo', color: '#F472B6', shape: <circle cx="30" cy="30" r="25" fill="currentColor"/> }
    ];

    const JuegoFormas = ({ onBack }) => {
      const [gameActive, setGameActive] = useState(false);
      const [score, setScore] = useState(0);
      const [shape, setShape] = useState(null);
      const [feedback, setFeedback] = useState(null);
      
      const [capybaraState, setCapybaraState] = useState('none'); 
      const milestones = useRef(new Set());

      const spawnShape = () => {
        const target = BINS[Math.floor(Math.random() * BINS.length)];
        return { ...target, x: Math.floor(BINS.length / 2), y: 0 }; 
      };

      const startGame = () => {
        setScore(0);
        setGameActive(true);
        setShape(spawnShape());
        setFeedback(null);
        milestones.current.clear(); 
        setCapybaraState('none');
      };

      const triggerCapybara = () => {
        setCapybaraState('dancing');
        setTimeout(() => setCapybaraState('spinning'), 7000);
        setTimeout(() => setCapybaraState('none'), 10000);
      };

      useEffect(() => {
        if (shape && shape.y >= 82) {
          if (shape.id === BINS[shape.x].id) {
            setScore(s => {
              const newScore = s + 100;
              if (newScore >= 2000 && !milestones.current.has(2000)) {
                milestones.current.add(2000);
                triggerCapybara();
              } else if (newScore >= 3000 && !milestones.current.has(3000)) {
                milestones.current.add(3000);
                triggerCapybara();
              }
              return newScore;
            });
            setFeedback({ type: 'success', text: '¡Correcto! +100' });
          } else {
            setScore(s => Math.max(0, s - 25));
            setFeedback({ type: 'error', text: '¡Uy! -25' });
          }
          setTimeout(() => setFeedback(null), 1200);
          setShape(spawnShape());
        }
      }, [shape?.y, shape?.x, shape?.id]);

      useEffect(() => {
        if (!gameActive) return;
        let animationFrame;
        let lastTime = performance.now();

        const tick = (time) => {
          if (time - lastTime > 40) { 
            setShape(prev => {
              if (!prev) return prev;
              return { ...prev, y: prev.y + 0.4 }; 
            });
            lastTime = time;
          }
          animationFrame = requestAnimationFrame(tick);
        };
        
        animationFrame = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(animationFrame);
      }, [gameActive]);

      const moveLeft = () => setShape(s => s ? { ...s, x: Math.max(0, s.x - 1) } : s);
      const moveRight = () => setShape(s => s ? { ...s, x: Math.min(BINS.length - 1, s.x + 1) } : s);
      const dropFast = () => setShape(s => s ? { ...s, y: 82 } : s); 

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (!gameActive) return;
          if (e.key === 'ArrowLeft') moveLeft();
          if (e.key === 'ArrowRight') moveRight();
          if (e.key === 'ArrowDown') dropFast();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [gameActive]);

      return (
        <div className="animate-fade-in flex flex-col items-center w-full relative">
          <style>
            {`
              @keyframes anarchicDance {
                0% { transform: translate(0, 0) scale(1) rotate(0deg); }
                10% { transform: translate(30vw, -20vh) scale(1.5) rotate(45deg); }
                20% { transform: translate(-30vw, 30vh) scale(0.8) rotate(-45deg); }
                30% { transform: translate(40vw, 40vh) scale(2) rotate(120deg); }
                40% { transform: translate(-20vw, -40vh) scale(1.2) rotate(-90deg); }
                50% { transform: translate(20vw, 10vh) scale(0.5) rotate(180deg); }
                60% { transform: translate(-40vw, 20vh) scale(1.8) rotate(-180deg); }
                70% { transform: translate(10vw, -30vh) scale(1.1) rotate(60deg); }
                80% { transform: translate(30vw, 30vh) scale(1.4) rotate(-60deg); }
                90% { transform: translate(-10vw, -10vh) scale(0.7) rotate(90deg); }
                100% { transform: translate(0, 0) scale(1) rotate(0deg); }
              }
              @keyframes crazySpin {
                0% { transform: translate(0, 0) scale(1.5) rotate(0deg); opacity: 1; }
                80% { transform: translate(0, 0) scale(0.5) rotate(2160deg); opacity: 1; }
                100% { transform: translate(0, 0) scale(0.1) rotate(2880deg); opacity: 0; }
              }
              .capybara-dance {
                animation: anarchicDance 7s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
              }
              .capybara-spin {
                animation: crazySpin 3s cubic-bezier(0.5, 0, 0.5, 1) forwards;
              }
            `}
          </style>

          {capybaraState !== 'none' && (
            <div className="fixed inset-0 pointer-events-none z-[100] flex items-center justify-center overflow-hidden">
              <div className={`text-[150px] md:text-[250px] drop-shadow-2xl ${capybaraState === 'dancing' ? 'capybara-dance' : 'capybara-spin'}`}>
                🦫
              </div>
            </div>
          )}

          <div className="flex justify-between items-center w-full mb-4 px-4">
            <div>
              <h2 className="text-4xl font-extrabold text-indigo-600">Lluvia de Polígonos</h2>
              <p className="text-xl text-slate-600">Lee bien los nombres y mueve las figuras a su base correcta.</p>
            </div>
            <div className="bg-indigo-100 px-8 py-4 rounded-2xl border-4 border-indigo-300 shadow-sm">
              <span className="text-3xl font-bold text-indigo-800">Puntos: {score}</span>
            </div>
          </div>

          <div className="relative w-full h-[80vh] min-h-[800px] bg-gradient-to-b from-slate-200 to-slate-400 border-[16px] border-slate-500 rounded-3xl overflow-hidden shadow-2xl flex flex-col">
            
            {!gameActive && (
              <div className="absolute inset-0 bg-slate-900/60 flex flex-col items-center justify-center z-30 backdrop-blur-sm">
                <h2 className="text-6xl font-extrabold text-white mb-6 drop-shadow-xl text-center">¡Atrapa las Formas!</h2>
                <p className="text-3xl text-slate-200 mb-8 max-w-4xl text-center leading-relaxed">
                  Usa las flechas o los botones para mover las figuras mientras caen.<br/>¡Mételas en la base que tiene su nombre!
                </p>
                <button onClick={startGame} className="bg-green-500 text-white text-4xl font-bold py-8 px-16 rounded-full shadow-2xl hover:bg-green-600 hover:scale-105 transition-all flex items-center gap-4">
                  <PlayIcon fill="white" size={40} /> ¡Empezar a jugar!
                </button>
              </div>
            )}

            {feedback && (
              <div className={`absolute top-1/3 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-4xl font-extrabold z-20 px-10 py-6 rounded-3xl shadow-2xl animate-bounce border-4 ${feedback.type === 'success' ? 'bg-green-400 text-white border-green-200' : 'bg-red-500 text-white border-red-200'}`}>
                {feedback.text}
              </div>
            )}

            <div className="flex-1 relative w-full">
              {shape && gameActive && (
                <div 
                  className="absolute flex justify-center transition-all duration-[40ms] ease-linear z-10" 
                  style={{ left: `${shape.x * (100 / BINS.length)}%`, top: `${shape.y}%`, width: `${100 / BINS.length}%` }}
                >
                  <svg viewBox="0 0 60 60" className="w-20 h-20 md:w-28 md:h-28 drop-shadow-2xl" style={{ color: shape.color }}>
                    {shape.shape}
                  </svg>
                </div>
              )}
            </div>

            <div className="w-full flex h-40 border-t-8 border-slate-600 bg-slate-800 z-0">
              {BINS.map((bin, i) => (
                <div key={i} className="flex-1 border-r border-slate-600 flex flex-col items-center justify-center p-2 md:p-4 hover:bg-slate-700 transition-colors">
                  <span className="text-xs sm:text-sm md:text-lg lg:text-xl xl:text-2xl font-bold text-center text-white leading-tight break-words">
                    {bin.name}
                  </span>
                </div>
              ))}
            </div>
          </div>

          <div className="flex gap-10 mt-8">
            <button onClick={moveLeft} className="bg-sky-500 text-white p-8 rounded-full shadow-xl hover:bg-sky-600 active:scale-90 transition-transform">
              <ChevronLeft size={48} strokeWidth={4} />
            </button>
            <button onClick={dropFast} className="bg-indigo-500 text-white p-8 rounded-full shadow-xl hover:bg-indigo-600 active:scale-90 transition-transform">
              <ChevronsDown size={48} strokeWidth={4} />
            </button>
            <button onClick={moveRight} className="bg-sky-500 text-white p-8 rounded-full shadow-xl hover:bg-sky-600 active:scale-90 transition-transform">
              <ChevronRight size={48} strokeWidth={4} />
            </button>
          </div>

          <div className="flex justify-center mt-12 w-full border-t-2 border-slate-200 pt-8">
            <button 
              onClick={onBack}
              className="bg-sky-500 text-white px-8 py-4 rounded-full font-bold shadow-xl hover:bg-sky-600 hover:scale-105 active:scale-95 transition-all flex items-center gap-3 text-xl"
            >
              <ArrowLeft size={28} /> Volver al Menú Principal
            </button>
          </div>

        </div>
      );
    };

    /* --- INICIO DE LA APLICACIÓN --- */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
