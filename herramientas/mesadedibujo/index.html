<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Geometría Divertida!</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Configuración personalizada de animaciones para Tailwind -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            shake: {
              '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
              '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
              '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
              '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
            }
          }
        }
      }
    }
  </script>

  <!-- React y ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (para compilar JSX en el navegador) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* --- ICONOS (Sustituyendo lucide-react por SVGs integrados) --- */
    const Star = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    const StarOutline = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    const ArrowLeft = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
    const CheckCircle2 = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>;
    const PlayIcon = ({ size=24, className="", fill="currentColor" }) => <svg viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const AlertCircle = ({ size=24, className="" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const ChevronLeft = ({ size=24, className="", strokeWidth=2 }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polyline points="15 18 9 12 15 6"/></svg>;
    const ChevronRight = ({ size=24, className="", strokeWidth=2 }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polyline points="9 18 15 12 9 6"/></svg>;
    const ChevronsDown = ({ size=24, className="", strokeWidth=2 }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/></svg>;

    /* --- COMPONENTE PRINCIPAL --- */
    function App() {
      const [currentView, setCurrentView] = useState('menu');
      const [stars, setStars] = useState(0);
      const [completedTopics, setCompletedTopics] = useState([]);

      const topics = [
        { id: 'poligonos', title: 'Elementos de un polígono', color: 'bg-blue-400', emoji: '🔷' },
        { id: 'triangulos', title: 'Clasificación de triángulos', color: 'bg-green-400', emoji: '📐' },
        { id: 'cuadrilateros', title: 'Clasificación de cuadriláteros', color: 'bg-yellow-400', emoji: '🟪' },
        { id: 'perimetro', title: 'El perímetro', color: 'bg-orange-400', emoji: '📏' },
        { id: 'area', title: 'El área (cuadrado unidad)', color: 'bg-purple-400', emoji: '🔲' },
        { id: 'circulo', title: 'Circunferencia y círculo', color: 'bg-pink-400', emoji: '⭕' },
        { id: 'mesa', title: 'Mesa de Dibujo', color: 'bg-amber-500', emoji: '🖍️' },
        { id: 'juego', title: '¡A Jugar!', color: 'bg-indigo-500', emoji: '🕹️' },
      ];

      const handleCorrectAnswer = (topicId) => {
        if (!completedTopics.includes(topicId)) {
          setStars(stars + 1);
          setCompletedTopics([...completedTopics, topicId]);
        }
      };

      return (
        <div className="min-h-screen bg-sky-50 font-sans text-slate-800">
          {/* Header - Oculto en la Mesa de Dibujo y en el Juego para maximizar el espacio */}
          {currentView !== 'mesa' && currentView !== 'juego' && (
            <header className="bg-white shadow-sm p-4 sticky top-0 z-10">
              <div className="max-w-4xl mx-auto flex justify-between items-center">
                <div className="flex items-center gap-2">
                  {currentView !== 'menu' && (
                    <button 
                      onClick={() => setCurrentView('menu')}
                      className="p-2 bg-sky-100 hover:bg-sky-200 rounded-full text-sky-700 transition-colors"
                    >
                      <ArrowLeft size={24} />
                    </button>
                  )}
                  <h1 className="text-2xl font-bold text-sky-600">
                    {currentView === 'menu' ? '¡Geometría Divertida!' : topics.find(t => t.id === currentView)?.title}
                  </h1>
                </div>
                <div className="flex items-center gap-2 bg-yellow-100 px-4 py-2 rounded-full border-2 border-yellow-400">
                  <Star className="text-yellow-500" size={24} />
                  <span className="text-xl font-bold text-yellow-700">{stars}</span>
                </div>
              </div>
            </header>
          )}

          {/* Main Content */}
          <main className={`mx-auto p-4 py-8 ${(currentView === 'mesa' || currentView === 'juego') ? 'max-w-[98%] xl:max-w-[1800px] w-full' : 'max-w-4xl'}`}>
            {currentView === 'menu' ? (
              <div className="flex flex-col gap-10">
                {/* Botones Especiales: Mesa y Juego (Arriba y Centrados) */}
                <div className="flex flex-col sm:flex-row justify-center items-center gap-6 md:gap-12">
                  {topics.filter(t => t.id === 'mesa' || t.id === 'juego').map((topic) => (
                    <button
                      key={topic.id}
                      onClick={() => setCurrentView(topic.id)}
                      className={`${topic.color} text-white p-8 rounded-[2rem] shadow-xl transform hover:-translate-y-2 hover:scale-105 transition-all duration-300 flex flex-col items-center justify-center text-center gap-4 border-b-8 border-black/20 relative overflow-hidden w-full sm:w-80`}
                    >
                      <span className="text-8xl drop-shadow-lg">{topic.emoji}</span>
                      <h2 className="text-3xl font-extrabold leading-tight drop-shadow-md">{topic.title}</h2>
                    </button>
                  ))}
                </div>

                {/* Separador Visual para las lecciones */}
                <div className="relative flex py-5 items-center">
                    <div className="flex-grow border-t-4 border-sky-200/50 rounded-full"></div>
                    <span className="flex-shrink-0 mx-6 text-sky-700 font-extrabold text-2xl uppercase tracking-wider">Lecciones Interactivas</span>
                    <div className="flex-grow border-t-4 border-sky-200/50 rounded-full"></div>
                </div>

                {/* Rejilla de Lecciones */}
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                  {topics.filter(t => t.id !== 'mesa' && t.id !== 'juego').map((topic) => (
                    <button
                      key={topic.id}
                      onClick={() => setCurrentView(topic.id)}
                      className={`${topic.color} text-white p-6 rounded-3xl shadow-lg transform hover:-translate-y-2 transition-all duration-300 flex flex-col items-center justify-center text-center gap-4 border-b-8 border-black/20 relative overflow-hidden`}
                    >
                      {completedTopics.includes(topic.id) && (
                        <div className="absolute top-3 right-3 bg-white rounded-full p-1">
                          <CheckCircle2 className="text-green-500" size={24} />
                        </div>
                      )}
                      <span className="text-6xl drop-shadow-md">{topic.emoji}</span>
                      <h2 className="text-xl font-bold leading-tight">{topic.title}</h2>
                    </button>
                  ))}
                </div>
              </div>
            ) : (
              <div className="bg-white rounded-3xl shadow-xl p-6 sm:p-10 border-4 border-sky-100">
                {currentView === 'poligonos' && <LessonPoligonos onComplete={() => handleCorrectAnswer('poligonos')} isCompleted={completedTopics.includes('poligonos')} />}
                {currentView === 'triangulos' && <LessonTriangulos onComplete={() => handleCorrectAnswer('triangulos')} isCompleted={completedTopics.includes('triangulos')} />}
                {currentView === 'cuadrilateros' && <LessonCuadrilateros onComplete={() => handleCorrectAnswer('cuadrilateros')} isCompleted={completedTopics.includes('cuadrilateros')} />}
                {currentView === 'perimetro' && <LessonPerimetro onComplete={() => handleCorrectAnswer('perimetro')} isCompleted={completedTopics.includes('perimetro')} />}
                {currentView === 'area' && <LessonArea onComplete={() => handleCorrectAnswer('area')} isCompleted={completedTopics.includes('area')} />}
                {currentView === 'circulo' && <LessonCirculo onComplete={() => handleCorrectAnswer('circulo')} isCompleted={completedTopics.includes('circulo')} />}
                {currentView === 'mesa' && <MesaDeDibujo onBack={() => setCurrentView('menu')} />}
                {currentView === 'juego' && <JuegoFormas onBack={() => setCurrentView('menu')} />}
              </div>
            )}
          </main>
        </div>
      );
    }

    /* --- REUSABLE COMPONENTS --- */

    const LessonContainer = ({ children, isCompleted }) => (
      <div className="space-y-8 animate-fade-in relative">
        {isCompleted && (
          <div className="absolute -top-4 -right-4 bg-green-500 text-white px-4 py-2 rounded-full font-bold shadow-md flex items-center gap-2 rotate-3">
            <Star className="text-white" size={20} /> ¡Completado!
          </div>
        )}
        {children}
      </div>
    );

    const QuizSection = ({ question, options, correctAnswer, onCorrect, isCompleted }) => {
      const [selected, setSelected] = useState(null);
      const [showError, setShowError] = useState(false);

      const handleSelect = (idx) => {
        if (isCompleted) return;
        setSelected(idx);
        if (idx === correctAnswer) {
          setShowError(false);
          onCorrect();
        } else {
          setShowError(true);
          setTimeout(() => setShowError(false), 2000);
        }
      };

      return (
        <div className="mt-12 bg-sky-50 p-6 rounded-2xl border-2 border-sky-200">
          <h3 className="text-2xl font-bold text-sky-800 mb-6 flex items-center gap-3">
            <PlayIcon className="text-sky-500" /> ¡Hora de jugar!
          </h3>
          <p className="text-xl mb-6 font-medium text-slate-700">{question}</p>
          
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {options.map((option, idx) => (
              <button
                key={idx}
                onClick={() => handleSelect(idx)}
                disabled={isCompleted}
                className={`p-4 text-lg font-bold rounded-xl border-b-4 transition-all duration-200
                  ${isCompleted && idx === correctAnswer 
                    ? 'bg-green-400 border-green-600 text-white' 
                    : selected === idx && showError 
                      ? 'bg-red-400 border-red-600 text-white animate-shake'
                      : 'bg-white border-sky-200 text-sky-700 hover:bg-sky-100 hover:border-sky-300'
                  }
                `}
              >
                {option}
              </button>
            ))}
          </div>
          {showError && (
            <p className="text-red-500 font-bold mt-4 flex items-center gap-2">
              <AlertCircle /> ¡Uy! Inténtalo de nuevo.
            </p>
          )}
          {isCompleted && (
            <p className="text-green-600 font-bold mt-4 flex items-center gap-2 text-xl">
              <Star className="text-green-600" /> ¡Excelente! Has ganado una estrella.
            </p>
          )}
        </div>
      );
    };

    /* --- LESSON COMPONENTS --- */

    const LessonPoligonos = ({ onComplete, isCompleted }) => (
      <LessonContainer isCompleted={isCompleted}>
        <div className="flex flex-col md:flex-row gap-8 items-center">
          <div className="flex-1">
            <h2 className="text-3xl font-extrabold text-blue-600 mb-4">¿Qué es un polígono?</h2>
            <p className="text-xl text-slate-600 mb-4">
              Un polígono es una figura plana y cerrada formada por líneas rectas.
            </p>
            <ul className="text-lg text-slate-700 space-y-3 bg-blue-50 p-4 rounded-xl">
              <li><strong>Lado:</strong> Cada una de las líneas rectas.</li>
              <li><strong>Vértice:</strong> La esquinita donde se juntan dos lados.</li>
              <li><strong>Ángulo:</strong> La abertura que hay por dentro de las esquinas.</li>
            </ul>
          </div>
          <div className="flex-1 relative bg-slate-100 p-8 rounded-2xl flex justify-center">
            <svg viewBox="0 0 100 100" className="w-48 h-48 drop-shadow-xl">
              <polygon points="50,10 90,40 75,90 25,90 10,40" fill="#60A5FA" stroke="#2563EB" strokeWidth="3" />
              <circle cx="50" cy="10" r="4" fill="#EF4444" />
              <text x="35" y="10" fontSize="8" fill="#EF4444" fontWeight="bold">Vértice</text>
              <path d="M 40,20 Q 50,25 60,20" fill="none" stroke="#F59E0B" strokeWidth="2" />
              <text x="45" y="32" fontSize="8" fill="#F59E0B" fontWeight="bold">Ángulo</text>
              <line x1="90" y1="40" x2="75" y2="90" stroke="#10B981" strokeWidth="4" />
              <text x="85" y="70" fontSize="8" fill="#10B981" fontWeight="bold">Lado</text>
            </svg>
          </div>
        </div>
        <QuizSection 
          question="Si una figura tiene 6 lados, ¿cuántos vértices (esquinas) tiene?"
          options={["3 vértices", "6 vértices", "4 vértices", "Ninguno"]}
          correctAnswer={1}
          onCorrect={onComplete}
          isCompleted={isCompleted}
        />
      </LessonContainer>
    );

    const LessonTriangulos = ({ onComplete, isCompleted }) => (
      <LessonContainer isCompleted={isCompleted}>
        <h2 className="text-3xl font-extrabold text-green-600 mb-4">Clasificación de Triángulos</h2>
        <p className="text-xl text-slate-600 mb-6">
          Los triángulos tienen 3 lados. Podemos llamarlos de diferente manera según cómo sean sus lados:
        </p>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div className="bg-green-50 p-4 rounded-xl flex flex-col items-center text-center">
            <svg viewBox="0 0 100 100" className="w-32 h-32 mb-4 drop-shadow-md">
              <polygon points="50,15 85,85 15,85" fill="#34D399" stroke="#059669" strokeWidth="3" />
            </svg>
            <h4 className="font-bold text-xl text-green-700">Equilátero</h4>
            <p>3 lados IGUALES</p>
          </div>
          <div className="bg-green-50 p-4 rounded-xl flex flex-col items-center text-center">
            <svg viewBox="0 0 100 100" className="w-32 h-32 mb-4 drop-shadow-md">
              <polygon points="50,10 70,90 30,90" fill="#34D399" stroke="#059669" strokeWidth="3" />
            </svg>
            <h4 className="font-bold text-xl text-green-700">Isósceles</h4>
            <p>2 lados IGUALES</p>
          </div>
          <div className="bg-green-50 p-4 rounded-xl flex flex-col items-center text-center">
            <svg viewBox="0 0 100 100" className="w-32 h-32 mb-4 drop-shadow-md">
              <polygon points="10,20 90,90 10,90" fill="#34D399" stroke="#059669" strokeWidth="3" />
            </svg>
            <h4 className="font-bold text-xl text-green-700">Escaleno</h4>
            <p>0 lados iguales (todos diferentes)</p>
          </div>
        </div>
        <QuizSection 
          question="¿Cómo se llama el triángulo que tiene los 3 lados del mismo tamaño?"
          options={["Escaleno", "Cuadrado", "Equilátero", "Isósceles"]}
          correctAnswer={2}
          onCorrect={onComplete}
          isCompleted={isCompleted}
        />
      </LessonContainer>
    );

    const LessonCuadrilateros = ({ onComplete, isCompleted }) => (
      <LessonContainer isCompleted={isCompleted}>
        <h2 className="text-3xl font-extrabold text-yellow-500 mb-4">Los Cuadriláteros</h2>
        <p className="text-xl text-slate-600 mb-6">
          Son polígonos que tienen exactamente <strong>4 lados</strong>. ¡Hay varios de la misma familia!
        </p>
        <div className="grid grid-cols-2 gap-4">
          <div className="bg-yellow-50 p-4 rounded-xl flex flex-col items-center text-center border-2 border-yellow-200">
            <svg viewBox="0 0 100 100" className="w-24 h-24 mb-2 drop-shadow-md">
              <rect x="20" y="20" width="60" height="60" fill="#FBBF24" stroke="#D97706" strokeWidth="3" />
            </svg>
            <h4 className="font-bold text-lg text-yellow-700">Cuadrado</h4>
            <p className="text-sm">4 lados iguales y rectos.</p>
          </div>
          <div className="bg-yellow-50 p-4 rounded-xl flex flex-col items-center text-center border-2 border-yellow-200">
            <svg viewBox="0 0 100 100" className="w-24 h-24 mb-2 drop-shadow-md">
              <rect x="10" y="30" width="80" height="40" fill="#FBBF24" stroke="#D97706" strokeWidth="3" />
            </svg>
            <h4 className="font-bold text-lg text-yellow-700">Rectángulo</h4>
            <p className="text-sm">Lados iguales dos a dos y rectos.</p>
          </div>
          <div className="bg-yellow-50 p-4 rounded-xl flex flex-col items-center text-center border-2 border-yellow-200">
            <svg viewBox="0 0 100 100" className="w-24 h-24 mb-2 drop-shadow-md">
              <polygon points="50,10 90,50 50,90 10,50" fill="#FBBF24" stroke="#D97706" strokeWidth="3" />
            </svg>
            <h4 className="font-bold text-lg text-yellow-700">Rombo</h4>
            <p className="text-sm">4 lados iguales pero torcidos.</p>
          </div>
          <div className="bg-yellow-50 p-4 rounded-xl flex flex-col items-center text-center border-2 border-yellow-200">
            <svg viewBox="0 0 100 100" className="w-24 h-24 mb-2 drop-shadow-md">
              <polygon points="30,20 90,20 70,80 10,80" fill="#FBBF24" stroke="#D97706" strokeWidth="3" />
            </svg>
            <h4 className="font-bold text-lg text-yellow-700">Romboide</h4>
            <p className="text-sm">Como un rectángulo empujado.</p>
          </div>
        </div>
        <QuizSection 
          question="Tengo 4 lados iguales, pero mis esquinas no son rectas como las de un cuadrado. ¿Quién soy?"
          options={["Rectángulo", "Triángulo", "Rombo", "Círculo"]}
          correctAnswer={2}
          onCorrect={onComplete}
          isCompleted={isCompleted}
        />
      </LessonContainer>
    );

    const LessonPerimetro = ({ onComplete, isCompleted }) => (
      <LessonContainer isCompleted={isCompleted}>
        <h2 className="text-3xl font-extrabold text-orange-500 mb-4">El Perímetro</h2>
        <p className="text-xl text-slate-600 mb-6">
          El perímetro es <strong>la suma de todos los lados</strong> de un polígono. Imagina que eres una hormiguita dando una vuelta completa alrededor de la figura.
        </p>
        <div className="bg-orange-50 p-6 rounded-2xl flex flex-col md:flex-row items-center gap-8 border-2 border-orange-200">
          <svg viewBox="0 0 100 100" className="w-48 h-48 drop-shadow-xl overflow-visible">
            {/* Triangle */}
            <polygon points="50,20 90,80 10,80" fill="#FED7AA" stroke="#EA580C" strokeWidth="3" />
            {/* Labels */}
            <text x="75" y="55" fontSize="8" fill="#C2410C" fontWeight="bold">5 cm</text>
            <text x="15" y="55" fontSize="8" fill="#C2410C" fontWeight="bold">5 cm</text>
            <text x="45" y="90" fontSize="8" fill="#C2410C" fontWeight="bold">6 cm</text>
            {/* Ant path */}
            <path d="M 10,80 L 50,20 L 90,80 L 10,80" fill="none" stroke="#000" strokeWidth="1" strokeDasharray="4,4" className="animate-pulse" />
            <circle cx="10" cy="80" r="3" fill="#000" />
          </svg>
          <div className="text-2xl text-orange-800">
            <p className="mb-4">Para saber el perímetro sumamos:</p>
            <p className="font-bold text-3xl bg-white p-4 rounded-xl shadow-inner inline-block text-center">
              5 + 5 + 6 = 16 cm
            </p>
          </div>
        </div>
        <QuizSection 
          question="Si un cuadrado tiene un lado que mide 3 cm, ¿Cuál es su perímetro? (Recuerda que tiene 4 lados iguales)"
          options={["3 cm", "6 cm", "12 cm", "9 cm"]}
          correctAnswer={2}
          onCorrect={onComplete}
          isCompleted={isCompleted}
        />
      </LessonContainer>
    );

    const LessonArea = ({ onComplete, isCompleted }) => (
      <LessonContainer isCompleted={isCompleted}>
        <h2 className="text-3xl font-extrabold text-purple-600 mb-4">El Área (Cuadrado Unidad)</h2>
        <p className="text-xl text-slate-600 mb-6">
          El área es <strong>todo el espacio de dentro</strong> de la figura. Para medirlo, usamos pequeños cuadrados (cuadrado unidad) y los contamos.
        </p>
        <div className="flex flex-col md:flex-row items-center gap-8 justify-center">
          <div className="bg-purple-50 p-6 rounded-2xl border-2 border-purple-200 shadow-md">
            <svg viewBox="0 0 120 120" className="w-48 h-48">
              {/* Grid bg */}
              <pattern id="grid-lesson" width="20" height="20" patternUnits="userSpaceOnUse">
                <rect width="20" height="20" fill="none" stroke="#E9D5FF" strokeWidth="1" />
              </pattern>
              <rect width="120" height="120" fill="url(#grid-lesson)" />
              {/* Shape */}
              <rect x="20" y="20" width="80" height="60" fill="#A855F7" stroke="#7E22CE" strokeWidth="2" />
              {/* Mini squares for shape */}
              {[...Array(12)].map((_, i) => (
                <rect key={i} x={20 + (i % 4) * 20} y={20 + Math.floor(i / 4) * 20} width="20" height="20" fill="none" stroke="#7E22CE" strokeWidth="1" strokeDasharray="2,2" />
              ))}
            </svg>
          </div>
          <div className="text-xl text-purple-800 bg-white p-6 rounded-xl shadow-md border-l-8 border-purple-500 max-w-sm">
            <p>Cada cuadradito es una <strong>unidad</strong>.</p>
            <p className="mt-4">Si cuentas los cuadraditos morados de la figura, verás que caben exactamente <strong>12 cuadraditos</strong>.</p>
            <p className="font-bold mt-2 text-2xl">Área = 12 unidades</p>
          </div>
        </div>
        <QuizSection 
          question="Si dibujo un rectángulo que tiene 2 cuadraditos de alto y 3 cuadraditos de ancho, ¿Cuántos cuadraditos caben dentro en total?"
          options={["5", "6", "10", "3"]}
          correctAnswer={1}
          onCorrect={onComplete}
          isCompleted={isCompleted}
        />
      </LessonContainer>
    );

    const LessonCirculo = ({ onComplete, isCompleted }) => (
      <LessonContainer isCompleted={isCompleted}>
        <h2 className="text-3xl font-extrabold text-pink-600 mb-4">La Circunferencia y el Círculo</h2>
        <p className="text-xl text-slate-600 mb-6">
          ¡Cuidado que no son lo mismo! Uno es como un anillo y el otro es como una moneda.
        </p>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div className="bg-pink-50 p-6 rounded-2xl flex flex-col items-center border-2 border-pink-200">
            <h3 className="text-2xl font-bold text-pink-700 mb-4">La Circunferencia</h3>
            <p className="mb-4 text-center">Es solo la línea del borde (vacía por dentro).</p>
            <svg viewBox="0 0 100 100" className="w-32 h-32 drop-shadow-md">
              <circle cx="50" cy="50" r="40" fill="none" stroke="#DB2777" strokeWidth="6" />
              <circle cx="50" cy="50" r="3" fill="#000" />
              <line x1="50" y1="50" x2="90" y2="50" stroke="#000" strokeWidth="2" strokeDasharray="2,2" />
              <text x="30" y="45" fontSize="8" fontWeight="bold">Centro</text>
              <text x="60" y="45" fontSize="8" fontWeight="bold">Radio</text>
            </svg>
          </div>
          <div className="bg-pink-50 p-6 rounded-2xl flex flex-col items-center border-2 border-pink-200">
            <h3 className="text-2xl font-bold text-pink-700 mb-4">El Círculo</h3>
            <p className="mb-4 text-center">Es el borde y todo lo relleno de dentro.</p>
            <svg viewBox="0 0 100 100" className="w-32 h-32 drop-shadow-md">
              <circle cx="50" cy="50" r="40" fill="#F472B6" stroke="#DB2777" strokeWidth="6" />
            </svg>
          </div>
        </div>
        <QuizSection 
          question="Si me como una pizza entera, ¿me estoy comiendo una circunferencia o un círculo?"
          options={["Una circunferencia", "Un cuadrado", "Un círculo", "Un triángulo"]}
          correctAnswer={2}
          onCorrect={onComplete}
          isCompleted={isCompleted}
        />
      </LessonContainer>
    );

    /* --- MESA DE DIBUJO --- */
    const MesaDeDibujo = ({ onBack }) => {
      const svgRef = React.useRef(null);
      const lastTap = React.useRef({}); 
      const [polygons, setPolygons] = useState([]);
      const [circles, setCircles] = useState([]);
      const [segments, setSegments] = useState([]); 
      const [currentPoints, setCurrentPoints] = useState([]);
      const [currentCenter, setCurrentCenter] = useState(null);
      const [currentSegmentStart, setCurrentSegmentStart] = useState(null); 
      const [segmentColor, setSegmentColor] = useState('#EF4444'); 
      const [cursorPos, setCursorPos] = useState(null);
      const [selectedElements, setSelectedElements] = useState({});
      const [activeTool, setActiveTool] = useState('pencil'); 
      
      const [dragAction, setDragAction] = useState(null);
      const [isDragging, setIsDragging] = useState(false);
      const [edgeInput, setEdgeInput] = useState(null);
      const [triangleTypeInput, setTriangleTypeInput] = useState(null);

      const gridSize = 40;
      const snap = (val) => Math.round(val / gridSize) * gridSize;

      const getCoords = (e) => {
        if (!svgRef.current) return null;
        const pt = svgRef.current.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const svgP = pt.matrixTransform(svgRef.current.getScreenCTM().inverse());
        const x = Math.max(0, Math.min(1600, snap(svgP.x)));
        const y = Math.max(0, Math.min(800, snap(svgP.y)));
        return { x, y, exactX: svgP.x, exactY: svgP.y };
      };

      const startDrag = (e, actionBuilder) => {
        if (activeTool !== 'move') return;
        e.stopPropagation();
        const coords = getCoords(e);
        if (!coords) return;
        
        try { e.target.setPointerCapture(e.pointerId); } catch(err) {}
        setDragAction(actionBuilder(coords));
        setIsDragging(false); 
      };

      const handlePointerMove = (e) => {
        const coords = getCoords(e);
        if (!coords) return;
        setCursorPos(coords);

        if (dragAction) {
          setIsDragging(true);
          const dx = coords.x - dragAction.startX;
          const dy = coords.y - dragAction.startY;

          if (dragAction.type === 'poly-vertex') {
            setPolygons(prev => {
              const newPolys = [...prev];
              const poly = [...newPolys[dragAction.polyIdx]];
              poly[dragAction.vertIdx] = { x: coords.x, y: coords.y };
              newPolys[dragAction.polyIdx] = poly;
              return newPolys;
            });
          } else if (dragAction.type === 'poly-body') {
            setPolygons(prev => {
              const newPolys = [...prev];
              newPolys[dragAction.polyIdx] = dragAction.initialPoly.map(p => ({ x: p.x + dx, y: p.y + dy }));
              return newPolys;
            });
          } else if (dragAction.type === 'circle-body') {
            setCircles(prev => {
              const newCircles = [...prev];
              newCircles[dragAction.circleIdx].center = { x: dragAction.initialCenter.x + dx, y: dragAction.initialCenter.y + dy };
              return newCircles;
            });
          } else if (dragAction.type === 'circle-edge') {
            setCircles(prev => {
              const newCircles = [...prev];
              const c = newCircles[dragAction.circleIdx];
              c.radius = Math.max(gridSize, snap(Math.hypot(coords.x - c.center.x, coords.y - c.center.y)));
              return newCircles;
            });
          } else if (dragAction.type === 'segment-body') {
            setSegments(prev => {
              const newSegs = [...prev];
              newSegs[dragAction.segIdx] = {
                ...dragAction.initialSeg,
                p1: { x: dragAction.initialSeg.p1.x + dx, y: dragAction.initialSeg.p1.y + dy },
                p2: { x: dragAction.initialSeg.p2.x + dx, y: dragAction.initialSeg.p2.y + dy }
              };
              return newSegs;
            });
          } else if (dragAction.type === 'segment-endpoint') {
            setSegments(prev => {
              const newSegs = [...prev];
              newSegs[dragAction.segIdx][dragAction.point] = { x: coords.x, y: coords.y };
              return newSegs;
            });
          }
        }
      };

      const handlePointerUp = (e) => {
        if (dragAction) {
          setDragAction(null);
          setTimeout(() => setIsDragging(false), 100);
        }
      };

      const handleSvgClick = (e) => {
        const coords = getCoords(e);
        if (!coords) return;
        
        if (activeTool === 'arrow') {
          if (!isDragging) setSelectedElements({});
          return;
        }

        if (activeTool === 'pencil') {
          setCurrentPoints([...currentPoints, { x: coords.x, y: coords.y }]);
        } else if (activeTool === 'compass') {
          if (!currentCenter) {
            setCurrentCenter({ x: coords.x, y: coords.y });
          } else {
            const radius = Math.hypot(coords.x - currentCenter.x, coords.y - currentCenter.y);
            if (radius > 0) {
              setCircles([...circles, { center: currentCenter, radius, filled: false }]);
            }
            setCurrentCenter(null);
          }
        } else if (activeTool === 'segment') {
          if (!currentSegmentStart) {
            setCurrentSegmentStart({ x: coords.x, y: coords.y });
          } else {
            setSegments([...segments, { p1: currentSegmentStart, p2: { x: coords.x, y: coords.y }, color: segmentColor }]);
            setCurrentSegmentStart(null);
          }
        }
      };

      const handleClosePolygon = (e) => {
        e.stopPropagation();
        if (activeTool !== 'pencil') return;

        if (currentPoints.length >= 3) {
          setPolygons([...polygons, currentPoints]);
          setCurrentPoints([]);
          setCursorPos(null);
        }
      };

      const toggleSelect = (e, id) => {
        if (activeTool !== 'arrow') return;
        e.stopPropagation();
        if (isDragging) return;
        
        setSelectedElements(prev => {
          const next = { ...prev };
          if (next[id]) delete next[id];
          else next[id] = true;
          return next;
        });
      };

      const handleInteriorClick = (e, pIdx) => {
        if (activeTool !== 'arrow') return;
        e.stopPropagation();
        if (isDragging) return;

        const poly = polygons[pIdx];
        const now = Date.now();
        const tapKey = `poly-${pIdx}-interior`;
        const timeSinceLastTap = now - (lastTap.current[tapKey] || 0);

        if (poly.length === 3 && timeSinceLastTap < 400) {
          const info = getPolygonInfo(poly);
          let currentType = 'Escaleno';
          if (info.name.includes('Equilátero')) currentType = 'Equilátero';
          else if (info.name.includes('Isósceles')) currentType = 'Isósceles';

          setTriangleTypeInput({ polyIdx: pIdx, currentType });
          
          setSelectedElements(prev => {
            const next = { ...prev };
            delete next[tapKey];
            return next;
          });
          lastTap.current[tapKey] = 0;
        } else {
          toggleSelect(e, tapKey);
          lastTap.current[tapKey] = now;
        }
      };

      const handleApplyTriangleType = (targetType) => {
        if (!triangleTypeInput) return;
        const pIdx = triangleTypeInput.polyIdx;
        
        setPolygons(prev => {
          const newPolys = [...prev];
          const poly = newPolys[pIdx];
          const p0 = poly[0];
          const p1 = poly[1];
          let p2 = poly[2];

          const dx = p1.x - p0.x;
          const dy = p1.y - p0.y;
          const L = Math.hypot(dx, dy);

          if (L > 0) {
            const midX = (p0.x + p1.x) / 2;
            const midY = (p0.y + p1.y) / 2;

            const nx = -dy / L;
            const ny = dx / L;

            const v2x = p2.x - p0.x;
            const v2y = p2.y - p0.y;
            const h = v2x * nx + v2y * ny;
            const signH = h >= 0 ? 1 : -1;
            const absH = Math.max(Math.abs(h), 40); 

            if (targetType === 'Equilátero') {
              const heightEqui = L * (Math.sqrt(3) / 2);
              p2 = { x: midX + nx * heightEqui * signH, y: midY + ny * heightEqui * signH };
            } else if (targetType === 'Isósceles') {
              p2 = { x: midX + nx * absH * signH, y: midY + ny * absH * signH };
            } else if (targetType === 'Escaleno') {
              const ux = dx / L;
              const uy = dy / L;
              p2 = { x: midX + ux * (L * 0.25) + nx * absH * signH, y: midY + uy * (L * 0.25) + ny * absH * signH };
            }
            
            newPolys[pIdx] = [p0, p1, p2];
          }
          return newPolys;
        });
        setTriangleTypeInput(null);
      };

      const handleVertexClick = (e, pIdx, i) => {
        if (activeTool !== 'arrow') return;
        e.stopPropagation();
        if (isDragging) return;

        const now = Date.now();
        const tapKey = `poly-${pIdx}-vert-${i}`;
        const timeSinceLastTap = now - (lastTap.current[tapKey] || 0);

        if (timeSinceLastTap < 400) { 
          toggleSelect(e, `poly-${pIdx}-angle-${i}`); 
          setSelectedElements(prev => {
            const next = { ...prev };
            delete next[tapKey];
            return next;
          });
          lastTap.current[tapKey] = 0; 
        } else {
          toggleSelect(e, tapKey);
          lastTap.current[tapKey] = now;
        }
      };

      const handleEdgeClick = (e, type, idx1, idx2 = null) => {
        if (activeTool !== 'arrow') return;
        e.stopPropagation();
        if (isDragging) return;

        const now = Date.now();
        const tapKey = type === 'poly' ? `poly-${idx1}-edge-${idx2}` : `segment-${idx1}`;
        const timeSinceLastTap = now - (lastTap.current[tapKey] || 0);

        if (timeSinceLastTap < 400) {
          let currentPx, anchor;
          if (type === 'poly') {
            const poly = polygons[idx1];
            const p1 = poly[idx2];
            const p2 = poly[(idx2 + 1) % poly.length];
            currentPx = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            anchor = {
              x: poly.reduce((acc, p) => acc + p.x, 0) / poly.length,
              y: poly.reduce((acc, p) => acc + p.y, 0) / poly.length
            };
          } else {
            const seg = segments[idx1];
            currentPx = Math.hypot(seg.p2.x - seg.p1.x, seg.p2.y - seg.p1.y);
            anchor = { x: (seg.p1.x + seg.p2.x) / 2, y: (seg.p1.y + seg.p2.y) / 2 };
          }
          
          const currentCm = parseFloat((currentPx / 40).toFixed(1));
          setEdgeInput({ type, polyIdx: idx1, edgeIdx: idx2, segIdx: idx1, currentCm, currentPx, anchor });
          
          setSelectedElements(prev => {
            const next = { ...prev };
            delete next[tapKey];
            return next;
          });
          lastTap.current[tapKey] = 0;
        } else {
          toggleSelect(e, tapKey);
          lastTap.current[tapKey] = now;
        }
      };

      const handleApplyEdgeLength = (newCm) => {
        if (!edgeInput || isNaN(newCm) || newCm <= 0) {
           setEdgeInput(null);
           return;
        }
        
        const targetPx = newCm * 40;
        const factor = targetPx / edgeInput.currentPx;
        const anchor = edgeInput.anchor;

        if (edgeInput.type === 'poly') {
          setPolygons(prev => {
            const newPolys = [...prev];
            newPolys[edgeInput.polyIdx] = newPolys[edgeInput.polyIdx].map(p => ({
              x: anchor.x + (p.x - anchor.x) * factor,
              y: anchor.y + (p.y - anchor.y) * factor
            }));
            return newPolys;
          });
        } else if (edgeInput.type === 'segment') {
          setSegments(prev => {
            const newSegs = [...prev];
            const seg = newSegs[edgeInput.segIdx];
            newSegs[edgeInput.segIdx] = {
              ...seg,
              p1: { x: anchor.x + (seg.p1.x - anchor.x) * factor, y: anchor.y + (seg.p1.y - anchor.y) * factor },
              p2: { x: anchor.x + (seg.p2.x - anchor.x) * factor, y: anchor.y + (seg.p2.y - anchor.y) * factor }
            };
            return newSegs;
          });
        }
        setEdgeInput(null);
      };

      const handleFillCircle = (e, idx) => {
        if (activeTool !== 'arrow') return;
        e.stopPropagation();
        if (isDragging) return;
        const newCircles = [...circles];
        newCircles[idx].filled = true;
        setCircles(newCircles);
        toggleSelect(e, `circle-${idx}-interior`);
      };

      const clearBoard = () => {
        setPolygons([]);
        setCircles([]);
        setSegments([]);
        setCurrentPoints([]);
        setCurrentCenter(null);
        setCurrentSegmentStart(null);
        setSelectedElements({});
      };

      const isSelected = (id) => selectedElements[id];

      const FloatingLabel = ({ text, x, y, color = "#1E293B", width = 160 }) => {
        const halfWidth = width / 2;
        return (
          <g transform={`translate(${x}, ${y - 45})`} className="pointer-events-none z-50 animate-fade-in">
            <rect x={-halfWidth} y="-20" width={width} height="40" fill={color} rx="10" filter="url(#shadow)" />
            <polygon points="-10,20 10,20 0,30" transform="translate(0, 0)" fill={color} />
            <text x="0" y="2" fill="white" fontSize="20" textAnchor="middle" dominantBaseline="middle" fontWeight="bold">
              {text}
            </text>
          </g>
        );
      };

      const getPolygonInfo = (poly) => {
        const numSides = poly.length;
        if (numSides === 3) {
          const d1 = Math.hypot(poly[0].x - poly[1].x, poly[0].y - poly[1].y);
          const d2 = Math.hypot(poly[1].x - poly[2].x, poly[1].y - poly[2].y);
          const d3 = Math.hypot(poly[2].x - poly[0].x, poly[2].y - poly[0].y);
          const approxEqual = (a, b) => Math.abs(a - b) <= 5;
          
          let type = 'Escaleno';
          if (approxEqual(d1, d2) && approxEqual(d2, d3)) type = 'Equilátero';
          else if (approxEqual(d1, d2) || approxEqual(d2, d3) || approxEqual(d1, d3)) type = 'Isósceles';
          
          return { name: `Triángulo ${type}`, color: 'rgba(34, 197, 94, 0.6)' }; 
        }
        switch(numSides) {
          case 4: return { name: 'Cuadrilátero', color: 'rgba(59, 130, 246, 0.6)' }; 
          case 5: return { name: 'Pentágono', color: 'rgba(239, 68, 68, 0.6)' }; 
          case 6: return { name: 'Hexágono', color: 'rgba(168, 85, 247, 0.6)' }; 
          default: return { name: 'Polígono', color: 'rgba(156, 163, 175, 0.6)' }; 
        }
      };

      const getAngleInfo = (poly, i) => {
        const p1 = poly[(i - 1 + poly.length) % poly.length];
        const p2 = poly[i];
        const p3 = poly[(i + 1) % poly.length];

        let sum = 0;
        for (let j = 0; j < poly.length; j++) {
          const current = poly[j];
          const next = poly[(j + 1) % poly.length];
          sum += (next.x - current.x) * (next.y + current.y);
        }
        const isClockwise = sum > 0;

        let a1 = Math.atan2(p1.y - p2.y, p1.x - p2.x);
        let a2 = Math.atan2(p3.y - p2.y, p3.x - p2.x);

        let startAngle = isClockwise ? a1 : a2;
        let endAngle = isClockwise ? a2 : a1;

        let angleDiff = endAngle - startAngle;
        if (angleDiff < 0) angleDiff += 2 * Math.PI;

        const deg = angleDiff * 180 / Math.PI;
        const type = Math.abs(deg - 90) <= 1 ? 'Recto' : deg < 90 ? 'Agudo' : deg < 180 ? 'Obtuso' : 'Cóncavo';

        const r = 35; 
        const x1 = p2.x + r * Math.cos(startAngle);
        const y1 = p2.y + r * Math.sin(startAngle);
        const x2 = p2.x + r * Math.cos(endAngle);
        const y2 = p2.y + r * Math.sin(endAngle);
        const largeArc = angleDiff > Math.PI ? 1 : 0;
        const sweep = 1;

        const path = `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} ${sweep} ${x2} ${y2} L ${p2.x} ${p2.y} Z`;
        const arcOnly = `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} ${sweep} ${x2} ${y2}`;
        
        const midAngle = startAngle + angleDiff / 2;
        const midX = p2.x + (r + 15) * Math.cos(midAngle);
        const midY = p2.y + (r + 15) * Math.sin(midAngle);

        return { path, arcOnly, type, midX, midY };
      };

      return (
        <div className="animate-fade-in space-y-6">
          <div className="flex flex-col gap-4 border-b-2 border-slate-100 pb-4">
            <div className="w-full">
              
              {/* BARRA DE HERRAMIENTAS */}
              <div className="flex flex-wrap gap-2 bg-white p-2 rounded-2xl shadow-sm inline-flex border-2 border-slate-100 items-center">
                <button 
                  onClick={() => { setActiveTool('pencil'); setCurrentCenter(null); setCurrentPoints([]); setSelectedElements({}); setCurrentSegmentStart(null); }} 
                  className={`px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all ${activeTool === 'pencil' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                >
                  🖍️ Lápiz
                </button>
                <button 
                  onClick={() => { setActiveTool('arrow'); setCurrentCenter(null); setCurrentPoints([]); setCurrentSegmentStart(null); }} 
                  className={`px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all ${activeTool === 'arrow' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                  title="Seleccionar para ver nombres"
                >
                  ↖️ Seleccionar
                </button>
                <button 
                  onClick={() => { setActiveTool('move'); setCurrentCenter(null); setCurrentPoints([]); setCurrentSegmentStart(null); }} 
                  className={`px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all ${activeTool === 'move' ? 'bg-indigo-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                  title="Arrastra para mover o estirar"
                >
                  🖐️ Mover
                </button>
                <div className="w-px h-8 bg-slate-300 mx-2"></div>
                <button 
                  onClick={() => { setActiveTool('compass'); setCurrentCenter(null); setCurrentPoints([]); setSelectedElements({}); setCurrentSegmentStart(null); }} 
                  className={`px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all ${activeTool === 'compass' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                >
                  🧭 Compás
                </button>
                <button 
                  onClick={() => { setActiveTool('segment'); setCurrentCenter(null); setCurrentPoints([]); setSelectedElements({}); setCurrentSegmentStart(null); }} 
                  className={`px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all ${activeTool === 'segment' ? 'bg-amber-400 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-200'}`}
                >
                  📏 Segmento
                </button>
                {activeTool === 'segment' && (
                  <div className="flex items-center gap-2 ml-2 pl-4 border-l-2 border-slate-200">
                    <button onClick={() => setSegmentColor('#EF4444')} className={`w-8 h-8 rounded-full bg-red-500 border-2 transition-all ${segmentColor === '#EF4444' ? 'border-slate-800 scale-110 shadow-md' : 'border-transparent hover:scale-105'}`} title="Rojo" />
                    <button onClick={() => setSegmentColor('#10B981')} className={`w-8 h-8 rounded-full bg-emerald-500 border-2 transition-all ${segmentColor === '#10B981' ? 'border-slate-800 scale-110 shadow-md' : 'border-transparent hover:scale-105'}`} title="Verde" />
                    <button onClick={() => setSegmentColor('#3B82F6')} className={`w-8 h-8 rounded-full bg-blue-500 border-2 transition-all ${segmentColor === '#3B82F6' ? 'border-slate-800 scale-110 shadow-md' : 'border-transparent hover:scale-105'}`} title="Azul" />
                  </div>
                )}
                
                <div className="w-px h-8 bg-slate-300 mx-2"></div>
                
                <button 
                  onClick={clearBoard}
                  className="bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold hover:bg-red-100 transition-colors flex items-center gap-2"
                >
                  🗑️ Limpiar
                </button>
              </div>

              {/* LEYENDA / TRUCOS */}
              <div className="mt-4 bg-amber-50 border-2 border-amber-200 p-4 rounded-2xl text-amber-900 shadow-sm">
                <h3 className="font-bold text-amber-800 mb-2 flex items-center gap-2 text-lg">
                  <span className="text-2xl">💡</span> ¡Trucos Secretos!
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 text-sm">
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm">
                    <span className="font-bold text-sky-600 block mb-1">↖️ Seleccionar</span>
                    <p>👉 <strong>Doble toque en el interior</strong> de un triángulo para cambiar su tipo.</p>
                  </div>
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm">
                    <span className="font-bold text-sky-600 block mb-1">↖️ Seleccionar</span>
                    <p>📏 <strong>Toca las líneas</strong> para medir (doble toque para cambiar medida).</p>
                  </div>
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm">
                    <span className="font-bold text-sky-600 block mb-1">↖️ Seleccionar</span>
                    <p>✌️ <strong>Doble toque en esquinas</strong> para ver su ángulo.</p>
                  </div>
                  <div className="bg-white p-3 rounded-xl border border-amber-100 shadow-sm">
                    <span className="font-bold text-sky-600 block mb-1">↖️ Seleccionar</span>
                    <p>🔄 <strong>Toca todos los lados</strong> para calcular el Perímetro.</p>
                  </div>
                </div>
                <p className="mt-3 text-sm text-indigo-700 font-medium bg-indigo-50 p-2 rounded-lg inline-block border border-indigo-100">
                  🖐️ <strong>Mover:</strong> Arrastra las esquinas de un polígono deformado y ¡mira cómo cambian sus medidas y ángulos en directo!
                </p>
              </div>

            </div>
          </div>

          {/* Pantalla de color arena con cuadrícula */}
          <div className={`relative border-4 rounded-3xl overflow-hidden shadow-inner bg-[#FDF5E6] transition-colors duration-300
            ${activeTool === 'pencil' ? 'border-amber-400 cursor-crosshair' 
            : activeTool === 'compass' ? 'border-pink-400 cursor-crosshair' 
            : activeTool === 'segment' ? 'border-emerald-400 cursor-crosshair' 
            : activeTool === 'move' ? 'border-indigo-400 cursor-grab active:cursor-grabbing' 
            : 'border-blue-400 cursor-default'}
          `}>
            <svg 
              ref={svgRef}
              viewBox="0 0 1600 800" 
              className="w-full h-auto touch-none"
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerUp}
              onPointerLeave={handlePointerUp}
              onClick={handleSvgClick}
            >
              <defs>
                <pattern id="grid-table" width={gridSize} height={gridSize} patternUnits="userSpaceOnUse">
                  <path d={`M ${gridSize} 0 L 0 0 0 ${gridSize}`} fill="none" stroke="#E6D5B8" strokeWidth="1.5" />
                </pattern>
                <filter id="shadow">
                  <feDropShadow dx="0" dy="2" stdDeviation="2" floodOpacity="0.3" />
                </filter>
              </defs>

              <rect width="100%" height="100%" fill="url(#grid-table)" />

              {/* Círculos Terminados */}
              {circles.map((c, i) => (
                <g key={`circle-${i}`}>
                  <circle 
                    cx={c.center.x} cy={c.center.y} r={c.radius} 
                    fill={c.filled ? "#C0C0C0" : "transparent"} 
                    className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-grab' : 'pointer-events-none'}
                    onClick={(e) => c.filled ? toggleSelect(e, `circle-${i}-interior`) : handleFillCircle(e, i)}
                    onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'circle-body', circleIdx: i, startX: coords.x, startY: coords.y, initialCenter: {...c.center} }))}
                  />

                  <line x1={c.center.x} y1={c.center.y - c.radius} x2={c.center.x} y2={c.center.y + c.radius} stroke="#0EA5E9" strokeWidth="3" strokeDasharray="6 6" className="pointer-events-none" />
                  <line x1={c.center.x} y1={c.center.y - c.radius} x2={c.center.x} y2={c.center.y + c.radius} stroke="transparent" strokeWidth="20" className={activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} onClick={(e) => toggleSelect(e, `circle-${i}-diameter`)} />
                  
                  <line x1={c.center.x} y1={c.center.y} x2={c.center.x + c.radius} y2={c.center.y} stroke="#8B5CF6" strokeWidth="3" strokeDasharray="6 6" className="pointer-events-none" />
                  <line x1={c.center.x} y1={c.center.y} x2={c.center.x + c.radius} y2={c.center.y} stroke="transparent" strokeWidth="20" className={activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} onClick={(e) => toggleSelect(e, `circle-${i}-radius`)} />

                  <circle 
                    cx={c.center.x} cy={c.center.y} r={c.radius} 
                    fill="none" stroke="#DB2777" strokeWidth="4"
                    className="pointer-events-none"
                  />
                  <circle 
                    cx={c.center.x} cy={c.center.y} r={c.radius} 
                    fill="none" stroke="transparent" strokeWidth="24"
                    className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-ns-resize' : 'pointer-events-none'}
                    onClick={(e) => toggleSelect(e, `circle-${i}-border`)}
                    onPointerDown={(e) => startDrag(e, () => ({ type: 'circle-edge', circleIdx: i }))}
                  />

                  {isSelected(`circle-${i}-interior`) && <FloatingLabel text="Círculo" x={c.center.x - 40} y={c.center.y} color="#64748B" />}
                  {isSelected(`circle-${i}-border`) && <FloatingLabel text="Circunferencia" x={c.center.x + c.radius} y={c.center.y - c.radius/2} width={180} color="#DB2777" />}
                  {isSelected(`circle-${i}-radius`) && <FloatingLabel text="Radio" x={c.center.x + c.radius/2} y={c.center.y} color="#8B5CF6" />}
                  {isSelected(`circle-${i}-diameter`) && <FloatingLabel text="Diámetro" x={c.center.x} y={c.center.y - c.radius/2} color="#0EA5E9" />}
                </g>
              ))}

              {/* Segmentos Sueltos Terminados */}
              {segments.map((seg, i) => {
                const isSel = isSelected(`segment-${i}`);
                const midX = (seg.p1.x + seg.p2.x) / 2;
                const midY = (seg.p1.y + seg.p2.y) / 2;
                const distPx = Math.hypot(seg.p1.x - seg.p2.x, seg.p1.y - seg.p2.y);
                const distCm = parseFloat((distPx / 40).toFixed(1));

                return (
                  <g key={`segment-${i}`}>
                    <line x1={seg.p1.x} y1={seg.p1.y} x2={seg.p2.x} y2={seg.p2.y} stroke="transparent" strokeWidth="24" 
                      className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-grab' : 'pointer-events-none'} 
                      onClick={(e) => handleEdgeClick(e, 'segment', i)} 
                      onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'segment-body', segIdx: i, startX: coords.x, startY: coords.y, initialSeg: {...seg} }))}
                    />
                    
                    <line x1={seg.p1.x} y1={seg.p1.y} x2={seg.p2.x} y2={seg.p2.y} stroke={seg.color} strokeWidth={isSel ? "6" : "4"} className="pointer-events-none transition-all" />
                    
                    {activeTool === 'move' && (
                      <g>
                        <circle cx={seg.p1.x} cy={seg.p1.y} r="20" fill="transparent" className="cursor-grab active:cursor-grabbing" 
                          onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'segment-endpoint', segIdx: i, point: 'p1', startX: coords.x, startY: coords.y }))} />
                        <circle cx={seg.p2.x} cy={seg.p2.y} r="20" fill="transparent" className="cursor-grab active:cursor-grabbing" 
                          onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'segment-endpoint', segIdx: i, point: 'p2', startX: coords.x, startY: coords.y }))} />
                        <circle cx={seg.p1.x} cy={seg.p1.y} r="8" fill="#FCD34D" className="pointer-events-none shadow-sm" />
                        <circle cx={seg.p2.x} cy={seg.p2.y} r="8" fill="#FCD34D" className="pointer-events-none shadow-sm" />
                      </g>
                    )}

                    {isSel && <FloatingLabel text={`Segmento: ${distCm} cm`} x={midX} y={midY} color={seg.color} width={220} />}
                  </g>
                );
              })}

              {/* Polígonos Terminados */}
              {polygons.map((poly, pIdx) => {
                const info = getPolygonInfo(poly);
                const cx = poly.reduce((acc, p) => acc + p.x, 0) / poly.length;
                const cy = poly.reduce((acc, p) => acc + p.y, 0) / poly.length;

                const perimeterPx = poly.reduce((sum, pt, idx) => {
                  const nextPt = poly[(idx + 1) % poly.length];
                  return sum + Math.hypot(pt.x - nextPt.x, pt.y - nextPt.y);
                }, 0);
                const perimeterCm = parseFloat((perimeterPx / 40).toFixed(1));

                const allEdgesSelected = poly.length >= 3 && poly.every((_, i) => isSelected(`poly-${pIdx}-edge-${i}`));

                return (
                  <g key={`poly-${pIdx}`}>
                    <polygon 
                      points={poly.map(p => `${p.x},${p.y}`).join(' ')} 
                      fill={info.color} 
                      stroke="transparent" 
                      className={activeTool === 'arrow' ? 'cursor-pointer' : activeTool === 'move' ? 'cursor-grab' : 'pointer-events-none'}
                      onClick={(e) => handleInteriorClick(e, pIdx)}
                      onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'poly-body', polyIdx: pIdx, startX: coords.x, startY: coords.y, initialPoly: [...poly] }))}
                    />

                    {poly.map((p, i) => {
                      const angleInfo = getAngleInfo(poly, i);
                      const isSel = isSelected(`poly-${pIdx}-angle-${i}`);
                      return (
                        <g key={`angle-${pIdx}-${i}`}>
                          <path 
                            d={angleInfo.path} 
                            fill={isSel ? "rgba(245, 158, 11, 0.4)" : "transparent"} 
                            className="pointer-events-none transition-colors"
                          />
                          {isSel && (
                            <>
                              <path d={angleInfo.arcOnly} fill="none" stroke="#D97706" strokeWidth="4" className="pointer-events-none" />
                              <FloatingLabel text={`Ángulo ${angleInfo.type}`} x={angleInfo.midX} y={angleInfo.midY} width={180} color="#D97706" />
                            </>
                          )}
                        </g>
                      );
                    })}

                    {poly.map((p, i) => {
                      const nextP = poly[(i + 1) % poly.length];
                      const midX = (p.x + nextP.x) / 2;
                      const midY = (p.y + nextP.y) / 2;
                      const isSel = isSelected(`poly-${pIdx}-edge-${i}`);
                      
                      const distPx = Math.hypot(p.x - nextP.x, p.y - nextP.y);
                      const distCm = parseFloat((distPx / 40).toFixed(1));
                      const labelText = `Lado: ${distCm} cm`;

                      return (
                        <g key={`edge-${pIdx}-${i}`}>
                          <line x1={p.x} y1={p.y} x2={nextP.x} y2={nextP.y} stroke="transparent" strokeWidth="48" className={activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} onClick={(e) => handleEdgeClick(e, 'poly', pIdx, i)} />
                          <line x1={p.x} y1={p.y} x2={nextP.x} y2={nextP.y} stroke={isSel ? "#EF4444" : "#475569"} strokeWidth={isSel ? "6" : "4"} className="pointer-events-none transition-all" />
                          {isSel && <FloatingLabel text={labelText} x={midX} y={midY} color="#EF4444" width={180} />}
                        </g>
                      );
                    })}

                    {poly.map((p, i) => {
                      const isSel = isSelected(`poly-${pIdx}-vert-${i}`);
                      return (
                        <g key={`vert-${pIdx}-${i}`}>
                          <circle 
                            cx={p.x} cy={p.y} r="32" fill="transparent" 
                            className={activeTool === 'move' ? 'cursor-grab active:cursor-grabbing' : activeTool === 'arrow' ? 'cursor-pointer' : 'pointer-events-none'} 
                            onPointerDown={(e) => startDrag(e, (coords) => ({ type: 'poly-vertex', polyIdx: pIdx, vertIdx: i, startX: coords.x, startY: coords.y }))}
                            onClick={(e) => handleVertexClick(e, pIdx, i)} 
                          />
                          <circle cx={p.x} cy={p.y} r={isSel ? "10" : "8"} fill={isSel ? "#3B82F6" : "#1E293B"} className="pointer-events-none transition-all" />
                          {isSel && <FloatingLabel text="Vértice" x={p.x} y={p.y} color="#3B82F6" width={120} />}
                        </g>
                      );
                    })}

                    {isSelected(`poly-${pIdx}-interior`) && (
                      <g>
                        <FloatingLabel text={info.name} x={cx} y={cy} color="#475569" width={280} />
                        <FloatingLabel text={`Perímetro: ${perimeterCm} cm`} x={cx} y={cy + 55} color="#10B981" width={260} />
                      </g>
                    )}
                    
                    {allEdgesSelected && !isSelected(`poly-${pIdx}-interior`) && (
                       <g transform={`translate(${cx}, ${cy})`} className="pointer-events-none z-50 animate-bounce">
                          <rect x="-140" y="-20" width="280" height="40" fill="#10B981" rx="20" filter="url(#shadow)" />
                          <text x="0" y="2" fill="white" fontSize="20" textAnchor="middle" dominantBaseline="middle" fontWeight="bold">
                            ¡Perímetro: {perimeterCm} cm!
                          </text>
                       </g>
                    )}
                  </g>
                );
              })}

              {/* Progreso del COMPÁS (Dibujando radio) */}
              {activeTool === 'compass' && currentCenter && cursorPos && (
                <g className="pointer-events-none">
                  <circle cx={currentCenter.x} cy={currentCenter.y} r="4" fill="#DB2777" />
                  <line x1={currentCenter.x} y1={currentCenter.y} x2={cursorPos.x} y2={cursorPos.y} stroke="#DB2777" strokeWidth="2" strokeDasharray="4 4" />
                  <circle cx={currentCenter.x} cy={currentCenter.y} r={Math.hypot(cursorPos.x - currentCenter.x, cursorPos.y - currentCenter.y)} fill="none" stroke="#DB2777" strokeWidth="2" strokeDasharray="8 8" opacity="0.6" />
                </g>
              )}

              {/* Progreso del SEGMENTO SUELTO */}
              {activeTool === 'segment' && currentSegmentStart && cursorPos && (
                <g className="pointer-events-none">
                  <circle cx={currentSegmentStart.x} cy={currentSegmentStart.y} r="6" fill={segmentColor} />
                  <line x1={currentSegmentStart.x} y1={currentSegmentStart.y} x2={cursorPos.x} y2={cursorPos.y} stroke={segmentColor} strokeWidth="4" strokeDasharray="6 6" opacity="0.7" />
                </g>
              )}

              {/* Progreso del LÁPIZ (Dibujando polígono) */}
              {activeTool === 'pencil' && currentPoints.map((p, i) => {
                if (i < currentPoints.length - 1) {
                  return <line key={`current-line-${i}`} x1={p.x} y1={p.y} x2={currentPoints[i+1].x} y2={currentPoints[i+1].y} stroke="#6B7280" strokeWidth="4" className="pointer-events-none" />;
                }
                return null;
              })}

              {activeTool === 'pencil' && currentPoints.map((p, i) => {
                const isFirst = i === 0;
                return (
                  <g key={`current-point-${i}`}>
                    {isFirst && currentPoints.length >= 3 && (
                      <>
                        <circle cx={p.x} cy={p.y} r="28" fill="transparent" className="cursor-pointer" onClick={handleClosePolygon} />
                        <circle cx={p.x} cy={p.y} r="12" fill="#10B981" className="animate-pulse pointer-events-none" />
                      </>
                    )}
                    {(!isFirst || currentPoints.length < 3) && (
                      <circle cx={p.x} cy={p.y} r="6" fill="#4B5563" className="pointer-events-none" />
                    )}
                  </g>
                );
              })}

              {/* Línea guía (Preview Lápiz) */}
              {activeTool === 'pencil' && currentPoints.length > 0 && cursorPos && (
                <line 
                  x1={currentPoints[currentPoints.length - 1].x} 
                  y1={currentPoints[currentPoints.length - 1].y} 
                  x2={cursorPos.x} 
                  y2={cursorPos.y} 
                  stroke="#9CA3AF" 
                  strokeWidth="4" 
                  strokeDasharray="8 8" 
                  className="pointer-events-none opacity-60" 
                />
              )}

              {/* Cursores Interactivos Visuales */}
              {cursorPos && activeTool !== 'arrow' && activeTool !== 'pencil' && (
                <g transform={`translate(${cursorPos.exactX}, ${cursorPos.exactY})`} className="pointer-events-none transition-transform duration-75">
                  <text x="-5" y="-5" fontSize="48" filter="url(#shadow)">
                    {activeTool === 'compass' ? '🧭' : activeTool === 'segment' ? '📏' : activeTool === 'move' ? '🖐️' : ''}
                  </text>
                </g>
              )}
            </svg>
          </div>

          {/* Botón Volver (Mesa de Dibujo) */}
          <div className="flex justify-center mt-8">
            <button 
              onClick={onBack}
              className="bg-sky-500 text-white px-8 py-4 rounded-full font-bold shadow-xl hover:bg-sky-600 hover:scale-105 active:scale-95 transition-all flex items-center gap-3 text-xl"
            >
              <ArrowLeft size={28} /> Volver al Menú Principal
            </button>
          </div>

          {/* Modal para introducir medida exacta */}
          {edgeInput && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
              <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border-4 border-sky-200 animate-fade-in text-center">
                <h3 className="text-2xl font-bold text-sky-800 mb-4">Medida exacta</h3>
                <p className="text-slate-600 mb-6">Introduce la nueva medida. La figura ajustará su tamaño automáticamente.</p>
                <div className="flex items-center gap-3 mb-8">
                  <input 
                    type="number" 
                    step="0.1"
                    min="0.1"
                    defaultValue={edgeInput.currentCm}
                    id="edge-length-input"
                    className="w-full p-4 text-2xl border-4 border-sky-100 rounded-xl focus:outline-none focus:border-sky-400 font-bold text-center bg-slate-50"
                    autoFocus
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') handleApplyEdgeLength(parseFloat(e.target.value));
                      if (e.key === 'Escape') setEdgeInput(null);
                    }}
                  />
                  <span className="text-2xl font-bold text-slate-500">cm</span>
                </div>
                <div className="flex gap-4">
                  <button onClick={() => setEdgeInput(null)} className="flex-1 p-4 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Cancelar</button>
                  <button onClick={() => handleApplyEdgeLength(parseFloat(document.getElementById('edge-length-input').value))} className="flex-1 p-4 rounded-xl font-bold text-white bg-sky-500 hover:bg-sky-600 transition-colors shadow-lg hover:shadow-xl">Aplicar</button>
                </div>
              </div>
            </div>
          )}

          {/* Modal para cambiar el tipo de Triángulo */}
          {triangleTypeInput && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
              <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border-4 border-green-200 animate-fade-in text-center">
                <h3 className="text-2xl font-bold text-green-700 mb-4">Transformar Triángulo</h3>
                <p className="text-slate-600 mb-6">Selecciona en qué tipo de triángulo quieres convertirlo.</p>
                <div className="flex flex-col gap-3 mb-8">
                  <button 
                    onClick={() => handleApplyTriangleType('Equilátero')} 
                    className={`p-4 rounded-xl font-bold transition-all text-lg ${triangleTypeInput.currentType === 'Equilátero' ? 'bg-green-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-700 hover:bg-green-100 border-2 border-slate-100'}`}
                  >
                    🔺 Equilátero
                    <span className="block text-xs font-normal mt-1 opacity-80">3 lados iguales</span>
                  </button>
                  <button 
                    onClick={() => handleApplyTriangleType('Isósceles')} 
                    className={`p-4 rounded-xl font-bold transition-all text-lg ${triangleTypeInput.currentType === 'Isósceles' ? 'bg-green-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-700 hover:bg-green-100 border-2 border-slate-100'}`}
                  >
                    📐 Isósceles
                    <span className="block text-xs font-normal mt-1 opacity-80">2 lados iguales</span>
                  </button>
                  <button 
                    onClick={() => handleApplyTriangleType('Escaleno')} 
                    className={`p-4 rounded-xl font-bold transition-all text-lg ${triangleTypeInput.currentType === 'Escaleno' ? 'bg-green-500 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-700 hover:bg-green-100 border-2 border-slate-100'}`}
                  >
                    ⛺ Escaleno
                    <span className="block text-xs font-normal mt-1 opacity-80">0 lados iguales</span>
                  </button>
                </div>
                <button onClick={() => setTriangleTypeInput(null)} className="w-full p-4 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Cancelar</button>
              </div>
            </div>
          )}

        </div>
      );
    };

    /* --- JUEGO DE FORMAS (CATCHER) --- */

    const BINS = [
      { id: 'T. Equilátero', name: 'Triángulo\nEquilátero', color: '#34D399', shape: <polygon points="30,5 55,55 5,55" fill="currentColor"/> },
      { id: 'T. Isósceles', name: 'Triángulo\nIsósceles', color: '#10B981', shape: <polygon points="30,5 45,55 15,55" fill="currentColor"/> },
      { id: 'T. Escaleno', name: 'Triángulo\nEscaleno', color: '#059669', shape: <polygon points="5,55 55,55 20,5" fill="currentColor"/> },
      { id: 'Cuadrado', name: 'Cuadrado', color: '#60A5FA', shape: <rect x="10" y="10" width="40" height="40" fill="currentColor"/> },
      { id: 'Rectángulo', name: 'Rectángulo', color: '#3B82F6', shape: <rect x="5" y="15" width="50" height="30" fill="currentColor"/> },
      { id: 'Rombo', name: 'Rombo', color: '#2563EB', shape: <polygon points="30,5 55,30 30,55 5,30" fill="currentColor"/> },
      { id: 'Trapecio', name: 'Trapecio', color: '#FCD34D', shape: <polygon points="15,15 45,15 55,45 5,45" fill="currentColor"/> },
      { id: 'Pentágono', name: 'Pentágono', color: '#EF4444', shape: <polygon points="30,5 55,25 45,55 15,55 5,25" fill="currentColor"/> },
      { id: 'Hexágono', name: 'Hexágono', color: '#A855F7', shape: <polygon points="15,10 45,10 55,30 45,50 15,50 5,30" fill="currentColor"/> },
      { id: 'Circunferencia', name: 'Circunferencia', color: '#DB2777', shape: <circle cx="30" cy="30" r="25" fill="none" stroke="currentColor" strokeWidth="6"/> },
      { id: 'Círculo', name: 'Círculo', color: '#F472B6', shape: <circle cx="30" cy="30" r="25" fill="currentColor"/> }
    ];

    const JuegoFormas = ({ onBack }) => {
      const [gameActive, setGameActive] = useState(false);
      const [score, setScore] = useState(0);
      const [shape, setShape] = useState(null);
      const [feedback, setFeedback] = useState(null);
      
      const [capybaraState, setCapybaraState] = useState('none'); 
      const milestones = useRef(new Set());

      const spawnShape = () => {
        const target = BINS[Math.floor(Math.random() * BINS.length)];
        return { ...target, x: Math.floor(BINS.length / 2), y: 0 }; 
      };

      const startGame = () => {
        setScore(0);
        setGameActive(true);
        setShape(spawnShape());
        setFeedback(null);
        milestones.current.clear(); 
        setCapybaraState('none');
      };

      const triggerCapybara = () => {
        setCapybaraState('dancing');
        setTimeout(() => setCapybaraState('spinning'), 7000);
        setTimeout(() => setCapybaraState('none'), 10000);
      };

      useEffect(() => {
        if (shape && shape.y >= 82) {
          if (shape.id === BINS[shape.x].id) {
            setScore(s => {
              const newScore = s + 100;
              if (newScore >= 2000 && !milestones.current.has(2000)) {
                milestones.current.add(2000);
                triggerCapybara();
              } else if (newScore >= 3000 && !milestones.current.has(3000)) {
                milestones.current.add(3000);
                triggerCapybara();
              }
              return newScore;
            });
            setFeedback({ type: 'success', text: '¡Correcto! +100' });
          } else {
            setScore(s => Math.max(0, s - 25));
            setFeedback({ type: 'error', text: '¡Uy! -25' });
          }
          setTimeout(() => setFeedback(null), 1200);
          setShape(spawnShape());
        }
      }, [shape?.y, shape?.x, shape?.id]);

      useEffect(() => {
        if (!gameActive) return;
        let animationFrame;
        let lastTime = performance.now();

        const tick = (time) => {
          if (time - lastTime > 40) { 
            setShape(prev => {
              if (!prev) return prev;
              return { ...prev, y: prev.y + 0.4 }; 
            });
            lastTime = time;
          }
          animationFrame = requestAnimationFrame(tick);
        };
        
        animationFrame = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(animationFrame);
      }, [gameActive]);

      const moveLeft = () => setShape(s => s ? { ...s, x: Math.max(0, s.x - 1) } : s);
      const moveRight = () => setShape(s => s ? { ...s, x: Math.min(BINS.length - 1, s.x + 1) } : s);
      const dropFast = () => setShape(s => s ? { ...s, y: 82 } : s); 

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (!gameActive) return;
          if (e.key === 'ArrowLeft') moveLeft();
          if (e.key === 'ArrowRight') moveRight();
          if (e.key === 'ArrowDown') dropFast();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [gameActive]);

      return (
        <div className="animate-fade-in flex flex-col items-center w-full relative">
          <style>
            {`
              @keyframes anarchicDance {
                0% { transform: translate(0, 0) scale(1) rotate(0deg); }
                10% { transform: translate(30vw, -20vh) scale(1.5) rotate(45deg); }
                20% { transform: translate(-30vw, 30vh) scale(0.8) rotate(-45deg); }
                30% { transform: translate(40vw, 40vh) scale(2) rotate(120deg); }
                40% { transform: translate(-20vw, -40vh) scale(1.2) rotate(-90deg); }
                50% { transform: translate(20vw, 10vh) scale(0.5) rotate(180deg); }
                60% { transform: translate(-40vw, 20vh) scale(1.8) rotate(-180deg); }
                70% { transform: translate(10vw, -30vh) scale(1.1) rotate(60deg); }
                80% { transform: translate(30vw, 30vh) scale(1.4) rotate(-60deg); }
                90% { transform: translate(-10vw, -10vh) scale(0.7) rotate(90deg); }
                100% { transform: translate(0, 0) scale(1) rotate(0deg); }
              }
              @keyframes crazySpin {
                0% { transform: translate(0, 0) scale(1.5) rotate(0deg); opacity: 1; }
                80% { transform: translate(0, 0) scale(0.5) rotate(2160deg); opacity: 1; }
                100% { transform: translate(0, 0) scale(0.1) rotate(2880deg); opacity: 0; }
              }
              .capybara-dance {
                animation: anarchicDance 7s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
              }
              .capybara-spin {
                animation: crazySpin 3s cubic-bezier(0.5, 0, 0.5, 1) forwards;
              }
            `}
          </style>

          {capybaraState !== 'none' && (
            <div className="fixed inset-0 pointer-events-none z-[100] flex items-center justify-center overflow-hidden">
