    <style>
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* ESTILOS DE MOVIMIENTO DEL PEÓN Y DADO */
        @keyframes hop {
            0% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-25px) scale(1.15); }
            100% { transform: translateY(0) scale(1); }
        }
        .animate-hop { animation: hop 0.4s ease-in-out forwards; }
        
        @keyframes tumble {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.1); }
            50% { transform: rotate(180deg) scale(0.9); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .animate-tumble { animation: tumble 0.3s linear infinite; }

        /* ESTILOS CINEMATOGRÁFICOS AVANZADOS */
        .sepia-filter { filter: sepia(0.85) contrast(1.3) brightness(0.8) grayscale(0.2); }
        @keyframes noise { 0% { background-position: 0 0; } 10% { background-position: -5% -10%; } 20% { background-position: -15% 5%; } 30% { background-position: 7% -25%; } 40% { background-position: 20% 25%; } 50% { background-position: -25% 10%; } 60% { background-position: 15% 5%; } 70% { background-position: 0% 15%; } 80% { background-position: 25% 35%; } 90% { background-position: -10% 10%; } 100% { background-position: 0 0; } }
        .animate-noise { animation: noise 0.15s infinite; }
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
        .animate-scanline { animation: scanline 6s linear infinite; }
        .text-shadow-cinematic { text-shadow: 3px 3px 6px rgba(0,0,0,0.9), -1px -1px 0 rgba(255,255,255,0.1); }
        
        /* Nuevos efectos de proyector */
        .film-scratch { width: 1px; height: 100%; background: rgba(255,255,255,0.3); position: absolute; left: 50%; animation: scratch 3s infinite linear; }
        @keyframes scratch {
            0% { transform: translateX(0); opacity: 0; } 10% { transform: translateX(-20vw); opacity: 0.5; }
            20% { transform: translateX(30vw); opacity: 0; } 30% { transform: translateX(-10vw); opacity: 0.8; }
            40% { transform: translateX(15vw); opacity: 0; } 50% { transform: translateX(-25vw); opacity: 0.4; }
            60% { transform: translateX(5vw); opacity: 0; } 100% { transform: translateX(0); opacity: 0; }
        }
        .vignette { background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.95) 100%); }
        .countdown-circle { border: 6px solid rgba(255,255,255,0.6); border-radius: 50%; width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; font-size: 90px; font-weight: bold; position: relative; overflow: hidden; }

        @keyframes spin-fast { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-fast 4s linear infinite; }

            const roll = () => {
                if (disabled || rolling) return;
                setRolling(true);
                let c = 0;
                const int = setInterval(() => {
                    setVal(Math.floor(Math.random() * 6));
                    c++;
                    if (c > 15) { 
                        clearInterval(int);
                        const final = Math.floor(Math.random() * 6) + 1;
                        setVal(final - 1);
                        setRolling(false);
                        // Pausa para ver el número antes de mover
                        setTimeout(() => {
                            onRoll(final);
                        }, 1200);
                    }
                }, 60);

        // MODAL DE ENTREVISTA Y GESTIÓN ECONÓMICA
        const InterviewModal = ({ character, difficulty, onClose, onSuccess, alreadyGuessed, balance, setBalance, isVip, globalMicActive, setGlobalMicActive, globalVoices, selectedVoiceURI, setSelectedVoiceURI }) => {
            const [chatLog, setChatLog] = useState([]);
            const [attemptHistory, setAttemptHistory] = useState([]); // Historial
            const [askedTopics, setAskedTopics] = useState(new Set());
            const [expandedTopic, setExpandedTopic] = useState(null);

            const [isListening, setIsListening] = useState(false);
            const [voiceEnabled, setVoiceEnabled] = useState(true);
            const [errorShake, setErrorShake] = useState(false);
            const scrollRef = useRef(null);
            const recognitionRef = useRef(null);
            const shouldListenRef = useRef(globalMicActive);
            const isSpeakingRef = useRef(false);
            const isRecoRunning = useRef(false);

            const COST_PENALTY = 50;
            const REWARD_NORMAL = 200;
            const REWARD_VIP = 5000;

            useEffect(() => {
                if (alreadyGuessed) { onSuccess(); return; }
                
                let welcome = "";

                } else {
                welcome = difficulty === 'en' ? 'Hello! Asking questions costs money (€). Guess to earn 200€!' : 
                            difficulty === 'es' ? '¡Hola! Hacer preguntas cuesta dinero (€). ¡Adivina para ganar 200€!' : 
                            '¡Hola! Las preguntas cuestan €. / Questions cost money (€).';
                }
                
                setChatLog([{ type: 'system', text: welcome, isVipAlert: isVip }]);

                if (globalMicActive) {
                    startListening();
                }

                return () => {
                    shouldListenRef.current = false;
                    isSpeakingRef.current = false;
                    isRecoRunning.current = false;
                    if (window.speechSynthesis) window.speechSynthesis.cancel();
                    if (recognitionRef.current) {
                        recognitionRef.current.onend = null;
                        try { recognitionRef.current.abort(); } catch(e){}
                    }
                };
            }, [alreadyGuessed, onSuccess, difficulty, isVip]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [chatLog]);

            const validVoices = globalVoices.filter(v => {
                if (difficulty === 'es') return v.lang.startsWith('es');
                if (difficulty === 'en') return v.lang.startsWith('en');
                return v.lang.startsWith('es') || v.lang.startsWith('en');
            });

            const createUtteranceWithVoice = (text, langStr) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = langStr;
                const chosenVoice = globalVoices.find(v => v.voiceURI === selectedVoiceURI);

                if (chosenVoice) {
                    if (difficulty === 'bilingual') {
                        if (chosenVoice.lang.startsWith(langStr.split('-')[0])) {
                            u.voice = chosenVoice;
                        }
                    } else {
                        u.voice = chosenVoice;
                    }
                }
                return u;
            };

            const speak = (textEs, textEn) => {
                if (!voiceEnabled || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();

                isSpeakingRef.current = true;

                const wasListening = shouldListenRef.current;
                // Si estaba escuchando, apagamos el hardware temporalmente para no generar eco,
                // PERO NO APAGAMOS LA LUZ VERDE (isListening se mantiene true).
                if (wasListening && recognitionRef.current) {
                    recognitionRef.current.onend = null;
                    try { recognitionRef.current.abort(); } catch(e){}
                    isRecoRunning.current = false;
                }

                let fallbackTimer;
                let isRestored = false;

                const restoreListening = () => {
                    if (isRestored) return;
                    isRestored = true;
                    clearTimeout(fallbackTimer);
                    setTimeout(() => {
                        isSpeakingRef.current = false;
                        // Si el candado global sigue activado, restauramos el hardware silenciosamente
                        if (wasListening && shouldListenRef.current && !isRecoRunning.current) {
                            startListening(); 
                        }
                    }, 500);
                };

                let utterances = [];
                let totalTextLength = 0;

                if (difficulty === 'es' && textEs) {
                    utterances.push(createUtteranceWithVoice(textEs, 'es-ES'));
                    totalTextLength += textEs.length;
                } else if (difficulty === 'en' && textEn) {
                    utterances.push(createUtteranceWithVoice(textEn, 'en-US'));
                    totalTextLength += textEn.length;
                } else if (difficulty === 'bilingual') {
                    if (textEs) { utterances.push(createUtteranceWithVoice(textEs, 'es-ES')); totalTextLength += textEs.length; }
                    if (textEn) { utterances.push(createUtteranceWithVoice(textEn, 'en-US')); totalTextLength += textEn.length; }
                }

                const estimatedMs = Math.max(3000, totalTextLength * 80); 
                fallbackTimer = setTimeout(restoreListening, estimatedMs);

                if (utterances.length > 0) {
                    utterances[utterances.length - 1].onend = restoreListening;
                    utterances[utterances.length - 1].onerror = restoreListening; 
                    utterances.forEach(u => window.speechSynthesis.speak(u));
                } else {
                    restoreListening();
                }
            };

            const deductMoney = (amount) => {
                if (balance >= amount) {
                setBalance(prev => prev - amount);
                return true;
                }
                const errEs = 'No tienes suficiente dinero para esta pregunta.';

                const err = difficulty === 'en' ? errEn : difficulty === 'es' ? errEs : `${errEs} / ${errEn}`;
                setChatLog(prev => [...prev, { type: 'system', text: err, isError: true }]);

            const getDynamicAnswer = (qKey, tense) => {
                const baseEs = character.es[qKey]; const baseEn = character.en[qKey];
                let resEs = baseEs; let resEn = baseEn;
                
                if (qKey === 'occupation') {
                    if (tense === 'past') { resEs = `Fui ${baseEs}.`; resEn = `I was a ${baseEn}.`; }
                    else if (tense === 'present') { resEs = `Soy ${baseEs}.`; resEn = `I am a ${baseEn}.`; }
                    else if (tense === 'future') { resEs = `Seré ${baseEs}.`; resEn = `I will be a ${baseEn}.`; }
                } else if (qKey === 'century') {
                    if (tense === 'past') { resEs = `Viví en el ${baseEs}.`; resEn = `I lived in the ${baseEn}.`; }
                    else if (tense === 'present') { resEs = `Vivo en el ${baseEs}.`; resEn = `I live in the ${baseEn}.`; }
                    else if (tense === 'future') { resEs = `Viviré en el ${baseEs}.`; resEn = `I will live in the ${baseEn}.`; }
                } else if (qKey === 'country') {
                    if (tense === 'past') { resEs = `Nací en ${baseEs}.`; resEn = `I was born in ${baseEn}.`; }
                    else if (tense === 'present') { resEs = `Soy de ${baseEs}.`; resEn = `I am from ${baseEn}.`; }
                    else if (tense === 'future') { resEs = `Seré recordado en ${baseEs}.`; resEn = `I will be remembered in ${baseEn}.`; }
                } else if (qKey === 'gender') {
                    if (tense === 'past') { resEs = `Fui ${baseEs}.`; resEn = `I was a ${baseEn}.`; }
                    else if (tense === 'present') { resEs = `Soy ${baseEs}.`; resEn = `I am a ${baseEn}.`; }
                    else if (tense === 'future') { resEs = `Seré ${baseEs}.`; resEn = `I will be a ${baseEn}.`; }
                } else if (qKey === 'status') {
                    const isAliveEs = baseEs.includes("Viv");
                    const isAliveEn = baseEn.includes("Alive");
                    
                    if (tense === 'past') { 
                        resEs = isAliveEs ? "Estuve vivo/a." : `Fallecí.`; 
                        resEn = isAliveEn ? "I was alive." : `I passed away.`; 
                    }
                    else if (tense === 'present') { 
                        resEs = `Estoy ${baseEs}.`; 
                        resEn = `I am ${baseEn}.`; 
                    }
                    else if (tense === 'future') { 
                        resEs = isAliveEs ? "Algún día falleceré." : "Mi legado vivirá."; 
                        resEn = isAliveEn ? "One day I will pass away." : "My legacy will live on."; 
                    }
                } else if (qKey === 'clue1' || qKey === 'clue2') {
                    if (tense === 'past') { resEs = `En el pasado: ${baseEs}`; resEn = `In the past: ${baseEn}`; }
                    else if (tense === 'present') { resEs = `Actualmente: ${baseEs}`; resEn = `Currently: ${baseEn}`; }
                    else if (tense === 'future') { resEs = `En el futuro: ${baseEs}`; resEn = `In the future: ${baseEn}`; }
                }
                return { es: resEs, en: resEn, text: difficulty === 'es' ? resEs : difficulty === 'en' ? resEn : `${resEs}\n[EN]: ${resEn}` };
            };

            const getLabel = (obj) => difficulty === 'en' ? obj.en : difficulty === 'es' ? obj.es : `${obj.es} / ${obj.en}`;

            const processInput = (inputText, isVoice = false, voiceConfidence = null) => {
                const normalizedInput = normalizeString(inputText);
                const normalizedName = normalizeString(character.name);
                
                const accentScore = (isVoice && voiceConfidence !== null && difficulty !== 'es') 
                    ? Math.max(1, Math.min(10, Math.round(voiceConfidence * 10))) 
                    : null;
                
                const isMatch = (input, target) => {
                    if (!target || !input) return false;
                    if (input.includes(target) || target.includes(input)) return true;
                    if (target.length > 6 && input.includes(target.substring(0, target.length - 2))) return true;
                    
                    const inputWords = input.split(' ').filter(w => w.length > 3);
                    const targetWords = target.split(' ').filter(w => w.length > 3);
                    if (targetWords.length > 0 && inputWords.length > 0) {
                        const matches = targetWords.filter(tw => inputWords.some(iw => iw.includes(tw) || tw.includes(iw)));
                        if (matches.length / targetWords.length >= 0.6) return true; 
                    }
                    return false;
                };

                if (
                normalizedInput === normalizedName || 
                (normalizedInput.length > 4 && normalizedName.includes(normalizedInput)) ||
                (isVoice && isMatch(normalizedInput, normalizedName))
                ) {
                const successGuessText = difficulty === 'en' ? `Correct guess!: ${character.name}` : `¡Adivinado!: ${character.name}`;
                setAttemptHistory(prev => [...prev, { text: successGuessText, correct: true }]);
                isSpeakingRef.current = false; 
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                const reward = isVip ? REWARD_VIP : REWARD_NORMAL;
                setBalance(prev => prev + reward);
                onSuccess(isVip);
                return;
                }

                let matchedTopic = null;
                let matchedTense = null;
                let matchedExtra = null;

                for (const topic of GRAMMAR_QUESTIONS) {
                    const labelEs = normalizeString(topic.label.es);
                    const labelEn = normalizeString(topic.label.en);
                    
                    if (isMatch(normalizedInput, labelEs) || isMatch(normalizedInput, labelEn)) {
                        matchedTopic = topic;
                        matchedTense = topic.tenses.find(t => t.id === (isVip ? 'present' : 'past'));
                        break;
                    }

                    for (const tense of topic.tenses) {
                        const qEs = normalizeString(tense.es);
                        const qEn = normalizeString(tense.en);
                        if (isMatch(normalizedInput, qEs) || isMatch(normalizedInput, qEn)) {
                        matchedTopic = topic;
                        matchedTense = tense;
                        break;
                        }
                    }
                    if (matchedTopic) break;
                }

                if (!matchedTopic) {
                for (const q of EXTRA_QUESTIONS) {
                    const qEs = normalizeString(q.label.es);
                    const qEn = normalizeString(q.label.en);
                    if (isMatch(normalizedInput, qEs) || isMatch(normalizedInput, qEn)) {
                    matchedExtra = q;
                    break;
                    }
                }
                }

                if (matchedTopic || matchedExtra) {
                const cost = matchedTopic ? matchedTopic.cost : matchedExtra.cost;
                if (!deductMoney(cost)) return;

                if (matchedTopic) setAskedTopics(prev => new Set(prev).add(matchedTopic.id));
                if (matchedExtra) setAskedTopics(prev => new Set(prev).add(matchedExtra.id));

                let answerText = "";
                let esToSpeak = "";
                let enToSpeak = "";
                
                if (matchedTopic) {
                    const answer = getDynamicAnswer(matchedTopic.key, matchedTense.id);
                    answerText = answer.text;
                    esToSpeak = answer.es;
                    enToSpeak = answer.en;
                } else {
                    answerText = matchedExtra.key === 'missingLetters' ? character.missingLetters : (difficulty === 'es' ? character.es[matchedExtra.key] : difficulty === 'en' ? character.en[matchedExtra.key] : `${character.es[matchedExtra.key]}\n[EN]: ${character.en[matchedExtra.key]}`);
                    esToSpeak = character.es[matchedExtra.key];
                    enToSpeak = character.en[matchedExtra.key];
                }

                const qPrefix = difficulty === 'en' ? 'Q:' : 'P:';
                const aPrefix = difficulty === 'en' ? 'A:' : 'R:';
                const historyText = `${qPrefix} ${inputText}\n${aPrefix} ${answerText.split('\n')[0]}`;
                setAttemptHistory(prev => [...prev, { text: historyText, correct: true }]);

                const successMsgEs = "✅ ¡Correcto! Pregunta reconocida.";
                const successMsgEn = "✅ Correct! Question recognized.";
                const successText = difficulty === 'en' ? successMsgEn : difficulty === 'es' ? successMsgEs : `${successMsgEs} / ${successMsgEn}`;
                
                setChatLog(prev => [
                    ...prev, 
                    { type: 'user', text: inputText, icon: isVoice ? Mic : undefined, cost: cost, score: accentScore },
                    { type: 'system', text: successText, isSuccess: true }
                ]);

                setTimeout(() => {
                    setChatLog(prev => [...prev, { type: 'bot', text: answerText }]);
                    if (!(matchedExtra && matchedExtra.key === 'missingLetters')) speak(esToSpeak, enToSpeak);
                }, 600);

                } else {
                setErrorShake(true); setTimeout(() => setErrorShake(false), 500);
                setBalance(prev => Math.max(0, prev - COST_PENALTY));
                
                const errHist = difficulty === 'en' ? `Unrecognized: "${inputText}"` : `No reconocido: "${inputText}"`;
                setAttemptHistory(prev => [...prev, { text: errHist, correct: false }]);

                const errEs = `❌ Error. Pregunta no reconocida o nombre incorrecto (-${COST_PENALTY}€).`;
                const errEn = `❌ Error. Question not recognized or incorrect name (-${COST_PENALTY}€).`;
                const errText = difficulty === 'en' ? errEn : difficulty === 'es' ? errEs : `${errEs} / ${errEn}`;
                
                setChatLog(prev => [
                    ...prev, 
                    { type: 'user', text: inputText, icon: isVoice ? Mic : undefined, score: accentScore },
                    { type: 'system', text: errText, isError: true }
                ]);
                speak('Error', 'Error');
                }

                setGuess('');
            };

            const askGrammarQuestion = (topic, tenseConfig) => {
                if (!deductMoney(topic.cost)) return;
                setAskedTopics(prev => new Set(prev).add(topic.id));
                setExpandedTopic(null);
                const answer = getDynamicAnswer(topic.key, tenseConfig.id);

                const qPrefix = difficulty === 'en' ? 'Q:' : 'P:';
                const aPrefix = difficulty === 'en' ? 'A:' : 'R:';
                const historyText = `${qPrefix} ${getLabel(tenseConfig)}\n${aPrefix} ${answer.text.split('\n')[0]}`;
                setAttemptHistory(prev => [...prev, { text: historyText, correct: true }]);

                const successMsgEs = "✅ ¡Correcto! Pregunta formulada.";
                const successMsgEn = "✅ Correct! Question asked.";
                const successText = difficulty === 'en' ? successMsgEn : difficulty === 'es' ? successMsgEs : `${successMsgEs} / ${successMsgEn}`;

                setChatLog(prev => [
                ...prev, 
                { type: 'user', text: getLabel(tenseConfig), icon: tenseConfig.icon, cost: topic.cost },
                { type: 'system', text: successText, isSuccess: true }
                ]);
                setTimeout(() => { setChatLog(prev => [...prev, { type: 'bot', text: answer.text }]); speak(answer.es, answer.en); }, 600);
            };

            const askExtraQuestion = (q) => {
                if (!deductMoney(q.cost)) return;
                setAskedTopics(prev => new Set(prev).add(q.id));
                const answerText = q.key === 'missingLetters' ? character.missingLetters : (difficulty === 'es' ? character.es[q.key] : difficulty === 'en' ? character.en[q.key] : `${character.es[q.key]}\n[EN]: ${character.en[q.key]}`);
                
                const qPrefix = difficulty === 'en' ? 'Q:' : 'P:';
                const aPrefix = difficulty === 'en' ? 'A:' : 'R:';
                const historyText = `${qPrefix} ${getLabel(q.label)}\n${aPrefix} ${answerText.split('\n')[0]}`;
                setAttemptHistory(prev => [...prev, { text: historyText, correct: true }]);

                const successMsgEs = "✅ ¡Correcto! Pregunta formulada.";
                const successMsgEn = "✅ Correct! Question asked.";
                const successText = difficulty === 'en' ? successMsgEn : difficulty === 'es' ? successMsgEs : `${successMsgEs} / ${successMsgEn}`;

                setChatLog(prev => [
                ...prev, 
                { type: 'user', text: getLabel(q.label), cost: q.cost },
                { type: 'system', text: successText, isSuccess: true }
                ]);
                setTimeout(() => { setChatLog(prev => [...prev, { type: 'bot', text: answerText }]); if(q.key !== 'missingLetters') speak(character.es[q.key], character.en[q.key]); }, 600);
            };

            const handleGuessSubmit = (e) => {
                e.preventDefault();
                if(!guess) return;
                processInput(guess, false);
            };

            const safeStart = (reco) => {
                try {
                    const p = reco.start();
                    if (p && p.catch) p.catch(e => console.warn("Reco start rejected:", e));
                } catch(e) { console.warn("Reco start error:", e); }
            };

            const startListening = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) { alert('Tu navegador no soporta el reconocimiento de voz. / Browser not supported for voice.'); return; }

                if (recognitionRef.current) {
                    recognitionRef.current.onend = null;
                    try { recognitionRef.current.abort(); } catch(e){}
                }

                const recognition = new SpeechRecognition();
                recognition.lang = difficulty === 'en' ? 'en-US' : 'es-ES';
                recognition.continuous = true;
                recognition.interimResults = false; 
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    isRecoRunning.current = true;
                };
                
                recognition.onresult = (e) => { 
                    if (isSpeakingRef.current) return;

                    const lastResultIndex = e.results.length - 1;
                    const transcript = e.results[lastResultIndex][0].transcript;
                    const confidence = e.results[lastResultIndex][0].confidence;
                    
                    if (transcript.trim().length > 0) {
                        processInput(transcript, true, confidence);
                    }
                };

                recognition.onerror = (e) => {
                    isRecoRunning.current = false;
                    // Solo apagamos el micro si el usuario no dio permisos
                    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                        shouldListenRef.current = false;
                        setGlobalMicActive(false);
                        setIsListening(false);
                    }
                };

                recognition.onend = () => {
                    isRecoRunning.current = false;
                    // Si el navegador pausa el microfono por silencio prolongado,
                    // lo relanzamos silenciosamente creando una instancia nueva si el usuario no lo apagó.
                    if (shouldListenRef.current && !isSpeakingRef.current) {
                        setTimeout(() => {
                            if (shouldListenRef.current && !isRecoRunning.current && !isSpeakingRef.current) {
                                startListening();
                            }
                        }, 300);
                    }
                };

                recognitionRef.current = recognition;
                safeStart(recognition);
            };

            const toggleListening = () => {
                // AQUÍ ES DONDE ESTÁ EL CONTROL MANUAL EXCLUSIVO
                if (shouldListenRef.current) {
                    // APAGAR
                    shouldListenRef.current = false;
                    setGlobalMicActive(false);
                    setIsListening(false);
                    if (recognitionRef.current) {
                        recognitionRef.current.onend = null;
                        try { recognitionRef.current.abort(); } catch(e){}
                    }
                    isRecoRunning.current = false;
                } else {
                    // ENCENDER
                    shouldListenRef.current = true;
                    setGlobalMicActive(true);
                    setIsListening(true);
                    startListening();
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-900/90 flex items-center justify-center p-2 sm:p-4 z-50 backdrop-blur-md">
                <div className={`rounded-3xl w-full max-w-7xl h-[95vh] sm:h-[90vh] overflow-hidden shadow-2xl flex flex-col lg:flex-row border-4 ${isVip ? 'border-fuchsia-400 bg-fuchsia-50' : 'border-white bg-white'}`}>
                    
                    {/* PANEL IZQUIERDO: Preguntas */}
                    <div className={`w-full lg:w-[30%] border-r flex flex-col h-[45%] lg:h-full ${isVip ? 'bg-fuchsia-100/50 border-fuchsia-200' : 'bg-slate-50 border-slate-200'}`}>
                    <div className={`p-4 sm:p-5 flex justify-between items-center ${isVip ? 'bg-gradient-to-r from-fuchsia-600 to-purple-600' : 'bg-indigo-700'} text-white`}>
                        <div>
                        <h2 className="font-bold text-lg sm:text-xl flex items-center gap-2">
                            {isVip ? <Music className="text-fuchsia-200"/> : <Languages />} 
                            {isVip ? 'VIP Singer Room' : 'Questions Menu'}
                        </h2>
                        <div className="flex items-center gap-2 mt-1">
                            <Coins className={`w-4 h-4 ${isVip ? 'text-fuchsia-200' : 'text-yellow-400'}`}/>
                            <span className="font-bold text-lg">{balance} €</span>
                        </div>
                        </div>
                    </div>
                    
                    <div className="p-3 sm:p-4 flex-1 overflow-y-auto space-y-3 custom-scrollbar">
                        {GRAMMAR_QUESTIONS.map(topic => {
                        const isAsked = askedTopics.has(topic.id);
                        const isExpanded = expandedTopic === topic.id;
                        const Icon = topic.icon;
                        return (
                            <div key={topic.id} className={`border rounded-xl overflow-hidden shadow-sm ${isVip ? 'bg-fuchsia-50/50 border-fuchsia-300' : 'bg-white border-slate-200'}`}>
                            <button onClick={() => !isAsked && setExpandedTopic(isExpanded ? null : topic.id)} disabled={isAsked}
                                className={`w-full p-3 sm:p-4 flex justify-between items-center transition-colors ${isAsked ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'hover:bg-indigo-50 text-slate-800'}`}>
                                <div className="flex items-center gap-2 sm:gap-3 font-semibold text-sm sm:text-base">
                                <Icon className={`w-4 h-4 sm:w-5 sm:h-5 ${isAsked ? 'text-slate-400' : (isVip ? 'text-fuchsia-500' : 'text-indigo-500')}`} />
                                {getLabel(topic.label)}
                                </div>
                                <div className="flex items-center gap-2">
                                {!isAsked && <span className="text-xs font-bold text-red-500 bg-red-100 px-2 py-1 rounded-full">-{topic.cost}€</span>}
                                {!isAsked && (isExpanded ? <ChevronUp className="w-5 h-5"/> : <ChevronDown className="w-5 h-5"/>)}
                                {isAsked && <CheckCircle2 className="w-5 h-5 text-green-500"/>}
                                </div>
                            </button>
                            
                            {isExpanded && !isAsked && (
                                <div className="bg-slate-50 p-2 sm:p-3 grid grid-cols-1 gap-2 border-t">
                                {topic.tenses.map(tense => (
                                    <button key={tense.id} onClick={() => askGrammarQuestion(topic, tense)}
                                    className="flex items-center gap-3 p-2 sm:p-3 rounded-lg border bg-white hover:border-indigo-400 transition-all text-left group">
                                    <div className={`p-1 sm:p-2 rounded-md ${tense.id === 'past' ? 'bg-amber-100 text-amber-600' : tense.id === 'present' ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}`}>
                                        <tense.icon className="w-4 h-4"/>
                                    </div>
                                    <div>
                                        <div className="text-[10px] sm:text-xs font-bold text-slate-400 uppercase">{tense.id}</div>
                                        <div className="text-xs sm:text-sm font-medium text-slate-700">{getLabel(tense)}</div>
                                    </div>
                                    </button>
                                ))}
                                </div>
                            )}
                            </div>
                        );
                        })}

                        {EXTRA_QUESTIONS.map(q => {
                        const isAsked = askedTopics.has(q.id);
                        return (
                            <button key={q.id} onClick={() => askExtraQuestion(q)} disabled={isAsked}
                            className={`w-full p-3 sm:p-4 rounded-xl flex justify-between items-center border transition-all font-semibold ${isAsked ? 'bg-slate-100 text-slate-400' : 'bg-amber-50 border-amber-200 text-amber-800 hover:bg-amber-100'}`}>
                            <div className="flex items-center gap-2 sm:gap-3 text-sm sm:text-base"><q.icon className="w-4 h-4 sm:w-5 sm:h-5" /> {getLabel(q.label)}</div>
                            <div className="flex items-center gap-2">
                                {!isAsked && <span className="text-xs font-bold text-red-500 bg-red-100 px-2 py-1 rounded-full">-{q.cost}€</span>}
                            </div>
                            </button>
                        )
                        })}
                    </div>
                    </div>

                    {/* PANEL CENTRAL: Chat e Input */}
                    <div className={`w-full lg:w-[50%] flex flex-col h-[55%] lg:h-full ${isVip ? 'bg-[url("https://www.transparenttextures.com/patterns/stardust.png")] bg-fuchsia-900/5' : 'bg-slate-100'}`}>
                    <div className="bg-white/90 backdrop-blur border-b px-4 sm:px-6 py-3 sm:py-4 flex justify-between items-center shadow-sm">
                        <h2 className={`text-lg sm:text-xl font-bold flex items-center gap-2 ${isVip ? 'text-fuchsia-700' : 'text-slate-800'}`}>
                        <User className={isVip ? 'text-fuchsia-500' : 'text-indigo-500'}/> 
                        {isVip ? 'Mystery Singer VIP' : (difficulty === 'en' ? 'Interview' : 'Entrevista')}
                        </h2>
                        <div className="flex items-center gap-2">
                            <select
                                value={selectedVoiceURI}
                                onChange={(e) => setSelectedVoiceURI(e.target.value)}
                                className="text-xs md:text-sm bg-slate-100 border border-slate-300 rounded px-2 py-1 max-w-[100px] md:max-w-[150px] truncate text-slate-700 outline-none cursor-pointer hover:border-indigo-400 focus:ring-2 focus:ring-indigo-200 transition-all"
                                title={difficulty === 'en' ? 'Choose Voice' : 'Elegir Voz'}
                            >
                                <option value="">{difficulty === 'en' ? 'Default Voice' : 'Voz Automática'}</option>
                                {validVoices.map(v => (
                                    <option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>
                                ))}
                            </select>

                            <button onClick={() => { setVoiceEnabled(!voiceEnabled); if(window.speechSynthesis) window.speechSynthesis.cancel(); }}
                            className={`p-2 rounded-full transition-colors ${voiceEnabled ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-200 text-slate-500'}`}>
                            {voiceEnabled ? <Volume2 size={18}/> : <VolumeX size={18}/>}
                            </button>
                        </div>
                    </div>

                    <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 scroll-smooth">
                        {chatLog.map((msg, i) => (
                        <div key={i} className={`flex ${msg.type === 'user' ? 'justify-end' : 'justify-start'} fade-in`}>
                            <div className={`max-w-[90%] sm:max-w-[85%] rounded-2xl p-3 sm:p-4 shadow-sm text-sm sm:text-[15px] leading-relaxed whitespace-pre-wrap
                            ${msg.type === 'user' ? 'bg-indigo-600 text-white rounded-br-none' : 
                                msg.type === 'system' ? (msg.isError ? 'bg-red-100 text-red-800 mx-auto text-sm font-medium text-center' : msg.isSuccess ? 'bg-green-100 text-green-800 mx-auto text-sm font-bold text-center border-2 border-green-300' : msg.isVipAlert ? 'bg-gradient-to-r from-fuchsia-500 to-purple-500 text-white font-bold mx-auto text-center border-2 border-fuchsia-300 shadow-lg scale-105' : 'bg-slate-200 text-slate-600 mx-auto text-sm italic text-center') : 
                                `bg-white border text-slate-800 rounded-bl-none font-medium ${isVip ? 'border-fuchsia-400 shadow-[0_0_15px_rgba(232,121,249,0.3)]' : 'border-slate-200'}`}`}
                            >
                            {msg.type === 'bot' && <div className="text-[10px] text-slate-400 font-bold uppercase mb-1">Character</div>}
                            {msg.type === 'user' && <div className="text-[10px] text-indigo-200 font-bold uppercase mb-1 flex justify-between items-center">
                                <span className="flex items-center gap-1">{msg.icon && <msg.icon className="w-3 h-3"/>} You</span> 
                                <div className="flex items-center gap-2">
                                    {msg.cost && <span className="text-red-300">-{msg.cost}€</span>}
                                </div>
                            </div>}
                            {msg.text}
                            {msg.score && (
                                <div className={`mt-3 p-2.5 rounded-lg text-xs font-bold border flex flex-col gap-1.5 ${msg.score >= 8 ? 'bg-green-500/20 border-green-400/50 text-green-100' : msg.score >= 5 ? 'bg-yellow-500/20 border-yellow-400/50 text-yellow-100' : 'bg-red-500/20 border-red-400/50 text-red-100'}`}>
                                    <div className="flex justify-between items-center">
                                        <span>{difficulty === 'en' ? 'Pronunciation Level' : 'Nivel de Pronunciación'}: {msg.score}/10</span>
                                        <span>{msg.score >= 8 ? '🟢' : msg.score >= 5 ? '🟡' : '🔴'}</span>
                                    </div>
                                    <div className="w-full bg-black/20 rounded-full h-2 overflow-hidden mt-0.5">
                                        <div className={`h-full ${msg.score >= 8 ? 'bg-green-400' : msg.score >= 5 ? 'bg-yellow-400' : 'bg-red-400'}`} style={{ width: `${(msg.score/10)*100}%` }}></div>
                                    </div>
                                </div>
                            )}
                            </div>
                        </div>
                        ))}
                    </div>

                    <div className="p-3 sm:p-4 bg-white/90 backdrop-blur border-t shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] relative mt-4">
                        
                        {isListening && (
                            <div className="absolute -top-12 left-1/2 transform -translate-x-1/2 flex items-center gap-3 bg-slate-900 text-white px-5 py-2 rounded-full shadow-[0_0_20px_rgba(34,197,94,0.6)] border-2 border-green-500 z-10 fade-in">
                                <div className="w-4 h-4 bg-green-500 rounded-full animate-pulse shadow-[0_0_12px_#4ade80]"></div>
                                <span className="text-sm font-bold tracking-widest">{difficulty === 'en' ? 'LISTENING...' : 'ESCUCHANDO...'}</span>
                            </div>
                        )}

                        <div 
                            className="absolute -top-12 sm:-top-14 left-1/2 transform -translate-x-1/2 flex items-center gap-3 bg-slate-900 px-5 py-2 sm:py-3 rounded-full shadow-2xl border-[3px] z-10 cursor-pointer transition-all hover:scale-105 active:scale-95"
                            onClick={toggleListening}
                            style={{ borderColor: isListening ? '#22c55e' : '#ef4444' }}
                            title={difficulty === 'en' ? 'Click to toggle microphone' : 'Clic para activar/desactivar micrófono'}
                        >
                            <div className="flex gap-2 sm:gap-3 bg-black/50 p-1.5 rounded-full border border-slate-700">
                                <div className={`w-3 h-3 sm:w-4 sm:h-4 rounded-full transition-all ${!isListening ? 'bg-red-500 shadow-[0_0_15px_#ef4444] scale-110' : 'bg-red-900/50'}`}></div>
                                <div className={`w-3 h-3 sm:w-4 sm:h-4 rounded-full transition-all ${isListening ? 'bg-green-500 shadow-[0_0_15px_#22c55e] scale-110 animate-pulse' : 'bg-green-900/50'}`}></div>
                            </div>
                            <span className={`text-xs sm:text-sm font-bold tracking-widest uppercase ${isListening ? 'text-green-400' : 'text-red-400'}`}>
                                {isListening ? (difficulty === 'en' ? 'MIC ON (Listening)' : 'MICRO ON (Escuchando)') : (difficulty === 'en' ? 'MIC OFF (Click to start)' : 'MICRO APAGADO (Pulsar)')}
                            </span>
                        </div>

                        <form onSubmit={handleGuessSubmit} className="flex gap-2">
                        <button type="button" onClick={toggleListening}
                            className={`p-3 sm:p-4 rounded-xl flex items-center justify-center transition-all ${isListening ? 'bg-green-500 text-white shadow-lg ring-4 ring-green-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                            {isListening ? <Mic size={20} /> : <MicOff size={20} />}
                        </button>
                        <input type="text" placeholder={difficulty === 'en' ? 'Type name or question...' : 'Escribe personaje o pregunta...'} 
                            value={guess} onChange={(e) => setGuess(e.target.value)}
                            className={`flex-1 px-3 sm:px-5 py-3 sm:py-4 border-2 rounded-xl outline-none transition-all text-sm sm:text-lg font-bold focus:border-indigo-500 ${errorShake ? 'border-red-500 animate-shake bg-red-50' : 'border-slate-300'}`} />
                        <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 sm:px-8 py-3 sm:py-4 rounded-xl font-bold text-sm sm:text-lg shadow-lg flex flex-col items-center justify-center leading-none transition-all hover:scale-105 active:scale-95">
                            <span>{difficulty === 'en' ? 'Send' : 'Enviar'}</span>
                            {guess && <span className="text-[10px] font-normal text-indigo-200 mt-1">(-50€)</span>}
                        </button>
                        </form>
                    </div>
                    </div>

                    {/* PANEL DERECHO: Historial (Ventanita de aciertos/fallos y contestaciones) */}
                    <div className={`hidden lg:flex w-[20%] border-l flex-col h-full ${isVip ? 'bg-fuchsia-100/30 border-fuchsia-200' : 'bg-slate-50 border-slate-200'}`}>
                        <div className={`p-4 border-b ${isVip ? 'border-fuchsia-200 bg-fuchsia-100/50' : 'border-slate-200 bg-white/50'} backdrop-blur flex justify-between items-center`}>
                            <h3 className="font-bold text-sm text-slate-700 flex items-center gap-2">
                                <HistoryIcon className="w-4 h-4 text-indigo-500" />
                                {difficulty === 'en' ? 'History' : 'Historial'}
                            </h3>
                            <span className="bg-slate-200 text-slate-600 text-[10px] font-bold px-2 py-1 rounded-full">{attemptHistory.length}</span>
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
                            {attemptHistory.map((item, i) => (
                                <div key={i} className={`flex items-start gap-2 p-2 rounded-lg border text-xs font-medium fade-in ${item.correct ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`}>
                                    <span className="shrink-0 text-sm">{item.correct ? '✔️' : '❌'}</span>
                                    <span className="break-words w-full mt-0.5 whitespace-pre-line leading-relaxed">{item.text}</span>
                                </div>
                            ))}
                            {attemptHistory.length === 0 && (
                                <div className="text-center text-slate-400 italic text-xs mt-6 px-2">
                                    {difficulty === 'en' ? 'Your questions and answers will appear here.' : 'Tus preguntas y las contestaciones aparecerán aquí.'}
                                </div>
                            )}
                        </div>
                    </div>

                </div>
                </div>
            );
        };

        // --- SUBCOMPONENTE: EFECTO MÁQUINA DE ESCRIBIR ---
        const TypewriterText = ({ text, speed = 30 }) => {
            const [displayed, setDisplayed] = useState("");
            
            useEffect(() => {
                let i = 0;
                setDisplayed("");
                const timer = setInterval(() => {
                    setDisplayed(text.substring(0, i + 1));
                    i++;
                    if(i >= text.length) clearInterval(timer);
                }, speed);
                return () => clearInterval(timer);
            }, [text, speed]);
            
            return <span>{displayed}</span>;
        };

        // --- COMPONENTE DE VÍDEO FICHA (VERSIÓN CINEMÁTICA MEJORADA) ---
        const VideoFicha = ({ character, difficulty, onContinue }) => {
            const [phase, setPhase] = useState('countdown-3');

            useEffect(() => {
                const t1 = setTimeout(() => setPhase('countdown-2'), 1000);
                const t2 = setTimeout(() => setPhase('countdown-1'), 2000);
                const t3 = setTimeout(() => setPhase('intro'), 3000);
                const t4 = setTimeout(() => setPhase('bio'), 5500);
                
                return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); };
            }, []);

            const getBioText = () => {
                if (difficulty === 'es') return character.es.bio;
                if (difficulty === 'en') return character.en.bio;
                return `${character.es.bio}\n\n[EN]: ${character.en.bio}`;
            };

            const getOccText = () => {
                if (difficulty === 'es') return `${character.es.occupation} · ${character.es.century}`;
                if (difficulty === 'en') return `${character.en.occupation} · ${character.en.century}`;
                return `${character.es.occupation} / ${character.en.occupation}`;
            };

            return (
                <div className="fixed inset-0 bg-black flex items-center justify-center p-0 sm:p-8 z-[60]">
                    <div className="relative w-full h-full sm:h-auto sm:aspect-video sm:max-w-5xl bg-[#0a0a0a] sm:rounded-3xl overflow-hidden shadow-[0_0_80px_rgba(0,0,0,0.9)] border border-neutral-800">
                        
                        <div className="absolute inset-0 sepia-filter opacity-80 pointer-events-none z-10">
                            <div className="absolute inset-0 bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.8%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E')] opacity-50 mix-blend-overlay animate-noise"></div>
                            <div className="film-scratch"></div>
                            <div className="film-scratch" style={{left: '20%', animationDelay: '1.5s'}}></div>
                            <div className="absolute top-0 bottom-0 left-0 right-0 w-full h-full bg-gradient-to-b from-transparent via-black/10 to-transparent animate-scanline"></div>
                        </div>
                        <div className="absolute inset-0 vignette pointer-events-none z-20"></div>

                        <div className="absolute inset-0 flex flex-col items-center justify-center z-30 p-6 sm:p-12 text-center text-amber-50">
                            
                            {phase.startsWith('countdown') && (
                                <div className="flex flex-col items-center justify-center h-full w-full opacity-80">
                                    <div className="countdown-circle font-mono text-white/80">
                                        <div className="countdown-line"></div>
                                        <div className="countdown-line" style={{transform: 'rotate(90deg)'}}></div>
                                        <span className="z-10 bg-[#0a0a0a] rounded-full w-32 h-32 flex items-center justify-center drop-shadow-lg">
                                            {phase.split('-')[1]}
                                        </span>
                                    </div>
                                </div>
                            )}

                            {phase === 'intro' && (
                                <div className="fade-in flex flex-col items-center justify-center h-full w-full">
                                    <h2 className="text-amber-500/80 text-sm md:text-2xl font-bold tracking-[0.5em] uppercase mb-6">
                                        {difficulty === 'en' ? 'Historical Archives' : 'Archivos Históricos'}
                                    </h2>
                                    <div className="w-1/2 h-[1px] bg-amber-500/50 mb-8"></div>
                                    <Film className="text-5xl text-amber-100/50 mb-4 animate-spin-slow" />
                                    <p className="text-amber-100/40 tracking-widest text-xs mt-4">RECORDING...</p>
                                </div>
                            )}

                            {phase === 'bio' && (
                                <div className="w-full max-w-4xl flex flex-col h-full fade-in justify-center relative">
                                    
                                    <div className="flex flex-col md:flex-row items-center md:items-start gap-8 w-full text-left mt-8 md:mt-0">
                                        <div className="w-32 h-32 md:w-48 md:h-48 shrink-0 rounded-sm border-2 border-amber-100/30 flex items-center justify-center bg-black/60 shadow-[0_0_40px_rgba(251,191,36,0.15)] relative overflow-hidden">
                                            <div className="absolute inset-0 bg-amber-900/20 mix-blend-overlay"></div>
                                            <UserTie className="text-6xl md:text-8xl text-amber-100/60 relative z-10" />
                                        </div>
                                        
                                        <div className="flex-1 flex flex-col justify-center text-center md:text-left w-full">
                                            <h1 className="text-3xl md:text-5xl lg:text-6xl font-serif font-bold tracking-widest uppercase mb-1 text-shadow-cinematic text-amber-50">
                                                {character.name}
                                            </h1>
                                            <p className="text-base md:text-2xl font-serif italic text-amber-400/90 mb-6 border-b border-amber-500/30 pb-4 inline-block md:inline">
                                                {getOccText()}
                                            </p>
                                            
                                            <div className="bg-black/50 p-5 md:p-8 rounded-lg border-l-4 border-amber-600 shadow-2xl relative">
                                                <FAIcon icon="fa-quote-left" className="absolute top-4 left-4 text-amber-500/20 text-3xl" />
                                                <p className="text-sm md:text-xl leading-relaxed md:leading-loose text-amber-100/95 font-medium whitespace-pre-wrap font-serif z-10 relative">
                                                    <TypewriterText text={getBioText()} speed={35} />
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="absolute bottom-4 right-4 md:bottom-0 md:right-0 fade-in" style={{animationDelay: '4s', animationFillMode: 'both'}}>
                                        <button 
                                            onClick={onContinue}
                                            className="flex items-center gap-3 bg-black/60 border border-amber-500/50 text-amber-400 hover:bg-amber-500 hover:text-black px-6 py-3 rounded-md font-bold text-sm md:text-lg transition-all uppercase tracking-widest"
                                        >
                                            <Play /> {difficulty === 'en' ? 'Continue' : 'Continuar'}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                        
                        <div className="absolute top-4 right-6 z-40 flex items-center gap-2">
                            <div className="w-3 h-3 bg-red-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
                            <span className="font-mono text-red-500 font-bold tracking-wider text-xs md:text-sm">REC</span>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE DE LA LÍNEA DEL TIEMPO ---
        const Timeline = ({ guessedCharacters, allCharacters, difficulty }) => {
            const guessedList = Array.from(guessedCharacters).map(idx => allCharacters[idx]);
            const uniqueGuessed = Array.from(new Set(guessedList.map(c => c.name)))
                .map(name => guessedList.find(c => c.name === name));

            const sorted = uniqueGuessed.sort((a, b) => a.sortYear - b.sortYear);

            if (sorted.length === 0) return null;

            return (
                <div className="w-full bg-white/80 backdrop-blur shadow-xl border border-slate-200 overflow-x-auto custom-scrollbar mb-8 py-10 px-8 rounded-[2rem]">
                <div className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6 text-center">
                    {difficulty === 'en' ? 'Historical Timeline' : 'Línea del Tiempo Histórica'}
                </div>
                <div className="relative flex items-center min-w-max mx-auto gap-24 h-12 px-10">
                    <div className="absolute top-1/2 left-0 right-0 h-1 bg-slate-300 -translate-y-1/2 z-0 rounded-full"></div>
                    
                    {sorted.map((char) => (
                        <div key={char.name} className="relative z-10 flex flex-col items-center group">
                        <div className="absolute -top-8 text-[10px] md:text-xs font-bold text-slate-500 bg-white px-3 py-1 rounded-full shadow-sm border border-slate-100 whitespace-nowrap group-hover:-translate-y-1 transition-transform">
                            {difficulty === 'en' ? char.en.century : char.es.century}
                        </div>
                        
                        <div className="w-4 h-4 md:w-5 md:h-5 bg-indigo-600 rounded-full border-4 border-white shadow-md ring-2 ring-indigo-200 group-hover:scale-125 transition-transform"></div>
                        
                        <div className="absolute top-8 text-xs md:text-sm font-bold text-indigo-900 bg-indigo-50 px-3 py-1.5 rounded-lg shadow-sm border border-indigo-100 whitespace-nowrap group-hover:translate-y-1 transition-transform">
                            {char.name}
                        </div>
                        </div>
                    ))}
                </div>
                </div>
            );
        };

        // --- COMPONENTE PRINCIPAL APP ---
        function App() {
            const [difficulty, setDifficulty] = useState(null);
            const [playerName, setPlayerName] = useState("");
            const [playerPosition, setPlayerPosition] = useState(-1);
            const [guessedCharacters, setGuessedCharacters] = useState(new Set());
            const [activeSquare, setActiveSquare] = useState(null);
            const [showFicha, setShowFicha] = useState(false);
            
            const [balance, setBalance] = useState(500);
            const [isVipModeActive, setIsVipModeActive] = useState(false);
            const [vipCharacter, setVipCharacter] = useState(null);
            const [vipWon, setVipWon] = useState(false);
            const [globalMicActive, setGlobalMicActive] = useState(false);

            // GESTIÓN DE VOCES GLOBALES
            const [globalVoices, setGlobalVoices] = useState([]);
            const [selectedVoiceURI, setSelectedVoiceURI] = useState("");
            
            // Estado de movimiento
            const [isMoving, setIsMoving] = useState(false);
            const [hopTrigger, setHopTrigger] = useState(0);

            useEffect(() => {
                const loadVoices = () => {
                    const voices = window.speechSynthesis.getVoices();
                    setGlobalVoices(voices);
                };
                
                loadVoices();
                if (window.speechSynthesis) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            const VIP_COST = 500;
            const VIP_THRESHOLD = 1500;

            const handleStart = (level, name) => {
                setDifficulty(level);
                setPlayerName(name);
            };

            const handleRoll = (diceValue) => {
                const finalPos = Math.min(playerPosition + diceValue, FULL_CHARACTERS.length - 1);
                setIsMoving(true);
                
                let currentPos = playerPosition;
                const delay = 400; // ms per hop

                const step = () => {
                    if (currentPos < finalPos) {
                        currentPos++;
                        setPlayerPosition(currentPos);
                        setHopTrigger(prev => prev + 1);
                        setTimeout(step, delay);
                    } else {
                        setIsMoving(false);
                        setActiveSquare(currentPos);
                    }
                };

                step();
            };

            const triggerVipEncounter = () => {
                if (balance < VIP_COST) return;
                setBalance(prev => prev - VIP_COST);
                
                // Elige un cantante aleatorio para el panel VIP
                const randomChar = VIP_CHARACTERS[Math.floor(Math.random() * VIP_CHARACTERS.length)];
                setVipCharacter(randomChar);
                setIsVipModeActive(true);
            };

            const handleVipSuccess = () => {
                setIsVipModeActive(false);
                setVipWon(true);
            };

            if (!difficulty) return <LevelSelector onSelect={handleStart} />;

            if (vipWon) {
                return (
                <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 text-center">
                    <div className="bg-gradient-to-b from-fuchsia-400 to-purple-600 p-12 rounded-full shadow-[0_0_100px_rgba(232,121,249,0.5)] mb-8 animate-bounce">
                    <Music className="text-white" size={100} />
                    </div>
                    <h1 className="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-300 to-purple-600 mb-6">¡GRAN BOTE VIP SINGER!</h1>
                    <p className="text-2xl text-fuchsia-100 mb-2">Adivinaste a: <strong>{vipCharacter.name}</strong></p>
                    <p className="text-xl text-slate-300 mb-12">Tu balance final es: <span className="text-green-400 font-bold text-3xl">{balance} €</span></p>
                    <button onClick={() => window.location.reload()} className="bg-white text-slate-900 px-8 py-4 rounded-full font-bold text-xl hover:scale-105 transition-all">Jugar de Nuevo</button>
                </div>
                );
            }

            return (
                <div>
                <header className="bg-indigo-900 text-white px-4 md:px-6 py-4 shadow-lg sticky top-0 z-40">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                    <div className="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start">
                        <div className="flex items-center gap-3">
                        <div className="bg-indigo-800 p-2 md:p-3 rounded-2xl"><Dices className="text-yellow-400" size={24} /></div>
                        <div>
                            <h1 className="text-xl md:text-2xl font-extrabold">Personajes de la Historia</h1>
                            <div className="text-[10px] md:text-xs font-bold text-indigo-300 uppercase tracking-wider">{difficulty} Mode - {guessedCharacters.size}/25</div>
                        </div>
                        </div>
                        
                        <div className="md:hidden flex flex-col items-end">
                        <div className="flex items-center gap-1 bg-green-600/30 px-3 py-1 rounded-lg border border-green-500/50">
                            <Coins className="text-yellow-400" size={14} />
                            <span className="font-bold text-green-300">{balance}€</span>
                        </div>
                        </div>
                    </div>
                    
                    <div className="flex flex-wrap items-center justify-center gap-3 w-full md:w-auto">
                        <div className="hidden md:flex items-center gap-2 bg-slate-900/50 px-5 py-2.5 rounded-xl border border-indigo-700">
                        <Coins className="text-yellow-400" size={20} />
                        <div className="flex flex-col">
                            <span className="text-[10px] text-slate-400 font-bold uppercase leading-none">Banco</span>
                            <span className={`font-bold text-xl leading-none ${balance < 100 ? 'text-red-400' : 'text-green-400'}`}>{balance} €</span>
                        </div>
                        </div>
                        
                        {balance >= VIP_THRESHOLD && (
                        <button onClick={triggerVipEncounter} className="relative overflow-hidden bg-gradient-to-r from-fuchsia-600 to-purple-500 text-white px-4 md:px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-[0_0_15px_rgba(232,121,249,0.5)] hover:scale-105 transition-transform">
                            <div className="absolute inset-0 shimmer"></div>
                            <Music className="relative z-10" />
                            <span className="relative z-10 hidden sm:inline">Invocar VIP Singer (-500€)</span>
                            <span className="relative z-10 sm:hidden">VIP Singer (-500€)</span>
                        </button>
                        )}

                        <DiceRoller onRoll={handleRoll} disabled={activeSquare !== null || isMoving || showFicha} uiText={{roll: difficulty === 'en' ? 'Roll' : 'Tirar', rolling: difficulty === 'en' ? 'Rolling...' : 'Tirando...'}} />
                    </div>
                    </div>
                </header>

                <main className="max-w-7xl mx-auto p-4 md:p-8">
                    
                    <Timeline 
                    guessedCharacters={guessedCharacters} 
                    allCharacters={FULL_CHARACTERS} 
                    difficulty={difficulty} 
                    />

                    <div className="bg-white p-4 md:p-8 rounded-[2rem] shadow-xl overflow-x-auto border">
                    {/* Tablero reducido a 25 casillas (5x5 Grid) */}
                    <div className="grid grid-cols-5 gap-2 md:gap-4 min-w-[300px] md:min-w-[500px] max-w-[800px] mx-auto">
                        {FULL_CHARACTERS.map((char, i) => {
                        const row = Math.floor(i / 5);
                        const col = (row % 2 === 0) ? (i % 5) : (4 - (i % 5));
                        const isCurrent = i === playerPosition;
                        const isGuessed = guessedCharacters.has(i);

                        return (
                            <div key={i} style={{ gridRow: row + 1, gridColumn: col + 1 }}
                            className={`relative aspect-square rounded-xl md:rounded-2xl border-4 flex flex-col items-center justify-center p-1 transition-all
                                ${isCurrent && !isMoving ? 'ring-4 ring-yellow-400 ring-offset-2 scale-110 z-10 bg-indigo-50 border-indigo-400 shadow-xl' : 'bg-white border-slate-200'}
                                ${isGuessed ? 'bg-green-50 border-green-400' : ''}`}
                            >
                            <span className="absolute top-1 left-2 text-[10px] font-bold text-slate-400">{i + 1}</span>
                            {isGuessed ? (
                                <><CheckCircle2 className="text-green-500 mb-1" size={24} /><span className="text-[9px] md:text-[11px] font-bold text-center leading-tight line-clamp-2 text-green-900 px-1">{char.name}</span></>
                            ) : <User className="text-slate-200" size={24} />}
                            {isCurrent && (
                                <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
                                    <div key={hopTrigger} className={`relative flex flex-col items-center justify-center w-full h-full ${isMoving ? 'animate-hop' : 'animate-bounce'}`}>
                                        <div className="w-10 h-10 md:w-12 md:h-12 bg-indigo-600 rounded-full border-4 border-white shadow-[0_5px_15px_rgba(0,0,0,0.3)] flex items-center justify-center z-10">
                                            <User className="text-white" size={16}/>
                                        </div>
                                        <div className="absolute top-10 md:top-12 mt-1 bg-slate-900 text-white text-[10px] md:text-xs font-bold px-2.5 py-0.5 rounded-full shadow-lg z-20 whitespace-nowrap border border-slate-700">
                                            {playerName}
                                        </div>
                                    </div>
                                </div>
                            )}
                            </div>
                        );
                        })}
                    </div>
                    </div>
                </main>

                {activeSquare !== null && !isVipModeActive && !showFicha && (
                    <InterviewModal 
                    character={FULL_CHARACTERS[activeSquare]} 
                    difficulty={difficulty}
                    balance={balance} setBalance={setBalance}
                    globalMicActive={globalMicActive} setGlobalMicActive={setGlobalMicActive}
                    globalVoices={globalVoices} selectedVoiceURI={selectedVoiceURI} setSelectedVoiceURI={setSelectedVoiceURI}
                    onClose={() => setActiveSquare(null)}
                    onSuccess={() => { 
                        setGuessedCharacters(prev => new Set(prev).add(activeSquare)); 
                        setShowFicha(true); 
                    }}
                    alreadyGuessed={guessedCharacters.has(activeSquare)}
                    />
                )}

                {showFicha && activeSquare !== null && (
                    <VideoFicha 
                    character={FULL_CHARACTERS[activeSquare]} 
                    difficulty={difficulty}
                    onContinue={() => {
                        setShowFicha(false);
                        setActiveSquare(null);
                    }}
                    />
                )}

                {isVipModeActive && vipCharacter && (
                    <InterviewModal 
                    character={vipCharacter} 
                    difficulty={difficulty}
                    balance={balance} setBalance={setBalance}
                    globalMicActive={globalMicActive} setGlobalMicActive={setGlobalMicActive}
                    globalVoices={globalVoices} selectedVoiceURI={selectedVoiceURI} setSelectedVoiceURI={setSelectedVoiceURI}
                    isVip={true}
                    onClose={() => setIsVipModeActive(false)}
                    onSuccess={handleVipSuccess}
                    alreadyGuessed={false}
                    />
                )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
